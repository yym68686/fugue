<svg width="260" height="56" viewBox="0 0 260 56" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Deploy to Fugue</title>
  <desc id="desc">A rounded black deploy badge with white deploy text and the Fugue brand wordmark.</desc>
  <defs>
    <style>
      @font-face {
        font-family: "FugueBrand";
        font-style: normal;
        font-weight: 700;
        src: url("data:font/ttf;base64,") format("truetype");
      }

      .badge-bg {
        fill: #000000;
      }

      .badge-outline {
        fill: none;
        stroke: #202020;
      }

      .fg-deploy {
        fill: #FFFFFF;
        font-family: "Manrope", "Avenir Next", "Segoe UI", system-ui, sans-serif;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .fg-wordmark {
        fill: #FFFFFF;
        font-family: "FugueBrand", "Syne", sans-serif;
        font-size: 30px;
        font-weight: 700;
        letter-spacing: -0.04em;
      }
    </style>
  </defs>

  <rect class="badge-bg" x="1" y="1" width="258" height="54" rx="14"/>
  <rect class="badge-outline" x="1.5" y="1.5" width="257" height="53" rx="13.5"/>
  <text class="fg-deploy" x="20" y="34">Deploy to</text>
  <text class="fg-wordmark" x="117" y="36">Fugue</text>
</svg>
