<svg width="440" height="86" viewBox="0 0 440 86" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Deploy to Fugue</title>
  <desc id="desc">A transparent SVG wordmark with black deploy to text and a Syne-styled Fugue brand wordmark.</desc>
  <defs>
    <style>
      @font-face {
        font-family: "FugueBrand";
        font-style: normal;
        font-weight: 700;
        src: url("data:font/ttf;base64,") format("truetype");
      }

      .fg-deploy {
        fill: #000000;
        font-family: "Manrope", "Avenir Next", "Segoe UI", system-ui, sans-serif;
        font-size: 27px;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .fg-wordmark {
        fill: #000000;
        font-family: "FugueBrand", "Syne", sans-serif;
        font-size: 54px;
        font-weight: 700;
        letter-spacing: -0.05em;
      }
    </style>
  </defs>

  <text class="fg-deploy" x="4" y="57">Deploy to</text>
  <text class="fg-wordmark" x="144" y="58">Fugue</text>
</svg>
