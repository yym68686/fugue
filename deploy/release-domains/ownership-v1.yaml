apiVersion: release-domain.fugue.dev/v1
kind: ReleaseDomainOwnership

domains:
  - node-local
  - authoritative-dns
  - control-plane
  - image-cache
  - backup

# Every value is resolved from the same Helm release/values builder that
# produced both manifests. No matcher infers a name from a repository path.
requiredBindings:
  - releaseName
  - releaseNamespace
  - nodeLocalNamespace
  - nodeLocalName
  - nodeLocalUpstreamServiceName
  - nodeLocalActiveName
  - dnsName
  - apiName
  - controllerName
  - telemetryAgentName
  - serviceName
  - ingressName
  - imageCacheName
  - controlPlanePostgresName
  - controlPlanePostgresSecretName
  - controlPlaneRestoreDrillName

fileRules:
  - id: non-runtime-docs
    prefix: docs/
    nonRuntime: true
  - id: non-runtime-go-tests
    suffix: _test.go
    nonRuntime: true
  - id: non-runtime-script-tests
    prefix: scripts/test_
    nonRuntime: true

  - id: control-plane-openapi-source
    exact: openapi/openapi.yaml
    domains: [control-plane]

  - id: planner-bootstrap-package
    prefix: internal/releasedomain/
    unknownReason: planner implementation is bootstrap/shared and cannot authorize itself
  - id: planner-bootstrap-command
    prefix: cmd/fugue-release-domain-plan/
    unknownReason: planner command is bootstrap/shared and cannot authorize itself
  - id: planner-bootstrap-ownership
    prefix: deploy/release-domains/
    unknownReason: ownership policy is bootstrap/shared and cannot authorize itself
  - id: planner-bootstrap-adapter
    exact: scripts/lib/control_plane_release_domains.sh
    unknownReason: release-domain adapter is bootstrap/shared and cannot authorize itself
  - id: planner-bootstrap-test
    exact: scripts/test_single_domain_release.sh
    unknownReason: release-domain activation test is bootstrap/shared
  - id: frozen-release-safety-test
    exact: scripts/test_release_domain_safety.sh
    unknownReason: release safety integration is outside Boundary A
  - id: release-entrypoint
    exact: scripts/upgrade_fugue_control_plane.sh
    unknownReason: release entrypoint is shared across every domain
  - id: workflow
    prefix: .github/workflows/
    unknownReason: workflow changes are bootstrap/shared
  - id: makefile
    exact: Makefile
    unknownReason: repository orchestration is shared
  - id: go-module
    exact: go.mod
    unknownReason: Go module graph is shared by multiple binaries and domains
  - id: go-sums
    exact: go.sum
    unknownReason: Go module graph is shared by multiple binaries and domains
  - id: helm-helpers
    exact: deploy/helm/fugue/templates/_helpers.tpl
    unknownReason: shared Helm helpers can change names, labels, selectors, and checksums across domains
  - id: helm-chart-metadata
    exact: deploy/helm/fugue/Chart.yaml
    unknownReason: Helm chart metadata and dependencies are shared
  - id: helm-chart-lock
    exact: deploy/helm/fugue/Chart.lock
    unknownReason: Helm dependency lock is shared
  - id: helm-subcharts
    prefix: deploy/helm/fugue/charts/
    unknownReason: Helm subchart changes are not owned by a single release domain
  - id: helm-crds
    prefix: deploy/helm/fugue/crds/
    unknownReason: CRD changes are outside every single-domain adapter
  - id: helm-test-hooks
    prefix: deploy/helm/fugue/templates/tests/
    unknownReason: Helm hooks require explicit rendered-hook treatment

  - id: node-local-template
    exact: deploy/helm/fugue/templates/node-local-dns-cache.yaml
    domains: [node-local]
  - id: authoritative-dns-template
    exact: deploy/helm/fugue/templates/dns-daemonset.yaml
    domains: [authoritative-dns]
  - id: authoritative-dns-groups-template
    exact: deploy/helm/fugue/templates/dns-group-daemonsets.yaml
    domains: [authoritative-dns]
  - id: control-plane-api-template
    exact: deploy/helm/fugue/templates/deployment.yaml
    domains: [control-plane]
  - id: control-plane-controller-template
    exact: deploy/helm/fugue/templates/controller-deployment.yaml
    domains: [control-plane]
  - id: control-plane-service-template
    exact: deploy/helm/fugue/templates/service.yaml
    domains: [control-plane]
  - id: control-plane-ingress-template
    exact: deploy/helm/fugue/templates/ingress.yaml
    domains: [control-plane]
  - id: control-plane-pdb-template
    exact: deploy/helm/fugue/templates/poddisruptionbudgets.yaml
    domains: [control-plane]
  - id: control-plane-cnpg-template
    exact: deploy/helm/fugue/templates/control-plane-postgres-cluster.yaml
    domains: [control-plane, backup]
  - id: control-plane-cnpg-secret-template
    exact: deploy/helm/fugue/templates/control-plane-postgres-secret.yaml
    domains: [control-plane]
  - id: backup-schedule-template
    exact: deploy/helm/fugue/templates/control-plane-postgres-scheduled-backup.yaml
    domains: [backup]
  - id: backup-restore-drill-template
    exact: deploy/helm/fugue/templates/control-plane-restore-drill-cronjob.yaml
    domains: [backup]
  - id: image-cache-template
    exact: deploy/helm/fugue/templates/image-cache-daemonset.yaml
    domains: [image-cache]

  - id: control-plane-api-image
    exact: Dockerfile.api
    domains: [control-plane]
  - id: control-plane-controller-image
    exact: Dockerfile.controller
    domains: [control-plane]
  - id: image-cache-image
    exact: Dockerfile.image-cache
    domains: [image-cache]
  - id: shared-edge-image
    exact: Dockerfile.edge
    unknownReason: the shared edge image reaches authoritative DNS and out-of-domain edge objects
  - id: backup-script
    exact: scripts/backup_fugue_postgres.sh
    domains: [backup]
  - id: restore-script
    exact: scripts/restore_fugue_postgres.sh
    domains: [backup]

# These rules require changed leaf JSON Pointers. Only current value subtrees
# whose rendered impact is confined to one release domain are allowlisted.
# Known shared/cross-domain leaves are explicitly unknown, and every unlisted
# value (including future children of these roots) remains fail-closed.
valueRules:
