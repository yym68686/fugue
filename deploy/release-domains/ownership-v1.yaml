objectRules:
  - id: node-local-priority-class
    domain: node-local
    apiGroup: scheduling.k8s.io
    version: v1
    kind: PriorityClass
    scope: Cluster
    name: ${nodeLocalName}
    requiredLabels:
      app.kubernetes.io/component: node-local-dns
      fugue.io/rollout-subsystem: cluster-dns
  - id: node-local-service-account
    domain: node-local
    apiGroup: ""
    version: v1
    kind: ServiceAccount
    scope: Namespaced
    namespace: ${nodeLocalNamespace}
    name: ${nodeLocalName}
    requiredLabels:
      app.kubernetes.io/component: node-local-dns
      fugue.io/rollout-subsystem: cluster-dns
  - id: node-local-config
    domain: node-local
    apiGroup: ""
    version: v1
    kind: ConfigMap
    scope: Namespaced
    namespace: ${nodeLocalNamespace}
    name: ${nodeLocalName}
    requiredLabels:
      app.kubernetes.io/component: node-local-dns
      fugue.io/rollout-subsystem: cluster-dns
  - id: node-local-upstream-service
    domain: node-local
    apiGroup: ""
    version: v1
    kind: Service
    scope: Namespaced
    namespace: ${nodeLocalNamespace}
    name: ${nodeLocalUpstreamServiceName}
    requiredLabels:
      app.kubernetes.io/component: node-local-dns-upstream
      fugue.io/rollout-subsystem: cluster-dns
  - id: node-local-service
    domain: node-local
    apiGroup: ""
    version: v1
    kind: Service
    scope: Namespaced
    namespace: ${nodeLocalNamespace}
    name: ${nodeLocalName}
    requiredLabels:
      app.kubernetes.io/component: node-local-dns
      fugue.io/rollout-subsystem: cluster-dns
  - id: node-local-active-service
    domain: node-local
    apiGroup: ""
    version: v1
    kind: Service
    scope: Namespaced
    namespace: ${nodeLocalNamespace}
    name: ${nodeLocalActiveName}
    requiredLabels:
      app.kubernetes.io/component: node-local-dns-active
      fugue.io/rollout-subsystem: cluster-dns
  - id: node-local-daemon-set
    domain: node-local
    apiGroup: apps
    version: v1
    kind: DaemonSet
    scope: Namespaced
    namespace: ${nodeLocalNamespace}
    name: ${nodeLocalName}
    requiredLabels:
      app.kubernetes.io/component: node-local-dns
      fugue.io/rollout-subsystem: cluster-dns
  - id: node-local-active-daemon-set
    domain: node-local
    apiGroup: apps
    version: v1
    kind: DaemonSet
    scope: Namespaced
    namespace: ${nodeLocalNamespace}
    name: ${nodeLocalActiveName}
    requiredLabels:
      app.kubernetes.io/component: node-local-dns-active
      fugue.io/rollout-subsystem: cluster-dns

  - id: authoritative-dns-daemon-set
    domain: authoritative-dns
    apiGroup: apps
    version: v1
    kind: DaemonSet
    scope: Namespaced
    namespace: ${releaseNamespace}
    name: ${dnsName}
    requiredLabels:
      app.kubernetes.io/component: dns
      fugue.io/rollout-subsystem: public-data-plane
      fugue.io/rollout-mode: direct-ondelete-protected
      fugue.io/downtime-class: online-required
  - id: authoritative-dns-group-daemon-set
    domain: authoritative-dns
    apiGroup: apps
    version: v1
    kind: DaemonSet
    scope: Namespaced
    namespace: ${releaseNamespace}
    namePrefix: ${dnsName}-
    requiredLabels:
      fugue.io/rollout-subsystem: public-data-plane
      fugue.io/rollout-mode: direct-ondelete-protected
      fugue.io/downtime-class: online-required
    nameSuffixLabel:
      key: app.kubernetes.io/component
      valuePrefix: dns-

  - id: control-plane-api-deployment
    domain: control-plane
    apiGroup: apps
    version: v1
    kind: Deployment
    scope: Namespaced
    namespace: ${releaseNamespace}
    name: ${apiName}
    requiredLabels:
      app.kubernetes.io/component: api
  - id: control-plane-controller-deployment
    domain: control-plane
    apiGroup: apps
    version: v1
    kind: Deployment
    scope: Namespaced
    namespace: ${releaseNamespace}
    name: ${controllerName}
    requiredLabels:
      app.kubernetes.io/component: controller
  - id: control-plane-telemetry-agent-deployment
    domain: control-plane
    apiGroup: apps
    version: v1
    kind: Deployment
    scope: Namespaced
    namespace: ${releaseNamespace}
    name: ${telemetryAgentName}
    requiredLabels:
      app.kubernetes.io/component: telemetry-agent
  - id: control-plane-service
    domain: control-plane
    apiGroup: ""
    version: v1
    kind: Service
    scope: Namespaced
    namespace: ${releaseNamespace}
    name: ${serviceName}
    requiredLabels:
      app.kubernetes.io/component: api
  - id: control-plane-api-pdb
    domain: control-plane
    apiGroup: policy
    version: v1
    kind: PodDisruptionBudget
    scope: Namespaced
    namespace: ${releaseNamespace}
    name: ${apiName}
    requiredLabels:
      app.kubernetes.io/component: api
  - id: control-plane-controller-pdb
    domain: control-plane
    apiGroup: policy
    version: v1
    kind: PodDisruptionBudget
    scope: Namespaced
    namespace: ${releaseNamespace}
    name: ${controllerName}
    requiredLabels:
      app.kubernetes.io/component: controller
  - id: control-plane-ingress
    domain: control-plane
    apiGroup: networking.k8s.io
    version: v1
    kind: Ingress
    scope: Namespaced
    namespace: ${releaseNamespace}
    name: ${ingressName}
  - id: control-plane-cnpg-cluster
    domain: control-plane
    apiGroup: postgresql.cnpg.io
    version: v1
    kind: Cluster
    scope: Namespaced
    namespace: ${releaseNamespace}
    name: ${controlPlanePostgresName}
    requiredLabels:
      app.kubernetes.io/component: control-plane-postgres
    pathOverrides:
      - pointer: /spec/backup
        domain: backup
  - id: control-plane-cnpg-secret
    domain: control-plane
    apiGroup: ""
    version: v1
    kind: Secret
    scope: Namespaced
    namespace: ${releaseNamespace}
    name: ${controlPlanePostgresSecretName}
    requiredLabels:
      app.kubernetes.io/component: control-plane-postgres

  - id: image-cache-daemon-set
    domain: image-cache
    apiGroup: apps
    version: v1
    kind: DaemonSet
    scope: Namespaced
    namespace: ${releaseNamespace}
    name: ${imageCacheName}
    requiredLabels:
      app.kubernetes.io/component: image-cache
      fugue.io/rollout-subsystem: node-local-build-plane

  - id: backup-scheduled-backup
    domain: backup
    apiGroup: postgresql.cnpg.io
    version: v1
    kind: ScheduledBackup
    scope: Namespaced
    namespace: ${releaseNamespace}
    name: ${controlPlanePostgresName}-backup
    requiredLabels:
      app.kubernetes.io/component: control-plane-postgres-backup
  - id: backup-restore-drill
    domain: backup
    apiGroup: batch
    version: v1
    kind: CronJob
    scope: Namespaced
    namespace: ${releaseNamespace}
    name: ${controlPlaneRestoreDrillName}
    requiredLabels:
      app.kubernetes.io/component: control-plane-restore-drill
