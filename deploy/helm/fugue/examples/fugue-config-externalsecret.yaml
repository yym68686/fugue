apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fugue-production-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: replace-me
  target:
    name: fugue-production-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        FUGUE_BOOTSTRAP_ADMIN_KEY: "{{ .bootstrap_admin_key }}"
        FUGUE_DATABASE_URL: "{{ .database_url }}"
        FUGUE_CLUSTER_JOIN_SERVER: "{{ .cluster_join_server }}"
        FUGUE_CLUSTER_JOIN_CA_HASH: "{{ .cluster_join_ca_hash }}"
        FUGUE_CLUSTER_JOIN_MESH_PROVIDER: "{{ .cluster_join_mesh_provider }}"
        FUGUE_CLUSTER_JOIN_MESH_LOGIN_SERVER: "{{ .cluster_join_mesh_login_server }}"
        FUGUE_CLUSTER_JOIN_MESH_AUTH_KEY: "{{ .cluster_join_mesh_auth_key }}"
        FUGUE_EDGE_TLS_ASK_TOKEN: "{{ .edge_tls_ask_token }}"
        POSTGRES_PASSWORD: "{{ .postgres_password }}"
  data:
    - secretKey: bootstrap_admin_key
      remoteRef:
        key: fugue/control-plane
        property: bootstrap_admin_key
    - secretKey: database_url
      remoteRef:
        key: fugue/control-plane
        property: database_url
    - secretKey: cluster_join_server
      remoteRef:
        key: fugue/control-plane
        property: cluster_join_server
    - secretKey: cluster_join_ca_hash
      remoteRef:
        key: fugue/control-plane
        property: cluster_join_ca_hash
    - secretKey: cluster_join_mesh_provider
      remoteRef:
        key: fugue/control-plane
        property: cluster_join_mesh_provider
    - secretKey: cluster_join_mesh_login_server
      remoteRef:
        key: fugue/control-plane
        property: cluster_join_mesh_login_server
    - secretKey: cluster_join_mesh_auth_key
      remoteRef:
        key: fugue/control-plane
        property: cluster_join_mesh_auth_key
    - secretKey: edge_tls_ask_token
      remoteRef:
        key: fugue/control-plane
        property: edge_tls_ask_token
    - secretKey: postgres_password
      remoteRef:
        key: fugue/control-plane
        property: postgres_password
