replicaCount: 1

bootstrapAdminKey: "fugue_bootstrap_admin_change_me"

api:
  image:
    repository: fugue-api
    tag: latest
    pullPolicy: IfNotPresent
  databaseURL: ""
  appBaseDomain: fugue.pro
  apiPublicDomain: api.fugue.pro
  registryPushBase: registry.fugue.pro
  clusterJoinServer: ""
  clusterJoinToken: ""
  clusterJoinMeshProvider: ""
  clusterJoinMeshLoginServer: ""
  clusterJoinMeshAuthKey: ""
  importWorkDir: /var/lib/fugue/import
  hostNetwork: false
  resources: {}
  extraEnv: []

controller:
  image:
    repository: fugue-controller
    tag: latest
    pullPolicy: IfNotPresent
  pollInterval: 5s
  runtimeOfflineAfter: 90s
  kubectlApply: true
  resources: {}
  extraEnv: []

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  nodePort: null

registry:
  enabled: true
  image:
    repository: registry
    tag: "2.8.3"
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 5000
    targetPort: 5000
    nodePort: 30500
  persistence:
    hostPath: /var/lib/fugue/registry
  resources: {}

headscale:
  enabled: false
  image:
    repository: headscale/headscale
    tag: "0.26.1"
    pullPolicy: IfNotPresent
  domain: mesh.fugue.pro
  service:
    type: NodePort
    port: 8080
    targetPort: 8080
    nodePort: 30443
  persistence:
    hostPath: /var/lib/fugue/headscale
  resources: {}

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  database: fugue
  username: fugue
  password: ""
  service:
    port: 5432
  persistence:
    hostPath: /var/lib/fugue/postgres
  resources: {}

persistence:
  mode: pvc
  accessMode: ReadWriteOnce
  size: 1Gi
  storageClassName: ""
  hostPath: /var/lib/fugue

rbac:
  create: true

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: fugue.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}
imagePullSecrets: []
