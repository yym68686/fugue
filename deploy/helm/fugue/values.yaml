bootstrapAdminKey: "fugue_bootstrap_admin_change_me"

api:
  replicaCount: 2
  image:
    repository: fugue-api
    tag: latest
    pullPolicy: IfNotPresent
  databaseURL: ""
  appBaseDomain: fugue.pro
  apiPublicDomain: api.fugue.pro
  registryPushBase: registry.fugue.pro
  registryPullBase: ""
  clusterJoinRegistryEndpoint: ""
  clusterJoinServer: ""
  clusterJoinToken: ""
  clusterJoinMeshProvider: ""
  clusterJoinMeshLoginServer: ""
  clusterJoinMeshAuthKey: ""
  importWorkDir: /var/lib/fugue/import
  hostNetwork: false
  minReadySeconds: 5
  terminationGracePeriodSeconds: 40
  shutdownDrainDelay: 5s
  shutdownTimeout: 25s
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  resources: {}
  extraEnv: []

controller:
  replicaCount: 2
  image:
    repository: fugue-controller
    tag: latest
    pullPolicy: IfNotPresent
  pollInterval: 5s
  fallbackPollInterval: 30s
  runtimeOfflineAfter: 90s
  kubectlApply: true
  terminationGracePeriodSeconds: 30
  nodeSelector: {}
  tolerations: []
  affinity: {}
  leaderElection:
    enabled: true
    leaseName: ""
    leaseNamespace: ""
    leaseDuration: 15s
    renewDeadline: 10s
    retryPeriod: 2s
  migrationGuard:
    legacyControllerContainerName: controller
    checkInterval: 2s
  builderScheduling:
    buildNodeLabelKey: fugue.io/build
    buildNodeLabelValue: "true"
    largeNodeLabelKey: fugue.io/build-tier
    largeNodeLabelValue: large
    mediumNodeLabelValue: medium
    smallNodeLabelValue: small
    candidateCount: 3
    selectionTimeoutSeconds: 120
    retryIntervalSeconds: 5
    reservationLeaseDurationSeconds: 120
    light:
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
          ephemeral-storage: 1Gi
        limits:
          cpu: "1"
          memory: 2Gi
          ephemeral-storage: 3Gi
      workspaceSizeLimit: 2Gi
      dockerDataSizeLimit: 4Gi
    heavy:
      resources:
        requests:
          cpu: 750m
          memory: 1Gi
          ephemeral-storage: 3Gi
        limits:
          cpu: "4"
          memory: 6Gi
          ephemeral-storage: 8Gi
      workspaceSizeLimit: 4Gi
      dockerDataSizeLimit: 8Gi
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  resources: {}
  extraEnv: []

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  nodePort: null

registry:
  enabled: true
  image:
    repository: registry
    tag: "2.8.3"
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 5000
    targetPort: 5000
    nodePort: 30500
  persistence:
    hostPath: /var/lib/fugue/registry
  nodeSelector: {}
  resources: {}

headscale:
  enabled: false
  image:
    repository: headscale/headscale
    tag: "0.26.1"
    pullPolicy: IfNotPresent
  domain: mesh.fugue.pro
  service:
    type: NodePort
    port: 8080
    targetPort: 8080
    nodePort: 30443
  persistence:
    hostPath: /var/lib/fugue/headscale
  nodeSelector: {}
  resources: {}

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  database: fugue
  username: fugue
  password: ""
  service:
    port: 5432
  persistence:
    hostPath: /var/lib/fugue/postgres
  nodeSelector: {}
  resources: {}

persistence:
  mode: emptyDir
  accessMode: ReadWriteOnce
  size: 1Gi
  storageClassName: ""
  hostPath: /var/lib/fugue

rbac:
  create: true

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: fugue.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}
imagePullSecrets: []
