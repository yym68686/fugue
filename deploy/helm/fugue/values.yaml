bootstrapAdminKey: "fugue_bootstrap_admin_change_me"

workloadIdentity:
  signingKey: ""

configSecret:
  existingSecretName: ""

api:
  replicaCount: 3
  image:
    repository: fugue-api
    tag: latest
    pullPolicy: IfNotPresent
  databaseURL: ""
  appBaseDomain: fugue.pro
  apiPublicDomain: api.fugue.pro
  edgeTLSAskToken: ""
  registryPushBase: ""
  registryPullBase: registry.fugue.internal:5000
  clusterJoinRegistryEndpoint: 127.0.0.1:30500
  clusterJoinServer: ""
  clusterJoinCAHash: ""
  clusterJoinBootstrapTokenTTL: 15m
  clusterJoinMeshProvider: ""
  clusterJoinMeshLoginServer: ""
  clusterJoinMeshAuthKey: ""
  importWorkDir: /var/lib/fugue/import
  hostNetwork: false
  minReadySeconds: 5
  terminationGracePeriodSeconds: 40
  shutdownDrainDelay: 5s
  shutdownTimeout: 25s
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  extraEnv: []

controller:
  replicaCount: 2
  image:
    repository: fugue-controller
    tag: latest
    pullPolicy: IfNotPresent
  githubSyncImportWorkers: 0
  pollInterval: 5s
  fallbackPollInterval: 30s
  runtimeOfflineAfter: 90s
  kubectlApply: true
  terminationGracePeriodSeconds: 30
  nodeSelector: {}
  tolerations: []
  affinity: {}
  leaderElection:
    enabled: true
    leaseName: ""
    leaseNamespace: ""
    leaseDuration: 15s
    renewDeadline: 10s
    retryPeriod: 2s
  migrationGuard:
    legacyControllerContainerName: controller
    checkInterval: 2s
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  resources: {}
  extraEnv: []

edge:
  enabled: true
  image:
    repository: fugue-edge
    tag: latest
    pullPolicy: IfNotPresent
  apiURL: ""
  edgeID: ""
  edgeGroupID: ""
  listenAddr: ":7832"
  healthPort: 7832
  caddy:
    enabled: false
    image:
      repository: caddy
      tag: "2.10.2-alpine"
      pullPolicy: IfNotPresent
    adminAddr: 127.0.0.1:2019
    adminURL: http://127.0.0.1:2019
    listenAddr: 127.0.0.1:18080
    tlsMode: "off"
    tlsAskURL: ""
    proxyListenAddr: 127.0.0.1:7833
    publicHostPorts:
      enabled: false
      http: 80
      https: 443
    persistence:
      hostPath: /var/lib/fugue/edge/caddy-data
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
        ephemeral-storage: 32Mi
      limits:
        memory: 256Mi
        ephemeral-storage: 256Mi
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
  syncInterval: 15s
  httpTimeout: 10s
  routesCachePath: /var/lib/fugue/edge/routes-cache.json
  tokenSecret:
    name: ""
    key: FUGUE_EDGE_TLS_ASK_TOKEN
  persistence:
    hostPath: /var/lib/fugue/edge
    mountPath: /var/lib/fugue/edge
  nodeSelector:
    fugue.io/role.edge: "true"
    fugue.io/schedulable: "true"
  tolerations:
    - key: fugue.io/dedicated
      operator: Equal
      value: edge
      effect: NoSchedule
    - key: fugue.io/tenant
      operator: Exists
      effect: NoSchedule
  affinity: {}
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
      ephemeral-storage: 32Mi
    limits:
      memory: 256Mi
      ephemeral-storage: 256Mi
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
  extraEnv: []
  groups: []

dns:
  enabled: false
  image:
    # fugue-dns is packaged in the same image as fugue-edge by default.
    repository: ""
    tag: ""
    pullPolicy: ""
  apiURL: ""
  dnsNodeID: ""
  edgeGroupID: ""
  zone: dns.fugue.pro
  answerIPs: []
  routeAAnswerIPs: []
  ttl: 60
  listenAddr: ":7834"
  healthPort: 7834
  udpAddr: "127.0.0.1:5353"
  tcpAddr: "127.0.0.1:5353"
  syncInterval: 15s
  heartbeatInterval: 30s
  httpTimeout: 10s
  cachePath: /var/lib/fugue/dns/dns-cache.json
  nameservers: []
  tokenSecret:
    name: ""
    key: FUGUE_EDGE_TLS_ASK_TOKEN
  persistence:
    hostPath: /var/lib/fugue/dns
    mountPath: /var/lib/fugue/dns
  publicHostPorts:
    enabled: false
    udp: 53
    tcp: 53
  nodeSelector:
    fugue.io/role.dns: "true"
    fugue.io/schedulable: "true"
  tolerations:
    - key: fugue.io/dedicated
      operator: Equal
      value: dns
      effect: NoSchedule
    - key: fugue.io/dedicated
      operator: Equal
      value: edge
      effect: NoSchedule
    - key: fugue.io/tenant
      operator: Exists
      effect: NoSchedule
  affinity: {}
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
      ephemeral-storage: 32Mi
    limits:
      memory: 256Mi
      ephemeral-storage: 256Mi
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
  extraEnv: []
  groups: []

imagePrePull:
  enabled: true
  image:
    repository: ""
    tag: ""
    pullPolicy: ""
  intervalSeconds: 900
  images: []
  priorityClassName: system-node-critical
  nodeSelector: {}
  # Omit affinity to use the chart default: control-plane nodes or
  # fugue.io/shared-pool=internal nodes. Set affinity: {} to opt into all
  # tolerated nodes, including tenant-owned nodes.
  tolerations:
    - operator: Exists
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
      ephemeral-storage: 16Mi
    limits:
      memory: 128Mi
      ephemeral-storage: 128Mi

topologyLabeler:
  enabled: true
  intervalSeconds: 900
  geolocationURL: https://ipapi.co/json/
  nodeSelector: {}
  # Omit affinity to use the chart default: control-plane nodes or
  # fugue.io/shared-pool=internal nodes. Set affinity: {} to opt into all
  # explicitly tolerated nodes. Do not tolerate disk-pressure here; cleanup
  # workloads such as node-janitor own abnormal-node recovery.
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Equal
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Equal
      effect: NoSchedule
    - key: fugue.io/dedicated
      operator: Equal
      value: internal
      effect: NoSchedule
  resources:
    requests:
      cpu: 5m
      memory: 32Mi
      ephemeral-storage: 16Mi
    limits:
      memory: 128Mi
      ephemeral-storage: 128Mi

nodeJanitor:
  enabled: true
  intervalSeconds: 21600
  priorityClassName: system-node-critical
  nodeSelector: {}
  # Omit affinity to use the chart default: control-plane nodes or
  # fugue.io/shared-pool=internal nodes. Set affinity: {} to opt into all
  # tolerated nodes, including tenant-owned nodes.
  tolerations:
    - operator: Exists
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
      ephemeral-storage: 32Mi
    limits:
      memory: 256Mi
      ephemeral-storage: 256Mi
  imagePrune:
    enabled: true
  runnerCleanup:
    enabled: true
    staleMinAgeHours: 24
  legacyTenantDataCleanup:
    enabled: true
    staleMinAgeHours: 168

sharedWorkspaceStorage:
  enabled: false
  storageClassName: fugue-rwx
  provisionerName: fugue.pro/nfs-rwx
  reclaimPolicy: Delete
  volumeBindingMode: Immediate
  allowVolumeExpansion: true
  archiveOnDelete: "true"
  pathPattern: "${.PVC.namespace}/${.PVC.name}"
  mountOptions:
    - vers=4.1
  server:
    image:
      repository: itsthenetwork/nfs-server-alpine
      tag: "12"
      pullPolicy: IfNotPresent
    sharedDirectory: /exports
    nfsPath: /
    hostPath: /var/lib/fugue/shared-workspaces
    clusterIP: 10.43.240.17
    nodeSelector:
      fugue.install/role: primary
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    resources: {}
  provisioner:
    image:
      repository: registry.k8s.io/sig-storage/nfs-subdir-external-provisioner
      tag: v4.0.2
      pullPolicy: IfNotPresent
    nodeSelector:
      node-role.kubernetes.io/control-plane: "true"
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    resources: {}

movableRWOStorage:
  enabled: true
  storageClassName: fugue-local-rwo
  provisionerName: rancher.io/local-path
  reclaimPolicy: Delete
  volumeBindingMode: WaitForFirstConsumer
  allowVolumeExpansion: false

registryJanitor:
  enabled: true
  schedule: "23 4 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  concurrencyPolicy: Forbid
  activeDeadlineSeconds: 1800
  startingDeadlineSeconds: 600
  nodeSelector: {}
  tolerations:
    - operator: Exists
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
      ephemeral-storage: 32Mi
    limits:
      memory: 256Mi
      ephemeral-storage: 256Mi
  gc:
    enabled: true
    skipWhenActiveJobs: true

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  nodePort: null

registry:
  enabled: true
  image:
    repository: registry
    tag: "2.8.3"
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 5000
    targetPort: 5000
    nodePort: 30500
  persistence:
    mode: hostPath
    hostPath: /var/lib/fugue/registry
    existingClaim: ""
    accessMode: ReadWriteOnce
    size: 50Gi
    storageClassName: ""
  maintenance:
    uploadPurge:
      enabled: true
      age: 168h
      interval: 24h
      dryRun: false
  nodeSelector: {}
  resources: {}

headscale:
  enabled: false
  image:
    repository: headscale/headscale
    tag: "0.26.1"
    pullPolicy: IfNotPresent
  domain: mesh.fugue.pro
  service:
    type: NodePort
    port: 8080
    targetPort: 8080
    nodePort: 30443
  persistence:
    hostPath: /var/lib/fugue/headscale
  nodeSelector: {}
  resources: {}

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  database: fugue
  username: fugue
  password: ""
  service:
    port: 5432
  persistence:
    hostPath: /var/lib/fugue/postgres
  nodeSelector: {}
  resources: {}

persistence:
  mode: emptyDir
  accessMode: ReadWriteOnce
  size: 1Gi
  storageClassName: ""
  hostPath: /var/lib/fugue

rbac:
  create: true

cnpg:
  enabled: true

cloudnative-pg:
  replicaCount: 2
  priorityClassName: system-cluster-critical
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node.kubernetes.io/not-ready
      operator: Exists
      effect: NoExecute
      tolerationSeconds: 300
    - key: node.kubernetes.io/unreachable
      operator: Exists
      effect: NoExecute
      tolerationSeconds: 300
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: fugue.install/role
                operator: NotIn
                values:
                  - primary
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: cloudnative-pg
                app.kubernetes.io/instance: fugue
  crds:
    create: true
  config:
    clusterWide: true

volsync:
  enabled: true
  manageCRDs: true

snapshotController:
  enabled: true
  replicaCount: 2
  minReadySeconds: 35
  image:
    repository: registry.k8s.io/sig-storage/snapshot-controller
    tag: v8.4.0
    pullPolicy: IfNotPresent
  extraArgs:
    - --v=5
    - --leader-election=true
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: fugue.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}
imagePullSecrets: []
