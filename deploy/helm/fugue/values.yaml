nodeLocalDNS:
  # Disabled in the reusable chart. The production upgrade/install entrypoints
  # explicitly opt in after validating the cluster DNS service and rollout mode.
  enabled: false
  # shadow only listens on localIP for explicit validation queries. iptables
  # additionally owns kubeDNSServiceIP so existing Pod DNS traffic is cached.
  mode: shadow
  # Compatibility Corefile mode for Pods created before mode-specific key
  # projection. Empty defaults to mode; phased rollouts pin the prior mode.
  legacyMode: ""
  namespace: kube-system
  localIP: 169.254.20.10
  # Required when enabled. Production entrypoints discover this from the live
  # kube-dns Service instead of assuming a Service CIDR.
  kubeDNSServiceIP: ""
  clusterDomain: cluster.local
  upstreamServiceName: ""
  image:
    repository: registry.k8s.io/dns/k8s-dns-node-cache
    tag: 1.26.8
    digest: sha256:bc6e64e2c85956af2fcc0aa720086410d41b4f31f378c9a92646fecc85cd4739
    pullPolicy: IfNotPresent
  updateStrategy:
    # OnDelete is fail-closed for DNS interception changes: the release
    # workflow replaces and verifies one node-local cache Pod at a time.
    type: OnDelete
    maxUnavailable: 1
  minReadySeconds: 10
  terminationGracePeriodSeconds: 30
  upstreamSelector:
    k8s-app: kube-dns
  nodeSelector:
    kubernetes.io/os: linux
  # Required when enabled. Each entry is an exact kubernetes.io/hostname value;
  # the chart renders the cohort as required node affinity.
  targetNodes: []
  # Explicitly quarantined nodes that must retain their previous NodeLocal mode
  # while the online targetNodes cohort rolls out independently. When non-empty,
  # legacyMode is required and the two hostname lists must be disjoint.
  preservedOfflineNodes: []
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
    - effect: NoExecute
      operator: Exists
    - effect: NoSchedule
      operator: Exists
  resources:
    requests:
      cpu: 25m
      memory: 5Mi

