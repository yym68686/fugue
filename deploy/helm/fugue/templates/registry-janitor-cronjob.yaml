{{- if and .Values.registry.enabled .Values.registryJanitor.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "fugue.registryJanitorName" . }}
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "registry-janitor") | nindent 4 }}
spec:
  schedule: {{ .Values.registryJanitor.schedule | quote }}
  concurrencyPolicy: {{ .Values.registryJanitor.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.registryJanitor.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.registryJanitor.failedJobsHistoryLimit }}
  startingDeadlineSeconds: {{ .Values.registryJanitor.startingDeadlineSeconds }}
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ .Values.registryJanitor.activeDeadlineSeconds }}
      template:
        metadata:
          labels:
            {{- include "fugue.componentSelectorLabels" (dict "root" . "component" "registry-janitor") | nindent 12 }}
            {{- with .Values.podLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            checksum/config-secret: {{ include "fugue.configSecretChecksum" . }}
            {{- with .Values.podAnnotations }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        spec:
          restartPolicy: OnFailure
          serviceAccountName: {{ include "fugue.serviceAccountName" . }}
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: registry-janitor
              image: {{ include "fugue.imageRef" (dict "repository" .Values.controller.image.repository "tag" .Values.controller.image.tag "digest" .Values.controller.image.digest) | quote }}
              imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
              command:
                - /bin/bash
                - -lc
                - |
                  set -euo pipefail

                  registry_base="http://{{ include "fugue.fullname" . }}-registry:{{ .Values.registry.service.port }}"
                  gc_lease="{{ include "fugue.registryGCName" . }}"

                  log() {
                    printf '[registry-janitor] %s\n' "$*"
                  }

                  parse_json_array() {
                    local payload=""
                    payload="$(tr -d '\n')"
                    if ! printf '%s' "${payload}" | grep -q '\['; then
                      return 0
                    fi
                    printf '%s' "${payload}" | sed -e 's/.*\[[[:space:]]*//' -e 's/[[:space:]]*\].*//' -e 's/","/\n/g' -e 's/^"//' -e 's/"$//'
                  }

                  registry_catalog() {
                    curl -fsS --max-time 10 "${registry_base}/v2/_catalog?n=1000" 2>/dev/null || printf '%s' '{"repositories":[]}'
                  }

                  registry_tags() {
                    curl -fsS --max-time 10 "${registry_base}/v2/$1/tags/list" 2>/dev/null || printf '%s' '{"tags":[]}'
                  }

                  registry_manifest_digest() {
                    curl -fsSI \
                      --max-time 10 \
                      -H 'Accept: application/vnd.docker.distribution.manifest.v2+json, application/vnd.oci.image.manifest.v1+json, application/vnd.oci.image.index.v1+json' \
                      "${registry_base}/v2/$1/manifests/$2" 2>/dev/null \
                      | awk -F': ' 'tolower($1) == "docker-content-digest" {print $2}' \
                      | tr -d '\r' \
                      | head -n 1 || true
                  }

                  ensure_gc_lease() {
                    if kubectl -n "${POD_NAMESPACE}" get "lease/${gc_lease}" >/dev/null 2>&1; then
                      return 0
                    fi
                    cat <<EOF | kubectl -n "${POD_NAMESPACE}" create -f - >/dev/null
                  apiVersion: coordination.k8s.io/v1
                  kind: Lease
                  metadata:
                    name: ${gc_lease}
                    labels:
                      app.kubernetes.io/managed-by: fugue
                      app.kubernetes.io/component: registry-gc
                  spec:
                    holderIdentity: registry-janitor
                  EOF
                  }

                  ensure_gc_lease
                  if [[ "$(kubectl -n "${POD_NAMESPACE}" get "lease/${gc_lease}" \
                    -o jsonpath='{.metadata.annotations.fugue\.pro/registry-gc-running}' 2>/dev/null)" == "true" ]]; then
                    log "skip retention: protected registry GC is running"
                    exit 0
                  fi

                  workload_values="/tmp/registry-workload-values"
                  if ! kubectl get deployments,statefulsets,daemonsets --all-namespaces \
                    -o jsonpath='{range .items[*]}{range .spec.template.spec.initContainers[*]}{.image}{"\n"}{range .env[*]}{.value}{"\n"}{end}{end}{range .spec.template.spec.containers[*]}{.image}{"\n"}{range .env[*]}{.value}{"\n"}{end}{end}{end}' \
                    >"${workload_values}"; then
                    log "abort retention: workload image reference scan failed"
                    exit 1
                  fi

                  declare -A keep_refs=()
                  declare -A keep_digests=()
                  while read -r value; do
                    [[ -n "${value}" ]] || continue
                    if [[ "${value}" =~ @sha256:[0-9a-fA-F]{64} ]]; then
                      digest="${BASH_REMATCH[0]#@}"
                      keep_digests["${digest,,}"]=1
                    fi
                    ref="${value}"
                    if [[ "${ref}" == */* ]]; then
                      ref="${ref#*/}"
                    fi
                    case "${ref}" in
                      *:*)
                        keep_refs["${ref}"]=1
                        ;;
                    esac
                  done < <(awk 'NF > 0' "${workload_values}")

                  deleted_count=0
                  while read -r repo; do
                    [[ -n "${repo}" ]] || continue
                    case "${repo}" in
                      fugue-apps/*)
                        log "skip managed app image repo ${repo}; controller retention owns these manifests"
                        continue
                        ;;
                    esac
                    while read -r tag; do
                      [[ -n "${tag}" ]] || continue
                      key="${repo}:${tag}"
                      if [[ -n "${keep_refs[${key}]:-}" ]]; then
                        continue
                      fi
                      digest="$(registry_manifest_digest "${repo}" "${tag}")"
                      digest="${digest,,}"
                      if [[ -z "${digest}" || -n "${keep_digests[${digest}]:-}" ]]; then
                        continue
                      fi
                      if curl -fsS --max-time 10 -X DELETE "${registry_base}/v2/${repo}/manifests/${digest}" >/dev/null; then
                        deleted_count=$((deleted_count + 1))
                        log "deleted stale registry tag ${key}"
                      else
                        log "skip deleting ${key}: registry delete request failed"
                      fi
                    done < <(registry_tags "${repo}" | parse_json_array)
                  done < <(registry_catalog | parse_json_array)

                  if [[ "${deleted_count}" -gt 0 ]]; then
                    kubectl -n "${POD_NAMESPACE}" annotate "lease/${gc_lease}" --overwrite \
                      fugue.pro/registry-gc-requested-at="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                      fugue.pro/registry-gc-request-reason="registry janitor deleted ${deleted_count} stale manifests" >/dev/null
                  fi
                  log "retention completed; deleted_manifests=${deleted_count}"
              env:
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
              resources:
                {{- toYaml .Values.registryJanitor.resources | nindent 16 }}
          {{- with .Values.registryJanitor.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.registryJanitor.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
