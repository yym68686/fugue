{{- if .Values.observability.logs.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-observability-loki" (include "fugue.fullname" .) }}
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "observability-loki") | nindent 4 }}
data:
  loki.yml: |
    auth_enabled: false
    server:
      http_listen_port: {{ .Values.observability.logs.port }}
    common:
      path_prefix: /loki
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      retention_period: {{ .Values.observability.logs.retention }}
    compactor:
      working_directory: /loki/compactor
      retention_enabled: true
      delete_request_store: filesystem
{{- end }}
