{{- if .Values.observability.metrics.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-observability-prometheus" (include "fugue.fullname" .) }}
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "observability-prometheus") | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.observability.metrics.scrapeInterval }}
      evaluation_interval: {{ .Values.observability.metrics.evaluationInterval }}
    rule_files:
      - /etc/prometheus/fugue-alerts.yml
    {{ if .Values.observability.alerts.enabled }}
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - {{ printf "%s-observability-alertmanager:%v" (include "fugue.fullname" .) .Values.observability.alerts.port | quote }}
    {{ end }}
    scrape_configs:
      - job_name: fugue-observability-prometheus
        metrics_path: /metrics
        static_configs:
          - targets:
              - {{ printf "127.0.0.1:%v" .Values.observability.metrics.port | quote }}
      {{ if .Values.observability.agent.enabled }}
      - job_name: fugue-telemetry-agent
        metrics_path: /metrics
        static_configs:
          - targets:
              - {{ printf "%s-telemetry-agent:%v" (include "fugue.fullname" .) .Values.observability.agent.port | quote }}
      {{ end }}
      - job_name: fugue-control-plane-pods
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ .Release.Namespace | quote }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_instance]
            regex: {{ .Release.Name | quote }}
            action: keep
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            regex: "api|controller|edge|dns|telemetry-agent|observability-prometheus|.*-front"
            action: keep
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component, __meta_kubernetes_pod_container_port_name]
            regex: "api;http"
            action: drop
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            regex: "http|metrics|health"
            action: keep
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            target_label: component
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - target_label: namespace
            replacement: {{ .Release.Namespace | quote }}
      - job_name: fugue-kubernetes-nodes
        scheme: https
        authorization:
          credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node
      - job_name: fugue-kubernetes-cadvisor
        scheme: https
        authorization:
          credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node
      - job_name: fugue-managed-postgres-pods
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_managed_by]
            regex: cloudnative-pg
            action: keep
          - source_labels: [__meta_kubernetes_pod_label_cnpg_io_cluster]
            regex: .+
            action: keep
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            regex: "metrics|http-metrics|prometheus"
            action: keep
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_cnpg_io_cluster]
            target_label: postgres_cluster
      {{ with .Values.observability.metrics.extraScrapeConfigs }}
{{ toYaml . | nindent 6 }}
      {{ end }}
  fugue-alerts.yml: |
    groups:
      - name: fugue-default-app-health
        rules:
          - alert: FugueAppNoReadyPods
            expr: fugue_app_ready == 0
            for: 5m
            labels:
              severity: page
            annotations:
              summary: "Fugue app has no ready pods"
              description: "An app reported no ready pods for more than 5 minutes."
          - alert: FugueAppHighErrorRate
            expr: |
              (
                sum by (tenant_id, project_id, app_id) (rate(fugue_app_response_status_total{status_class=~"5xx"}[5m]))
                /
                sum by (tenant_id, project_id, app_id) (rate(fugue_app_requests_total[5m]))
              ) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Fugue app 5xx rate is high"
              description: "An app exceeded 5% 5xx responses for more than 5 minutes."
          - alert: FugueAppHighP95Duration
            expr: |
              histogram_quantile(
                0.95,
                sum by (tenant_id, project_id, app_id, le) (rate(fugue_app_duration_seconds_bucket[5m]))
              ) > 5
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Fugue app p95 duration is high"
              description: "An app exceeded 5 seconds p95 duration for more than 10 minutes."
          - alert: FugueAppRestartBurst
            expr: increase(fugue_app_restarts_total[10m]) > 3
            for: 0m
            labels:
              severity: warning
            annotations:
              summary: "Fugue app restarted repeatedly"
              description: "An app restarted more than 3 times in 10 minutes."
      - name: fugue-operation-evidence
        rules:
          - alert: FugueRolloutEvidenceCaptureFailed
            expr: sum(fugue_rollout_failure_evidence_capture_total{result="error"}) > 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Fugue rollout evidence capture is failing"
              description: "At least one rollout evidence collector error has been retained by the control plane. Inspect operation evidence before trusting root-cause diagnosis completeness."
          - alert: FugueOperationInsufficientEvidenceRatioHigh
            expr: |
              (
                sum(fugue_operation_evidence_records_total{confidence="insufficient_evidence"})
                /
                clamp_min(sum(fugue_operation_evidence_records_total), 1)
              ) > 0.20
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Fugue operation evidence is frequently insufficient"
              description: "More than 20% of retained operation evidence records are marked insufficient_evidence. Collector coverage or permissions may be incomplete."
          - alert: FugueReleaseAttemptStuck
            expr: sum(fugue_release_attempts_total{status=~"pending|importing|deploying|rolling_out|health_checking"}) > 0
            for: 30m
            labels:
              severity: warning
            annotations:
              summary: "Fugue release attempt may be stuck"
              description: "At least one release attempt has remained in a non-terminal status long enough to require investigation. Use fugue app release attempts/status/explain to inspect the phase timeline."
      - name: fugue-edge-request-body
        rules:
          - alert: FugueEdgeSlowRequestBodyRead
            expr: |
              (
                sum by (edge_id, app, hostname, path_prefix, route_kind, client_country, client_asn) (rate(fugue_edge_request_body_read_seconds_sum[5m]))
                /
                sum by (edge_id, app, hostname, path_prefix, route_kind, client_country, client_asn) (rate(fugue_edge_request_body_read_seconds_count[5m]))
              ) > 30
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Fugue edge request body reads are slow"
              description: "Buffered request body reads averaged more than 30 seconds over 5 minutes for an edge/app/route/client segment."
          - alert: FugueEdgeLowRequestBodyThroughput
            expr: |
              (
                sum by (edge_id, app, hostname, path_prefix, route_kind, client_country, client_asn) (rate(fugue_edge_request_body_throughput_bps_sum[5m]))
                /
                sum by (edge_id, app, hostname, path_prefix, route_kind, client_country, client_asn) (rate(fugue_edge_request_body_throughput_bps_count[5m]))
              ) < 65536
              and
              sum by (edge_id, app, hostname, path_prefix, route_kind, client_country, client_asn) (rate(fugue_edge_request_body_throughput_bps_count[5m])) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Fugue edge request body throughput is low"
              description: "Buffered request body throughput averaged below 64 KiB/s over 5 minutes for an edge/app/route/client segment."
          - alert: FugueEdgeFrontHighClientTCPRetransmits
            expr: |
              (
                sum by (edge_id, edge_group_id, node_host, protocol) (rate(fugue_edge_front_client_tcp_total_retrans_sum[5m]))
                /
                sum by (edge_id, edge_group_id, node_host, protocol) (rate(fugue_edge_front_client_tcp_total_retrans_count[5m]))
              ) > 5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Fugue edge-front client TCP retransmits are high"
              description: "Completed public TCP connections averaged more than 5 retransmits over 5 minutes for an edge node/protocol segment."
          - alert: FugueEdgeNodeTCPRetransmitRateHigh
            expr: |
              rate(fugue_edge_node_tcp_counter{protocol="Tcp",name="RetransSegs"}[5m]) > 100
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Fugue edge node TCP retransmit rate is high"
              description: "The edge node TCP RetransSegs counter increased faster than 100 segments/sec for more than 5 minutes."
          - alert: FugueEdgeNodeTCPMetricsUnavailable
            expr: fugue_edge_node_tcp_proc_read_error == 1
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Fugue edge node TCP metrics are unavailable"
              description: "edge-front could not read the configured /proc/net TCP counters from the edge node."
      - name: fugue-robustness
        rules:
          - alert: FugueRobustnessBundlePublishRejected
            expr: fugue_robustness_bundle_publish_rejections_recent > 0
            for: 0m
            labels:
              severity: page
            annotations:
              summary: "Fugue rejected a generated data-plane bundle"
              description: "A route, DNS, TLS, or generated-state invariant rejected a bundle. Inspect fugue admin robustness incidents before retrying rollout."
          - alert: FugueRobustnessNodeGenerationDrift
            expr: fugue_robustness_node_generation_drift_seconds > 600
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Fugue node generation drift persists"
              description: "An edge or DNS node has reported a stale generation for more than 10 minutes. Inspect node-health guardian evidence and resync or quarantine the affected node."
          - alert: FugueRobustnessLKGServing
            expr: fugue_robustness_lkg_serving == 1
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Fugue node is serving LKG"
              description: "An edge or DNS node has served last-known-good or degraded cached state for more than 15 minutes. Confirm the control plane can publish a new valid bundle."
          - alert: FugueRobustnessBackupStale
            expr: fugue_robustness_backup_last_success_age_seconds > 90000
            for: 30m
            labels:
              severity: warning
            annotations:
              summary: "Fugue backup freshness is stale"
              description: "A backup policy has not recorded a successful backup within the expected 25-hour window."
      - name: fugue-registry-maintenance
        rules:
          - record: fugue_registry_pvc_usage_ratio
            expr: |
              max(
                kubelet_volume_stats_used_bytes{
                  namespace={{ .Release.Namespace | quote }},
                  persistentvolumeclaim={{ include "fugue.registryDataClaimName" . | quote }}
                }
              )
              /
              max(
                kubelet_volume_stats_capacity_bytes{
                  namespace={{ .Release.Namespace | quote }},
                  persistentvolumeclaim={{ include "fugue.registryDataClaimName" . | quote }}
                }
              )
          - alert: FugueRegistryMaintenanceJobMissing
            expr: fugue_registry_janitor_present == 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Fugue registry maintenance job is missing"
              description: "A required registry retention or garbage-collection CronJob is absent or suspended."
          - alert: FugueRegistryPVCUsageHigh
            expr: |
              fugue_registry_pvc_usage_ratio > 0.80
              or
              (
                fugue_registry_storage_capacity_bytes > 0
                and
                fugue_registry_storage_used_bytes / fugue_registry_storage_capacity_bytes > 0.80
              )
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Fugue registry PVC usage is high"
              description: "The bundled registry storage filesystem has remained above 80% utilization."
          - alert: FugueRegistryUnreferencedBlobsHigh
            expr: fugue_registry_unreferenced_blob_bytes > 10737418240
            for: 30m
            labels:
              severity: warning
            annotations:
              summary: "Fugue registry has excessive unreferenced blobs"
              description: "More than 10 GiB of registry blobs are not reachable from retained manifests or workload digests."
          - alert: FugueRegistryGCOverdue
            expr: |
              (
                fugue_registry_gc_requested == 1
                and
                fugue_registry_gc_last_success_timestamp_seconds == 0
              )
              or
              (
                fugue_registry_gc_last_success_timestamp_seconds > 0
                and
                time() - fugue_registry_gc_last_success_timestamp_seconds > 108000
              )
            for: 30m
            labels:
              severity: warning
            annotations:
              summary: "Fugue registry garbage collection is overdue"
              description: "Protected registry garbage collection has never succeeded or has not succeeded in the last 30 hours."
{{- end }}
