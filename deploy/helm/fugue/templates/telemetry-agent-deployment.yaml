{{- if .Values.observability.agent.enabled }}
{{- $agentNodeSelector := .Values.observability.agent.nodeSelector -}}
{{- $agentTolerations := default .Values.tolerations .Values.observability.agent.tolerations -}}
{{- $agentAffinity := default .Values.affinity .Values.observability.agent.affinity -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-telemetry-agent" (include "fugue.fullname" .) }}
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "telemetry-agent") | nindent 4 }}
spec:
  replicas: {{ .Values.observability.agent.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "fugue.componentSelectorLabels" (dict "root" . "component" "telemetry-agent") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fugue.componentSelectorLabels" (dict "root" . "component" "telemetry-agent") | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.observability.agent.terminationGracePeriodSeconds }}
      {{- if .Values.rbac.create }}
      serviceAccountName: {{ include "fugue.serviceAccountName" . }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: telemetry-agent
          image: {{ include "fugue.imageRef" (dict "repository" .Values.observability.agent.image.repository "tag" .Values.observability.agent.image.tag "digest" .Values.observability.agent.image.digest) | quote }}
          imagePullPolicy: {{ .Values.observability.agent.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.observability.agent.port }}
              protocol: TCP
          env:
            - name: FUGUE_TELEMETRY_AGENT_BIND_ADDR
              value: {{ .Values.observability.agent.bindAddr | quote }}
            - name: FUGUE_OBSERVABILITY_ENABLED
              value: {{ .Values.observability.enabled | quote }}
            - name: FUGUE_OBSERVABILITY_RETENTION
              value: {{ .Values.observability.retention | quote }}
            - name: FUGUE_OBSERVABILITY_TENANT_EVENT_QUOTA_PER_MINUTE
              value: {{ .Values.observability.tenantEventQuotaPerMinute | quote }}
            - name: FUGUE_OBSERVABILITY_APP_EVENT_QUOTA_PER_MINUTE
              value: {{ .Values.observability.appEventQuotaPerMinute | quote }}
            - name: FUGUE_OBSERVABILITY_TENANT_EVENT_QUOTA_OVERRIDES
              value: {{ .Values.observability.tenantEventQuotaOverrides | quote }}
            - name: FUGUE_OBSERVABILITY_APP_RETENTION_OVERRIDES
              value: {{ .Values.observability.appRetentionOverrides | quote }}
            - name: FUGUE_OBSERVABILITY_RUNTIME_LOG_PATHS
              value: {{ .Values.observability.agent.runtimeLogPaths | quote }}
            - name: FUGUE_OBSERVABILITY_PROMETHEUS_SCRAPE_URLS
              value: {{ .Values.observability.agent.prometheusScrapeURLs | quote }}
            - name: FUGUE_OBSERVABILITY_SCRAPE_INTERVAL
              value: {{ .Values.observability.agent.scrapeInterval | quote }}
            - name: FUGUE_OBSERVABILITY_KUBERNETES_LOGS_ENABLED
              value: {{ .Values.observability.agent.kubernetesLogs.enabled | quote }}
            - name: FUGUE_OBSERVABILITY_KUBERNETES_LOG_NAMESPACES
              value: {{ default .Release.Namespace .Values.observability.agent.kubernetesLogs.namespaces | quote }}
            - name: FUGUE_OBSERVABILITY_KUBERNETES_LOG_NAMESPACE_PREFIXES
              value: {{ .Values.observability.agent.kubernetesLogs.namespacePrefixes | quote }}
            - name: FUGUE_OBSERVABILITY_KUBERNETES_LOG_LABEL_SELECTOR
              value: {{ .Values.observability.agent.kubernetesLogs.labelSelector | quote }}
            - name: FUGUE_OBSERVABILITY_KUBERNETES_LOG_POLL_INTERVAL
              value: {{ .Values.observability.agent.kubernetesLogs.pollInterval | quote }}
            - name: FUGUE_OBSERVABILITY_KUBERNETES_LOG_TAIL_LINES
              value: {{ .Values.observability.agent.kubernetesLogs.tailLines | int64 | quote }}
            - name: FUGUE_OBSERVABILITY_KUBERNETES_LOG_MAX_PODS
              value: {{ .Values.observability.agent.kubernetesLogs.maxPods | int64 | quote }}
            - name: FUGUE_OBSERVABILITY_KUBERNETES_LOG_MAX_LINES_PER_CYCLE
              value: {{ .Values.observability.agent.kubernetesLogs.maxLinesPerCycle | int64 | quote }}
            - name: FUGUE_OBSERVABILITY_QUEUE_SIZE
              value: {{ .Values.observability.agent.queueSize | int64 | quote }}
            - name: FUGUE_OBSERVABILITY_BATCH_SIZE
              value: {{ .Values.observability.agent.batchSize | int64 | quote }}
            - name: FUGUE_OBSERVABILITY_MAX_PAYLOAD_BYTES
              value: {{ .Values.observability.agent.maxPayloadBytes | int64 | quote }}
            - name: FUGUE_OBSERVABILITY_MEMORY_LIMIT_BYTES
              value: {{ .Values.observability.agent.memoryLimitBytes | int64 | quote }}
            - name: FUGUE_OBSERVABILITY_RETRY_MAX_ATTEMPTS
              value: {{ .Values.observability.agent.retryMaxAttempts | int64 | quote }}
            - name: FUGUE_OBSERVABILITY_TENANT_ID
              value: {{ .Values.observability.identity.tenantID | quote }}
            - name: FUGUE_OBSERVABILITY_PROJECT_ID
              value: {{ .Values.observability.identity.projectID | quote }}
            - name: FUGUE_OBSERVABILITY_APP_ID
              value: {{ .Values.observability.identity.appID | quote }}
            - name: FUGUE_OBSERVABILITY_RUNTIME_ID
              value: {{ .Values.observability.identity.runtimeID | quote }}
            - name: FUGUE_OBSERVABILITY_COMPONENT
              value: {{ .Values.observability.identity.component | quote }}
            {{- if .Values.observability.exporterSecret.existingSecretName }}
            - name: FUGUE_OBSERVABILITY_METRICS_REMOTE_WRITE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.observability.exporterSecret.existingSecretName | quote }}
                  key: {{ .Values.observability.exporterSecret.metricsRemoteWriteURLKey | quote }}
                  optional: true
            - name: FUGUE_OBSERVABILITY_METRICS_QUERY_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.observability.exporterSecret.existingSecretName | quote }}
                  key: {{ .Values.observability.exporterSecret.metricsQueryURLKey | quote }}
                  optional: true
            - name: FUGUE_OBSERVABILITY_LOKI_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.observability.exporterSecret.existingSecretName | quote }}
                  key: {{ .Values.observability.exporterSecret.lokiURLKey | quote }}
                  optional: true
            - name: FUGUE_OBSERVABILITY_CLICKHOUSE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.observability.exporterSecret.existingSecretName | quote }}
                  key: {{ .Values.observability.exporterSecret.clickHouseDSNKey | quote }}
                  optional: true
            - name: FUGUE_OBSERVABILITY_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.observability.exporterSecret.existingSecretName | quote }}
                  key: {{ .Values.observability.exporterSecret.otlpEndpointKey | quote }}
                  optional: true
            {{- else }}
            {{- if .Values.observability.metrics.enabled }}
            - name: FUGUE_OBSERVABILITY_METRICS_REMOTE_WRITE_URL
              value: {{ printf "http://%s-observability-prometheus:%v/api/v1/write" (include "fugue.fullname" .) .Values.observability.metrics.port | quote }}
            - name: FUGUE_OBSERVABILITY_METRICS_QUERY_URL
              value: {{ printf "http://%s-observability-prometheus:%v/api/v1/query" (include "fugue.fullname" .) .Values.observability.metrics.port | quote }}
            {{- end }}
            {{- if .Values.observability.logs.enabled }}
            - name: FUGUE_OBSERVABILITY_LOKI_URL
              value: {{ printf "http://%s-observability-loki:%v/loki/api/v1/push" (include "fugue.fullname" .) .Values.observability.logs.port | quote }}
            {{- end }}
            {{- if .Values.observability.analytics.enabled }}
            - name: FUGUE_OBSERVABILITY_CLICKHOUSE_DSN
              value: {{ printf "http://%s-observability-clickhouse:%v?database=fugue_observability" (include "fugue.fullname" .) .Values.observability.analytics.httpPort | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.observability.agent.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.observability.agent.resources | nindent 12 }}
      {{- with $agentNodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $agentAffinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $agentTolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
