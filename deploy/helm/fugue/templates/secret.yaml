{{- if not .Values.configSecret.existingSecretName }}
{{- $secretName := include "fugue.configSecretName" . -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $bootstrapAdminKey := .Values.bootstrapAdminKey -}}
{{- if and (eq $bootstrapAdminKey "") $existingSecret -}}
  {{- $bootstrapAdminKey = (index $existingSecret.data "FUGUE_BOOTSTRAP_ADMIN_KEY" | b64dec) -}}
{{- end -}}
{{- if eq $bootstrapAdminKey "" -}}
  {{- $bootstrapAdminKey = "fugue_bootstrap_admin_change_me" -}}
{{- end -}}
{{- $workloadIdentitySigningKey := .Values.workloadIdentity.signingKey -}}
{{- if and (eq $workloadIdentitySigningKey "") $existingSecret -}}
  {{- $existingWorkloadIdentitySigningKey := index $existingSecret.data "FUGUE_WORKLOAD_IDENTITY_SIGNING_KEY" -}}
  {{- if $existingWorkloadIdentitySigningKey -}}
    {{- $workloadIdentitySigningKey = ($existingWorkloadIdentitySigningKey | b64dec) -}}
  {{- end -}}
{{- end -}}
{{- if eq $workloadIdentitySigningKey "" -}}
  {{- $workloadIdentitySigningKey = randAlphaNum 48 -}}
{{- end -}}
{{- $bundleSigningKey := .Values.bundle.signingKey -}}
{{- if and (eq $bundleSigningKey "") $existingSecret -}}
  {{- $existingBundleSigningKey := index $existingSecret.data "FUGUE_BUNDLE_SIGNING_KEY" -}}
  {{- if $existingBundleSigningKey -}}
    {{- $bundleSigningKey = ($existingBundleSigningKey | b64dec) -}}
  {{- end -}}
{{- end -}}
{{- if eq $bundleSigningKey "" -}}
  {{- $bundleSigningKey = randAlphaNum 48 -}}
{{- end -}}
{{- $bundleSigningPreviousKey := .Values.bundle.previousSigningKey -}}
{{- if and (eq $bundleSigningPreviousKey "") $existingSecret -}}
  {{- $existingBundleSigningPreviousKey := index $existingSecret.data "FUGUE_BUNDLE_SIGNING_PREVIOUS_KEY" -}}
  {{- if $existingBundleSigningPreviousKey -}}
    {{- $bundleSigningPreviousKey = ($existingBundleSigningPreviousKey | b64dec) -}}
  {{- end -}}
{{- end -}}
{{- $postgresPassword := .Values.postgres.password -}}
{{- if and (eq $postgresPassword "") $existingSecret -}}
  {{- $existingPostgresPassword := index $existingSecret.data "POSTGRES_PASSWORD" -}}
  {{- if $existingPostgresPassword -}}
    {{- $postgresPassword = ($existingPostgresPassword | b64dec) -}}
  {{- end -}}
{{- end -}}
{{- if and .Values.postgres.enabled (eq $postgresPassword "") -}}
  {{- $postgresPassword = randAlphaNum 32 -}}
{{- end -}}
{{- $databaseURL := .Values.api.databaseURL -}}
{{- if eq $databaseURL "" -}}
  {{- if and .Values.controlPlanePostgres.enabled .Values.controlPlanePostgres.useForAPI -}}
    {{- $controlPlanePostgresPassword := .Values.controlPlanePostgres.password -}}
    {{- $controlPlanePostgresSecretName := include "fugue.controlPlanePostgresSecretName" . -}}
    {{- $existingControlPlanePostgresSecret := lookup "v1" "Secret" .Release.Namespace $controlPlanePostgresSecretName -}}
    {{- if and (eq $controlPlanePostgresPassword "") $existingControlPlanePostgresSecret -}}
      {{- $existingPassword := index $existingControlPlanePostgresSecret.data "password" -}}
      {{- if $existingPassword -}}
        {{- $controlPlanePostgresPassword = ($existingPassword | b64dec) -}}
      {{- end -}}
    {{- end -}}
    {{- if and (eq $controlPlanePostgresPassword "") $existingSecret -}}
      {{- $existingPostgresPassword := index $existingSecret.data "POSTGRES_PASSWORD" -}}
      {{- if $existingPostgresPassword -}}
        {{- $controlPlanePostgresPassword = ($existingPostgresPassword | b64dec) -}}
      {{- end -}}
    {{- end -}}
    {{- if eq $controlPlanePostgresPassword "" -}}
      {{- fail "controlPlanePostgres.useForAPI=true requires an existing control-plane postgres secret, existing config POSTGRES_PASSWORD, or controlPlanePostgres.password" -}}
    {{- end -}}
    {{- $databaseURL = printf "postgres://%s:%s@%s.%s.svc.cluster.local:%v/%s?sslmode=disable" .Values.controlPlanePostgres.username $controlPlanePostgresPassword (include "fugue.controlPlanePostgresRWServiceName" .) .Release.Namespace 5432 .Values.controlPlanePostgres.database -}}
  {{- else if .Values.postgres.enabled -}}
    {{- $databaseURL = printf "postgres://%s:%s@%s:%v/%s?sslmode=disable" .Values.postgres.username $postgresPassword (include "fugue.postgresServiceName" .) .Values.postgres.service.port .Values.postgres.database -}}
  {{- else -}}
    {{- fail "api.databaseURL must be set when postgres.enabled=false" -}}
  {{- end -}}
{{- end -}}
{{- $clusterJoinMeshAuthKey := .Values.api.clusterJoinMeshAuthKey -}}
{{- if and (eq $clusterJoinMeshAuthKey "") $existingSecret -}}
  {{- $existingClusterJoinMeshAuthKey := index $existingSecret.data "FUGUE_CLUSTER_JOIN_MESH_AUTH_KEY" -}}
  {{- if $existingClusterJoinMeshAuthKey -}}
    {{- $clusterJoinMeshAuthKey = ($existingClusterJoinMeshAuthKey | b64dec) -}}
  {{- end -}}
{{- end -}}
{{- $edgeTLSAskToken := .Values.api.edgeTLSAskToken -}}
{{- if and (eq $edgeTLSAskToken "") $existingSecret -}}
  {{- $existingEdgeTLSAskToken := index $existingSecret.data "FUGUE_EDGE_TLS_ASK_TOKEN" -}}
  {{- if $existingEdgeTLSAskToken -}}
    {{- $edgeTLSAskToken = ($existingEdgeTLSAskToken | b64dec) -}}
  {{- end -}}
{{- end -}}
{{- if eq $edgeTLSAskToken "" -}}
  {{- $edgeTLSAskToken = randAlphaNum 48 -}}
{{- end -}}
{{- $dataBackendAccessKeyID := .Values.api.dataBackend.accessKeyID -}}
{{- if and (eq $dataBackendAccessKeyID "") $existingSecret -}}
  {{- $existingDataBackendAccessKeyID := index $existingSecret.data "FUGUE_DATA_BACKEND_ACCESS_KEY_ID" -}}
  {{- if $existingDataBackendAccessKeyID -}}
    {{- $dataBackendAccessKeyID = ($existingDataBackendAccessKeyID | b64dec) -}}
  {{- end -}}
{{- end -}}
{{- $dataBackendSecretAccessKey := .Values.api.dataBackend.secretAccessKey -}}
{{- if and (eq $dataBackendSecretAccessKey "") $existingSecret -}}
  {{- $existingDataBackendSecretAccessKey := index $existingSecret.data "FUGUE_DATA_BACKEND_SECRET_ACCESS_KEY" -}}
  {{- if $existingDataBackendSecretAccessKey -}}
    {{- $dataBackendSecretAccessKey = ($existingDataBackendSecretAccessKey | b64dec) -}}
  {{- end -}}
{{- end -}}
{{- $dataBackendSessionToken := .Values.api.dataBackend.sessionToken -}}
{{- if and (eq $dataBackendSessionToken "") $existingSecret -}}
  {{- $existingDataBackendSessionToken := index $existingSecret.data "FUGUE_DATA_BACKEND_SESSION_TOKEN" -}}
  {{- if $existingDataBackendSessionToken -}}
    {{- $dataBackendSessionToken = ($existingDataBackendSessionToken | b64dec) -}}
  {{- end -}}
{{- end -}}
{{- $dataCredentialEncryptionKey := .Values.api.dataBackend.credentialEncryptionKey -}}
{{- if and (eq $dataCredentialEncryptionKey "") $existingSecret -}}
  {{- $existingDataCredentialEncryptionKey := index $existingSecret.data "FUGUE_DATA_CREDENTIAL_ENCRYPTION_KEY" -}}
  {{- if $existingDataCredentialEncryptionKey -}}
    {{- $dataCredentialEncryptionKey = ($existingDataCredentialEncryptionKey | b64dec) -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "fugue.labels" . | nindent 4 }}
type: Opaque
stringData:
  FUGUE_BOOTSTRAP_ADMIN_KEY: {{ $bootstrapAdminKey | quote }}
  FUGUE_WORKLOAD_IDENTITY_SIGNING_KEY: {{ $workloadIdentitySigningKey | quote }}
  FUGUE_BUNDLE_SIGNING_KEY: {{ $bundleSigningKey | quote }}
  FUGUE_BUNDLE_SIGNING_PREVIOUS_KEY: {{ $bundleSigningPreviousKey | quote }}
  FUGUE_DATABASE_URL: {{ $databaseURL | quote }}
  FUGUE_CLUSTER_JOIN_SERVER: {{ .Values.api.clusterJoinServer | quote }}
  FUGUE_CLUSTER_JOIN_SERVER_FALLBACKS: {{ .Values.api.clusterJoinServerFallbacks | quote }}
  FUGUE_CLUSTER_JOIN_CA_HASH: {{ .Values.api.clusterJoinCAHash | quote }}
  FUGUE_CLUSTER_JOIN_MESH_PROVIDER: {{ .Values.api.clusterJoinMeshProvider | quote }}
  FUGUE_CLUSTER_JOIN_MESH_LOGIN_SERVER: {{ .Values.api.clusterJoinMeshLoginServer | quote }}
  FUGUE_CLUSTER_JOIN_MESH_AUTH_KEY: {{ $clusterJoinMeshAuthKey | quote }}
  FUGUE_EDGE_TLS_ASK_TOKEN: {{ $edgeTLSAskToken | quote }}
  FUGUE_DATA_BACKEND_ACCESS_KEY_ID: {{ $dataBackendAccessKeyID | quote }}
  FUGUE_DATA_BACKEND_SECRET_ACCESS_KEY: {{ $dataBackendSecretAccessKey | quote }}
  FUGUE_DATA_BACKEND_SESSION_TOKEN: {{ $dataBackendSessionToken | quote }}
  FUGUE_DATA_CREDENTIAL_ENCRYPTION_KEY: {{ $dataCredentialEncryptionKey | quote }}
  POSTGRES_PASSWORD: {{ $postgresPassword | quote }}
{{- end }}
