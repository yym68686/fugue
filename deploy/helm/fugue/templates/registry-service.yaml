{{- if .Values.registry.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fugue.fullname" . }}-registry
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "registry") | nindent 4 }}
spec:
  type: {{ .Values.registry.service.type }}
  selector:
    {{- include "fugue.componentSelectorLabels" (dict "root" . "component" "registry") | nindent 4 }}
  ports:
    - name: registry
      port: {{ .Values.registry.service.port }}
      targetPort: {{ .Values.registry.service.targetPort }}
      protocol: TCP
      {{- if and (eq .Values.registry.service.type "NodePort") .Values.registry.service.nodePort }}
      nodePort: {{ .Values.registry.service.nodePort }}
      {{- end }}
{{- end }}
