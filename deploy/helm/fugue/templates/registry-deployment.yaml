{{- $registry := (.Values.registry | default (dict)) -}}
{{- $registryPersistence := (get $registry "persistence" | default (dict)) -}}
{{- $registryPersistenceMode := "hostPath" -}}
{{- if hasKey $registryPersistence "mode" -}}
{{- $registryPersistenceMode = (get $registryPersistence "mode") -}}
{{- end -}}
{{- if and .Values.registry.enabled (ne $registryPersistenceMode "hostPath") (ne $registryPersistenceMode "pvc") (ne $registryPersistenceMode "existingClaim") -}}
{{- fail (printf "unsupported registry.persistence.mode %q (expected hostPath, pvc, or existingClaim)" $registryPersistenceMode) -}}
{{- end -}}
{{- if .Values.registry.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fugue.fullname" . }}-registry
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "registry") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "fugue.componentSelectorLabels" (dict "root" . "component" "registry") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fugue.componentSelectorLabels" (dict "root" . "component" "registry") | nindent 8 }}
      annotations:
        checksum/registry-config: {{ include (print $.Template.BasePath "/registry-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: registry
          image: {{ include "fugue.imageRef" (dict "repository" .Values.registry.image.repository "tag" .Values.registry.image.tag "digest" .Values.registry.image.digest) | quote }}
          imagePullPolicy: {{ .Values.registry.image.pullPolicy }}
          ports:
            - name: registry
              containerPort: 5000
              protocol: TCP
          volumeMounts:
            - name: registry-config
              mountPath: /etc/docker/registry/config.yml
              subPath: config.yml
              readOnly: true
            - name: registry-data
              mountPath: /var/lib/registry
          readinessProbe:
            httpGet:
              path: /v2/
              port: registry
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v2/
              port: registry
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.registry.resources | nindent 12 }}
      volumes:
        - name: registry-config
          configMap:
            name: {{ printf "%s-registry-config" (include "fugue.fullname" .) | quote }}
            items:
              - key: config.yml
                path: config.yml
        - name: registry-data
          {{- if eq $registryPersistenceMode "hostPath" }}
          hostPath:
            path: {{ default "/var/lib/fugue/registry" (get $registryPersistence "hostPath") | quote }}
            type: DirectoryOrCreate
          {{- else if eq $registryPersistenceMode "pvc" }}
          persistentVolumeClaim:
            claimName: {{ printf "%s-registry-data" (include "fugue.fullname" .) | quote }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ required "registry.persistence.existingClaim must be set when registry.persistence.mode=existingClaim" (get $registryPersistence "existingClaim") | quote }}
          {{- end }}
      {{- if .Values.registry.controlPlaneSingletonNodeSelector }}
      nodeSelector:
        {{- toYaml .Values.registry.controlPlaneSingletonNodeSelector | nindent 8 }}
      {{- else }}
      {{- with (default .Values.nodeSelector .Values.registry.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
