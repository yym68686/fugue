{{- if .Values.observability.analytics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-observability-clickhouse" (include "fugue.fullname" .) }}
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "observability-clickhouse") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "fugue.componentSelectorLabels" (dict "root" . "component" "observability-clickhouse") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.observability.analytics.httpPort }}
      targetPort: http
      protocol: TCP
    - name: native
      port: {{ .Values.observability.analytics.nativePort }}
      targetPort: native
      protocol: TCP
{{- end }}
