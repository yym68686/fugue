{{- if .Values.observability.alerts.enabled }}
{{- $alertsNodeSelector := .Values.observability.alerts.nodeSelector -}}
{{- $alertsTolerations := default .Values.tolerations .Values.observability.alerts.tolerations -}}
{{- $alertsAffinity := default .Values.affinity .Values.observability.alerts.affinity -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-observability-alertmanager" (include "fugue.fullname" .) }}
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "observability-alertmanager") | nindent 4 }}
spec:
  replicas: {{ .Values.observability.alerts.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "fugue.componentSelectorLabels" (dict "root" . "component" "observability-alertmanager") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fugue.componentSelectorLabels" (dict "root" . "component" "observability-alertmanager") | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.rbac.create }}
      serviceAccountName: {{ include "fugue.serviceAccountName" . }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: alertmanager
          image: {{ include "fugue.imageRef" (dict "repository" .Values.observability.alerts.image.repository "tag" .Values.observability.alerts.image.tag "digest" .Values.observability.alerts.image.digest) | quote }}
          imagePullPolicy: {{ .Values.observability.alerts.image.pullPolicy }}
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
            - --web.listen-address=:{{ .Values.observability.alerts.port }}
            {{- with .Values.observability.alerts.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.observability.alerts.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            periodSeconds: 5
            failureThreshold: 6
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.observability.alerts.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
              readOnly: true
            - name: data
              mountPath: /alertmanager
      volumes:
        - name: config
          configMap:
            name: {{ printf "%s-observability-alertmanager" (include "fugue.fullname" .) }}
        - name: data
          emptyDir: {}
      {{- with $alertsNodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $alertsAffinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $alertsTolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
