{{- if and .Values.controlPlanePostgres.enabled (not .Values.controlPlanePostgres.existingSecretName) }}
{{- $secretName := include "fugue.controlPlanePostgresSecretName" . -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingConfigSecret := lookup "v1" "Secret" .Release.Namespace (include "fugue.configSecretName" .) -}}
{{- $password := .Values.controlPlanePostgres.password -}}
{{- if and (eq $password "") $existingSecret -}}
  {{- $existingPassword := index $existingSecret.data "password" -}}
  {{- if $existingPassword -}}
    {{- $password = ($existingPassword | b64dec) -}}
  {{- end -}}
{{- end -}}
{{- if and (eq $password "") $existingConfigSecret -}}
  {{- $existingPostgresPassword := index $existingConfigSecret.data "POSTGRES_PASSWORD" -}}
  {{- if $existingPostgresPassword -}}
    {{- $password = ($existingPostgresPassword | b64dec) -}}
  {{- end -}}
{{- end -}}
{{- if eq $password "" -}}
  {{- $password = randAlphaNum 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "fugue.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane-postgres
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.controlPlanePostgres.username | quote }}
  password: {{ $password | quote }}
{{- end }}
