{{- if .Values.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "fugue.serviceAccountName" . }}
  labels:
    {{- include "fugue.labels" . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "fugue.controlPlaneServiceAccountName" . }}
  labels:
    {{- include "fugue.labels" . | nindent 4 }}
    app.kubernetes.io/part-of: fugue-control-plane
{{- end }}
