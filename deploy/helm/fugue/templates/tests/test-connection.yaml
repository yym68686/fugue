apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "fugue.fullname" . }}-test-connection"
  labels:
    {{- include "fugue.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args: ['http://{{ include "fugue.fullname" . }}:{{ .Values.service.port }}/healthz', '-qO-']
  restartPolicy: Never
