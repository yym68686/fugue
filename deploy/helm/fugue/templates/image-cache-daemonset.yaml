{{- if .Values.imageCache.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "fugue.imageCacheName" . }}
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "image-cache") | nindent 4 }}
spec:
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      {{- include "fugue.componentSelectorLabels" (dict "root" . "component" "image-cache") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fugue.componentSelectorLabels" (dict "root" . "component" "image-cache") | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config-secret: {{ include "fugue.configSecretChecksum" . }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- if .Values.rbac.create }}
      serviceAccountName: {{ include "fugue.serviceAccountName" . }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.imageCache.priorityClassName }}
      priorityClassName: {{ .Values.imageCache.priorityClassName | quote }}
      {{- end }}
      containers:
        - name: image-cache
          image: {{ include "fugue.imageRef" (dict "repository" .Values.imageCache.image.repository "tag" .Values.imageCache.image.tag "digest" .Values.imageCache.image.digest) | quote }}
          imagePullPolicy: {{ .Values.imageCache.image.pullPolicy }}
          ports:
            - name: registry
              containerPort: {{ .Values.imageCache.port }}
              hostPort: {{ .Values.imageCache.port }}
              protocol: TCP
          env:
            - name: FUGUE_IMAGE_CACHE_LISTEN_ADDR
              value: {{ printf ":%v" .Values.imageCache.port | quote }}
            - name: FUGUE_IMAGE_CACHE_STORE_DIR
              value: /var/lib/fugue/image-cache/registry
            - name: FUGUE_IMAGE_CACHE_REGISTRY_BASE
              value: {{ default (include "fugue.registryPullBase" .) .Values.imageCache.registryBase | quote }}
            - name: FUGUE_IMAGE_CACHE_LOCAL_BASE
              value: {{ printf "127.0.0.1:%v" .Values.imageCache.port | quote }}
            - name: FUGUE_IMAGE_CACHE_UPSTREAM_BASE
              value: {{ default (include "fugue.registryPushBase" .) .Values.imageCache.upstreamBase | quote }}
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: FUGUE_IMAGE_CACHE_ENDPOINT
              value: {{ printf "http://$(NODE_IP):%v" .Values.imageCache.port | quote }}
            - name: FUGUE_API_BASE
              value: {{ printf "http://%s:%v" (include "fugue.fullname" .) .Values.service.port | quote }}
            - name: FUGUE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fugue.configSecretName" . }}
                  key: FUGUE_BOOTSTRAP_ADMIN_KEY
          resources:
            {{- toYaml .Values.imageCache.resources | nindent 12 }}
          volumeMounts:
            - name: image-cache-store
              mountPath: /var/lib/fugue/image-cache
      volumes:
        - name: image-cache-store
          hostPath:
            path: {{ .Values.imageCache.hostPath | quote }}
            type: DirectoryOrCreate
      {{- with .Values.imageCache.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imageCache.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imageCache.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
