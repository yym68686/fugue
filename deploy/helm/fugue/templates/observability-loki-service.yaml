{{- if .Values.observability.logs.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-observability-loki" (include "fugue.fullname" .) }}
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "observability-loki") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "fugue.componentSelectorLabels" (dict "root" . "component" "observability-loki") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.observability.logs.port }}
      targetPort: http
      protocol: TCP
{{- end }}
