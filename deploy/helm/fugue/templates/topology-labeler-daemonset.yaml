{{- $topologyLabeler := (get .Values "topologyLabeler" | default (dict)) -}}
{{- $topologyLabelerEnabled := true -}}
{{- if hasKey $topologyLabeler "enabled" -}}
{{- $topologyLabelerEnabled = (get $topologyLabeler "enabled") -}}
{{- end -}}
{{- $topologyLabelerIntervalSeconds := 900 -}}
{{- if hasKey $topologyLabeler "intervalSeconds" -}}
{{- $topologyLabelerIntervalSeconds = (get $topologyLabeler "intervalSeconds") -}}
{{- end -}}
{{- $topologyLabelerGeolocationURL := "https://ipapi.co/json/" -}}
{{- if hasKey $topologyLabeler "geolocationURL" -}}
{{- $topologyLabelerGeolocationURL = (get $topologyLabeler "geolocationURL") -}}
{{- end -}}
{{- $topologyLabelerResources := dict -}}
{{- if hasKey $topologyLabeler "resources" -}}
{{- $topologyLabelerResources = (get $topologyLabeler "resources" | default (dict)) -}}
{{- end -}}
{{- $topologyLabelerNodeSelector := dict -}}
{{- if hasKey $topologyLabeler "nodeSelector" -}}
{{- $topologyLabelerNodeSelector = (get $topologyLabeler "nodeSelector" | default (dict)) -}}
{{- end -}}
{{- $topologyLabelerTolerations := list (dict "operator" "Exists") -}}
{{- if hasKey $topologyLabeler "tolerations" -}}
{{- $topologyLabelerTolerations = (get $topologyLabeler "tolerations") -}}
{{- end -}}
{{- if $topologyLabelerEnabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "fugue.topologyLabelerName" . }}
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "topology-labeler") | nindent 4 }}
spec:
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      {{- include "fugue.componentSelectorLabels" (dict "root" . "component" "topology-labeler") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fugue.componentSelectorLabels" (dict "root" . "component" "topology-labeler") | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.rbac.create }}
      serviceAccountName: {{ include "fugue.serviceAccountName" . }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: topology-labeler
          image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail

              node_api_base="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS:-443}"
              token_file="/var/run/secrets/kubernetes.io/serviceaccount/token"
              ca_file="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              interval_seconds="{{ $topologyLabelerIntervalSeconds }}"
              geolocation_url="{{ $topologyLabelerGeolocationURL }}"

              extract_json_field() {
                local json="$1"
                local key="$2"
                printf '%s' "${json}" | sed -n "s/.*\"${key}\"[[:space:]]*:[[:space:]]*\"\\([^\"]*\\)\".*/\\1/p"
              }

              json_escape() {
                local value="${1:-}"
                value="${value//\\/\\\\}"
                value="${value//\"/\\\"}"
                printf '%s' "${value}"
              }

              normalize_country_name() {
                local value="${1:-}"
                case "${value}" in
                  "Hong Kong SAR China")
                    printf '%s' "Hong Kong"
                    ;;
                  "Macao SAR China")
                    printf '%s' "Macao"
                    ;;
                  *)
                    printf '%s' "${value}"
                    ;;
                esac
              }

              detect_public_country() {
                local json=""
                local country_name=""
                local country_code=""
                json="$(curl -fsS --max-time 5 "${geolocation_url}" 2>/dev/null || true)"
                json="$(printf '%s' "${json}" | tr -d '\r\n')"
                [ -n "${json}" ] || return 1
                country_name="$(extract_json_field "${json}" "country_name")"
                country_code="$(extract_json_field "${json}" "country_code")"
                country_name="$(normalize_country_name "${country_name}")"
                [ -n "${country_name}" ] || return 1
                [ -n "${country_code}" ] || return 1
                printf '%s\n%s' "${country_name}" "${country_code}"
              }

              patch_node_metadata() {
                local country_name="${1:-}"
                local country_code="${2:-}"
                local token=""
                local patch=""
                local code_label=""
                local country_code_fragment=""
                local annotation_fragment=""
                token="$(cat "${token_file}")"
                if [ -n "${country_code}" ]; then
                  code_label="$(printf '%s' "${country_code}" | tr '[:upper:]' '[:lower:]')"
                  country_code_fragment="$(printf ',\"fugue.io/location-country-code\":\"%s\"' "$(json_escape "${code_label}")")"
                fi
                if [ -n "${country_name}" ]; then
                  annotation_fragment="$(printf ',\"annotations\":{\"fugue.io/location-country\":\"%s\"}' "$(json_escape "${country_name}")")"
                fi
                patch="$(printf '{"metadata":{"labels":{"fugue.io/shared-pool":"internal"%s}%s}}' "${country_code_fragment}" "${annotation_fragment}")"
                curl -fsS --cacert "${ca_file}" -X PATCH \
                  -H "Authorization: Bearer ${token}" \
                  -H "Content-Type: application/merge-patch+json" \
                  --data "${patch}" \
                  "${node_api_base}/api/v1/nodes/${NODE_NAME}" \
                  >/dev/null
              }

              while true; do
                country_data="$(detect_public_country || true)"
                country_name="$(printf '%s\n' "${country_data}" | sed -n '1p')"
                country_code="$(printf '%s\n' "${country_data}" | sed -n '2p')"
                if ! patch_node_metadata "${country_name}" "${country_code}"; then
                  echo "topology label patch failed for ${NODE_NAME}" >&2
                  sleep 30
                  continue
                fi
                sleep "${interval_seconds}"
              done
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            {{- toYaml $topologyLabelerResources | nindent 12 }}
      {{- with $topologyLabelerNodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $topologyLabelerTolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
