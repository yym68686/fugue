{{- $headscale := (.Values.headscale | default (dict)) -}}
{{- $headscalePersistence := (get $headscale "persistence" | default (dict)) -}}
{{- $headscalePersistenceMode := "pvc" -}}
{{- if hasKey $headscalePersistence "mode" -}}
{{- $headscalePersistenceMode = (get $headscalePersistence "mode") -}}
{{- end -}}
{{- $headscaleNodeSelector := (default .Values.nodeSelector .Values.headscale.nodeSelector) -}}
{{- $headscaleSingletonSelector := .Values.headscale.controlPlaneSingletonNodeSelector -}}
{{- if and .Values.headscale.enabled (ne $headscalePersistenceMode "hostPath") (ne $headscalePersistenceMode "pvc") (ne $headscalePersistenceMode "existingClaim") -}}
{{- fail (printf "unsupported headscale.persistence.mode %q (expected hostPath, pvc, or existingClaim)" $headscalePersistenceMode) -}}
{{- end -}}
{{- if and .Values.headscale.enabled (eq $headscalePersistenceMode "hostPath") (empty $headscaleNodeSelector) (empty $headscaleSingletonSelector) -}}
{{- fail "headscale.persistence.mode=hostPath requires headscale.nodeSelector, headscale.controlPlaneSingletonNodeSelector, or a global nodeSelector so the Headscale database and noise key cannot drift across nodes. Use pvc/existingClaim for movable storage." -}}
{{- end -}}
{{- if .Values.headscale.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fugue.headscaleServiceName" . }}
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "headscale") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "fugue.componentSelectorLabels" (dict "root" . "component" "headscale") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fugue.componentSelectorLabels" (dict "root" . "component" "headscale") | nindent 8 }}
      annotations:
        checksum/headscale-config: {{ include (print $.Template.BasePath "/headscale-config.yaml") . | sha256sum }}
    spec:
      containers:
        - name: headscale
          image: {{ include "fugue.imageRef" (dict "repository" .Values.headscale.image.repository "tag" .Values.headscale.image.tag "digest" .Values.headscale.image.digest) | quote }}
          imagePullPolicy: {{ .Values.headscale.image.pullPolicy }}
          args:
            - serve
            - --config
            - /etc/headscale/config.yaml
          ports:
            - name: http
              containerPort: {{ .Values.headscale.service.targetPort }}
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.headscale.resources | nindent 12 }}
          volumeMounts:
            - name: headscale-config
              mountPath: /etc/headscale
            - name: headscale-data
              mountPath: /var/lib/headscale
            - name: headscale-run
              mountPath: /var/run/headscale
      {{- if .Values.headscale.controlPlaneSingletonNodeSelector }}
      nodeSelector:
        {{- toYaml .Values.headscale.controlPlaneSingletonNodeSelector | nindent 8 }}
      {{- else }}
      {{- with (default .Values.nodeSelector .Values.headscale.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      volumes:
        - name: headscale-config
          configMap:
            name: {{ include "fugue.headscaleConfigName" . }}
        - name: headscale-data
          {{- if eq $headscalePersistenceMode "hostPath" }}
          hostPath:
            path: {{ default "/var/lib/fugue/headscale" (get $headscalePersistence "hostPath") | quote }}
            type: DirectoryOrCreate
          {{- else if eq $headscalePersistenceMode "pvc" }}
          persistentVolumeClaim:
            claimName: {{ printf "%s-headscale-data" (include "fugue.fullname" .) | quote }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ required "headscale.persistence.existingClaim must be set when headscale.persistence.mode=existingClaim" (get $headscalePersistence "existingClaim") | quote }}
          {{- end }}
        - name: headscale-run
          emptyDir: {}
{{- end }}
