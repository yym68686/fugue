{{- if not .Values.platformComponentIdentity.existingSecretName }}
{{- $secretName := include "fugue.platformComponentIdentitySecretName" . -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingData := dict -}}
{{- if $existingSecret -}}
  {{- $existingData = default (dict) $existingSecret.data -}}
{{- end -}}
{{- $resolved := include "fugue.resolvePlatformComponentIdentityData" (dict "root" . "existingData" $existingData) | fromJson -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "fugue.labels" . | nindent 4 }}
    app.kubernetes.io/part-of: fugue-control-plane
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  FUGUE_PLATFORM_COMPONENT_IDENTITY_SIGNING_KEY: {{ index $resolved "signingKey" | quote }}
  FUGUE_PLATFORM_COMPONENT_IDENTITY_SIGNING_KEY_ID: {{ index $resolved "signingKeyID" | quote }}
  FUGUE_PLATFORM_COMPONENT_IDENTITY_PREVIOUS_SIGNING_KEY: {{ index $resolved "previousSigningKey" | quote }}
  FUGUE_PLATFORM_COMPONENT_IDENTITY_PREVIOUS_SIGNING_KEY_ID: {{ index $resolved "previousSigningKeyID" | quote }}
  FUGUE_PLATFORM_COMPONENT_IDENTITY_REVOKED_KEY_IDS: {{ index $resolved "revokedKeyIDs" | quote }}
{{- end }}
