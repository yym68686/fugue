{{- if .Values.observability.analytics.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-observability-clickhouse" (include "fugue.fullname" .) }}
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "observability-clickhouse") | nindent 4 }}
data:
  fugue-observability.xml: |
    <clickhouse>
      <logger>
        <level>information</level>
        <console>true</console>
      </logger>
      <profiles>
        <default>
          <max_memory_usage>1073741824</max_memory_usage>
        </default>
      </profiles>
    </clickhouse>
  init-observability.sql: |
    CREATE DATABASE IF NOT EXISTS fugue_observability;

    CREATE TABLE IF NOT EXISTS fugue_observability.request_facts
    (
      ts DateTime64(3, 'UTC'),
      tenant_id String,
      project_id String,
      app_id String,
      runtime_id String,
      edge_id String,
      pod String,
      trace_id String,
      request_id String,
      route_id String,
      hostname String,
      path_template String,
      method LowCardinality(String),
      status_code UInt16,
      status_class LowCardinality(String),
      duration_ms UInt32,
      ttfb_ms UInt32,
      upstream_ms UInt32,
      bytes_in UInt64,
      bytes_out UInt64,
      streaming Bool,
      error_type LowCardinality(String),
      deployment_id String,
      operation_id String,
      summary_json String
    )
    ENGINE = MergeTree
    PARTITION BY toDate(ts)
    ORDER BY (tenant_id, project_id, app_id, ts, trace_id, request_id)
    TTL ts + INTERVAL 1 DAY DELETE;

    CREATE TABLE IF NOT EXISTS fugue_observability.request_spans
    (
      ts DateTime64(3, 'UTC'),
      tenant_id String,
      project_id String,
      app_id String,
      runtime_id String,
      service LowCardinality(String),
      trace_id String,
      span_id String,
      parent_span_id String,
      request_id String,
      stage LowCardinality(String),
      stage_ms UInt32,
      status_code UInt16,
      error_type LowCardinality(String),
      attributes_json String
    )
    ENGINE = MergeTree
    PARTITION BY toDate(ts)
    ORDER BY (tenant_id, project_id, app_id, trace_id, ts, stage)
    TTL ts + INTERVAL 1 DAY DELETE;

    CREATE TABLE IF NOT EXISTS fugue_observability.app_events
    (
      ts DateTime64(3, 'UTC'),
      tenant_id String,
      project_id String,
      app_id String,
      event_type LowCardinality(String),
      severity LowCardinality(String),
      operation_id String,
      deployment_id String,
      runtime_id String,
      pod String,
      message String,
      attributes_json String
    )
    ENGINE = MergeTree
    PARTITION BY toDate(ts)
    ORDER BY (tenant_id, project_id, app_id, ts, event_type)
    TTL ts + INTERVAL 1 DAY DELETE;

    CREATE TABLE IF NOT EXISTS fugue_observability.diagnosis_windows_1m
    (
      minute DateTime('UTC'),
      tenant_id String,
      project_id String,
      app_id String,
      rpm UInt32,
      p50_ttfb_ms Float64,
      p95_ttfb_ms Float64,
      p99_ttfb_ms Float64,
      p50_duration_ms Float64,
      p95_duration_ms Float64,
      p99_duration_ms Float64,
      error_rate Float64,
      top_bottleneck_stage String,
      top_bottleneck_confidence Float64
    )
    ENGINE = MergeTree
    PARTITION BY toDate(minute)
    ORDER BY (tenant_id, project_id, app_id, minute)
    TTL minute + INTERVAL 1 DAY DELETE;

    CREATE TABLE IF NOT EXISTS fugue_observability.release_gate_rollups_1m
    (
      minute DateTime('UTC'),
      tenant_id String,
      project_id String,
      app_id String,
      release_id String,
      release_role LowCardinality(String),
      request_count UInt64,
      error_5xx_count UInt64,
      edge_upstream_error_count UInt64,
      p95_ttfb_ms Float64,
      p99_duration_ms Float64
    )
    ENGINE = MergeTree
    PARTITION BY toDate(minute)
    ORDER BY (tenant_id, project_id, app_id, release_id, release_role, minute)
    TTL minute + INTERVAL 1 DAY DELETE;

    CREATE MATERIALIZED VIEW IF NOT EXISTS fugue_observability.release_gate_rollups_1m_mv
    TO fugue_observability.release_gate_rollups_1m
    AS SELECT
      toStartOfMinute(ts) AS minute,
      tenant_id,
      project_id,
      app_id,
      JSONExtractString(summary_json, 'release_id') AS release_id,
      JSONExtractString(summary_json, 'release_role') AS release_role,
      count() AS request_count,
      countIf(status_code >= 500) AS error_5xx_count,
      countIf(error_type = 'upstream_error') AS edge_upstream_error_count,
      quantileTDigest(0.95)(toFloat64(ttfb_ms)) AS p95_ttfb_ms,
      quantileTDigestIf(0.99)(toFloat64(duration_ms), NOT (streaming OR JSONExtractBool(summary_json, 'sse') OR JSONExtractBool(summary_json, 'stream') OR JSONExtractBool(summary_json, 'streaming'))) AS p99_duration_ms
    FROM fugue_observability.request_facts
    WHERE app_id != '' AND (JSONExtractString(summary_json, 'release_id') != '' OR JSONExtractString(summary_json, 'release_role') != '')
    GROUP BY minute, tenant_id, project_id, app_id, release_id, release_role;
{{- end }}
