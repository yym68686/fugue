apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fugue.fullname" . }}-release-safety
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "release-safety") | nindent 4 }}
data:
  public-data-plane: "bounded-rolling-restart; hostPort-compatible"
  node-local-build-plane: "bounded-rolling-restart; one node at a time"
  registry: "isolated-singleton; blocks new builds and deploys while unavailable"
  mesh-control: "isolated-singleton; blocks node joins while unavailable"
  shared-workspace-storage: "downtime-required; single NFS writer"
  tenant-stateless-apps: "rolling-update; maxUnavailable=0"
  tenant-single-writer-storage-apps: "downtime-required unless app declares an external blue/green storage strategy"
