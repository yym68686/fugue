{{- if .Values.movableRWOStorage.enabled }}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.movableRWOStorage.storageClassName | quote }}
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "movable-rwo-storage") | nindent 4 }}
    fugue.pro/movable-rwo: "true"
provisioner: {{ .Values.movableRWOStorage.provisionerName | quote }}
reclaimPolicy: {{ .Values.movableRWOStorage.reclaimPolicy }}
volumeBindingMode: {{ .Values.movableRWOStorage.volumeBindingMode }}
allowVolumeExpansion: {{ .Values.movableRWOStorage.allowVolumeExpansion }}
{{- with .Values.movableRWOStorage.parameters }}
parameters:
{{- toYaml . | nindent 2 }}
{{- end }}
{{- with .Values.movableRWOStorage.allowedTopologies }}
allowedTopologies:
{{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
