{{- range $group := .Values.dns.groups }}
{{- $name := required "dns.groups[].name is required" $group.name | lower | replace "_" "-" | trunc 30 | trimSuffix "-" -}}
{{- $edgeGroupID := required (printf "dns.groups[%s].edgeGroupID is required" $name) $group.edgeGroupID -}}
{{- if not $group.nodeSelector }}
{{- fail (printf "dns.groups[%s].nodeSelector is required" $name) }}
{{- end }}
{{- if not $group.answerIPs }}
{{- fail (printf "dns.groups[%s].answerIPs must contain at least one IP" $name) }}
{{- end }}
{{- $image := default dict $group.image -}}
{{- $tokenSecret := default dict $group.tokenSecret -}}
{{- $publicHostPorts := default dict $group.publicHostPorts -}}
{{- $dnsAPIURL := default (default (printf "http://%s:%v" (include "fugue.fullname" $) $.Values.service.port) $.Values.dns.apiURL) $group.apiURL -}}
{{- $dnsTokenSecretName := default (default (include "fugue.configSecretName" $) $.Values.dns.tokenSecret.name) $tokenSecret.name -}}
{{- $dnsTokenSecretKey := default (default "FUGUE_EDGE_TLS_ASK_TOKEN" $.Values.dns.tokenSecret.key) $tokenSecret.key -}}
{{- $dnsImageRepository := default (default $.Values.edge.image.repository $.Values.dns.image.repository) $image.repository -}}
{{- $dnsImageTag := default (default $.Values.edge.image.tag $.Values.dns.image.tag) $image.tag -}}
{{- $dnsImagePullPolicy := default (default $.Values.edge.image.pullPolicy $.Values.dns.image.pullPolicy) $image.pullPolicy -}}
{{- $publicHostPortsEnabled := $.Values.dns.publicHostPorts.enabled -}}
{{- if hasKey $publicHostPorts "enabled" }}{{- $publicHostPortsEnabled = $publicHostPorts.enabled -}}{{- end -}}
{{- $publicUDP := default $.Values.dns.publicHostPorts.udp $publicHostPorts.udp -}}
{{- $publicTCP := default $.Values.dns.publicHostPorts.tcp $publicHostPorts.tcp -}}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "fugue.dnsDaemonSetName" $ }}-{{ $name }}
  labels:
    {{- include "fugue.componentLabels" (dict "root" $ "component" (printf "dns-%s" $name)) | nindent 4 }}
spec:
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      {{- include "fugue.componentSelectorLabels" (dict "root" $ "component" (printf "dns-%s" $name)) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fugue.componentSelectorLabels" (dict "root" $ "component" (printf "dns-%s" $name)) | nindent 8 }}
        {{- with $.Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config-secret: {{ include "fugue.configSecretChecksum" $ }}
        checksum/dns-global-config: {{ toJson (dict "routeAAnswerIPs" $.Values.dns.routeAAnswerIPs "ttl" $.Values.dns.ttl "zone" $.Values.dns.zone "nameservers" $.Values.dns.nameservers) | sha256sum }}
        checksum/dns-group-config: {{ toJson $group | sha256sum }}
        {{- with $.Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dns
          image: "{{ $dnsImageRepository }}:{{ $dnsImageTag }}"
          imagePullPolicy: {{ $dnsImagePullPolicy }}
          command:
            - /usr/local/bin/fugue-dns
          {{- with $.Values.dns.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ default $.Values.dns.healthPort $group.healthPort }}
              protocol: TCP
            {{- if $publicHostPortsEnabled }}
            - name: dns-udp
              containerPort: 53
              hostPort: {{ $publicUDP }}
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              hostPort: {{ $publicTCP }}
              protocol: TCP
            {{- end }}
          env:
            - name: FUGUE_API_URL
              value: {{ $dnsAPIURL | quote }}
            - name: FUGUE_DNS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $dnsTokenSecretName }}
                  key: {{ $dnsTokenSecretKey }}
            - name: FUGUE_DNS_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: FUGUE_EDGE_GROUP_ID
              value: {{ $edgeGroupID | quote }}
            - name: FUGUE_DNS_ZONE
              value: {{ default $.Values.dns.zone $group.zone | quote }}
            - name: FUGUE_DNS_ANSWER_IPS
              value: {{ join "," $group.answerIPs | quote }}
            {{- if $.Values.dns.routeAAnswerIPs }}
            - name: FUGUE_DNS_ROUTE_A_ANSWER_IPS
              value: {{ join "," $.Values.dns.routeAAnswerIPs | quote }}
            {{- end }}
            - name: FUGUE_DNS_TTL
              value: {{ printf "%v" (default $.Values.dns.ttl $group.ttl) | quote }}
            - name: FUGUE_DNS_LISTEN_ADDR
              value: {{ default $.Values.dns.listenAddr $group.listenAddr | quote }}
            - name: FUGUE_DNS_UDP_ADDR
              value: {{ default $.Values.dns.udpAddr $group.udpAddr | quote }}
            - name: FUGUE_DNS_TCP_ADDR
              value: {{ default $.Values.dns.tcpAddr $group.tcpAddr | quote }}
            - name: FUGUE_DNS_CACHE_PATH
              value: {{ default $.Values.dns.cachePath $group.cachePath | quote }}
            - name: FUGUE_DNS_SYNC_INTERVAL
              value: {{ default $.Values.dns.syncInterval $group.syncInterval | quote }}
            - name: FUGUE_DNS_HEARTBEAT_INTERVAL
              value: {{ default $.Values.dns.heartbeatInterval $group.heartbeatInterval | quote }}
            - name: FUGUE_DNS_HTTP_TIMEOUT
              value: {{ default $.Values.dns.httpTimeout $group.httpTimeout | quote }}
            {{- if $group.nameservers }}
            - name: FUGUE_DNS_NAMESERVERS
              value: {{ join "," $group.nameservers | quote }}
            {{- else if $.Values.dns.nameservers }}
            - name: FUGUE_DNS_NAMESERVERS
              value: {{ join "," $.Values.dns.nameservers | quote }}
            {{- end }}
            {{- with $.Values.dns.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with $group.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: dns-cache
              mountPath: {{ $.Values.dns.persistence.mountPath | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
            timeoutSeconds: 3
          resources:
            {{- toYaml $.Values.dns.resources | nindent 12 }}
      volumes:
        - name: dns-cache
          hostPath:
            path: {{ $.Values.dns.persistence.hostPath | quote }}
            type: DirectoryOrCreate
      nodeSelector:
        {{- toYaml $group.nodeSelector | nindent 8 }}
      {{- with $group.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.dns.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
