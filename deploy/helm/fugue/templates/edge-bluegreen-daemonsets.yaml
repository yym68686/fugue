{{- define "fugue.edgeBlueGreenGroup" -}}
{{- $root := .root -}}
{{- $daemonBase := .daemonBase -}}
{{- $componentBase := .componentBase -}}
{{- $edgeGroupID := .edgeGroupID -}}
{{- $nodeSelector := .nodeSelector -}}
{{- $apiURL := .apiURL -}}
{{- $tokenSecretName := .tokenSecretName -}}
{{- $tokenSecretKey := .tokenSecretKey -}}
{{- $edgeImageRepository := .edgeImageRepository -}}
{{- $edgeImageTag := .edgeImageTag -}}
{{- $edgeImageDigest := .edgeImageDigest -}}
{{- $edgeImagePullPolicy := .edgeImagePullPolicy -}}
{{- $caddyEnabled := .caddyEnabled -}}
{{- $caddyImageRepository := .caddyImageRepository -}}
{{- $caddyImageTag := .caddyImageTag -}}
{{- $caddyImageDigest := .caddyImageDigest -}}
{{- $caddyImagePullPolicy := .caddyImagePullPolicy -}}
{{- $caddyAdminAddr := .caddyAdminAddr -}}
{{- $caddyAdminURL := .caddyAdminURL -}}
{{- $caddyTLSMode := .caddyTLSMode -}}
{{- $caddyTLSAskURL := .caddyTLSAskURL -}}
{{- $caddyProxyListenAddr := .caddyProxyListenAddr -}}
{{- $caddyDataDir := .caddyDataDir -}}
{{- $caddyDataHostPath := .caddyDataHostPath -}}
{{- $sharedTLSEnabled := .sharedTLSEnabled -}}
{{- $staticTLSEnabled := .staticTLSEnabled -}}
{{- $staticTLSSecretName := .staticTLSSecretName -}}
{{- $staticTLSMountPath := .staticTLSMountPath -}}
{{- $staticTLSCertKey := .staticTLSCertKey -}}
{{- $staticTLSPrivateKeyKey := .staticTLSPrivateKeyKey -}}
{{- $peerFallbackEnabled := .peerFallbackEnabled -}}
{{- $listenAddr := .listenAddr -}}
{{- $healthPort := .healthPort -}}
{{- $routesCachePath := .routesCachePath -}}
{{- $cacheArchiveLimit := .cacheArchiveLimit -}}
{{- $maxStale := .maxStale -}}
{{- $syncInterval := .syncInterval -}}
{{- $httpTimeout := .httpTimeout -}}
{{- $routeCacheHostPath := .routeCacheHostPath -}}
{{- $frontImageRepository := default $edgeImageRepository $root.Values.edge.blueGreen.front.image.repository -}}
{{- $frontImageTag := default $edgeImageTag $root.Values.edge.blueGreen.front.image.tag -}}
{{- $frontImageDigest := default $edgeImageDigest $root.Values.edge.blueGreen.front.image.digest -}}
{{- $frontImagePullPolicy := default $edgeImagePullPolicy $root.Values.edge.blueGreen.front.image.pullPolicy -}}
{{- $frontPublicHostPorts := default dict $root.Values.edge.blueGreen.front.publicHostPorts -}}
{{- $slotA := default dict $root.Values.edge.blueGreen.slots.a -}}
{{- $slotB := default dict $root.Values.edge.blueGreen.slots.b -}}
{{- $slotAHTTP := default 18080 $slotA.httpPort -}}
{{- $slotAHTTPS := default 18443 $slotA.httpsPort -}}
{{- $slotBHTTP := default 28080 $slotB.httpPort -}}
{{- $slotBHTTPS := default 28443 $slotB.httpsPort -}}
{{- $stateHostPath := default "/var/lib/fugue/edge-blue-green" $root.Values.edge.blueGreen.stateHostPath -}}
{{- $activeSlotFile := default "/var/lib/fugue/edge-blue-green/active-slot" $root.Values.edge.blueGreen.activeSlotFile -}}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ $daemonBase }}-front
  labels:
    {{- include "fugue.componentLabels" (dict "root" $root "component" (printf "%s-front" $componentBase)) | nindent 4 }}
    fugue.io/rollout-subsystem: public-data-plane
    fugue.io/rollout-mode: node-local-blue-green-front
    fugue.io/downtime-class: online-required
spec:
  revisionHistoryLimit: 2
  updateStrategy:
    type: OnDelete
  selector:
    matchLabels:
      {{- include "fugue.componentSelectorLabels" (dict "root" $root "component" (printf "%s-front" $componentBase)) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fugue.componentSelectorLabels" (dict "root" $root "component" (printf "%s-front" $componentBase)) | nindent 8 }}
        fugue.io/rollout-subsystem: public-data-plane
        fugue.io/rollout-mode: node-local-blue-green-front
        fugue.io/downtime-class: online-required
        {{- with $root.Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/edge-blue-green-front: {{ toJson $root.Values.edge.blueGreen | sha256sum }}
        {{- with $root.Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      {{- with $root.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: edge-front
          image: {{ include "fugue.imageRef" (dict "repository" $frontImageRepository "tag" $frontImageTag "digest" $frontImageDigest) | quote }}
          imagePullPolicy: {{ $frontImagePullPolicy }}
          command:
            - /usr/local/bin/fugue-edge-front
          {{- with $root.Values.edge.blueGreen.front.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            {{- if $frontPublicHostPorts.enabled }}
            - name: http-public
              containerPort: 80
              hostPort: {{ default 80 $frontPublicHostPorts.http }}
              protocol: TCP
            - name: https-public
              containerPort: 443
              hostPort: {{ default 443 $frontPublicHostPorts.https }}
              protocol: TCP
            {{- end }}
            - name: health
              containerPort: {{ default 7831 $root.Values.edge.blueGreen.front.healthPort }}
              protocol: TCP
          env:
            - name: FUGUE_EDGE_FRONT_NODE_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: FUGUE_EDGE_FRONT_HTTP_LISTEN_ADDR
              value: {{ default ":80" $root.Values.edge.blueGreen.front.httpListenAddr | quote }}
            - name: FUGUE_EDGE_FRONT_HTTPS_LISTEN_ADDR
              value: {{ default ":443" $root.Values.edge.blueGreen.front.httpsListenAddr | quote }}
            - name: FUGUE_EDGE_FRONT_HEALTH_LISTEN_ADDR
              value: {{ printf ":%v" (default 7831 $root.Values.edge.blueGreen.front.healthPort) | quote }}
            - name: FUGUE_EDGE_FRONT_HTTP_MODE
              value: {{ default "redirect" $root.Values.edge.blueGreen.httpMode | quote }}
            - name: FUGUE_EDGE_FRONT_ACTIVE_SLOT_FILE
              value: {{ $activeSlotFile | quote }}
            - name: FUGUE_EDGE_FRONT_DEFAULT_SLOT
              value: {{ default "a" $root.Values.edge.blueGreen.activeSlot | quote }}
            - name: FUGUE_EDGE_FRONT_SLOT_A_HTTP_PORT
              value: {{ printf "%v" $slotAHTTP | quote }}
            - name: FUGUE_EDGE_FRONT_SLOT_A_HTTPS_PORT
              value: {{ printf "%v" $slotAHTTPS | quote }}
            - name: FUGUE_EDGE_FRONT_SLOT_B_HTTP_PORT
              value: {{ printf "%v" $slotBHTTP | quote }}
            - name: FUGUE_EDGE_FRONT_SLOT_B_HTTPS_PORT
              value: {{ printf "%v" $slotBHTTPS | quote }}
          volumeMounts:
            - name: edge-blue-green-state
              mountPath: {{ dir $activeSlotFile | quote }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 3
          resources:
            {{- toYaml $root.Values.edge.blueGreen.front.resources | nindent 12 }}
      volumes:
        - name: edge-blue-green-state
          hostPath:
            path: {{ $stateHostPath | quote }}
            type: DirectoryOrCreate
      nodeSelector:
        {{- toYaml $nodeSelector | nindent 8 }}
      {{- with $root.Values.edge.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.edge.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{ range $slot := list (dict "name" "a" "httpPort" $slotAHTTP "httpsPort" $slotAHTTPS "image" (default dict $slotA.image)) (dict "name" "b" "httpPort" $slotBHTTP "httpsPort" $slotBHTTPS "image" (default dict $slotB.image)) }}
{{ $slotImage := default dict $slot.image -}}
{{ $slotEdgeImageRepository := default $edgeImageRepository $slotImage.repository -}}
{{ $slotEdgeImageTag := default $edgeImageTag $slotImage.tag -}}
{{ $slotEdgeImageDigest := default $edgeImageDigest $slotImage.digest -}}
{{ $slotEdgeImagePullPolicy := default $edgeImagePullPolicy $slotImage.pullPolicy -}}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ $daemonBase }}-worker-{{ $slot.name }}
  labels:
    {{- include "fugue.componentLabels" (dict "root" $root "component" (printf "%s-worker-%s" $componentBase $slot.name)) | nindent 4 }}
    fugue.io/rollout-subsystem: public-data-plane
    fugue.io/rollout-mode: node-local-blue-green-worker
    fugue.io/downtime-class: online-required
    fugue.io/edge-slot: {{ $slot.name | quote }}
spec:
  revisionHistoryLimit: 2
  updateStrategy:
    type: OnDelete
  selector:
    matchLabels:
      {{- include "fugue.componentSelectorLabels" (dict "root" $root "component" (printf "%s-worker-%s" $componentBase $slot.name)) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fugue.componentSelectorLabels" (dict "root" $root "component" (printf "%s-worker-%s" $componentBase $slot.name)) | nindent 8 }}
        fugue.io/rollout-subsystem: public-data-plane
        fugue.io/rollout-mode: node-local-blue-green-worker
        fugue.io/downtime-class: online-required
        fugue.io/edge-slot: {{ $slot.name | quote }}
        {{- with $root.Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config-secret: {{ include "fugue.configSecretChecksum" $root }}
        checksum/edge-blue-green-worker: {{ printf "%s-%s" (toJson $root.Values.edge) $slot.name | sha256sum }}
        {{- with $root.Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      {{- with $root.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: edge
          image: {{ include "fugue.imageRef" (dict "repository" $slotEdgeImageRepository "tag" $slotEdgeImageTag "digest" $slotEdgeImageDigest) | quote }}
          imagePullPolicy: {{ $slotEdgeImagePullPolicy }}
          {{- with $root.Values.edge.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ $healthPort }}
              protocol: TCP
          env:
            - name: FUGUE_API_URL
              value: {{ $apiURL | quote }}
            - name: FUGUE_EDGE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $tokenSecretName }}
                  key: {{ $tokenSecretKey }}
            - name: FUGUE_BUNDLE_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fugue.configSecretName" $root }}
                  key: FUGUE_BUNDLE_SIGNING_KEY
            - name: FUGUE_BUNDLE_SIGNING_KEY_ID
              value: {{ $root.Values.bundle.signingKeyID | quote }}
            - name: FUGUE_BUNDLE_SIGNING_PREVIOUS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fugue.configSecretName" $root }}
                  key: FUGUE_BUNDLE_SIGNING_PREVIOUS_KEY
                  optional: true
            - name: FUGUE_BUNDLE_SIGNING_PREVIOUS_KEY_ID
              value: {{ $root.Values.bundle.previousSigningKeyID | quote }}
            - name: FUGUE_BUNDLE_REVOKED_KEY_IDS
              value: {{ $root.Values.bundle.revokedKeyIDs | quote }}
            - name: FUGUE_EDGE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: FUGUE_EDGE_GROUP_ID
              value: {{ $edgeGroupID | quote }}
            - name: FUGUE_EDGE_LISTEN_ADDR
              value: {{ $listenAddr | quote }}
            - name: FUGUE_EDGE_ROUTES_CACHE_PATH
              value: {{ $routesCachePath | quote }}
            - name: FUGUE_EDGE_CACHE_ARCHIVE_LIMIT
              value: {{ printf "%v" $cacheArchiveLimit | quote }}
            - name: FUGUE_EDGE_MAX_STALE
              value: {{ $maxStale | quote }}
            - name: FUGUE_EDGE_PEER_FALLBACK_ENABLED
              value: {{ printf "%t" $peerFallbackEnabled | quote }}
            - name: FUGUE_EDGE_SYNC_INTERVAL
              value: {{ $syncInterval | quote }}
            - name: FUGUE_EDGE_HTTP_TIMEOUT
              value: {{ $httpTimeout | quote }}
            {{- if $caddyEnabled }}
            - name: FUGUE_EDGE_CADDY_ENABLED
              value: "true"
            - name: FUGUE_EDGE_CADDY_ADMIN_URL
              value: {{ $caddyAdminURL | quote }}
            - name: FUGUE_EDGE_CADDY_LISTEN_ADDR
              value: {{ printf ":%v" $slot.httpsPort | quote }}
            - name: FUGUE_EDGE_CADDY_TLS_MODE
              value: {{ $caddyTLSMode | quote }}
            {{- if $caddyTLSAskURL }}
            - name: FUGUE_EDGE_CADDY_TLS_ASK_URL
              value: {{ $caddyTLSAskURL | quote }}
            {{- end }}
            - name: FUGUE_EDGE_PROXY_LISTEN_ADDR
              value: {{ $caddyProxyListenAddr | quote }}
            - name: FUGUE_EDGE_CADDY_DATA_DIR
              value: {{ $caddyDataDir | quote }}
            - name: FUGUE_EDGE_CADDY_SHARED_TLS_ENABLED
              value: {{ printf "%t" $sharedTLSEnabled | quote }}
            {{- if $staticTLSEnabled }}
            - name: FUGUE_EDGE_CADDY_STATIC_TLS_CERT_FILE
              value: {{ printf "%s/%s" (trimSuffix "/" $staticTLSMountPath) $staticTLSCertKey | quote }}
            - name: FUGUE_EDGE_CADDY_STATIC_TLS_KEY_FILE
              value: {{ printf "%s/%s" (trimSuffix "/" $staticTLSMountPath) $staticTLSPrivateKeyKey | quote }}
            {{- end }}
            {{- end }}
            {{- with $root.Values.edge.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with $.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: route-cache
              mountPath: {{ $root.Values.edge.persistence.mountPath | quote }}
            {{- if $caddyEnabled }}
            - name: caddy-data
              mountPath: {{ "/data" | quote }}
            {{- end }}
            {{- if and $caddyEnabled $staticTLSEnabled }}
            - name: caddy-static-tls
              mountPath: {{ $staticTLSMountPath | quote }}
              readOnly: true
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
            timeoutSeconds: 3
          resources:
            {{- toYaml $root.Values.edge.resources | nindent 12 }}
        {{- if $caddyEnabled }}
        - name: caddy
          image: {{ include "fugue.imageRef" (dict "repository" $caddyImageRepository "tag" $caddyImageTag "digest" $caddyImageDigest) | quote }}
          imagePullPolicy: {{ $caddyImagePullPolicy }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              printf '%s\n' '{' '    admin {{ $caddyAdminAddr }}' '}' >/config/Caddyfile
              exec caddy run --adapter caddyfile --config /config/Caddyfile
          {{- with $root.Values.edge.caddy.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: https-worker
              containerPort: {{ $slot.httpsPort }}
              hostPort: {{ $slot.httpsPort }}
              protocol: TCP
          volumeMounts:
            - name: caddy-config
              mountPath: /config
            - name: caddy-data
              mountPath: {{ "/data" | quote }}
            {{- if $staticTLSEnabled }}
            - name: caddy-static-tls
              mountPath: {{ $staticTLSMountPath | quote }}
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml $root.Values.edge.caddy.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: route-cache
          hostPath:
            path: {{ printf "%s/slot-%s" (trimSuffix "/" $routeCacheHostPath) $slot.name | quote }}
            type: DirectoryOrCreate
        {{- if $caddyEnabled }}
        - name: caddy-config
          emptyDir: {}
        - name: caddy-data
          hostPath:
            path: {{ printf "%s/slot-%s" (trimSuffix "/" $caddyDataHostPath) $slot.name | quote }}
            type: DirectoryOrCreate
        {{- if $staticTLSEnabled }}
        - name: caddy-static-tls
          secret:
            secretName: {{ $staticTLSSecretName | quote }}
            items:
              - key: {{ $staticTLSCertKey | quote }}
                path: {{ $staticTLSCertKey | quote }}
              - key: {{ $staticTLSPrivateKeyKey | quote }}
                path: {{ $staticTLSPrivateKeyKey | quote }}
        {{- end }}
        {{- end }}
      nodeSelector:
        {{- toYaml $nodeSelector | nindent 8 }}
      {{- with $root.Values.edge.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.edge.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end -}}

{{- if and .Values.edge.enabled .Values.edge.blueGreen.enabled }}
{{- if not .Values.edge.caddy.enabled }}
{{- fail "edge.caddy.enabled=true is required when edge.blueGreen.enabled=true" }}
{{- end }}
{{- if not (trim .Values.edge.edgeGroupID) }}
{{- fail "edge.edgeGroupID is required when edge.blueGreen.enabled=true" }}
{{- end }}
{{- $rootStaticTLS := default dict .Values.edge.caddy.staticTLS -}}
{{- $staticTLSEnabled := default false $rootStaticTLS.enabled -}}
{{- $staticTLSSecretName := default "" $rootStaticTLS.secretName -}}
{{- if and $staticTLSEnabled (not (trim $staticTLSSecretName)) }}
{{- fail "edge.caddy.staticTLS.secretName is required when edge.caddy.staticTLS.enabled=true" }}
{{- end }}
{{- include "fugue.edgeBlueGreenGroup" (dict
  "root" .
  "daemonBase" (include "fugue.edgeDaemonSetName" .)
  "componentBase" "edge"
  "edgeGroupID" .Values.edge.edgeGroupID
  "nodeSelector" .Values.edge.nodeSelector
  "apiURL" (default (printf "http://%s:%v" (include "fugue.fullname" .) .Values.service.port) .Values.edge.apiURL)
  "tokenSecretName" (default (include "fugue.configSecretName" .) .Values.edge.tokenSecret.name)
  "tokenSecretKey" (default "FUGUE_EDGE_TLS_ASK_TOKEN" .Values.edge.tokenSecret.key)
  "edgeImageRepository" .Values.edge.image.repository
  "edgeImageTag" .Values.edge.image.tag
  "edgeImageDigest" .Values.edge.image.digest
  "edgeImagePullPolicy" .Values.edge.image.pullPolicy
  "caddyEnabled" .Values.edge.caddy.enabled
  "caddyImageRepository" .Values.edge.caddy.image.repository
  "caddyImageTag" .Values.edge.caddy.image.tag
  "caddyImageDigest" .Values.edge.caddy.image.digest
  "caddyImagePullPolicy" .Values.edge.caddy.image.pullPolicy
  "caddyAdminAddr" .Values.edge.caddy.adminAddr
  "caddyAdminURL" .Values.edge.caddy.adminURL
  "caddyTLSMode" .Values.edge.caddy.tlsMode
  "caddyTLSAskURL" .Values.edge.caddy.tlsAskURL
  "caddyProxyListenAddr" .Values.edge.caddy.proxyListenAddr
  "caddyDataDir" (default "/data/caddy" .Values.edge.caddy.dataDir)
  "caddyDataHostPath" (default "/var/lib/fugue/edge/caddy-data" .Values.edge.caddy.persistence.hostPath)
  "sharedTLSEnabled" (default true .Values.edge.caddy.sharedTLS.enabled)
  "staticTLSEnabled" $staticTLSEnabled
  "staticTLSSecretName" $staticTLSSecretName
  "staticTLSMountPath" (default "/etc/caddy/static-tls" $rootStaticTLS.mountPath)
  "staticTLSCertKey" (default "tls.crt" $rootStaticTLS.certificateKey)
  "staticTLSPrivateKeyKey" (default "tls.key" $rootStaticTLS.privateKeyKey)
  "peerFallbackEnabled" .Values.edge.peerFallbackEnabled
  "listenAddr" .Values.edge.listenAddr
  "healthPort" .Values.edge.healthPort
  "routesCachePath" .Values.edge.routesCachePath
  "cacheArchiveLimit" .Values.edge.cacheArchiveLimit
  "maxStale" .Values.edge.maxStale
  "syncInterval" .Values.edge.syncInterval
  "httpTimeout" .Values.edge.httpTimeout
  "routeCacheHostPath" .Values.edge.persistence.hostPath
  "extraEnv" (list)
) }}
{{- range $group := .Values.edge.groups }}
{{- $name := required "edge.groups[].name is required" $group.name | lower | replace "_" "-" | trunc 30 | trimSuffix "-" -}}
{{- $edgeGroupID := required (printf "edge.groups[%s].edgeGroupID is required" $name) $group.edgeGroupID -}}
{{- if not $group.nodeSelector }}
{{- fail (printf "edge.groups[%s].nodeSelector is required" $name) }}
{{- end }}
{{- $image := default dict $group.image -}}
{{- $tokenSecret := default dict $group.tokenSecret -}}
{{- $caddy := default dict $group.caddy -}}
{{- $groupStaticTLS := default dict $caddy.staticTLS -}}
{{- $caddyEnabled := $.Values.edge.caddy.enabled -}}
{{- if hasKey $caddy "enabled" }}{{- $caddyEnabled = $caddy.enabled -}}{{- end -}}
{{- if not $caddyEnabled }}
{{- fail (printf "edge.groups[%s].caddy.enabled=false is not supported when edge.blueGreen.enabled=true" $name) }}
{{- end }}
{{- $groupStaticTLSEnabled := $staticTLSEnabled -}}
{{- if hasKey $groupStaticTLS "enabled" }}{{- $groupStaticTLSEnabled = $groupStaticTLS.enabled -}}{{- end -}}
{{- $groupStaticTLSSecretName := default $staticTLSSecretName $groupStaticTLS.secretName -}}
{{- if and $groupStaticTLSEnabled (not (trim $groupStaticTLSSecretName)) }}
{{- fail (printf "edge.groups[%s].caddy.staticTLS.secretName or edge.caddy.staticTLS.secretName is required when staticTLS is enabled" $name) }}
{{- end }}
{{- $groupCaddyPersistence := default dict $caddy.persistence -}}
{{- $rootCaddyPersistence := default dict $.Values.edge.caddy.persistence -}}
{{- $rootSharedTLS := default dict $.Values.edge.caddy.sharedTLS -}}
{{- $groupSharedTLS := default dict $caddy.sharedTLS -}}
{{- $peerFallbackEnabled := $.Values.edge.peerFallbackEnabled -}}
{{- if hasKey $group "peerFallbackEnabled" }}{{- $peerFallbackEnabled = $group.peerFallbackEnabled -}}{{- end -}}
{{- $caddyImage := default dict $caddy.image -}}
{{- include "fugue.edgeBlueGreenGroup" (dict
  "root" $
  "daemonBase" (printf "%s-%s" (include "fugue.edgeDaemonSetName" $) $name)
  "componentBase" (printf "edge-%s" $name)
  "edgeGroupID" $edgeGroupID
  "nodeSelector" $group.nodeSelector
  "apiURL" (default (default (printf "http://%s:%v" (include "fugue.fullname" $) $.Values.service.port) $.Values.edge.apiURL) $group.apiURL)
  "tokenSecretName" (default (default (include "fugue.configSecretName" $) $.Values.edge.tokenSecret.name) $tokenSecret.name)
  "tokenSecretKey" (default (default "FUGUE_EDGE_TLS_ASK_TOKEN" $.Values.edge.tokenSecret.key) $tokenSecret.key)
  "edgeImageRepository" (default $.Values.edge.image.repository $image.repository)
  "edgeImageTag" (default $.Values.edge.image.tag $image.tag)
  "edgeImageDigest" (default $.Values.edge.image.digest $image.digest)
  "edgeImagePullPolicy" (default $.Values.edge.image.pullPolicy $image.pullPolicy)
  "caddyEnabled" $caddyEnabled
  "caddyImageRepository" (default $.Values.edge.caddy.image.repository $caddyImage.repository)
  "caddyImageTag" (default $.Values.edge.caddy.image.tag $caddyImage.tag)
  "caddyImageDigest" (default $.Values.edge.caddy.image.digest $caddyImage.digest)
  "caddyImagePullPolicy" (default $.Values.edge.caddy.image.pullPolicy $caddyImage.pullPolicy)
  "caddyAdminAddr" (default $.Values.edge.caddy.adminAddr $caddy.adminAddr)
  "caddyAdminURL" (default $.Values.edge.caddy.adminURL $caddy.adminURL)
  "caddyTLSMode" (default $.Values.edge.caddy.tlsMode $caddy.tlsMode)
  "caddyTLSAskURL" (default $.Values.edge.caddy.tlsAskURL $caddy.tlsAskURL)
  "caddyProxyListenAddr" (default $.Values.edge.caddy.proxyListenAddr $caddy.proxyListenAddr)
  "caddyDataDir" (default $.Values.edge.caddy.dataDir $caddy.dataDir)
  "caddyDataHostPath" (default (default "/var/lib/fugue/edge/caddy-data" $rootCaddyPersistence.hostPath) $groupCaddyPersistence.hostPath)
  "sharedTLSEnabled" (default (default true $rootSharedTLS.enabled) $groupSharedTLS.enabled)
  "staticTLSEnabled" $groupStaticTLSEnabled
  "staticTLSSecretName" $groupStaticTLSSecretName
  "staticTLSMountPath" (default (default "/etc/caddy/static-tls" $rootStaticTLS.mountPath) $groupStaticTLS.mountPath)
  "staticTLSCertKey" (default (default "tls.crt" $rootStaticTLS.certificateKey) $groupStaticTLS.certificateKey)
  "staticTLSPrivateKeyKey" (default (default "tls.key" $rootStaticTLS.privateKeyKey) $groupStaticTLS.privateKeyKey)
  "peerFallbackEnabled" $peerFallbackEnabled
  "listenAddr" (default $.Values.edge.listenAddr $group.listenAddr)
  "healthPort" (default $.Values.edge.healthPort $group.healthPort)
  "routesCachePath" (default $.Values.edge.routesCachePath $group.routesCachePath)
  "cacheArchiveLimit" (default $.Values.edge.cacheArchiveLimit $group.cacheArchiveLimit)
  "maxStale" (default $.Values.edge.maxStale $group.maxStale)
  "syncInterval" (default $.Values.edge.syncInterval $group.syncInterval)
  "httpTimeout" (default $.Values.edge.httpTimeout $group.httpTimeout)
  "routeCacheHostPath" $.Values.edge.persistence.hostPath
  "extraEnv" (default (list) $group.extraEnv)
) }}
