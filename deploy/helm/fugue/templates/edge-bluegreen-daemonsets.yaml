{{/* Validate every edge DaemonSet name that the current values render. */}}
{{- define "fugue.validateEdgeDaemonSetNames" -}}
{{- $root := . -}}
{{- if $root.Values.edge.enabled -}}
{{- $daemonBase := include "fugue.edgeDaemonSetName" $root -}}
{{- $blueGreenEnabled := $root.Values.edge.blueGreen.enabled -}}
{{- $migration := default dict $root.Values.edge.blueGreen.migration -}}
{{- $directEnabled := or (not $blueGreenEnabled) (default false $migration.keepLegacyDirect) -}}
{{- $sshFront := default dict $root.Values.edge.sshFront -}}
{{- $sshEnabled := true -}}
{{- if hasKey $sshFront "enabled" }}{{- $sshEnabled = $sshFront.enabled -}}{{- end -}}
{{- $dynamic := default dict $root.Values.edge.dynamic -}}
{{- $dynamicBlueGreen := default dict $dynamic.blueGreen -}}
{{- $dynamicBlueGreenEnabled := true -}}
{{- if hasKey $dynamicBlueGreen "enabled" }}{{- $dynamicBlueGreenEnabled = $dynamicBlueGreen.enabled -}}{{- end -}}
{{- $dynamicEnabled := and $blueGreenEnabled (default false $dynamic.enabled) $dynamicBlueGreenEnabled -}}
{{- $resources := list -}}
{{- if $directEnabled -}}
{{- $resources = append $resources (dict "name" $daemonBase "owner" "edge legacy") -}}
{{- end -}}
{{- if $blueGreenEnabled -}}
{{- $resources = append $resources (dict "name" (printf "%s-front" $daemonBase) "owner" "edge front") -}}
{{- $resources = append $resources (dict "name" (printf "%s-worker-a" $daemonBase) "owner" "edge worker a") -}}
{{- $resources = append $resources (dict "name" (printf "%s-worker-b" $daemonBase) "owner" "edge worker b") -}}
{{- end -}}
{{- if $sshEnabled -}}
{{- $resources = append $resources (dict "name" (printf "%s-ssh-front" $daemonBase) "owner" "edge ssh front") -}}
{{- end -}}
{{- if $dynamicEnabled -}}
{{- $resources = append $resources (dict "name" (printf "%s-dynamic-front" $daemonBase) "owner" "dynamic front") -}}
{{- $resources = append $resources (dict "name" (printf "%s-dynamic-worker-a" $daemonBase) "owner" "dynamic worker a") -}}
{{- $resources = append $resources (dict "name" (printf "%s-dynamic-worker-b" $daemonBase) "owner" "dynamic worker b") -}}
{{- end -}}
{{- $seenGroupNames := dict -}}
{{- range $group := $root.Values.edge.groups -}}
{{- $rawName := required "edge.groups[].name is required" $group.name -}}
{{- $name := $rawName | lower | replace "_" "-" | trunc 30 | trimSuffix "-" -}}
{{- if not (regexMatch "^[a-z0-9]([a-z0-9-]*[a-z0-9])?$" $name) -}}
{{- fail (printf "edge.groups[].name=%v does not normalize to a valid DNS label" $rawName) -}}
{{- end -}}
{{- if or (eq $name "dynamic") (eq $name "ssh") -}}
{{- fail (printf "edge.groups[].name=%s is reserved" $name) -}}
{{- end -}}
{{- if hasKey $seenGroupNames $name -}}
{{- fail (printf "edge.groups contains duplicate normalized name %s" $name) -}}
{{- end -}}
{{- $_ := set $seenGroupNames $name true -}}
{{- if $directEnabled -}}
{{- $resources = append $resources (dict "name" (printf "%s-%s" $daemonBase $name) "owner" (printf "group %s legacy" $name)) -}}
{{- end -}}
{{- if $blueGreenEnabled -}}
{{- $resources = append $resources (dict "name" (printf "%s-%s-front" $daemonBase $name) "owner" (printf "group %s front" $name)) -}}
{{- $resources = append $resources (dict "name" (printf "%s-%s-worker-a" $daemonBase $name) "owner" (printf "group %s worker a" $name)) -}}
{{- $resources = append $resources (dict "name" (printf "%s-%s-worker-b" $daemonBase $name) "owner" (printf "group %s worker b" $name)) -}}
{{- end -}}
{{- if $sshEnabled -}}
{{- $resources = append $resources (dict "name" (printf "%s-%s-ssh-front" $daemonBase $name) "owner" (printf "group %s ssh front" $name)) -}}
{{- end -}}
{{- end -}}
{{- $seenResourceNames := dict -}}
{{- range $resource := $resources -}}
{{- $resourceName := get $resource "name" -}}
{{- if hasKey $seenResourceNames $resourceName -}}
{{- fail (printf "edge DaemonSet name collision %s between %s and %s" $resourceName (get $seenResourceNames $resourceName) (get $resource "owner")) -}}
{{- end -}}
{{- $_ := set $seenResourceNames $resourceName (get $resource "owner") -}}
{{- end -}}
{{- end -}}
{{- end -}}

{{/*
Resolve one local blue/green image as an atomic repository/tag/digest identity.

Group and dynamic cohort overrides are sparse maps; the presence of any
identity key activates the complete local identity, including an explicitly
empty digest. This prevents a tag-based local override from accidentally
inheriting an older digest from its fallback image.
*/}}
{{- define "fugue.atomicImageIdentity" -}}
{{- $fallback := default dict .fallback -}}
{{- $override := default dict .override -}}
{{- $identityOverride := false -}}
{{- if .identityKeysDefineOverride -}}
{{- $identityOverride = or (hasKey $override "repository") (hasKey $override "tag") (hasKey $override "digest") -}}
{{- else -}}
{{- $identityOverride = or (not (empty (get $override "repository"))) (not (empty (get $override "tag"))) (not (empty (get $override "digest"))) -}}
{{- end -}}
{{- $repository := get $fallback "repository" -}}
{{- $tag := get $fallback "tag" -}}
{{- $digest := get $fallback "digest" -}}
{{- if $identityOverride -}}
{{- $repository = get $override "repository" -}}
{{- $tag = get $override "tag" -}}
{{- $digest = get $override "digest" -}}
{{- end -}}
{{- dict
  "repository" $repository
  "tag" $tag
  "digest" $digest
  "pullPolicy" (default (get $fallback "pullPolicy") (get $override "pullPolicy"))
  | toJson -}}
{{- end -}}

{{/*
Overlay an existing image map without reviving a fallback digest. Repository
and tag remain sparse for backwards compatibility. Once either is overridden,
the override's digest (including empty or omitted) wins as part of the new
identity. Sparse maps may also explicitly override or clear digest alone; a
generated map whose complete identity tuple is empty remains an inheritance
placeholder.
*/}}
{{- define "fugue.sparseImageIdentity" -}}
{{- $fallback := default dict .fallback -}}
{{- $override := default dict .override -}}
{{- $repositoryOverride := false -}}
{{- $tagOverride := false -}}
{{- $digestOverride := false -}}
{{- $repositoryOverride = not (empty (get $override "repository")) -}}
{{- $tagOverride = not (empty (get $override "tag")) -}}
{{- if .identityKeysDefineOverride -}}
{{- $allIdentityPlaceholders := and (hasKey $override "repository") (hasKey $override "tag") (hasKey $override "digest") (empty (get $override "repository")) (empty (get $override "tag")) (empty (get $override "digest")) -}}
{{- $digestOverride = and (hasKey $override "digest") (not $allIdentityPlaceholders) -}}
{{- else -}}
{{- $digestOverride = not (empty (get $override "digest")) -}}
{{- end -}}
{{- $repository := get $fallback "repository" -}}
{{- $tag := get $fallback "tag" -}}
{{- $digest := get $fallback "digest" -}}
{{- if $repositoryOverride }}{{- $repository = get $override "repository" -}}{{- end -}}
{{- if $tagOverride }}{{- $tag = get $override "tag" -}}{{- end -}}
{{- if or $repositoryOverride $tagOverride $digestOverride }}{{- $digest = get $override "digest" -}}{{- end -}}
{{- dict
  "repository" $repository
  "tag" $tag
  "digest" $digest
  "pullPolicy" (default (get $fallback "pullPolicy") (get $override "pullPolicy"))
  | toJson -}}
{{- end -}}

{{- define "fugue.edgeBlueGreenGroup" -}}
{{- $root := .root -}}
{{- $daemonBase := .daemonBase -}}
{{- $componentBase := .componentBase -}}
{{- $edgeGroupID := .edgeGroupID -}}
{{- $nodeSelector := .nodeSelector -}}
{{- $apiURL := .apiURL -}}
{{- $tokenSecretName := .tokenSecretName -}}
{{- $tokenSecretKey := .tokenSecretKey -}}
{{- $edgeImageRepository := .edgeImageRepository -}}
{{- $edgeImageTag := .edgeImageTag -}}
{{- $edgeImageDigest := .edgeImageDigest -}}
{{- $edgeImagePullPolicy := .edgeImagePullPolicy -}}
{{- $caddyEnabled := .caddyEnabled -}}
{{- $caddyImageRepository := .caddyImageRepository -}}
{{- $caddyImageTag := .caddyImageTag -}}
{{- $caddyImageDigest := .caddyImageDigest -}}
{{- $caddyImagePullPolicy := .caddyImagePullPolicy -}}
{{- $caddyAdminAddr := .caddyAdminAddr -}}
{{- $caddyAdminURL := .caddyAdminURL -}}
{{- $caddyTLSMode := .caddyTLSMode -}}
{{- $caddyTLSAskURL := .caddyTLSAskURL -}}
{{- $caddyProxyListenAddr := .caddyProxyListenAddr -}}
{{- $caddyDataDir := .caddyDataDir -}}
{{- $caddyDataHostPath := .caddyDataHostPath -}}
{{- $sharedTLSEnabled := .sharedTLSEnabled -}}
{{- $staticTLSEnabled := .staticTLSEnabled -}}
{{- $staticTLSSecretName := .staticTLSSecretName -}}
{{- $staticTLSMountPath := .staticTLSMountPath -}}
{{- $staticTLSCertKey := .staticTLSCertKey -}}
{{- $staticTLSPrivateKeyKey := .staticTLSPrivateKeyKey -}}
{{- $peerFallbackEnabled := .peerFallbackEnabled -}}
{{- $listenAddr := .listenAddr -}}
{{- $healthPort := .healthPort -}}
{{- $routesCachePath := .routesCachePath -}}
{{- $cacheArchiveLimit := .cacheArchiveLimit -}}
{{- $maxStale := .maxStale -}}
{{- $requestBodyBuffer := default dict $root.Values.edge.requestBodyBuffer -}}
{{- $syncInterval := .syncInterval -}}
{{- $httpTimeout := .httpTimeout -}}
{{- $routeCacheHostPath := .routeCacheHostPath -}}
{{- $credentialHostPath := trim (default "" .credentialHostPath) -}}
{{- $frontResources := default $root.Values.edge.blueGreen.front.resources .frontResources -}}
{{- $workerResources := default $root.Values.edge.resources .workerResources -}}
{{- $caddyResources := default $root.Values.edge.caddy.resources .caddyResources -}}
{{- $edgeImage := dict "repository" $edgeImageRepository "tag" $edgeImageTag "digest" $edgeImageDigest "pullPolicy" $edgeImagePullPolicy -}}
{{- $rootFrontImageConfig := default dict $root.Values.edge.blueGreen.front.image -}}
{{- $rootFrontImage := include "fugue.sparseImageIdentity" (dict "fallback" $edgeImage "override" $rootFrontImageConfig "identityKeysDefineOverride" false) | fromJson -}}
{{- $localBlueGreen := default dict .blueGreenImageOverrides -}}
{{- $localFront := default dict $localBlueGreen.front -}}
{{- $localFrontImageConfig := default dict $localFront.image -}}
{{- $frontImage := include "fugue.atomicImageIdentity" (dict "fallback" $rootFrontImage "override" $localFrontImageConfig "identityKeysDefineOverride" true) | fromJson -}}
{{- $frontImageRepository := get $frontImage "repository" -}}
{{- $frontImageTag := get $frontImage "tag" -}}
{{- $frontImageDigest := get $frontImage "digest" -}}
{{- $frontImagePullPolicy := get $frontImage "pullPolicy" -}}
{{- $frontPublicHostPorts := default dict $root.Values.edge.blueGreen.front.publicHostPorts -}}
{{- $frontProcNet := default dict $root.Values.edge.blueGreen.front.procNet -}}
{{- $frontProcHostPath := default "/proc" $frontProcNet.hostPath -}}
{{- $frontProcMountPath := default "/host/proc" $frontProcNet.mountPath -}}
{{- $slotA := default dict $root.Values.edge.blueGreen.slots.a -}}
{{- $slotB := default dict $root.Values.edge.blueGreen.slots.b -}}
{{- $rootSlotAImageConfig := default dict $slotA.image -}}
{{- $rootSlotBImageConfig := default dict $slotB.image -}}
{{- $rootSlotAImage := include "fugue.sparseImageIdentity" (dict "fallback" $edgeImage "override" $rootSlotAImageConfig "identityKeysDefineOverride" false) | fromJson -}}
{{- $rootSlotBImage := include "fugue.sparseImageIdentity" (dict "fallback" $edgeImage "override" $rootSlotBImageConfig "identityKeysDefineOverride" false) | fromJson -}}
{{- $localSlots := default dict $localBlueGreen.slots -}}
{{- $localSlotA := default dict $localSlots.a -}}
{{- $localSlotB := default dict $localSlots.b -}}
{{- $localSlotAImageConfig := default dict $localSlotA.image -}}
{{- $localSlotBImageConfig := default dict $localSlotB.image -}}
{{- $slotAImage := include "fugue.atomicImageIdentity" (dict "fallback" $rootSlotAImage "override" $localSlotAImageConfig "identityKeysDefineOverride" true) | fromJson -}}
{{- $slotBImage := include "fugue.atomicImageIdentity" (dict "fallback" $rootSlotBImage "override" $localSlotBImageConfig "identityKeysDefineOverride" true) | fromJson -}}
{{- $slotAHTTP := default 18080 $slotA.httpPort -}}
{{- $slotAHTTPS := default 18443 $slotA.httpsPort -}}
{{- $slotBHTTP := default 28080 $slotB.httpPort -}}
{{- $slotBHTTPS := default 28443 $slotB.httpsPort -}}
{{- $stateHostPath := default "/var/lib/fugue/edge-blue-green" $root.Values.edge.blueGreen.stateHostPath -}}
{{- $activeSlotFile := default "/var/lib/fugue/edge-blue-green/active-slot" $root.Values.edge.blueGreen.activeSlotFile -}}
{{- $frontChecksumConfig := dict
  "component" $componentBase
  "edgeGroupID" $edgeGroupID
  "nodeSelector" $nodeSelector
  "credentialHostPath" $credentialHostPath
  "image" $frontImage
  "resources" $frontResources
  "front" (omit $root.Values.edge.blueGreen.front "image" "resources")
  "httpMode" $root.Values.edge.blueGreen.httpMode
  "activeSlot" $root.Values.edge.blueGreen.activeSlot
  "stateHostPath" $stateHostPath
  "activeSlotFile" $activeSlotFile
  "slotPorts" (dict "a" (dict "http" $slotAHTTP "https" $slotAHTTPS) "b" (dict "http" $slotBHTTP "https" $slotBHTTPS))
  "affinity" $root.Values.edge.affinity
  "tolerations" $root.Values.edge.tolerations
  "imagePullSecrets" $root.Values.imagePullSecrets
  "podLabels" $root.Values.podLabels
  "podAnnotations" $root.Values.podAnnotations
  -}}
{{- $workerChecksumCohort := omit . "root" "blueGreenImageOverrides" "frontResources" "edgeImageRepository" "edgeImageTag" "edgeImageDigest" "edgeImagePullPolicy" -}}
{{- $workerChecksumShared := dict
  "bundle" $root.Values.bundle
  "requestBodyBuffer" $requestBodyBuffer
  "edgeSecurityContext" $root.Values.edge.securityContext
  "edgeAffinity" $root.Values.edge.affinity
  "edgeTolerations" $root.Values.edge.tolerations
  "edgeExtraEnv" $root.Values.edge.extraEnv
  "edgePersistenceMountPath" $root.Values.edge.persistence.mountPath
  "caddySecurityContext" $root.Values.edge.caddy.securityContext
  "imagePullSecrets" $root.Values.imagePullSecrets
  "podLabels" $root.Values.podLabels
  "podAnnotations" $root.Values.podAnnotations
  }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ $daemonBase }}-front
  labels:
    {{- include "fugue.componentLabels" (dict "root" $root "component" (printf "%s-front" $componentBase)) | nindent 4 }}
    fugue.io/rollout-subsystem: public-data-plane
    fugue.io/rollout-mode: node-local-blue-green-front
    fugue.io/downtime-class: online-required
spec:
  revisionHistoryLimit: 2
  updateStrategy:
    type: OnDelete
  selector:
    matchLabels:
      {{- include "fugue.componentSelectorLabels" (dict "root" $root "component" (printf "%s-front" $componentBase)) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fugue.componentSelectorLabels" (dict "root" $root "component" (printf "%s-front" $componentBase)) | nindent 8 }}
        fugue.io/rollout-subsystem: public-data-plane
        fugue.io/rollout-mode: node-local-blue-green-front
        fugue.io/downtime-class: online-required
        {{- if $credentialHostPath }}
        fugue.io/edge-workload: dynamic
        {{- end }}
        {{- with $root.Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/edge-blue-green-front: {{ toJson $frontChecksumConfig | sha256sum }}
        {{- with $root.Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      {{- with $root.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: edge-front
          image: {{ include "fugue.imageRef" (dict "repository" $frontImageRepository "tag" $frontImageTag "digest" $frontImageDigest) | quote }}
          imagePullPolicy: {{ $frontImagePullPolicy }}
          command:
            - /usr/local/bin/fugue-edge-front
          {{- with $root.Values.edge.blueGreen.front.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            {{- if $frontPublicHostPorts.enabled }}
            - name: http-public
              containerPort: 80
              hostPort: {{ default 80 $frontPublicHostPorts.http }}
              protocol: TCP
            - name: https-public
              containerPort: 443
              hostPort: {{ default 443 $frontPublicHostPorts.https }}
              protocol: TCP
            {{- end }}
            - name: health
              containerPort: {{ default 7831 $root.Values.edge.blueGreen.front.healthPort }}
              protocol: TCP
          env:
            - name: FUGUE_EDGE_FRONT_NODE_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: FUGUE_EDGE_FRONT_EDGE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- if $credentialHostPath }}
            - name: FUGUE_EDGE_FRONT_NODE_ENV_FILE
              value: {{ $credentialHostPath | quote }}
            {{- else }}
            - name: FUGUE_EDGE_FRONT_EDGE_GROUP_ID
              value: {{ $edgeGroupID | quote }}
            {{- end }}
            - name: FUGUE_EDGE_FRONT_HTTP_LISTEN_ADDR
              value: {{ default ":80" $root.Values.edge.blueGreen.front.httpListenAddr | quote }}
            - name: FUGUE_EDGE_FRONT_HTTPS_LISTEN_ADDR
              value: {{ default ":443" $root.Values.edge.blueGreen.front.httpsListenAddr | quote }}
            - name: FUGUE_EDGE_FRONT_HEALTH_LISTEN_ADDR
              value: {{ printf ":%v" (default 7831 $root.Values.edge.blueGreen.front.healthPort) | quote }}
            - name: FUGUE_EDGE_FRONT_HTTP_MODE
              value: {{ default "redirect" $root.Values.edge.blueGreen.httpMode | quote }}
            - name: FUGUE_EDGE_FRONT_ACTIVE_SLOT_FILE
              value: {{ $activeSlotFile | quote }}
            - name: FUGUE_EDGE_FRONT_DEFAULT_SLOT
              value: {{ default "a" $root.Values.edge.blueGreen.activeSlot | quote }}
            - name: FUGUE_EDGE_FRONT_SLOT_A_HTTP_PORT
              value: {{ printf "%v" $slotAHTTP | quote }}
            - name: FUGUE_EDGE_FRONT_SLOT_A_HTTPS_PORT
              value: {{ printf "%v" $slotAHTTPS | quote }}
            - name: FUGUE_EDGE_FRONT_SLOT_B_HTTP_PORT
              value: {{ printf "%v" $slotBHTTP | quote }}
            - name: FUGUE_EDGE_FRONT_SLOT_B_HTTPS_PORT
              value: {{ printf "%v" $slotBHTTPS | quote }}
            - name: FUGUE_EDGE_FRONT_PROC_NET_SNMP_PATH
              value: {{ printf "%s/net/snmp" (trimSuffix "/" $frontProcMountPath) | quote }}
            - name: FUGUE_EDGE_FRONT_PROC_NET_NETSTAT_PATH
              value: {{ printf "%s/net/netstat" (trimSuffix "/" $frontProcMountPath) | quote }}
          volumeMounts:
            - name: edge-blue-green-state
              mountPath: {{ dir $activeSlotFile | quote }}
            - name: host-proc
              mountPath: {{ $frontProcMountPath | quote }}
              readOnly: true
            {{- if $credentialHostPath }}
            - name: edge-node-env
              mountPath: {{ $credentialHostPath | quote }}
              readOnly: true
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 3
          resources:
            {{- toYaml $frontResources | nindent 12 }}
      volumes:
        - name: edge-blue-green-state
          hostPath:
            path: {{ $stateHostPath | quote }}
            type: DirectoryOrCreate
        - name: host-proc
          hostPath:
            path: {{ $frontProcHostPath | quote }}
            type: Directory
        {{- if $credentialHostPath }}
        - name: edge-node-env
          hostPath:
            path: {{ $credentialHostPath | quote }}
            type: FileOrCreate
        {{- end }}
      nodeSelector:
        {{- toYaml $nodeSelector | nindent 8 }}
      {{- if $root.Values.edge.affinity }}
      affinity:
        {{- toYaml $root.Values.edge.affinity | nindent 8 }}
      {{- else if not $credentialHostPath }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: fugue.io/edge-workload
                    operator: NotIn
                    values:
                      - dynamic
      {{- end }}
      {{- with $root.Values.edge.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{ range $slot := list (dict "name" "a" "httpPort" $slotAHTTP "httpsPort" $slotAHTTPS "image" $slotAImage) (dict "name" "b" "httpPort" $slotBHTTP "httpsPort" $slotBHTTPS "image" $slotBImage) }}
{{ $slotImage := $slot.image -}}
{{ $slotEdgeImageRepository := get $slotImage "repository" -}}
{{ $slotEdgeImageTag := get $slotImage "tag" -}}
{{ $slotEdgeImageDigest := get $slotImage "digest" -}}
{{ $slotEdgeImagePullPolicy := get $slotImage "pullPolicy" }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ $daemonBase }}-worker-{{ $slot.name }}
  labels:
    {{- include "fugue.componentLabels" (dict "root" $root "component" (printf "%s-worker-%s" $componentBase $slot.name)) | nindent 4 }}
    fugue.io/rollout-subsystem: public-data-plane
    fugue.io/rollout-mode: node-local-blue-green-worker
    fugue.io/downtime-class: online-required
    fugue.io/edge-slot: {{ $slot.name | quote }}
spec:
  revisionHistoryLimit: 2
  updateStrategy:
    type: OnDelete
  selector:
    matchLabels:
      {{- include "fugue.componentSelectorLabels" (dict "root" $root "component" (printf "%s-worker-%s" $componentBase $slot.name)) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fugue.componentSelectorLabels" (dict "root" $root "component" (printf "%s-worker-%s" $componentBase $slot.name)) | nindent 8 }}
        fugue.io/rollout-subsystem: public-data-plane
        fugue.io/rollout-mode: node-local-blue-green-worker
        fugue.io/downtime-class: online-required
        fugue.io/edge-slot: {{ $slot.name | quote }}
        {{- if $credentialHostPath }}
        fugue.io/edge-workload: dynamic
        {{- end }}
        {{- with $root.Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config-secret: {{ include "fugue.configSecretChecksum" $root }}
        checksum/edge-blue-green-worker: {{ toJson (dict "cohort" $workerChecksumCohort "shared" $workerChecksumShared "slot" $slot) | sha256sum }}
        {{- with $root.Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      {{- with $root.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: edge
          image: {{ include "fugue.imageRef" (dict "repository" $slotEdgeImageRepository "tag" $slotEdgeImageTag "digest" $slotEdgeImageDigest) | quote }}
          imagePullPolicy: {{ $slotEdgeImagePullPolicy }}
          {{- with $root.Values.edge.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ $healthPort }}
              protocol: TCP
          env:
            - name: FUGUE_API_URL
              value: {{ $apiURL | quote }}
            {{- if $credentialHostPath }}
            - name: FUGUE_EDGE_NODE_ENV_FILE
              value: {{ $credentialHostPath | quote }}
            - name: FUGUE_EDGE_WORKLOAD_MODE
              value: "dynamic"
            {{- else }}
            - name: FUGUE_EDGE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $tokenSecretName }}
                  key: {{ $tokenSecretKey }}
            {{- end }}
            - name: FUGUE_BUNDLE_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fugue.configSecretName" $root }}
                  key: FUGUE_BUNDLE_SIGNING_KEY
            - name: FUGUE_BUNDLE_SIGNING_KEY_ID
              value: {{ $root.Values.bundle.signingKeyID | quote }}
            - name: FUGUE_BUNDLE_SIGNING_PREVIOUS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fugue.configSecretName" $root }}
                  key: FUGUE_BUNDLE_SIGNING_PREVIOUS_KEY
                  optional: true
            - name: FUGUE_BUNDLE_SIGNING_PREVIOUS_KEY_ID
              value: {{ $root.Values.bundle.previousSigningKeyID | quote }}
            - name: FUGUE_BUNDLE_REVOKED_KEY_IDS
              value: {{ $root.Values.bundle.revokedKeyIDs | quote }}
            - name: FUGUE_EDGE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- if not $credentialHostPath }}
            - name: FUGUE_EDGE_GROUP_ID
              value: {{ $edgeGroupID | quote }}
            {{- end }}
            - name: FUGUE_EDGE_LISTEN_ADDR
              value: {{ $listenAddr | quote }}
            - name: FUGUE_EDGE_ROUTES_CACHE_PATH
              value: {{ $routesCachePath | quote }}
            - name: FUGUE_EDGE_CACHE_ARCHIVE_LIMIT
              value: {{ printf "%v" $cacheArchiveLimit | quote }}
            - name: FUGUE_EDGE_MAX_STALE
              value: {{ $maxStale | quote }}
            - name: FUGUE_EDGE_PEER_FALLBACK_ENABLED
              value: {{ printf "%t" $peerFallbackEnabled | quote }}
            - name: FUGUE_EDGE_SYNC_INTERVAL
              value: {{ $syncInterval | quote }}
            - name: FUGUE_EDGE_HTTP_TIMEOUT
              value: {{ $httpTimeout | quote }}
            - name: FUGUE_EDGE_REQUEST_BODY_BUFFER_PATH
              value: {{ default "/var/lib/fugue/edge/request-body-buffer" $requestBodyBuffer.path | quote }}
            - name: FUGUE_EDGE_REQUEST_BODY_BUFFER_MAX_BYTES
              value: {{ (default 16777216 $requestBodyBuffer.maxBytes) | int64 | quote }}
            - name: FUGUE_EDGE_REQUEST_BODY_BUFFER_MAX_BUDGET_RATIO
              value: {{ printf "%v" (default 1.0 $requestBodyBuffer.maxBudgetRatio) | quote }}
            - name: FUGUE_EDGE_REQUEST_BODY_BUFFER_TOTAL_MAX_BYTES
              value: {{ (default 0 $requestBodyBuffer.totalMaxBytes) | int64 | quote }}
            - name: FUGUE_EDGE_REQUEST_BODY_BUFFER_RESERVE_BYTES
              value: {{ (default 4294967296 $requestBodyBuffer.reserveBytes) | int64 | quote }}
            - name: FUGUE_EDGE_REQUEST_BODY_BUFFER_DISK_RATIO
              value: {{ printf "%v" (default 0.25 $requestBodyBuffer.diskRatio) | quote }}
            - name: FUGUE_EDGE_REQUEST_BODY_BUFFER_SLOW_THRESHOLD
              value: {{ default "30s" $requestBodyBuffer.slowThreshold | quote }}
            - name: FUGUE_EDGE_REQUEST_BODY_BUFFER_PROGRESS_EVERY
              value: {{ default "10s" $requestBodyBuffer.progressEvery | quote }}
            {{- if $caddyEnabled }}
            - name: FUGUE_EDGE_CADDY_ENABLED
              value: "true"
            - name: FUGUE_EDGE_CADDY_ADMIN_URL
              value: {{ $caddyAdminURL | quote }}
            - name: FUGUE_EDGE_CADDY_LISTEN_ADDR
              value: {{ printf ":%v" $slot.httpsPort | quote }}
            - name: FUGUE_EDGE_CADDY_TLS_MODE
              value: {{ $caddyTLSMode | quote }}
            {{- if $caddyTLSAskURL }}
            - name: FUGUE_EDGE_CADDY_TLS_ASK_URL
              value: {{ $caddyTLSAskURL | quote }}
            {{- end }}
            - name: FUGUE_EDGE_PROXY_LISTEN_ADDR
              value: {{ $caddyProxyListenAddr | quote }}
            - name: FUGUE_EDGE_CADDY_DATA_DIR
              value: {{ $caddyDataDir | quote }}
            - name: FUGUE_EDGE_CADDY_SHARED_TLS_ENABLED
              value: {{ printf "%t" $sharedTLSEnabled | quote }}
            {{- if $staticTLSEnabled }}
            - name: FUGUE_EDGE_CADDY_STATIC_TLS_CERT_FILE
              value: {{ printf "%s/%s" (trimSuffix "/" $staticTLSMountPath) $staticTLSCertKey | quote }}
            - name: FUGUE_EDGE_CADDY_STATIC_TLS_KEY_FILE
              value: {{ printf "%s/%s" (trimSuffix "/" $staticTLSMountPath) $staticTLSPrivateKeyKey | quote }}
            {{- end }}
            {{- end }}
            {{- with $root.Values.edge.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with $.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            {{- if $credentialHostPath }}
            - name: edge-node-env
              mountPath: {{ $credentialHostPath | quote }}
              readOnly: true
            {{- end }}
            - name: route-cache
              mountPath: {{ $root.Values.edge.persistence.mountPath | quote }}
            {{- if $caddyEnabled }}
            - name: caddy-data
              mountPath: {{ "/data" | quote }}
            {{- end }}
            {{- if and $caddyEnabled $staticTLSEnabled }}
            - name: caddy-static-tls
              mountPath: {{ $staticTLSMountPath | quote }}
              readOnly: true
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
            timeoutSeconds: 3
          resources:
            {{- toYaml $workerResources | nindent 12 }}
        {{- if $caddyEnabled }}
        - name: caddy
          image: {{ include "fugue.imageRef" (dict "repository" $caddyImageRepository "tag" $caddyImageTag "digest" $caddyImageDigest) | quote }}
          imagePullPolicy: {{ $caddyImagePullPolicy }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              printf '%s\n' '{' '    admin {{ $caddyAdminAddr }}' '}' >/config/Caddyfile
              exec caddy run --adapter caddyfile --config /config/Caddyfile
          {{- with $root.Values.edge.caddy.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: https-worker
              containerPort: {{ $slot.httpsPort }}
              hostPort: {{ $slot.httpsPort }}
              protocol: TCP
          volumeMounts:
            - name: caddy-config
              mountPath: /config
            - name: caddy-data
              mountPath: {{ "/data" | quote }}
            {{- if $staticTLSEnabled }}
            - name: caddy-static-tls
              mountPath: {{ $staticTLSMountPath | quote }}
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml $caddyResources | nindent 12 }}
        {{- end }}
      volumes:
        {{- if $credentialHostPath }}
        - name: edge-node-env
          hostPath:
            path: {{ $credentialHostPath | quote }}
            type: FileOrCreate
        {{- end }}
        - name: route-cache
          hostPath:
            path: {{ printf "%s/slot-%s" (trimSuffix "/" $routeCacheHostPath) $slot.name | quote }}
            type: DirectoryOrCreate
        {{- if $caddyEnabled }}
        - name: caddy-config
          emptyDir: {}
        - name: caddy-data
          hostPath:
            path: {{ printf "%s/slot-%s" (trimSuffix "/" $caddyDataHostPath) $slot.name | quote }}
            type: DirectoryOrCreate
        {{- if $staticTLSEnabled }}
        - name: caddy-static-tls
          secret:
            secretName: {{ $staticTLSSecretName | quote }}
            items:
              - key: {{ $staticTLSCertKey | quote }}
                path: {{ $staticTLSCertKey | quote }}
              - key: {{ $staticTLSPrivateKeyKey | quote }}
                path: {{ $staticTLSPrivateKeyKey | quote }}
        {{- end }}
        {{- end }}
      nodeSelector:
        {{- toYaml $nodeSelector | nindent 8 }}
      {{- if $root.Values.edge.affinity }}
      affinity:
        {{- toYaml $root.Values.edge.affinity | nindent 8 }}
      {{- else if not $credentialHostPath }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: fugue.io/edge-workload
                    operator: NotIn
                    values:
                      - dynamic
      {{- end }}
      {{- with $root.Values.edge.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end -}}

{{- if and .Values.edge.enabled .Values.edge.blueGreen.enabled }}
{{- if not .Values.edge.caddy.enabled }}
{{- fail "edge.caddy.enabled=true is required when edge.blueGreen.enabled=true" }}
{{- end }}
{{- if not (trim .Values.edge.edgeGroupID) }}
{{- fail "edge.edgeGroupID is required when edge.blueGreen.enabled=true" }}
{{- end }}
{{- $rootStaticTLS := default dict .Values.edge.caddy.staticTLS -}}
{{- $staticTLSEnabled := default false $rootStaticTLS.enabled -}}
{{- $staticTLSSecretName := default "" $rootStaticTLS.secretName -}}
{{- if and $staticTLSEnabled (not (trim $staticTLSSecretName)) }}
{{- fail "edge.caddy.staticTLS.secretName is required when edge.caddy.staticTLS.enabled=true" }}
{{- end }}
{{- include "fugue.edgeBlueGreenGroup" (dict
  "root" .
  "daemonBase" (include "fugue.edgeDaemonSetName" .)
  "componentBase" "edge"
  "edgeGroupID" .Values.edge.edgeGroupID
  "nodeSelector" .Values.edge.nodeSelector
  "apiURL" (default (printf "http://%s:%v" (include "fugue.fullname" .) .Values.service.port) .Values.edge.apiURL)
  "tokenSecretName" (default (include "fugue.configSecretName" .) .Values.edge.tokenSecret.name)
  "tokenSecretKey" (default "FUGUE_EDGE_TLS_ASK_TOKEN" .Values.edge.tokenSecret.key)
  "edgeImageRepository" .Values.edge.image.repository
  "edgeImageTag" .Values.edge.image.tag
  "edgeImageDigest" .Values.edge.image.digest
  "edgeImagePullPolicy" .Values.edge.image.pullPolicy
  "caddyEnabled" .Values.edge.caddy.enabled
  "caddyImageRepository" .Values.edge.caddy.image.repository
  "caddyImageTag" .Values.edge.caddy.image.tag
  "caddyImageDigest" .Values.edge.caddy.image.digest
  "caddyImagePullPolicy" .Values.edge.caddy.image.pullPolicy
  "caddyAdminAddr" .Values.edge.caddy.adminAddr
  "caddyAdminURL" .Values.edge.caddy.adminURL
  "caddyTLSMode" .Values.edge.caddy.tlsMode
  "caddyTLSAskURL" .Values.edge.caddy.tlsAskURL
  "caddyProxyListenAddr" .Values.edge.caddy.proxyListenAddr
  "caddyDataDir" (default "/data/caddy" .Values.edge.caddy.dataDir)
  "caddyDataHostPath" (default "/var/lib/fugue/edge/caddy-data" .Values.edge.caddy.persistence.hostPath)
  "sharedTLSEnabled" (default true .Values.edge.caddy.sharedTLS.enabled)
  "staticTLSEnabled" $staticTLSEnabled
  "staticTLSSecretName" $staticTLSSecretName
  "staticTLSMountPath" (default "/etc/caddy/static-tls" $rootStaticTLS.mountPath)
  "staticTLSCertKey" (default "tls.crt" $rootStaticTLS.certificateKey)
  "staticTLSPrivateKeyKey" (default "tls.key" $rootStaticTLS.privateKeyKey)
  "peerFallbackEnabled" .Values.edge.peerFallbackEnabled
  "listenAddr" .Values.edge.listenAddr
  "healthPort" .Values.edge.healthPort
  "routesCachePath" .Values.edge.routesCachePath
  "cacheArchiveLimit" .Values.edge.cacheArchiveLimit
  "maxStale" .Values.edge.maxStale
  "syncInterval" .Values.edge.syncInterval
  "httpTimeout" .Values.edge.httpTimeout
  "routeCacheHostPath" .Values.edge.persistence.hostPath
  "extraEnv" (list)
) }}
{{- range $group := .Values.edge.groups }}
{{- $name := required "edge.groups[].name is required" $group.name | lower | replace "_" "-" | trunc 30 | trimSuffix "-" -}}
{{- $edgeGroupID := required (printf "edge.groups[%s].edgeGroupID is required" $name) $group.edgeGroupID -}}
{{- if not $group.nodeSelector }}
{{- fail (printf "edge.groups[%s].nodeSelector is required" $name) }}
{{- end }}
{{- $image := default dict $group.image -}}
{{- $rootEdgeImage := dict "repository" $.Values.edge.image.repository "tag" $.Values.edge.image.tag "digest" $.Values.edge.image.digest "pullPolicy" $.Values.edge.image.pullPolicy -}}
{{- $groupEdgeImage := include "fugue.sparseImageIdentity" (dict "fallback" $rootEdgeImage "override" $image "identityKeysDefineOverride" true) | fromJson -}}
{{- $groupBlueGreen := default dict $group.blueGreen -}}
{{- $tokenSecret := default dict $group.tokenSecret -}}
{{- $caddy := default dict $group.caddy -}}
{{- $groupStaticTLS := default dict $caddy.staticTLS -}}
{{- $caddyEnabled := $.Values.edge.caddy.enabled -}}
{{- if hasKey $caddy "enabled" }}{{- $caddyEnabled = $caddy.enabled -}}{{- end -}}
{{- if not $caddyEnabled }}
{{- fail (printf "edge.groups[%s].caddy.enabled=false is not supported when edge.blueGreen.enabled=true" $name) }}
{{- end }}
{{- $groupStaticTLSEnabled := $staticTLSEnabled -}}
{{- if hasKey $groupStaticTLS "enabled" }}{{- $groupStaticTLSEnabled = $groupStaticTLS.enabled -}}{{- end -}}
{{- $groupStaticTLSSecretName := default $staticTLSSecretName $groupStaticTLS.secretName -}}
{{- if and $groupStaticTLSEnabled (not (trim $groupStaticTLSSecretName)) }}
{{- fail (printf "edge.groups[%s].caddy.staticTLS.secretName or edge.caddy.staticTLS.secretName is required when staticTLS is enabled" $name) }}
{{- end }}
{{- $groupCaddyPersistence := default dict $caddy.persistence -}}
{{- $rootCaddyPersistence := default dict $.Values.edge.caddy.persistence -}}
{{- $rootSharedTLS := default dict $.Values.edge.caddy.sharedTLS -}}
{{- $groupSharedTLS := default dict $caddy.sharedTLS -}}
{{- $peerFallbackEnabled := $.Values.edge.peerFallbackEnabled -}}
{{- if hasKey $group "peerFallbackEnabled" }}{{- $peerFallbackEnabled = $group.peerFallbackEnabled -}}{{- end -}}
{{- $caddyImage := default dict $caddy.image -}}
{{- $rootCaddyImage := dict "repository" $.Values.edge.caddy.image.repository "tag" $.Values.edge.caddy.image.tag "digest" $.Values.edge.caddy.image.digest "pullPolicy" $.Values.edge.caddy.image.pullPolicy -}}
{{- $groupCaddyImage := include "fugue.sparseImageIdentity" (dict "fallback" $rootCaddyImage "override" $caddyImage "identityKeysDefineOverride" true) | fromJson -}}
{{- include "fugue.edgeBlueGreenGroup" (dict
  "root" $
  "daemonBase" (printf "%s-%s" (include "fugue.edgeDaemonSetName" $) $name)
  "componentBase" (printf "edge-%s" $name)
  "edgeGroupID" $edgeGroupID
  "nodeSelector" $group.nodeSelector
  "apiURL" (default (default (printf "http://%s:%v" (include "fugue.fullname" $) $.Values.service.port) $.Values.edge.apiURL) $group.apiURL)
  "tokenSecretName" (default (default (include "fugue.configSecretName" $) $.Values.edge.tokenSecret.name) $tokenSecret.name)
  "tokenSecretKey" (default (default "FUGUE_EDGE_TLS_ASK_TOKEN" $.Values.edge.tokenSecret.key) $tokenSecret.key)
  "edgeImageRepository" (get $groupEdgeImage "repository")
  "edgeImageTag" (get $groupEdgeImage "tag")
  "edgeImageDigest" (get $groupEdgeImage "digest")
  "edgeImagePullPolicy" (get $groupEdgeImage "pullPolicy")
  "blueGreenImageOverrides" $groupBlueGreen
  "caddyEnabled" $caddyEnabled
  "caddyImageRepository" (get $groupCaddyImage "repository")
  "caddyImageTag" (get $groupCaddyImage "tag")
  "caddyImageDigest" (get $groupCaddyImage "digest")
  "caddyImagePullPolicy" (get $groupCaddyImage "pullPolicy")
  "caddyAdminAddr" (default $.Values.edge.caddy.adminAddr $caddy.adminAddr)
  "caddyAdminURL" (default $.Values.edge.caddy.adminURL $caddy.adminURL)
  "caddyTLSMode" (default $.Values.edge.caddy.tlsMode $caddy.tlsMode)
  "caddyTLSAskURL" (default $.Values.edge.caddy.tlsAskURL $caddy.tlsAskURL)
  "caddyProxyListenAddr" (default $.Values.edge.caddy.proxyListenAddr $caddy.proxyListenAddr)
  "caddyDataDir" (default $.Values.edge.caddy.dataDir $caddy.dataDir)
  "caddyDataHostPath" (default (default "/var/lib/fugue/edge/caddy-data" $rootCaddyPersistence.hostPath) $groupCaddyPersistence.hostPath)
  "sharedTLSEnabled" (default (default true $rootSharedTLS.enabled) $groupSharedTLS.enabled)
  "staticTLSEnabled" $groupStaticTLSEnabled
  "staticTLSSecretName" $groupStaticTLSSecretName
  "staticTLSMountPath" (default (default "/etc/caddy/static-tls" $rootStaticTLS.mountPath) $groupStaticTLS.mountPath)
  "staticTLSCertKey" (default (default "tls.crt" $rootStaticTLS.certificateKey) $groupStaticTLS.certificateKey)
  "staticTLSPrivateKeyKey" (default (default "tls.key" $rootStaticTLS.privateKeyKey) $groupStaticTLS.privateKeyKey)
  "peerFallbackEnabled" $peerFallbackEnabled
  "listenAddr" (default $.Values.edge.listenAddr $group.listenAddr)
  "healthPort" (default $.Values.edge.healthPort $group.healthPort)
  "routesCachePath" (default $.Values.edge.routesCachePath $group.routesCachePath)
  "cacheArchiveLimit" (default $.Values.edge.cacheArchiveLimit $group.cacheArchiveLimit)
  "maxStale" (default $.Values.edge.maxStale $group.maxStale)
  "syncInterval" (default $.Values.edge.syncInterval $group.syncInterval)
  "httpTimeout" (default $.Values.edge.httpTimeout $group.httpTimeout)
  "routeCacheHostPath" $.Values.edge.persistence.hostPath
  "extraEnv" (default (list) $group.extraEnv)
) }}
{{- end }}
{{- $dynamic := default dict .Values.edge.dynamic -}}
{{- $dynamicBlueGreen := default dict $dynamic.blueGreen -}}
{{- $dynamicBlueGreenEnabled := true -}}
{{- if hasKey $dynamicBlueGreen "enabled" }}{{- $dynamicBlueGreenEnabled = $dynamicBlueGreen.enabled -}}{{- end -}}
{{- if and $dynamic.enabled $dynamicBlueGreenEnabled }}
{{- if not $dynamic.nodeSelector }}
{{- fail "edge.dynamic.nodeSelector is required when edge.dynamic.enabled=true" }}
{{- end }}
{{- $dynamicCredentialHostPath := required "edge.dynamic.credentialHostPath is required when edge.dynamic.enabled=true" $dynamic.credentialHostPath -}}
{{- $dynamicCaddy := default dict $dynamic.caddy -}}
{{- $dynamicFront := default dict $dynamic.front -}}
{{- include "fugue.edgeBlueGreenGroup" (dict
  "root" .
  "daemonBase" (printf "%s-dynamic" (include "fugue.edgeDaemonSetName" .))
  "componentBase" "edge-dynamic"
  "edgeGroupID" "dynamic"
  "nodeSelector" $dynamic.nodeSelector
  "apiURL" (default (printf "http://%s:%v" (include "fugue.fullname" .) .Values.service.port) .Values.edge.apiURL)
  "tokenSecretName" (default (include "fugue.configSecretName" .) .Values.edge.tokenSecret.name)
  "tokenSecretKey" (default "FUGUE_EDGE_TLS_ASK_TOKEN" .Values.edge.tokenSecret.key)
  "edgeImageRepository" .Values.edge.image.repository
  "edgeImageTag" .Values.edge.image.tag
  "edgeImageDigest" .Values.edge.image.digest
  "edgeImagePullPolicy" .Values.edge.image.pullPolicy
  "blueGreenImageOverrides" $dynamicBlueGreen
  "caddyEnabled" .Values.edge.caddy.enabled
  "caddyImageRepository" .Values.edge.caddy.image.repository
  "caddyImageTag" .Values.edge.caddy.image.tag
  "caddyImageDigest" .Values.edge.caddy.image.digest
  "caddyImagePullPolicy" .Values.edge.caddy.image.pullPolicy
  "caddyAdminAddr" .Values.edge.caddy.adminAddr
  "caddyAdminURL" .Values.edge.caddy.adminURL
  "caddyTLSMode" .Values.edge.caddy.tlsMode
  "caddyTLSAskURL" .Values.edge.caddy.tlsAskURL
  "caddyProxyListenAddr" .Values.edge.caddy.proxyListenAddr
  "caddyDataDir" (default "/data/caddy" .Values.edge.caddy.dataDir)
  "caddyDataHostPath" (default "/var/lib/fugue/edge/caddy-data" .Values.edge.caddy.persistence.hostPath)
  "sharedTLSEnabled" (default true .Values.edge.caddy.sharedTLS.enabled)
  "staticTLSEnabled" $staticTLSEnabled
  "staticTLSSecretName" $staticTLSSecretName
  "staticTLSMountPath" (default "/etc/caddy/static-tls" $rootStaticTLS.mountPath)
  "staticTLSCertKey" (default "tls.crt" $rootStaticTLS.certificateKey)
  "staticTLSPrivateKeyKey" (default "tls.key" $rootStaticTLS.privateKeyKey)
  "peerFallbackEnabled" .Values.edge.peerFallbackEnabled
  "listenAddr" .Values.edge.listenAddr
  "healthPort" .Values.edge.healthPort
  "routesCachePath" .Values.edge.routesCachePath
  "cacheArchiveLimit" .Values.edge.cacheArchiveLimit
  "maxStale" .Values.edge.maxStale
  "syncInterval" .Values.edge.syncInterval
  "httpTimeout" .Values.edge.httpTimeout
  "routeCacheHostPath" .Values.edge.persistence.hostPath
  "credentialHostPath" $dynamicCredentialHostPath
  "frontResources" (default .Values.edge.blueGreen.front.resources $dynamicFront.resources)
  "workerResources" (default .Values.edge.resources $dynamic.resources)
  "caddyResources" (default .Values.edge.caddy.resources $dynamicCaddy.resources)
  "extraEnv" (list)
) }}
{{- end }}
{{- end }}
