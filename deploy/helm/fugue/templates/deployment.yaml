apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fugue.fullname" . }}
  labels:
    {{- include "fugue.labels" . | nindent 4 }}
spec:
  strategy:
    type: Recreate
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "fugue.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fugue.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.rbac.create }}
      serviceAccountName: {{ include "fugue.serviceAccountName" . }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: FUGUE_BIND_ADDR
              value: ":8080"
            - name: FUGUE_STORE_PATH
              value: /var/lib/fugue/store.json
            - name: FUGUE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "fugue.configSecretName" . }}
                  key: FUGUE_DATABASE_URL
            - name: FUGUE_APP_BASE_DOMAIN
              value: {{ .Values.api.appBaseDomain | quote }}
            - name: FUGUE_API_PUBLIC_DOMAIN
              value: {{ .Values.api.apiPublicDomain | quote }}
            - name: FUGUE_REGISTRY_PUSH_BASE
              value: {{ .Values.api.registryPushBase | quote }}
            - name: FUGUE_IMPORT_WORK_DIR
              value: {{ .Values.api.importWorkDir | quote }}
            - name: FUGUE_BOOTSTRAP_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fugue.configSecretName" . }}
                  key: FUGUE_BOOTSTRAP_ADMIN_KEY
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/fugue
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
        - name: controller
          image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          env:
            - name: FUGUE_STORE_PATH
              value: /var/lib/fugue/store.json
            - name: FUGUE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "fugue.configSecretName" . }}
                  key: FUGUE_DATABASE_URL
            - name: FUGUE_RENDER_DIR
              value: /var/lib/fugue/rendered
            - name: FUGUE_CONTROLLER_POLL_INTERVAL
              value: {{ .Values.controller.pollInterval | quote }}
            - name: FUGUE_RUNTIME_OFFLINE_AFTER
              value: {{ .Values.controller.runtimeOfflineAfter | quote }}
            - name: FUGUE_CONTROLLER_KUBECTL_APPLY
              value: {{ .Values.controller.kubectlApply | quote }}
            {{- with .Values.controller.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/fugue
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if eq .Values.persistence.mode "pvc" }}
          persistentVolumeClaim:
            claimName: {{ include "fugue.fullname" . }}-data
          {{- else if eq .Values.persistence.mode "hostPath" }}
          hostPath:
            path: {{ .Values.persistence.hostPath | quote }}
            type: DirectoryOrCreate
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
