{{- $apiNodeSelector := .Values.api.nodeSelector -}}
{{- $apiTolerations := default .Values.tolerations .Values.api.tolerations -}}
{{- $apiAffinity := default .Values.affinity .Values.api.affinity -}}
{{- $apiTopologySpread := default (dict) .Values.api.topologySpread -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fugue.apiDeploymentName" . }}
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  minReadySeconds: {{ .Values.api.minReadySeconds }}
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.api.strategy.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.api.strategy.rollingUpdate.maxSurge }}
  selector:
    matchLabels:
      {{- include "fugue.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fugue.componentSelectorLabels" (dict "root" . "component" "api") | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config-secret: {{ include "fugue.configSecretChecksum" . }}
        checksum/headscale-config: {{ include (print $.Template.BasePath "/headscale-config.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.api.terminationGracePeriodSeconds }}
      hostNetwork: {{ .Values.api.hostNetwork }}
      {{- if .Values.api.hostNetwork }}
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- if .Values.rbac.create }}
      serviceAccountName: {{ include "fugue.serviceAccountName" . }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "fugue.imageRef" (dict "repository" .Values.api.image.repository "tag" .Values.api.image.tag "digest" .Values.api.image.digest) | quote }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: FUGUE_BIND_ADDR
              value: ":8080"
            - name: FUGUE_CONTROL_PLANE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: FUGUE_CONTROL_PLANE_RELEASE_INSTANCE
              value: {{ .Release.Name | quote }}
            - name: FUGUE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "fugue.configSecretName" . }}
                  key: FUGUE_DATABASE_URL
            - name: FUGUE_CLUSTER_JOIN_SERVER
              valueFrom:
                secretKeyRef:
                  name: {{ include "fugue.configSecretName" . }}
                  key: FUGUE_CLUSTER_JOIN_SERVER
            - name: FUGUE_CLUSTER_JOIN_SERVER_FALLBACKS
              valueFrom:
                secretKeyRef:
                  name: {{ include "fugue.configSecretName" . }}
                  key: FUGUE_CLUSTER_JOIN_SERVER_FALLBACKS
            - name: FUGUE_CLUSTER_JOIN_CA_HASH
              valueFrom:
                secretKeyRef:
                  name: {{ include "fugue.configSecretName" . }}
                  key: FUGUE_CLUSTER_JOIN_CA_HASH
            - name: FUGUE_CLUSTER_JOIN_BOOTSTRAP_TOKEN_TTL
              value: {{ .Values.api.clusterJoinBootstrapTokenTTL | quote }}
            - name: FUGUE_CLUSTER_JOIN_MESH_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: {{ include "fugue.configSecretName" . }}
                  key: FUGUE_CLUSTER_JOIN_MESH_PROVIDER
            - name: FUGUE_CLUSTER_JOIN_MESH_LOGIN_SERVER
              valueFrom:
                secretKeyRef:
                  name: {{ include "fugue.configSecretName" . }}
                  key: FUGUE_CLUSTER_JOIN_MESH_LOGIN_SERVER
            - name: FUGUE_CLUSTER_JOIN_MESH_AUTH_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fugue.configSecretName" . }}
                  key: FUGUE_CLUSTER_JOIN_MESH_AUTH_KEY
            - name: FUGUE_APP_BASE_DOMAIN
              value: {{ .Values.api.appBaseDomain | quote }}
            - name: FUGUE_API_PUBLIC_DOMAIN
              value: {{ .Values.api.apiPublicDomain | quote }}
            {{- if .Values.api.dnsStaticRecordsJSON }}
            - name: FUGUE_DNS_STATIC_RECORDS_JSON
              value: {{ .Values.api.dnsStaticRecordsJSON | quote }}
            {{- end }}
            {{- if .Values.api.platformRoutesJSON }}
            - name: FUGUE_PLATFORM_ROUTES_JSON
              value: {{ .Values.api.platformRoutesJSON | quote }}
            {{- end }}
            - name: FUGUE_EDGE_TLS_ASK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fugue.configSecretName" . }}
                  key: FUGUE_EDGE_TLS_ASK_TOKEN
            - name: FUGUE_ALLOW_LEGACY_EDGE_TOKEN
              value: {{ .Values.api.allowLegacyEdgeToken | quote }}
            - name: FUGUE_REGISTRY_PUSH_BASE
              value: {{ include "fugue.registryPushBase" . | quote }}
            - name: FUGUE_REGISTRY_PULL_BASE
              value: {{ include "fugue.registryPullBase" . | quote }}
            - name: FUGUE_CLUSTER_JOIN_REGISTRY_ENDPOINT
              value: {{ include "fugue.clusterJoinRegistryEndpoint" . | quote }}
            - name: FUGUE_IMPORT_WORK_DIR
              value: {{ .Values.api.importWorkDir | quote }}
            - name: FUGUE_API_SHUTDOWN_DRAIN_DELAY
              value: {{ .Values.api.shutdownDrainDelay | quote }}
            - name: FUGUE_API_SHUTDOWN_TIMEOUT
              value: {{ .Values.api.shutdownTimeout | quote }}
            - name: FUGUE_BOOTSTRAP_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fugue.configSecretName" . }}
                  key: FUGUE_BOOTSTRAP_ADMIN_KEY
            - name: FUGUE_WORKLOAD_IDENTITY_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fugue.configSecretName" . }}
                  key: FUGUE_WORKLOAD_IDENTITY_SIGNING_KEY
            - name: FUGUE_BUNDLE_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fugue.configSecretName" . }}
                  key: FUGUE_BUNDLE_SIGNING_KEY
            - name: FUGUE_BUNDLE_SIGNING_KEY_ID
              value: {{ .Values.bundle.signingKeyID | quote }}
            - name: FUGUE_BUNDLE_SIGNING_PREVIOUS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fugue.configSecretName" . }}
                  key: FUGUE_BUNDLE_SIGNING_PREVIOUS_KEY
                  optional: true
            - name: FUGUE_BUNDLE_SIGNING_PREVIOUS_KEY_ID
              value: {{ .Values.bundle.previousSigningKeyID | quote }}
            - name: FUGUE_BUNDLE_REVOKED_KEY_IDS
              value: {{ .Values.bundle.revokedKeyIDs | quote }}
            - name: FUGUE_BUNDLE_VALID_FOR
              value: {{ .Values.bundle.validFor | quote }}
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/fugue
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 2
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 3
            failureThreshold: 3
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: data
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: {{ default "ScheduleAnyway" $apiTopologySpread.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "fugue.componentSelectorLabels" (dict "root" . "component" "api") | nindent 14 }}
      {{- with $apiNodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $apiAffinity }}
      affinity:
        {{- toYaml $apiAffinity | nindent 8 }}
      {{- else }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "fugue.componentSelectorLabels" (dict "root" . "component" "api") | nindent 20 }}
      {{- end }}
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ .Values.api.nodeFailureTolerationSeconds }}
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ .Values.api.nodeFailureTolerationSeconds }}
        {{- with $apiTolerations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
