{{/*
Adapted for Fugue's staged cluster-DNS rollout from the Kubernetes NodeLocal
DNSCache manifest (Apache-2.0):
cluster/addons/dns/nodelocaldns/nodelocaldns.yaml at
fc1c3faf47e46f9c257a17f9aae5abc6dd28c118.
*/}}
{{- define "fugue.nodeLocalDNSCorefile" -}}
{{ .clusterDomain }}:53 {
    errors
    cache {
        success 9984 30
        denial 9984 5
    }
    reload
    loop
    bind {{ .bindIPs }}
    forward . __PILLAR__CLUSTER__DNS__ {
        force_tcp
    }
    prometheus :9253
    health {{ .localIP }}:8080
}
in-addr.arpa:53 {
    errors
    cache 30
    reload
    loop
    bind {{ .bindIPs }}
    forward . __PILLAR__CLUSTER__DNS__ {
        force_tcp
    }
    prometheus :9253
}
ip6.arpa:53 {
    errors
    cache 30
    reload
    loop
    bind {{ .bindIPs }}
    forward . __PILLAR__CLUSTER__DNS__ {
        force_tcp
    }
    prometheus :9253
}
.:53 {
    errors
    cache 30
    reload
    loop
    bind {{ .bindIPs }}
    forward . __PILLAR__CLUSTER__DNS__ {
        force_tcp
    }
    prometheus :9253
}
{{- end -}}
{{- if .Values.nodeLocalDNS.enabled }}
{{- $config := .Values.nodeLocalDNS -}}
{{- $mode := required "nodeLocalDNS.mode is required" $config.mode -}}
{{- if not (has $mode (list "shadow" "iptables")) -}}
{{- fail "nodeLocalDNS.mode must be shadow or iptables" -}}
{{- end -}}
{{- $legacyMode := default $mode $config.legacyMode -}}
{{- if not (has $legacyMode (list "shadow" "iptables")) -}}
{{- fail "nodeLocalDNS.legacyMode must be shadow or iptables" -}}
{{- end -}}
{{- $namespace := required "nodeLocalDNS.namespace is required" $config.namespace -}}
{{- $localIP := required "nodeLocalDNS.localIP is required" $config.localIP -}}
{{- $kubeDNSServiceIP := required "nodeLocalDNS.kubeDNSServiceIP is required" $config.kubeDNSServiceIP -}}
{{- $ipv4Pattern := `^((25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])\.){3}(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])$` -}}
{{- if not (regexMatch $ipv4Pattern $localIP) -}}
{{- fail "nodeLocalDNS.localIP must be a valid IPv4 address" -}}
{{- end -}}
{{- if not (hasPrefix "169.254." $localIP) -}}
{{- fail "nodeLocalDNS.localIP must be in the IPv4 link-local 169.254.0.0/16 range" -}}
{{- end -}}
{{- if not (regexMatch $ipv4Pattern $kubeDNSServiceIP) -}}
{{- fail "nodeLocalDNS.kubeDNSServiceIP must be a valid IPv4 address" -}}
{{- end -}}
{{- if eq $localIP $kubeDNSServiceIP -}}
{{- fail "nodeLocalDNS.localIP and nodeLocalDNS.kubeDNSServiceIP must be different" -}}
{{- end -}}
{{- $clusterDomain := required "nodeLocalDNS.clusterDomain is required" $config.clusterDomain | trimSuffix "." -}}
{{- if not (regexMatch `^[a-z0-9]([a-z0-9.-]*[a-z0-9])?$` $clusterDomain) -}}
{{- fail "nodeLocalDNS.clusterDomain must be a lowercase DNS name" -}}
{{- end -}}
{{- if not $config.upstreamSelector -}}
{{- fail "nodeLocalDNS.upstreamSelector must select the central CoreDNS pods" -}}
{{- end -}}
{{- $targetNodes := $config.targetNodes | default (list) -}}
{{- if not (kindIs "slice" $targetNodes) -}}
{{- fail "nodeLocalDNS.targetNodes must be a non-empty hostname list" -}}
{{- end -}}
{{- if eq (len $targetNodes) 0 -}}
{{- fail "nodeLocalDNS.targetNodes must be a non-empty hostname list" -}}
{{- end -}}
{{- $seenTargetNodes := dict -}}
{{- range $targetNode := $targetNodes -}}
{{- if not (kindIs "string" $targetNode) -}}
{{- fail "nodeLocalDNS.targetNodes must contain only non-empty hostnames" -}}
{{- end -}}
{{- if eq (trim $targetNode) "" -}}
{{- fail "nodeLocalDNS.targetNodes must contain only non-empty hostnames" -}}
{{- end -}}
{{- if hasKey $seenTargetNodes $targetNode -}}
{{- fail "nodeLocalDNS.targetNodes must not contain duplicate hostnames" -}}
{{- end -}}
{{- $_ := set $seenTargetNodes $targetNode true -}}
{{- end -}}
{{- $preservedOfflineNodes := $config.preservedOfflineNodes | default (list) -}}
{{- if not (kindIs "slice" $preservedOfflineNodes) -}}
{{- fail "nodeLocalDNS.preservedOfflineNodes must be a hostname list" -}}
{{- end -}}
{{- $seenPreservedNodes := dict -}}
{{- range $preservedNode := $preservedOfflineNodes -}}
{{- if not (kindIs "string" $preservedNode) -}}
{{- fail "nodeLocalDNS.preservedOfflineNodes must contain only non-empty hostnames" -}}
{{- end -}}
{{- if eq (trim $preservedNode) "" -}}
{{- fail "nodeLocalDNS.preservedOfflineNodes must contain only non-empty hostnames" -}}
{{- end -}}
{{- if hasKey $seenPreservedNodes $preservedNode -}}
{{- fail "nodeLocalDNS.preservedOfflineNodes must not contain duplicate hostnames" -}}
{{- end -}}
{{- if hasKey $seenTargetNodes $preservedNode -}}
{{- fail "nodeLocalDNS.targetNodes and nodeLocalDNS.preservedOfflineNodes must be disjoint" -}}
{{- end -}}
{{- $_ := set $seenPreservedNodes $preservedNode true -}}
{{- end -}}
{{- $splitCohort := gt (len $preservedOfflineNodes) 0 -}}
{{- if and $splitCohort (eq (trim (default "" $config.legacyMode)) "") -}}
{{- fail "nodeLocalDNS.legacyMode must be explicit when preservedOfflineNodes is non-empty" -}}
{{- end -}}
{{- /* --reset-then-reuse-values recursively retains legacy map keys. The release entrypoint overwrites the retired hostname key with an empty migration sentinel; only that empty value may be discarded. */ -}}
{{- $nodeSelector := deepCopy $config.nodeSelector -}}
{{- if hasKey $nodeSelector "kubernetes.io/hostname" -}}
{{- $legacyHostname := get $nodeSelector "kubernetes.io/hostname" -}}
{{- if not (kindIs "string" $legacyHostname) -}}
{{- fail "nodeLocalDNS.nodeSelector must not set kubernetes.io/hostname; use nodeLocalDNS.targetNodes" -}}
{{- else if ne $legacyHostname "" -}}
{{- fail "nodeLocalDNS.nodeSelector must not set kubernetes.io/hostname; use nodeLocalDNS.targetNodes" -}}
{{- end -}}
{{- $_ := unset $nodeSelector "kubernetes.io/hostname" -}}
{{- end -}}
{{- if ne (get $nodeSelector "kubernetes.io/os") "linux" -}}
{{- fail "nodeLocalDNS.nodeSelector must require kubernetes.io/os=linux" -}}
{{- end -}}
{{- $updateStrategyType := required "nodeLocalDNS.updateStrategy.type is required" $config.updateStrategy.type -}}
{{- if not (has $updateStrategyType (list "OnDelete" "RollingUpdate")) -}}
{{- fail "nodeLocalDNS.updateStrategy.type must be OnDelete or RollingUpdate" -}}
{{- end -}}
{{- if and $splitCohort (ne $updateStrategyType "OnDelete") -}}
{{- fail "nodeLocalDNS.updateStrategy.type must be OnDelete when preservedOfflineNodes is non-empty" -}}
{{- end -}}
{{- if and (eq $updateStrategyType "RollingUpdate") (lt (int $config.updateStrategy.maxUnavailable) 1) -}}
{{- fail "nodeLocalDNS.updateStrategy.maxUnavailable must be an integer >= 1" -}}
{{- end -}}
{{- if lt (int $config.minReadySeconds) 0 -}}
{{- fail "nodeLocalDNS.minReadySeconds must be an integer >= 0" -}}
{{- end -}}
{{- if lt (int $config.terminationGracePeriodSeconds) 1 -}}
{{- fail "nodeLocalDNS.terminationGracePeriodSeconds must be an integer >= 1" -}}
{{- end -}}
{{- $name := printf "%s-node-local-dns" (include "fugue.fullname" .) | trunc 63 | trimSuffix "-" -}}
{{- $defaultUpstreamServiceName := printf "%s-dns-upstream" (include "fugue.fullname" .) | trunc 63 | trimSuffix "-" -}}
{{- $upstreamServiceName := required "nodeLocalDNS upstream service name is required" (default $defaultUpstreamServiceName $config.upstreamServiceName) -}}
{{- $listenIPs := $localIP -}}
{{- if eq $mode "iptables" -}}
{{- $listenIPs = printf "%s,%s" $localIP $kubeDNSServiceIP -}}
{{- end -}}
{{- $shadowCorefile := include "fugue.nodeLocalDNSCorefile" (dict "bindIPs" $localIP "clusterDomain" $clusterDomain "localIP" $localIP) -}}
{{- $iptablesCorefile := include "fugue.nodeLocalDNSCorefile" (dict "bindIPs" (printf "%s %s" $localIP $kubeDNSServiceIP) "clusterDomain" $clusterDomain "localIP" $localIP) -}}
{{- $legacyCorefile := $shadowCorefile -}}
{{- if eq $legacyMode "iptables" -}}
{{- $legacyCorefile = $iptablesCorefile -}}
{{- end -}}
{{- $selectedCorefile := $shadowCorefile -}}
{{- $selectedCorefileKey := "Corefile.shadow" -}}
{{- if eq $mode "iptables" -}}
{{- $selectedCorefile = $iptablesCorefile -}}
{{- $selectedCorefileKey = "Corefile.iptables" -}}
{{- end -}}
{{- $legacyListenIPs := $localIP -}}
{{- $legacyCorefileKey := "Corefile.shadow" -}}
{{- if eq $legacyMode "iptables" -}}
{{- $legacyListenIPs = printf "%s,%s" $localIP $kubeDNSServiceIP -}}
{{- $legacyCorefileKey = "Corefile.iptables" -}}
{{- end -}}
{{- $activeStem := $name | trunc 56 | trimSuffix "-" -}}
{{- $activeName := printf "%s-active" $activeStem -}}
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: {{ $name }}
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "node-local-dns") | nindent 4 }}
    fugue.io/rollout-subsystem: cluster-dns
value: 1000000000
globalDefault: false
preemptionPolicy: Never
description: "Fugue NodeLocal DNSCache canary: high scheduling priority without preempting existing workloads."
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ $namespace }}
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "node-local-dns") | nindent 4 }}
    fugue.io/rollout-subsystem: cluster-dns
automountServiceAccountToken: false
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $upstreamServiceName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "node-local-dns-upstream") | nindent 4 }}
    fugue.io/rollout-subsystem: cluster-dns
spec:
  ports:
    - name: dns
      port: 53
      protocol: UDP
      targetPort: 53
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: 53
  selector:
    {{- toYaml $config.upstreamSelector | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}
  namespace: {{ $namespace }}
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "node-local-dns") | nindent 4 }}
    fugue.io/rollout-subsystem: cluster-dns
data:
  # Keep both mode-specific inputs stable while an OnDelete rollout contains
  # old and new Pods. Each Pod projects only the key matching its own mode.
  Corefile.shadow: |
    {{- $shadowCorefile | nindent 4 }}
  Corefile.iptables: |
    {{- $iptablesCorefile | nindent 4 }}
  # Compatibility key for Pods created before mode-specific projection was
  # introduced. legacyMode keeps those Pods on their existing behavior while
  # new Pods mount the mode-specific key below.
  Corefile: |
    {{- $legacyCorefile | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $namespace }}
  annotations:
    prometheus.io/port: "9253"
    prometheus.io/scrape: "true"
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "node-local-dns") | nindent 4 }}
    fugue.io/rollout-subsystem: cluster-dns
    fugue.io/node-local-dns-cohort: {{ ternary "preserved" "active" $splitCohort | quote }}
spec:
  clusterIP: None
  ports:
    - name: metrics
      port: 9253
      protocol: TCP
      targetPort: 9253
    - name: setup-metrics
      port: 9353
      protocol: TCP
      targetPort: 9353
  selector:
    {{- include "fugue.componentSelectorLabels" (dict "root" . "component" "node-local-dns") | nindent 4 }}
{{- if $splitCohort }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $activeName }}
  namespace: {{ $namespace }}
  annotations:
    prometheus.io/port: "9253"
    prometheus.io/scrape: "true"
  labels:
    {{- include "fugue.componentLabels" (dict "root" . "component" "node-local-dns-active") | nindent 4 }}
    fugue.io/rollout-subsystem: cluster-dns
    fugue.io/node-local-dns-cohort: "active"
spec:
  clusterIP: None
  ports:
    - name: metrics
      port: 9253
      protocol: TCP
      targetPort: 9253
    - name: setup-metrics
      port: 9353
      protocol: TCP
      targetPort: 9353
  selector:
    {{- include "fugue.componentSelectorLabels" (dict "root" . "component" "node-local-dns-active") | nindent 4 }}
{{- end }}
---
{{- $daemonSets := list (dict "name" $name "component" "node-local-dns" "mode" $mode "corefile" $selectedCorefile "corefileKey" $selectedCorefileKey "listenIPs" $listenIPs "targetNodes" $targetNodes) -}}
{{- if $splitCohort -}}
{{- $daemonSets = list
      (dict "name" $name "component" "node-local-dns" "mode" $legacyMode "corefile" $legacyCorefile "corefileKey" $legacyCorefileKey "listenIPs" $legacyListenIPs "targetNodes" $preservedOfflineNodes)
      (dict "name" $activeName "component" "node-local-dns-active" "mode" $mode "corefile" $selectedCorefile "corefileKey" $selectedCorefileKey "listenIPs" $listenIPs "targetNodes" $targetNodes) -}}
{{- end -}}
{{- range $cohortIndex, $cohort := $daemonSets }}
{{- if gt $cohortIndex 0 }}
---
{{- end }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ get $cohort "name" }}
  namespace: {{ $namespace }}
  labels:
    {{- include "fugue.componentLabels" (dict "root" $ "component" (get $cohort "component")) | nindent 4 }}
    fugue.io/rollout-subsystem: cluster-dns
    fugue.io/rollout-mode: node-local-rolling
    fugue.io/node-local-dns-cohort: {{ ternary "preserved" "active" (and $splitCohort (eq $cohortIndex 0)) | quote }}
spec:
  revisionHistoryLimit: 2
  minReadySeconds: {{ $config.minReadySeconds }}
  updateStrategy:
    type: {{ $updateStrategyType }}
    {{- if eq $updateStrategyType "RollingUpdate" }}
    rollingUpdate:
      maxUnavailable: {{ $config.updateStrategy.maxUnavailable }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "fugue.componentSelectorLabels" (dict "root" $ "component" (get $cohort "component")) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fugue.componentSelectorLabels" (dict "root" $ "component" (get $cohort "component")) | nindent 8 }}
        fugue.io/rollout-subsystem: cluster-dns
        fugue.io/node-local-dns-mode: {{ get $cohort "mode" | quote }}
        fugue.io/node-local-dns-cohort: {{ ternary "preserved" "active" (and $splitCohort (eq $cohortIndex 0)) | quote }}
      annotations:
        checksum/node-local-dns-config: {{ get $cohort "corefile" | sha256sum }}
        prometheus.io/port: "9253"
        prometheus.io/scrape: "true"
    spec:
      priorityClassName: {{ $name }}
      serviceAccountName: {{ $name }}
      automountServiceAccountToken: false
      hostNetwork: true
      dnsPolicy: Default
      terminationGracePeriodSeconds: {{ $config.terminationGracePeriodSeconds }}
      containers:
        - name: node-cache
          image: {{ include "fugue.imageRef" (dict "repository" $config.image.repository "tag" $config.image.tag "digest" $config.image.digest) | quote }}
          imagePullPolicy: {{ $config.image.pullPolicy }}
          args:
            - -localip
            - {{ get $cohort "listenIPs" | quote }}
            - -conf
            - /etc/Corefile
            - -upstreamsvc
            - {{ $upstreamServiceName | quote }}
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          readinessProbe:
            httpGet:
              host: {{ $localIP }}
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              host: {{ $localIP }}
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml $config.resources | nindent 12 }}
          volumeMounts:
            - name: xtables-lock
              mountPath: /run/xtables.lock
              readOnly: false
            - name: config-volume
              mountPath: /etc/coredns
      volumes:
        - name: xtables-lock
          hostPath:
            path: /run/xtables.lock
            type: FileOrCreate
        - name: config-volume
          configMap:
            name: {{ $name }}
            items:
              - key: {{ get $cohort "corefileKey" }}
                path: Corefile.base
      nodeSelector:
        {{- toYaml $nodeSelector | nindent 8 }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      {{- range $targetNode := (get $cohort "targetNodes") }}
                      - {{ $targetNode | quote }}
                      {{- end }}
      tolerations:
        {{- toYaml $config.tolerations | nindent 8 }}
{{- end }}
{{- end }}
