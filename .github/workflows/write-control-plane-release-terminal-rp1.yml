name: write-control-plane-release-terminal-rp1

on:
  workflow_dispatch:
    inputs:
      expected_sha:
        description: Exact main policy SHA authorized to materialize one genesis reservation object
        required: true
        type: string

permissions: {}

concurrency:
  group: fugue-release-terminal-object-materialization-rp1
  cancel-in-progress: false

jobs:
  materialize-genesis-reservation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      contents: write
    steps:
      - name: Checkout exact terminal-writer policy SHA
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact genesis materialization authorization
        id: verify
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          HEALTH_URL: ${{ vars.FUGUE_CONTROL_PLANE_RP1_HEALTH_URL || 'https://api.fugue.pro/healthz' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          readonly terminal_ref='refs/heads/fugue-control-plane-release-terminal-state'
          [[ "${GITHUB_EVENT_NAME}" == 'workflow_dispatch' ]] || exit 1
          [[ "${GITHUB_REF}" == 'refs/heads/main' ]] || exit 1
          [[ "${GITHUB_RUN_ID}" =~ ^[1-9][0-9]*$ && "${GITHUB_RUN_ATTEMPT}" == '1' ]] || exit 1
          [[ "${EXPECTED_SHA}" =~ ^[0-9a-f]{40}$ && "${GITHUB_SHA}" == "${EXPECTED_SHA}" ]] || exit 1

          policy_identity="$(git rev-list --parents -n 1 "${GITHUB_SHA}")" || exit 1
          read -r policy_commit policy_parent extra <<<"${policy_identity}" || exit 1
          [[ -z "${extra:-}" && "${policy_commit}" == "${GITHUB_SHA}" && "${policy_parent}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          actual_changes_text="$(git diff --no-renames --name-status "${policy_parent}" "${GITHUB_SHA}")" || exit 1
          mapfile -t actual_changes <<<"${actual_changes_text}"
          expected_changes=(
            $'A\t.github/workflows/write-control-plane-release-terminal-rp1.yml'
            $'A\tinternal/platformsafety/release_terminal_workflow_test.go'
          )
          [[ "${#actual_changes[@]}" == "${#expected_changes[@]}" ]] || exit 1
          for index in "${!expected_changes[@]}"; do
            [[ "${actual_changes[${index}]}" == "${expected_changes[${index}]}" ]] || exit 1
          done
          git diff --exit-code --ignore-submodules "${GITHUB_SHA}" -- || exit 1
          [[ -z "$(git status --porcelain=v1 --untracked-files=all)" ]] || exit 1

          remote_main="$(timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')" || exit 1
          [[ "${remote_main}" == "${EXPECTED_SHA}" ]] || exit 1
          state_count="$(timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/matching-refs/heads/fugue-control-plane-release-terminal-state" \
            --jq '[.[] | select(.ref == "refs/heads/fugue-control-plane-release-terminal-state")] | length')" || exit 1
          [[ "${state_count}" == '0' ]] || exit 1

          policy_date="$(git show -s --format=%cI "${GITHUB_SHA}")" || exit 1
          terminal_date="$(python3 - "${policy_date}" "${HEALTH_URL}" <<'PY'
          import datetime, sys, urllib.parse
          instant = datetime.datetime.fromisoformat(sys.argv[1])
          if instant.tzinfo is None:
              raise SystemExit("policy commit date lacks a timezone")
          parsed = urllib.parse.urlsplit(sys.argv[2])
          if parsed.scheme != "https" or not parsed.hostname or parsed.username or parsed.password or parsed.fragment:
              raise SystemExit("health URL must be credential-free HTTPS")
          print(instant.astimezone(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"))
          PY
          )" || exit 1
          [[ "${terminal_date}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$ ]] || exit 1
          {
            printf 'policy_parent=%s\n' "${policy_parent}"
            printf 'health_url=%s\n' "${HEALTH_URL}"
            printf 'terminal_date=%s\n' "${terminal_date}"
            printf 'terminal_ref=%s\n' "${terminal_ref}"
          } >>"${GITHUB_OUTPUT}" || exit 1

      - name: Write genesis materialization intent evidence
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          POLICY_PARENT: ${{ steps.verify.outputs.policy_parent }}
          TERMINAL_DATE: ${{ steps.verify.outputs.terminal_date }}
          TERMINAL_REF: ${{ steps.verify.outputs.terminal_ref }}
        run: |
          set -euo pipefail
          evidence_dir="${RUNNER_TEMP}/fugue-rp1-terminal-genesis"
          install -d -m 0700 "${evidence_dir}"
          umask 077
          python3 - "${evidence_dir}/intent.json" <<'PY'
          import json, os, pathlib, sys
          payload = {
              "schema_version": 1,
              "workflow": "write-control-plane-release-terminal-rp1",
              "repository": os.environ["GITHUB_REPOSITORY"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": int(os.environ["GITHUB_RUN_ATTEMPT"]),
              "head_sha": os.environ["EXPECTED_SHA"],
              "policy_parent_sha": os.environ["POLICY_PARENT"],
              "terminal_ref": os.environ["TERMINAL_REF"],
              "terminal_date": os.environ["TERMINAL_DATE"],
              "transition": "genesis-reservation-object-pending-ref-absent",
              "cluster_mutation_attempted": False,
              "git_history_rewritten": False,
          }
          pathlib.Path(sys.argv[1]).write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          PY

      - name: Upload genesis materialization intent evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fugue-rp1-terminal-genesis-intent-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/fugue-rp1-terminal-genesis/intent.json
          if-no-files-found: error
          retention-days: 90

      - name: Observe unchanged production health before immutable object write
        env:
          HEALTH_URL: ${{ steps.verify.outputs.health_url }}
        run: |
          set -euo pipefail
          for sample in 1 2 3 4 5; do
            response="$(curl --fail --silent --show-error \
              --connect-timeout 5 --max-time 10 "${HEALTH_URL}")"
            python3 - "${response}" <<'PY'
          import json, sys
          if json.loads(sys.argv[1]) != {"status": "ok"}:
              raise SystemExit("production health payload drifted")
          PY
            [[ "${sample}" == '5' ]] || sleep 15
          done

      - name: Materialize canonical genesis reservation objects without moving a ref
        id: materialize
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          TERMINAL_DATE: ${{ steps.verify.outputs.terminal_date }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          readonly terminal_ref='refs/heads/fugue-control-plane-release-terminal-state'
          readonly payload_path='.fugue-release-terminal-state.json'
          [[ "${GITHUB_EVENT_NAME}" == 'workflow_dispatch' ]] || exit 1
          [[ "${GITHUB_RUN_ATTEMPT}" == '1' && "${GITHUB_SHA}" == "${EXPECTED_SHA}" ]] || exit 1
          [[ "${GITHUB_RUN_ID}" =~ ^[1-9][0-9]*$ && "${EXPECTED_SHA}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          [[ "${TERMINAL_DATE}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$ ]] || exit 1
          object_tmp="$(mktemp -d)" || exit 1
          trap 'rm -rf "${object_tmp}"' EXIT
          umask 077

          python3 - "${object_tmp}/terminal-state.json" "${object_tmp}/blob-request.json" <<'PY'
          import json, os, pathlib, sys
          document = {
              "schema_version": 1,
              "certificate_kind": "fugue-control-plane-release-policy-terminal-reservation",
              "terminal_mode": "reservation",
              "source_run_id": os.environ["GITHUB_RUN_ID"],
              "source_run_attempt": 1,
              "source_head_sha": os.environ["EXPECTED_SHA"],
              "source_workflow": ".github/workflows/write-control-plane-release-terminal-rp1.yml",
              "source_conclusion": "in_progress",
              "previous_terminal_state_oid": "absent",
          }
          content = json.dumps(document, ensure_ascii=False, separators=(",", ":")) + "\n"
          pathlib.Path(sys.argv[1]).write_text(content, encoding="utf-8")
          pathlib.Path(sys.argv[2]).write_text(
              json.dumps({"content": content, "encoding": "utf-8"}, separators=(",", ":")),
              encoding="utf-8",
          )
          PY
          blob_sha="$(git hash-object -w --stdin <"${object_tmp}/terminal-state.json")" || exit 1
          [[ "${blob_sha}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          blob_status=0
          timeout --kill-after=2s 10s gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/git/blobs" \
            --input "${object_tmp}/blob-request.json" >"${object_tmp}/blob-response.json" || blob_status=$?
          timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/blobs/${blob_sha}" \
            >"${object_tmp}/blob-readback.json" || exit 1
          python3 - "${object_tmp}/terminal-state.json" "${object_tmp}/blob-readback.json" "${blob_sha}" <<'PY'
          import base64, json, pathlib, sys
          expected = pathlib.Path(sys.argv[1]).read_bytes()
          response = json.load(open(sys.argv[2], encoding="utf-8"))
          encoded = response.get("content")
          if response.get("sha") != sys.argv[3] or response.get("encoding") != "base64" or not isinstance(encoded, str):
              raise SystemExit("terminal reservation blob readback identity drifted")
          if base64.b64decode("".join(encoded.split()), validate=True) != expected:
              raise SystemExit("terminal reservation blob readback bytes drifted")
          PY

          printf '100644 blob %s\t%s\n' "${blob_sha}" "${payload_path}" >"${object_tmp}/tree-input"
          tree_sha="$(git mktree <"${object_tmp}/tree-input")" || exit 1
          [[ "${tree_sha}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          python3 - "${payload_path}" "${blob_sha}" >"${object_tmp}/tree-request.json" <<'PY'
          import json, sys
          json.dump({"tree": [{"path": sys.argv[1], "mode": "100644", "type": "blob", "sha": sys.argv[2]}]}, sys.stdout, separators=(",", ":"))
          PY
          tree_status=0
          timeout --kill-after=2s 10s gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/git/trees" \
            --input "${object_tmp}/tree-request.json" >"${object_tmp}/tree-response.json" || tree_status=$?
          timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/trees/${tree_sha}" \
            >"${object_tmp}/tree-readback.json" || exit 1
          python3 - "${object_tmp}/tree-readback.json" "${tree_sha}" "${payload_path}" "${blob_sha}" <<'PY'
          import json, sys
          response = json.load(open(sys.argv[1], encoding="utf-8"))
          expected = [{"path": sys.argv[3], "mode": "100644", "type": "blob", "sha": sys.argv[4]}]
          actual = [{key: entry.get(key) for key in ("path", "mode", "type", "sha")} for entry in response.get("tree", [])]
          if response.get("sha") != sys.argv[2] or response.get("truncated") is not False or actual != expected:
              raise SystemExit("terminal reservation tree readback drifted")
          PY

          reservation_message="fugue release terminal reservation ${GITHUB_RUN_ID}"
          python3 - "${tree_sha}" "${TERMINAL_DATE}" "${reservation_message}" \
            "${object_tmp}/commit-object" "${object_tmp}/commit-request.json" <<'PY'
          import datetime, json, pathlib, sys
          tree_sha, date, message, object_path, request_path = sys.argv[1:]
          instant = datetime.datetime.fromisoformat(date.replace("Z", "+00:00"))
          if instant.tzinfo != datetime.timezone.utc:
              raise SystemExit("terminal reservation commit date is not UTC")
          timestamp = int(instant.timestamp())
          identity_line = f"Fugue Release Terminal <release-terminal@fugue.invalid> {timestamp} +0000"
          content = (
              f"tree {tree_sha}\n"
              f"author {identity_line}\n"
              f"committer {identity_line}\n"
              "\n"
          ).encode("utf-8") + message.encode("utf-8")
          pathlib.Path(object_path).write_bytes(content)
          identity = {"name": "Fugue Release Terminal", "email": "release-terminal@fugue.invalid", "date": date}
          pathlib.Path(request_path).write_text(
              json.dumps({"message": message, "tree": tree_sha, "parents": [], "author": identity, "committer": identity}, separators=(",", ":")),
              encoding="utf-8",
          )
          PY
          reservation_oid="$(git hash-object -t commit --stdin <"${object_tmp}/commit-object")" || exit 1
          [[ "${reservation_oid}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          commit_status=0
          timeout --kill-after=2s 10s gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/git/commits" \
            --input "${object_tmp}/commit-request.json" >"${object_tmp}/commit-response.json" || commit_status=$?
          timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/commits/${reservation_oid}" \
            >"${object_tmp}/commit-readback.json" || exit 1
          python3 - "${object_tmp}/commit-request.json" "${object_tmp}/commit-readback.json" \
            "${reservation_oid}" "${tree_sha}" <<'PY'
          import json, sys
          request = json.load(open(sys.argv[1], encoding="utf-8"))
          response = json.load(open(sys.argv[2], encoding="utf-8"))
          if response.get("sha") != sys.argv[3] or response.get("message") != request["message"]:
              raise SystemExit("terminal reservation commit identity drifted")
          if response.get("tree", {}).get("sha") != sys.argv[4] or response.get("parents") != []:
              raise SystemExit("terminal reservation root topology drifted")
          for field in ("author", "committer"):
              actual = {key: response.get(field, {}).get(key) for key in ("name", "email", "date")}
              if actual != request[field]:
                  raise SystemExit(f"terminal reservation commit {field} drifted")
          PY

          after_count="$(timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/matching-refs/heads/fugue-control-plane-release-terminal-state" \
            --jq '[.[] | select(.ref == "refs/heads/fugue-control-plane-release-terminal-state")] | length')" || exit 1
          [[ "${after_count}" == '0' ]] || exit 1
          after_main="$(timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')" || exit 1
          [[ "${after_main}" == "${EXPECTED_SHA}" ]] || exit 1
          {
            printf 'payload_blob_sha=%s\n' "${blob_sha}"
            printf 'payload_tree_sha=%s\n' "${tree_sha}"
            printf 'reservation_oid=%s\n' "${reservation_oid}"
            printf 'blob_transport_status=%s\n' "${blob_status}"
            printf 'tree_transport_status=%s\n' "${tree_status}"
            printf 'commit_transport_status=%s\n' "${commit_status}"
          } >>"${GITHUB_OUTPUT}" || exit 1

      - name: Write genesis materialization result evidence
        env:
          PAYLOAD_BLOB_SHA: ${{ steps.materialize.outputs.payload_blob_sha }}
          PAYLOAD_TREE_SHA: ${{ steps.materialize.outputs.payload_tree_sha }}
          RESERVATION_OID: ${{ steps.materialize.outputs.reservation_oid }}
          BLOB_TRANSPORT_STATUS: ${{ steps.materialize.outputs.blob_transport_status }}
          TREE_TRANSPORT_STATUS: ${{ steps.materialize.outputs.tree_transport_status }}
          COMMIT_TRANSPORT_STATUS: ${{ steps.materialize.outputs.commit_transport_status }}
        run: |
          set -euo pipefail
          evidence_file="${RUNNER_TEMP}/fugue-rp1-terminal-genesis/intent.json"
          python3 - "${evidence_file}" <<'PY'
          import json, os, pathlib, re, sys
          path = pathlib.Path(sys.argv[1])
          payload = json.loads(path.read_text(encoding="utf-8"))
          if payload.get("transition") != "genesis-reservation-object-pending-ref-absent":
              raise SystemExit("terminal genesis intent transition drifted")
          for key, env_name in (
              ("payload_blob_sha", "PAYLOAD_BLOB_SHA"),
              ("payload_tree_sha", "PAYLOAD_TREE_SHA"),
              ("reservation_oid", "RESERVATION_OID"),
          ):
              value = os.environ[env_name]
              if re.fullmatch(r"[0-9a-f]{40}", value) is None:
                  raise SystemExit(f"{key} is malformed")
              payload[key] = value
          payload["transport_status"] = {
              "blob": int(os.environ["BLOB_TRANSPORT_STATUS"]),
              "tree": int(os.environ["TREE_TRANSPORT_STATUS"]),
              "commit": int(os.environ["COMMIT_TRANSPORT_STATUS"]),
          }
          payload["transition"] = "genesis-reservation-object-materialized-ref-absent"
          temporary = path.with_suffix(".tmp")
          temporary.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          temporary.replace(path)
          PY

      - name: Upload genesis materialization result evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fugue-rp1-terminal-genesis-result-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/fugue-rp1-terminal-genesis/intent.json
          if-no-files-found: error
          retention-days: 90
