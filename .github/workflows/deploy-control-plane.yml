          FUGUE_EDGE_DYNAMIC_ENABLED: ${{ vars.FUGUE_EDGE_DYNAMIC_ENABLED || 'true' }}
          FUGUE_CONTROL_PLANE_BACKUP_DRAIN_MODE: ${{ vars.FUGUE_CONTROL_PLANE_BACKUP_DRAIN_MODE || 'wait' }}
          FUGUE_CONTROL_PLANE_BACKUP_DRAIN_WAIT_SECONDS: ${{ vars.FUGUE_CONTROL_PLANE_BACKUP_DRAIN_WAIT_SECONDS || '120' }}
          FUGUE_CONTROL_PLANE_BACKUP_DRAIN_POLL_SECONDS: ${{ vars.FUGUE_CONTROL_PLANE_BACKUP_DRAIN_POLL_SECONDS || '5' }}
          FUGUE_CONTROL_PLANE_BACKUP_DRAIN_REQUIRED: ${{ vars.FUGUE_CONTROL_PLANE_BACKUP_DRAIN_REQUIRED || 'auto' }}
          FUGUE_CONTROL_PLANE_BACKUP_COORDINATION_LEASE_NAME: ${{ vars.FUGUE_CONTROL_PLANE_BACKUP_COORDINATION_LEASE_NAME || format('{0}-control-plane-db-backup', vars.FUGUE_RELEASE_FULLNAME || 'fugue-fugue') }}
          FUGUE_CONTROL_PLANE_BACKUP_COORDINATION_LEASE_NAMESPACE: ${{ vars.FUGUE_CONTROL_PLANE_BACKUP_COORDINATION_LEASE_NAMESPACE || vars.FUGUE_NAMESPACE || 'fugue-system' }}
          FUGUE_CONTROL_PLANE_BACKUP_COORDINATION_LEASE_DURATION_SECONDS: ${{ vars.FUGUE_CONTROL_PLANE_BACKUP_COORDINATION_LEASE_DURATION_SECONDS || '120' }}
          FUGUE_CONTROL_PLANE_BACKUP_COORDINATION_LEASE_RENEW_SECONDS: ${{ vars.FUGUE_CONTROL_PLANE_BACKUP_COORDINATION_LEASE_RENEW_SECONDS || '30' }}
          FUGUE_CONTROL_PLANE_BACKUP_COORDINATION_COMMAND_TIMEOUT_SECONDS: ${{ vars.FUGUE_CONTROL_PLANE_BACKUP_COORDINATION_COMMAND_TIMEOUT_SECONDS || '15' }}
          FUGUE_CONTROL_PLANE_BACKUP_COORDINATION_DB_QUERY_TIMEOUT_SECONDS: ${{ vars.FUGUE_CONTROL_PLANE_BACKUP_COORDINATION_DB_QUERY_TIMEOUT_SECONDS || '20' }}
          FUGUE_CONTROL_PLANE_STALE_RELEASE_RECOVERY_MODE: ${{ vars.FUGUE_CONTROL_PLANE_STALE_RELEASE_RECOVERY_MODE || '' }}
          FUGUE_CONTROL_PLANE_STALE_RELEASE_RECOVERY_PROOF_FILE: ${{ runner.temp }}/fugue-stale-release-recovery-proof.json
          FUGUE_DEPLOY_JOB_BUDGET_SECONDS: '20400'
          FUGUE_DEPLOY_ROLLBACK_RESERVE_SECONDS: '10200'
          FUGUE_DEPLOY_ARTIFACT_RESERVE_SECONDS: '600'
          FUGUE_PUBLIC_DATA_PLANE_RELEASE_MODE: ${{ vars.FUGUE_PUBLIC_DATA_PLANE_RELEASE_MODE || 'auto' }}
          FUGUE_PUBLIC_DATA_PLANE_AUTO_RELEASE_ELIGIBLE: ${{ vars.FUGUE_PUBLIC_DATA_PLANE_AUTO_RELEASE_ELIGIBLE || needs.build.outputs.build_edge == 'true' }}
          FUGUE_NODE_LOCAL_BUILD_PLANE_RELEASE_MODE: ${{ vars.FUGUE_NODE_LOCAL_BUILD_PLANE_RELEASE_MODE || 'auto' }}
          FUGUE_STATEFUL_DEPENDENCY_RELEASE_MODE: ${{ vars.FUGUE_STATEFUL_DEPENDENCY_RELEASE_MODE || 'guard' }}
        run: ./scripts/upgrade_fugue_control_plane.sh

      - name: Remove stale release recovery proof
        if: always()
        run: rm -f "${RUNNER_TEMP}/fugue-stale-release-recovery-proof.json"

      - name: Upload release attribution
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fugue-control-plane-release-attribution-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/fugue-release
          if-no-files-found: ignore
