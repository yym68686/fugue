name: deploy-control-plane

on:
  workflow_dispatch:
    inputs:
      expected_sha:
        description: Exact lowercase main commit SHA authorized for this release
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: fugue-production-cluster-mutation-v1
  cancel-in-progress: false

jobs:
  release-input-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Guard exact main commit authorization
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          ACTUAL_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REF: ${{ github.ref }}
          EVENT_REF_NAME: ${{ github.ref_name }}
          EVENT_REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          [[ "${EVENT_NAME}" == "workflow_dispatch" ]]
          [[ "${EVENT_REF}" == "refs/heads/main" ]]
          [[ "${EVENT_REF_NAME}" == "main" ]]
          [[ "${EVENT_REF_TYPE}" == "branch" ]]
          [[ "${EXPECTED_SHA}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${ACTUAL_SHA}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${EXPECTED_SHA}" == "${ACTUAL_SHA}" ]]

  release-baseline:
    needs:
      - release-input-guard
    runs-on:
      - self-hosted
      - linux
      - x64
      - fugue
      - control-plane
    outputs:
      domain_base_sha: ${{ steps.domain_baseline.outputs.domain_base_sha }}
      baseline_ref_object_sha: ${{ steps.domain_baseline.outputs.baseline_ref_object_sha }}
      is_genesis: ${{ steps.domain_baseline.outputs.is_genesis }}
      genesis_parent_sha: ${{ steps.domain_baseline.outputs.genesis_parent_sha }}
      changed_files: ${{ steps.release_changes.outputs.changed_files }}
      baseline_refs: ${{ steps.release_changes.outputs.baseline_refs }}
      source: ${{ steps.release_changes.outputs.source }}
      target_ref: ${{ steps.release_changes.outputs.target_ref }}
      api_image_baseline_ref: ${{ steps.live_images.outputs.api_image_baseline_ref }}
      controller_image_baseline_ref: ${{ steps.live_images.outputs.controller_image_baseline_ref }}
      drain_agent_image_baseline_ref: ${{ steps.live_images.outputs.drain_agent_image_baseline_ref }}
      telemetry_agent_image_baseline_ref: ${{ steps.live_images.outputs.telemetry_agent_image_baseline_ref }}
      image_cache_image_baseline_ref: ${{ steps.live_images.outputs.image_cache_image_baseline_ref }}
      edge_image_baseline_ref: ${{ steps.live_images.outputs.edge_image_baseline_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Resolve release-domain baseline
        id: domain_baseline
        env:
          FUGUE_CONTROL_PLANE_RELEASE_GENESIS_SHA: ${{ vars.FUGUE_CONTROL_PLANE_RELEASE_GENESIS_SHA }}
        run: |
          set -euo pipefail
          readonly baseline_tag='fugue-control-plane-release-baseline'
          readonly baseline_ref="refs/tags/${baseline_tag}"
          readonly genesis_parent_sha='723116882214ae9efeaee0877bb378d0db2dcea7'
          readonly target_sha="${GITHUB_SHA}"

          [[ "${target_sha}" =~ ^[0-9a-f]{40}$ ]]
          remote_tag=''
          set +e
          remote_tag="$(git ls-remote --refs --exit-code origin "${baseline_ref}")"
          remote_status=$?
          set -e

          case "${remote_status}" in
            0)
              [[ "$(printf '%s\n' "${remote_tag}" | sed '/^$/d' | wc -l | tr -d ' ')" == '1' ]]
              read -r remote_object remote_ref extra <<<"${remote_tag}"
              [[ -z "${extra:-}" ]]
              [[ "${remote_object}" =~ ^[0-9a-f]{40}$ ]]
              [[ "${remote_ref}" == "${baseline_ref}" ]]
              git fetch --no-tags origin "${baseline_ref}"
              fetched_ref_object_sha="$(git rev-parse --verify FETCH_HEAD)"
              domain_base_sha="$(git rev-parse --verify 'FETCH_HEAD^{commit}')"
              [[ "${fetched_ref_object_sha}" == "${remote_object}" ]]
              [[ "${domain_base_sha}" =~ ^[0-9a-f]{40}$ ]]
              [[ "${remote_object}" == "${domain_base_sha}" ]]
              git merge-base --is-ancestor "${domain_base_sha}" "${target_sha}"
              baseline_ref_object_sha="${remote_object}"
              is_genesis='false'
              ;;
            2)
              genesis_sha="${FUGUE_CONTROL_PLANE_RELEASE_GENESIS_SHA:-}"
              [[ "${genesis_sha}" =~ ^[0-9a-f]{40}$ ]]
              [[ "${genesis_sha}" == "${target_sha}" ]]
              read -r commit actual_parent extra <<<"$(git rev-list --parents -n 1 "${target_sha}")"
              [[ "${commit}" == "${target_sha}" ]]
              [[ -z "${extra:-}" ]]
              [[ "${actual_parent}" == "${genesis_parent_sha}" ]]
              domain_base_sha="${genesis_parent_sha}"
              baseline_ref_object_sha=''
              is_genesis='true'
              ;;
            *)
              echo "failed to read the dedicated release baseline tag" >&2
              exit 1
              ;;
          esac

          {
            printf 'domain_base_sha=%s\n' "${domain_base_sha}"
            printf 'baseline_ref_object_sha=%s\n' "${baseline_ref_object_sha}"
            printf 'is_genesis=%s\n' "${is_genesis}"
            printf 'genesis_parent_sha=%s\n' "${genesis_parent_sha}"
          } >>"${GITHUB_OUTPUT}"

      - name: Resolve live image metadata
        id: live_images
        env:
          FUGUE_RELEASE_NAME: ${{ vars.FUGUE_RELEASE_NAME || 'fugue' }}
          FUGUE_NAMESPACE: ${{ vars.FUGUE_NAMESPACE || 'fugue-system' }}
          FUGUE_RELEASE_FULLNAME: ${{ vars.FUGUE_RELEASE_FULLNAME || 'fugue-fugue' }}
          FUGUE_IMAGE_TAG: ${{ github.sha }}
        run: ./scripts/resolve_control_plane_live_images.sh

      - name: Compute live-to-target release changed files
        id: release_changes
        env:
          FUGUE_RELEASE_TARGET_REF: ${{ github.sha }}
          FUGUE_RELEASE_BASE_REFS: ${{ steps.live_images.outputs.release_baseline_tags }}
          FUGUE_RELEASE_REQUIRE_BASELINE: "true"
        run: ./scripts/compute_release_changed_files_from_live.sh

  release-gate:
    needs:
      - release-input-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Setup Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v4.2.0

      - name: Verify generated OpenAPI artifacts
        run: make generate-openapi-check

      - name: Verify release-domain safety contracts
        run: |
          bash scripts/test_prepare_authoritative_dns_dig.sh
          bash scripts/test_release_domain_workflow.sh
          bash scripts/test_release_domain_safety.sh
          bash scripts/test_node_local_dns_release.sh
          python3 scripts/test_verify_stale_release_recovery.py

      - name: Run Go tests
        run: go test ./...

  build:
    needs:
      - release-baseline
      - release-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      api_image_repository: ${{ steps.meta.outputs.api_image_repository }}
      controller_image_repository: ${{ steps.meta.outputs.controller_image_repository }}
      drain_agent_image_repository: ${{ steps.meta.outputs.drain_agent_image_repository }}
      telemetry_agent_image_repository: ${{ steps.meta.outputs.telemetry_agent_image_repository }}
      image_cache_image_repository: ${{ steps.meta.outputs.image_cache_image_repository }}
      edge_image_repository: ${{ steps.meta.outputs.edge_image_repository }}
      app_ssh_image_repository: ${{ steps.meta.outputs.app_ssh_image_repository }}
      api_image_digest: ${{ steps.build_images.outputs.api_image_digest }}
      controller_image_digest: ${{ steps.build_images.outputs.controller_image_digest }}
      drain_agent_image_digest: ${{ steps.build_images.outputs.drain_agent_image_digest }}
      telemetry_agent_image_digest: ${{ steps.build_images.outputs.telemetry_agent_image_digest }}
      image_cache_image_digest: ${{ steps.build_images.outputs.image_cache_image_digest }}
      edge_image_digest: ${{ steps.build_images.outputs.edge_image_digest }}
      app_ssh_image_digest: ${{ steps.build_images.outputs.app_ssh_image_digest }}
      verified_image_artifacts_json: ${{ steps.build_images.outputs.verified_image_artifacts_json }}
      verified_image_artifacts_digest: ${{ steps.build_images.outputs.verified_image_artifacts_digest }}
      build_api: ${{ steps.plan.outputs.build_api }}
      build_controller: ${{ steps.plan.outputs.build_controller }}
      build_drain_agent: ${{ steps.plan.outputs.build_drain_agent }}
      build_telemetry_agent: ${{ steps.plan.outputs.build_telemetry_agent }}
      build_image_cache: ${{ steps.plan.outputs.build_image_cache }}
      build_edge: ${{ steps.plan.outputs.build_edge }}
      build_app_ssh: ${{ steps.plan.outputs.build_app_ssh }}
      image_targets: ${{ steps.plan.outputs.targets }}
      image_target_count: ${{ steps.plan.outputs.target_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Compute image metadata
        id: meta
        run: |
          owner_lc="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "image_tag=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "api_image_repository=ghcr.io/${owner_lc}/fugue-api" >> "${GITHUB_OUTPUT}"
          echo "controller_image_repository=ghcr.io/${owner_lc}/fugue-controller" >> "${GITHUB_OUTPUT}"
          echo "drain_agent_image_repository=ghcr.io/${owner_lc}/fugue-drain-agent" >> "${GITHUB_OUTPUT}"
          echo "telemetry_agent_image_repository=ghcr.io/${owner_lc}/fugue-telemetry-agent" >> "${GITHUB_OUTPUT}"
          echo "image_cache_image_repository=ghcr.io/${owner_lc}/fugue-image-cache" >> "${GITHUB_OUTPUT}"
          echo "edge_image_repository=ghcr.io/${owner_lc}/fugue-edge" >> "${GITHUB_OUTPUT}"
          echo "app_ssh_image_repository=ghcr.io/${owner_lc}/fugue-app-ssh" >> "${GITHUB_OUTPUT}"

      - name: Compute image build plan
        id: plan
        env:
          FUGUE_RELEASE_CHANGED_FILES: ${{ needs.release-baseline.outputs.changed_files }}
          FUGUE_RELEASE_CHANGED_FILES_SET: "true"
          FUGUE_RELEASE_TARGET_REF: ${{ needs.release-baseline.outputs.target_ref }}
          FUGUE_API_IMAGE_BASE_REF: ${{ needs.release-baseline.outputs.api_image_baseline_ref }}
          FUGUE_CONTROLLER_IMAGE_BASE_REF: ${{ needs.release-baseline.outputs.controller_image_baseline_ref }}
          FUGUE_DRAIN_AGENT_IMAGE_BASE_REF: ${{ needs.release-baseline.outputs.drain_agent_image_baseline_ref }}
          FUGUE_TELEMETRY_AGENT_IMAGE_BASE_REF: ${{ needs.release-baseline.outputs.telemetry_agent_image_baseline_ref }}
          FUGUE_IMAGE_CACHE_IMAGE_BASE_REF: ${{ needs.release-baseline.outputs.image_cache_image_baseline_ref }}
          FUGUE_EDGE_IMAGE_BASE_REF: ${{ needs.release-baseline.outputs.edge_image_baseline_ref }}
        run: ./scripts/compute_control_plane_image_build_plan.sh

      - name: Setup Docker Buildx
        if: steps.plan.outputs.target_count != '0'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        if: steps.plan.outputs.target_count != '0'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish verified control-plane image provenance
        id: build_images
        env:
          FUGUE_CONTROL_PLANE_IMAGE_TARGETS: ${{ steps.plan.outputs.targets }}
          FUGUE_IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          FUGUE_API_IMAGE_REPOSITORY: ${{ steps.meta.outputs.api_image_repository }}
          FUGUE_CONTROLLER_IMAGE_REPOSITORY: ${{ steps.meta.outputs.controller_image_repository }}
          FUGUE_DRAIN_AGENT_IMAGE_REPOSITORY: ${{ steps.meta.outputs.drain_agent_image_repository }}
          FUGUE_TELEMETRY_AGENT_IMAGE_REPOSITORY: ${{ steps.meta.outputs.telemetry_agent_image_repository }}
          FUGUE_IMAGE_CACHE_IMAGE_REPOSITORY: ${{ steps.meta.outputs.image_cache_image_repository }}
          FUGUE_EDGE_IMAGE_REPOSITORY: ${{ steps.meta.outputs.edge_image_repository }}
          FUGUE_APP_SSH_IMAGE_REPOSITORY: ${{ steps.meta.outputs.app_ssh_image_repository }}
        run: ./scripts/build_control_plane_images.sh

  deploy:
    needs:
      - release-baseline
      - release-gate
      - build
    if: ${{ always() && needs.release-baseline.result == 'success' && needs.release-gate.result == 'success' && needs.build.result == 'success' }}
    # The staged rollout needs room for backup/release coordination, bounded
    # rollback, and attribution upload. New budget env values are intentionally
    # harmless to the previous release script during the bootstrap deployment.
    timeout-minutes: 360
    runs-on:
      - self-hosted
      - linux
      - x64
      - fugue
      - control-plane
    environment: production
    permissions:
      actions: read
      contents: read
    steps:
      - name: Record deploy job budget origin
        if: ${{ needs.release-baseline.outputs.is_genesis != 'true' }}
        run: echo "FUGUE_DEPLOY_JOB_STARTED_AT_EPOCH=$(date +%s)" >> "${GITHUB_ENV}"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Build private release-domain tools
        run: |
          set -euo pipefail
          tools_dir="${RUNNER_TEMP}/fugue-release-tools"
          [[ ! -e "${tools_dir}" && ! -L "${tools_dir}" ]]
          install -d -m 0700 "${tools_dir}"
          [[ -d "${tools_dir}" && ! -L "${tools_dir}" ]]
          [[ "$(stat -c '%a' "${tools_dir}")" == '700' ]]
          umask 077
          go build -trimpath -o "${tools_dir}/fugue-release-domain-evidence" ./cmd/fugue-release-domain-evidence
          go build -trimpath -o "${tools_dir}/fugue-release-domain-dispatch" ./cmd/fugue-release-domain-dispatch
          chmod 0700 \
            "${tools_dir}/fugue-release-domain-evidence" \
            "${tools_dir}/fugue-release-domain-dispatch"
          for tool in \
            "${tools_dir}/fugue-release-domain-evidence" \
            "${tools_dir}/fugue-release-domain-dispatch"; do
            [[ -f "${tool}" && ! -L "${tool}" && -x "${tool}" ]]
            [[ "$(stat -c '%a' "${tool}")" == '700' ]]
          done

      - name: Write genesis public release evidence
        if: ${{ needs.release-baseline.outputs.is_genesis == 'true' }}
        env:
          DOMAIN_BASE_SHA: ${{ needs.release-baseline.outputs.domain_base_sha }}
          DOMAIN_TARGET_SHA: ${{ github.sha }}
          GENESIS_SHA: ${{ vars.FUGUE_CONTROL_PLANE_RELEASE_GENESIS_SHA }}
          GENESIS_PARENT_SHA: ${{ needs.release-baseline.outputs.genesis_parent_sha }}
        run: |
          set -euo pipefail
          tools_dir="${RUNNER_TEMP}/fugue-release-tools"
          private_dir="${RUNNER_TEMP}/fugue-release-domain-private"
          public_dir="${RUNNER_TEMP}/fugue-release-domain-public"
          changed_evidence="${private_dir}/changed-file-evidence.json"
          public_evidence="${public_dir}/release-domain-evidence.json"
          [[ ! -e "${private_dir}" && ! -L "${private_dir}" ]]
          [[ ! -e "${public_dir}" && ! -L "${public_dir}" ]]
          install -d -m 0700 "${private_dir}" "${public_dir}"
          [[ -d "${private_dir}" && ! -L "${private_dir}" ]]
          [[ -d "${public_dir}" && ! -L "${public_dir}" ]]
          [[ "$(stat -c '%a' "${private_dir}")" == '700' ]]
          [[ "$(stat -c '%a' "${public_dir}")" == '700' ]]
          umask 077
          "${tools_dir}/fugue-release-domain-evidence" \
            --repo "${GITHUB_WORKSPACE}" \
            --base "${DOMAIN_BASE_SHA}" \
            --target "${DOMAIN_TARGET_SHA}" \
            --output "${changed_evidence}"
          "${tools_dir}/fugue-release-domain-dispatch" write-genesis-public-evidence \
            --changed-evidence "${changed_evidence}" \
            --ownership "${GITHUB_WORKSPACE}/deploy/release-domains/ownership-v1.yaml" \
            --expected-change ".github/workflows/deploy-control-plane.yml" \
            --expected-change "cmd/fugue-release-domain-dispatch/classify_files.go" \
            --expected-change "cmd/fugue-release-domain-dispatch/main.go" \
            --expected-change "cmd/fugue-release-domain-dispatch/main_test.go" \
            --expected-change "cmd/fugue-release-domain-dispatch/public_evidence.go" \
            --expected-change "cmd/fugue-release-domain-dispatch/public_evidence_test.go" \
            --expected-change "cmd/fugue-release-domain-dispatch/secure_files.go" \
            --expected-change "cmd/fugue-release-domain-dispatch/stat_times_darwin.go" \
            --expected-change "cmd/fugue-release-domain-dispatch/stat_times_linux.go" \
            --expected-change "cmd/fugue-release-domain-dispatch/stat_times_other.go" \
            --expected-change "cmd/fugue-release-domain-dispatch/strict_json.go" \
            --expected-change "cmd/fugue-release-domain-evidence/evidence.go" \
            --expected-change "cmd/fugue-release-domain-evidence/evidence_test.go" \
            --expected-change "cmd/fugue-release-domain-evidence/main.go" \
            --expected-change "cmd/fugue-release-domain-evidence/manifest.go" \
            --expected-change "cmd/fugue-release-domain-evidence/manifest_test.go" \
            --expected-change "cmd/fugue-release-domain-plan/main.go" \
            --expected-change "cmd/fugue-release-domain-plan/main_test.go" \
            --expected-change "cmd/fugue-release-domain-plan/output.go" \
            --expected-change "cmd/fugue-release-domain-plan/output_test.go" \
            --expected-change "deploy/release-domains/ownership-v1.yaml" \
            --expected-change "docs/runbooks/release-domain-planner.md" \
            --expected-change "internal/api/topology_labeler_test.go" \
            --expected-change "internal/platformsafety/release_workflow_test.go" \
            --expected-change "internal/releaseadapter/adapter.go" \
            --expected-change "internal/releaseadapter/dispatcher.go" \
            --expected-change "internal/releaseadapter/dispatcher_test.go" \
            --expected-change "internal/releaseadapter/trace.go" \
            --expected-change "internal/releaseadapter/transaction.go" \
            --expected-change "internal/releaseadapter/transaction_test.go" \
            --expected-change "internal/releasedomain/changed_file_evidence.go" \
            --expected-change "internal/releasedomain/changed_file_evidence_test.go" \
            --expected-change "internal/releasedomain/file_classifier_test.go" \
            --expected-change "internal/releasedomain/ownership_test.go" \
            --expected-change "internal/releasedomain/plan_artifacts.go" \
            --expected-change "internal/releasedomain/plan_artifacts_test.go" \
            --expected-change "internal/releasedomain/rendered_classifier_test.go" \
            --expected-change "internal/releasedomain/rollback_ownership.go" \
            --expected-change "internal/releasedomain/rollback_ownership_test.go" \
            --expected-change "internal/releasedomain/transaction_envelope.go" \
            --expected-change "internal/releaseevidence/public.go" \
            --expected-change "internal/releaseevidence/public_test.go" \
            --expected-change "scripts/lib/control_plane_release_domain_production.sh" \
            --expected-change "scripts/lib/control_plane_release_domains.sh" \
            --expected-change "scripts/lib/control_plane_release_render.sh" \
            --expected-change "scripts/test_control_plane_release_domain_production.sh" \
            --expected-change "scripts/test_control_plane_release_main_wiring.sh" \
            --expected-change "scripts/test_control_plane_release_render.sh" \
            --expected-change "scripts/test_release_domain_safety.sh" \
            --expected-change "scripts/test_release_domain_workflow.sh" \
            --expected-change "scripts/test_single_domain_release.sh" \
            --expected-change "scripts/upgrade_fugue_control_plane.sh" \
            --output "${public_evidence}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --head-sha "${DOMAIN_TARGET_SHA}" \
            --expected-head-sha "${GENESIS_SHA}" \
            --actual-parent-sha "${DOMAIN_BASE_SHA}" \
            --expected-parent-sha "${GENESIS_PARENT_SHA}"
          [[ -f "${public_evidence}" && ! -L "${public_evidence}" ]]
          [[ "$(stat -c '%a' "${public_evidence}")" == '600' ]]

      - name: Guard stateful component files
        if: ${{ needs.release-baseline.outputs.is_genesis != 'true' }}
        env:
          FUGUE_RELEASE_CHANGED_FILES: ${{ needs.release-baseline.outputs.changed_files }}
        run: |
          forbidden_pattern='^deploy/helm/fugue/templates/(postgres-(deployment|service)|registry-(configmap|deployment|pvc|service)|headscale-.*|control-plane-postgres-.*|shared-workspace-.*|snapshot-controller)\.yaml$'
          if printf '%s\n' "${FUGUE_RELEASE_CHANGED_FILES}" | grep -E "${forbidden_pattern}" >/dev/null; then
            echo "stateful component manifests changed since the live release:"
            printf '%s\n' "${FUGUE_RELEASE_CHANGED_FILES}" | grep -E "${forbidden_pattern}" || true
            echo "control-plane auto deploy refuses postgres/registry/headscale changes; use an independent controlled release window"
            exit 1
          fi

      - name: Prepare authoritative DNS DiG runtime
        if: ${{ needs.release-baseline.outputs.is_genesis != 'true' }}
        run: ./scripts/prepare_authoritative_dns_dig.sh

      - name: Verify local deploy prerequisites
        if: ${{ needs.release-baseline.outputs.is_genesis != 'true' }}
        run: |
          command -v helm
          command -v curl
          command -v dig
          [[ "$(command -v dig)" == "${FUGUE_AUTHORITATIVE_DNS_DIG_PREPARED_BIN}" ]]
          dig -v
          if command -v kubectl >/dev/null 2>&1; then
            kubectl version --client
          else
            k3s kubectl version --client
          fi

      - name: Explain runner and fail closed target
        if: ${{ needs.release-baseline.outputs.is_genesis != 'true' }}
        env:
          FUGUE_RELEASE_NAME: ${{ vars.FUGUE_RELEASE_NAME || 'fugue' }}
          FUGUE_NAMESPACE: ${{ vars.FUGUE_NAMESPACE || 'fugue-system' }}
          FUGUE_IMAGE_TAG: ${{ needs.build.outputs.image_tag || github.sha }}
          FUGUE_IMAGE_TARGETS: ${{ needs.build.outputs.image_targets || '' }}
          FUGUE_RELEASE_CHANGED_FILES: ${{ needs.release-baseline.outputs.changed_files }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/fugue-release"
          if command -v kubectl >/dev/null 2>&1; then
            KUBECTL=kubectl
          else
            KUBECTL="k3s kubectl"
          fi
          {
            echo "workflow=deploy-control-plane.yml"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "runner_name=${RUNNER_NAME}"
            echo "runner_os=${RUNNER_OS}"
            echo "runner_arch=${RUNNER_ARCH}"
            echo "repository=${GITHUB_REPOSITORY}"
            echo "commit=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF}"
            echo "release_name=${FUGUE_RELEASE_NAME}"
            echo "namespace=${FUGUE_NAMESPACE}"
            echo "image_tag=${FUGUE_IMAGE_TAG}"
            echo "image_targets=${FUGUE_IMAGE_TARGETS}"
            echo "kubectl=$(${KUBECTL} version --client 2>&1 | tr '\n' ';')"
            echo "helm=$(helm version --short 2>&1)"
          } > "${RUNNER_TEMP}/fugue-release/attribution.env"
          if ! ${KUBECTL} config current-context >> "${RUNNER_TEMP}/fugue-release/target-cluster.txt" 2>&1; then
            echo "Kubernetes context unavailable; fail closed before control-plane deploy" >&2
            exit 1
          fi
          if ! ${KUBECTL} get --raw=/readyz?verbose > "${RUNNER_TEMP}/fugue-release/kubernetes-readyz.txt" 2>&1; then
            echo "Kubernetes API /readyz failed; fail closed before control-plane deploy" >&2
            cat "${RUNNER_TEMP}/fugue-release/kubernetes-readyz.txt" >&2 || true
            exit 1
          fi
          if helm plugin list 2>/dev/null | grep -q '^diff[[:space:]]'; then
            echo "helm_diff=available" >> "${RUNNER_TEMP}/fugue-release/attribution.env"
          else
            echo "helm_diff=not_installed; upgrade script records kubectl/resource diffs where supported" >> "${RUNNER_TEMP}/fugue-release/attribution.env"
          fi
          printf '%s\n' "${FUGUE_RELEASE_CHANGED_FILES}" > "${RUNNER_TEMP}/fugue-release/changed-files.txt"

      - name: Resolve live image metadata
        id: live_images
