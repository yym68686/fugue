name: deploy-control-plane

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-control-plane.yml'
      - 'assets/**'
      - 'cmd/fugue-api/**'
      - 'cmd/fugue-controller/**'
      - 'cmd/fugue-drain-agent/**'
      - 'cmd/fugue-registry-maintenance/**'
      - 'cmd/fugue-telemetry-agent/**'
      - 'cmd/fugue-image-cache/**'
      - 'cmd/fugue-edge/**'
      - 'cmd/fugue-edge-front/**'
      - 'cmd/fugue-ssh-front/**'
      - 'cmd/fugue-dns/**'
      - 'cmd/fugue-mesh-agent/**'
      - 'cmd/fugue-mesh-recovery/**'
      - 'images/app-ssh/**'
      - 'internal/**'
      - 'deploy/helm/fugue/charts/**'
      - 'deploy/helm/fugue/crds/**'
      - 'deploy/helm/fugue/Chart.yaml'
      - 'deploy/helm/fugue/values-production-ha.yaml'
      - 'deploy/helm/fugue/values.yaml'
      - 'deploy/helm/fugue/templates/**'
      - 'Dockerfile.api'
      - 'Dockerfile.controller'
      - 'Dockerfile.drain-agent'
      - 'Dockerfile.telemetry-agent'
      - 'Dockerfile.image-cache'
      - 'Dockerfile.edge'
      - 'Dockerfile.app-ssh'
      - 'go.mod'
      - 'go.sum'
      - 'scripts/export_cloudflare_zone_static_records.sh'
      - 'scripts/install_fugue_ha.sh'
      - 'scripts/issue_fugue_app_wildcard_tls.sh'
      - 'scripts/render_fugue_edge_systemd_unit.sh'
      - 'scripts/render_fugue_dns_systemd_unit.sh'
      - 'scripts/render_fugue_mesh_agent_systemd_unit.sh'
      - 'scripts/render_fugue_mesh_recovery_systemd_unit.sh'
      - 'scripts/release_fugue_public_data_plane.sh'
      - 'scripts/sync_fugue_edge_proxy.sh'
      - 'scripts/upgrade_fugue_control_plane.sh'
  workflow_dispatch:
    inputs:
      existing_image_tag:
        description: Existing image tag to deploy without rebuilding images.
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: fugue-control-plane-production-v3
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.existing_image_tag == '' }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      api_image_repository: ${{ steps.meta.outputs.api_image_repository }}
      controller_image_repository: ${{ steps.meta.outputs.controller_image_repository }}
      drain_agent_image_repository: ${{ steps.meta.outputs.drain_agent_image_repository }}
      telemetry_agent_image_repository: ${{ steps.meta.outputs.telemetry_agent_image_repository }}
      image_cache_image_repository: ${{ steps.meta.outputs.image_cache_image_repository }}
      edge_image_repository: ${{ steps.meta.outputs.edge_image_repository }}
      app_ssh_image_repository: ${{ steps.meta.outputs.app_ssh_image_repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: make test

      - name: Compute image metadata
        id: meta
        run: |
          owner_lc="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "image_tag=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "api_image_repository=ghcr.io/${owner_lc}/fugue-api" >> "${GITHUB_OUTPUT}"
          echo "controller_image_repository=ghcr.io/${owner_lc}/fugue-controller" >> "${GITHUB_OUTPUT}"
          echo "drain_agent_image_repository=ghcr.io/${owner_lc}/fugue-drain-agent" >> "${GITHUB_OUTPUT}"
          echo "telemetry_agent_image_repository=ghcr.io/${owner_lc}/fugue-telemetry-agent" >> "${GITHUB_OUTPUT}"
          echo "image_cache_image_repository=ghcr.io/${owner_lc}/fugue-image-cache" >> "${GITHUB_OUTPUT}"
          echo "edge_image_repository=ghcr.io/${owner_lc}/fugue-edge" >> "${GITHUB_OUTPUT}"
          echo "app_ssh_image_repository=ghcr.io/${owner_lc}/fugue-app-ssh" >> "${GITHUB_OUTPUT}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push fugue-api
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: |
            ${{ steps.meta.outputs.api_image_repository }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Build and push fugue-controller
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./Dockerfile.controller
          push: true
          tags: |
            ${{ steps.meta.outputs.controller_image_repository }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Build and push fugue-drain-agent
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./Dockerfile.drain-agent
          push: true
          tags: |
            ${{ steps.meta.outputs.drain_agent_image_repository }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Build and push fugue-telemetry-agent
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./Dockerfile.telemetry-agent
          push: true
          tags: |
            ${{ steps.meta.outputs.telemetry_agent_image_repository }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Build and push fugue-image-cache
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./Dockerfile.image-cache
          push: true
          tags: |
            ${{ steps.meta.outputs.image_cache_image_repository }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Build and push fugue-edge
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./Dockerfile.edge
          push: true
          tags: |
            ${{ steps.meta.outputs.edge_image_repository }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Build and push fugue-app-ssh
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./Dockerfile.app-ssh
          push: true
          tags: |
            ${{ steps.meta.outputs.app_ssh_image_repository }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

  deploy:
    needs: build
    if: ${{ always() && (needs.build.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.existing_image_tag != '')) }}
    runs-on:
      - self-hosted
      - linux
      - x64
      - fugue
      - control-plane
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release changed files
        id: release_changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          changed_files=""
          if [[ "${EVENT_NAME}" == "push" && -n "${BEFORE_SHA}" && "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]] &&
            git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            changed_files="$(git diff --name-only "${BEFORE_SHA}" "${AFTER_SHA}")"
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            changed_files="$(git diff --name-only HEAD^ HEAD)"
          fi
          {
            echo "changed_files<<EOF"
            printf '%s\n' "${changed_files}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Guard stateful component files
        if: github.event_name == 'push'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          if [[ -z "${BEFORE_SHA}" || "${BEFORE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
            echo "skip stateful-file guard on initial push"
            exit 0
          fi
          if git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            changed_files="$(git diff --name-only "${BEFORE_SHA}" "${AFTER_SHA}")"
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            changed_files="$(git diff --name-only HEAD^ HEAD)"
          else
            changed_files=""
          fi
          forbidden_pattern='^deploy/helm/fugue/templates/(postgres-(deployment|service)|registry-(configmap|deployment|pvc|service)|headscale-.*|control-plane-postgres-.*|shared-workspace-.*|snapshot-controller)\.yaml$'
          if printf '%s\n' "${changed_files}" | grep -E "${forbidden_pattern}" >/dev/null; then
            echo "stateful component manifests changed in this push:"
            printf '%s\n' "${changed_files}" | grep -E "${forbidden_pattern}" || true
            echo "control-plane auto deploy refuses postgres/registry/headscale changes; ship those with a manual release"
            exit 1
          fi

      - name: Verify local deploy prerequisites
        run: |
          command -v helm
          command -v curl
          if command -v kubectl >/dev/null 2>&1; then
            kubectl version --client
          else
            k3s kubectl version --client
          fi

      - name: Upgrade Fugue control plane
        # Edge fan-out now happens inside the upgrade script using the
        # control-plane automation secret, so the workflow only needs one
        # deploy entrypoint.
        env:
          FUGUE_RELEASE_NAME: ${{ vars.FUGUE_RELEASE_NAME || 'fugue' }}
          FUGUE_NAMESPACE: ${{ vars.FUGUE_NAMESPACE || 'fugue-system' }}
          FUGUE_RELEASE_FULLNAME: ${{ vars.FUGUE_RELEASE_FULLNAME || 'fugue-fugue' }}
          FUGUE_API_KEY: ${{ secrets.FUGUE_API_KEY || '' }}
          FUGUE_API_PUBLIC_DOMAIN: ${{ vars.FUGUE_API_PUBLIC_DOMAIN || '' }}
          FUGUE_APP_BASE_DOMAIN: ${{ vars.FUGUE_APP_BASE_DOMAIN || '' }}
          FUGUE_API_DATABASE_URL: ${{ secrets.FUGUE_API_DATABASE_URL || '' }}
          FUGUE_POSTGRES_ENABLED: ${{ vars.FUGUE_POSTGRES_ENABLED || (vars.FUGUE_CONTROL_PLANE_POSTGRES_USE_FOR_API == 'true' && 'false' || 'true') }}
          FUGUE_CONTROL_PLANE_POSTGRES_ENABLED: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_ENABLED || 'false' }}
          FUGUE_CONTROL_PLANE_POSTGRES_USE_FOR_API: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_USE_FOR_API || 'false' }}
          FUGUE_CONTROL_PLANE_POSTGRES_NAME: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_NAME || '' }}
          FUGUE_CONTROL_PLANE_POSTGRES_IMAGE_NAME: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_IMAGE_NAME || '' }}
          FUGUE_CONTROL_PLANE_POSTGRES_INSTANCES: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_INSTANCES || '3' }}
          FUGUE_CONTROL_PLANE_POSTGRES_STORAGE_SIZE: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_STORAGE_SIZE || '10Gi' }}
          FUGUE_CONTROL_PLANE_POSTGRES_STORAGE_CLASS: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_STORAGE_CLASS || '' }}
          FUGUE_CONTROL_PLANE_POSTGRES_EXISTING_SECRET_NAME: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_EXISTING_SECRET_NAME || '' }}
          FUGUE_CONTROL_PLANE_POSTGRES_BOOTSTRAP_SOURCE_URL: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_BOOTSTRAP_SOURCE_URL || '' }}
          FUGUE_CONTROL_PLANE_SINGLETONS_ENABLED: ${{ vars.FUGUE_CONTROL_PLANE_SINGLETONS_ENABLED || 'false' }}
          FUGUE_CONTROL_PLANE_SINGLETON_NODE_SELECTOR: ${{ vars.FUGUE_CONTROL_PLANE_SINGLETON_NODE_SELECTOR || '' }}
          FUGUE_SHARED_WORKSPACE_STORAGE_ENABLED: ${{ vars.FUGUE_SHARED_WORKSPACE_STORAGE_ENABLED || 'false' }}
          FUGUE_SHARED_WORKSPACE_STORAGE_CLASS: ${{ vars.FUGUE_SHARED_WORKSPACE_STORAGE_CLASS || 'fugue-rwx' }}
          FUGUE_SHARED_WORKSPACE_NFS_CLUSTER_IP: ${{ vars.FUGUE_SHARED_WORKSPACE_NFS_CLUSTER_IP || '' }}
          FUGUE_CONTROL_PLANE_KUBE_API_FALLBACK_SERVERS: ${{ vars.FUGUE_CONTROL_PLANE_KUBE_API_FALLBACK_SERVERS || '' }}
          FUGUE_CLUSTER_JOIN_SERVER_FALLBACKS: ${{ vars.FUGUE_CLUSTER_JOIN_SERVER_FALLBACKS || '' }}
          FUGUE_CLUSTER_JOIN_K3S_VERSION: ${{ vars.FUGUE_CLUSTER_JOIN_K3S_VERSION || '' }}
          FUGUE_CLUSTER_JOIN_MESH_PROVIDER: ${{ vars.FUGUE_CLUSTER_JOIN_MESH_PROVIDER || '' }}
          FUGUE_CLUSTER_JOIN_MESH_LOGIN_SERVER: ${{ vars.FUGUE_CLUSTER_JOIN_MESH_LOGIN_SERVER || '' }}
          FUGUE_CLUSTER_JOIN_MESH_AUTH_KEY: ${{ secrets.FUGUE_CLUSTER_JOIN_MESH_AUTH_KEY || '' }}
          FUGUE_IMAGE_STORE_MODE: ${{ vars.FUGUE_IMAGE_STORE_MODE || 'distributed' }}
          FUGUE_IMAGE_STORE_MIN_REPLICAS: ${{ vars.FUGUE_IMAGE_STORE_MIN_REPLICAS || '1' }}
          FUGUE_IMAGE_STORE_TARGET_REPLICAS: ${{ vars.FUGUE_IMAGE_STORE_TARGET_REPLICAS || '1' }}
          FUGUE_IMAGE_STORE_SCHEDULER_INTERVAL: ${{ vars.FUGUE_IMAGE_STORE_SCHEDULER_INTERVAL || '30s' }}
          FUGUE_IMAGE_STORE_REPLICA_LEASE_TTL: ${{ vars.FUGUE_IMAGE_STORE_REPLICA_LEASE_TTL || '30m' }}
          FUGUE_IMAGE_STORE_VERIFY_INTERVAL: ${{ vars.FUGUE_IMAGE_STORE_VERIFY_INTERVAL || '10m' }}
          FUGUE_IMAGE_CACHE_INVENTORY_ENABLED: ${{ vars.FUGUE_IMAGE_CACHE_INVENTORY_ENABLED || 'true' }}
          FUGUE_IMAGE_CACHE_INVENTORY_INTERVAL: ${{ vars.FUGUE_IMAGE_CACHE_INVENTORY_INTERVAL || '30m' }}
          FUGUE_IMAGE_CACHE_INVENTORY_TTL: ${{ vars.FUGUE_IMAGE_CACHE_INVENTORY_TTL || '2h' }}
          FUGUE_IMAGE_STORE_ORPHAN_PRUNE_MODE: ${{ vars.FUGUE_IMAGE_STORE_ORPHAN_PRUNE_MODE || 'delete' }}
          FUGUE_IMAGE_STORE_ORPHAN_PRUNE_GRACE_PERIOD: ${{ vars.FUGUE_IMAGE_STORE_ORPHAN_PRUNE_GRACE_PERIOD || '24h' }}
          FUGUE_IMAGE_STORE_ORPHAN_PRUNE_MAX_TARGETS_PER_NODE: ${{ vars.FUGUE_IMAGE_STORE_ORPHAN_PRUNE_MAX_TARGETS_PER_NODE || '50' }}
          FUGUE_IMAGE_STORE_ORPHAN_PRUNE_MAX_DELETE_BYTES_PER_NODE: ${{ vars.FUGUE_IMAGE_STORE_ORPHAN_PRUNE_MAX_DELETE_BYTES_PER_NODE || '10Gi' }}
          FUGUE_IMAGE_STORE_ORPHAN_PRUNE_MIN_REPLICA_COUNT: ${{ vars.FUGUE_IMAGE_STORE_ORPHAN_PRUNE_MIN_REPLICA_COUNT || '1' }}
          FUGUE_REGISTRY_ENABLED: ${{ vars.FUGUE_REGISTRY_ENABLED || 'false' }}
          FUGUE_REGISTRY_PUSH_BASE: ${{ vars.FUGUE_REGISTRY_PUSH_BASE || '' }}
          FUGUE_REGISTRY_PULL_BASE: ${{ vars.FUGUE_REGISTRY_PULL_BASE || '' }}
          FUGUE_CLUSTER_JOIN_REGISTRY_ENDPOINT: ${{ vars.FUGUE_CLUSTER_JOIN_REGISTRY_ENDPOINT || '' }}
          FUGUE_DATA_BACKEND_PROVIDER: ${{ vars.FUGUE_DATA_BACKEND_PROVIDER || 'cloudflare-r2' }}
          FUGUE_DATA_BACKEND_BUCKET: ${{ secrets.FUGUE_DATA_BACKEND_BUCKET || vars.FUGUE_DATA_BACKEND_BUCKET || '' }}
          FUGUE_DATA_BACKEND_REGION: ${{ vars.FUGUE_DATA_BACKEND_REGION || '' }}
          FUGUE_DATA_BACKEND_ENDPOINT: ${{ secrets.FUGUE_DATA_BACKEND_ENDPOINT || vars.FUGUE_DATA_BACKEND_ENDPOINT || '' }}
          FUGUE_DATA_R2_ACCOUNT_ID: ${{ secrets.FUGUE_DATA_R2_ACCOUNT_ID || vars.FUGUE_DATA_R2_ACCOUNT_ID || '' }}
          FUGUE_DATA_BACKEND_PREFIX: ${{ vars.FUGUE_DATA_BACKEND_PREFIX || '' }}
          FUGUE_DATA_BACKEND_ACCESS_KEY_ID: ${{ secrets.FUGUE_DATA_BACKEND_ACCESS_KEY_ID || '' }}
          FUGUE_DATA_BACKEND_SECRET_ACCESS_KEY: ${{ secrets.FUGUE_DATA_BACKEND_SECRET_ACCESS_KEY || '' }}
          FUGUE_DATA_BACKEND_SESSION_TOKEN: ${{ secrets.FUGUE_DATA_BACKEND_SESSION_TOKEN || '' }}
          FUGUE_DATA_CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.FUGUE_DATA_CREDENTIAL_ENCRYPTION_KEY || '' }}
          FUGUE_DATA_PRESIGN_TTL: ${{ vars.FUGUE_DATA_PRESIGN_TTL || '6h' }}
          FUGUE_CONTROL_PLANE_AUTOMATION_SECRET_NAME: ${{ vars.FUGUE_CONTROL_PLANE_AUTOMATION_SECRET_NAME || '' }}
          FUGUE_SYNC_EDGE_PROXY: ${{ vars.FUGUE_SYNC_EDGE_PROXY || 'false' }}
          FUGUE_SMOKE_URL: ${{ vars.FUGUE_SMOKE_URL || '' }}
          FUGUE_SMOKE_URLS: ${{ vars.FUGUE_SMOKE_URLS || '' }}
          FUGUE_API_IMAGE_REPOSITORY: ${{ (github.event_name == 'workflow_dispatch' && inputs.existing_image_tag != '' && format('ghcr.io/{0}/fugue-api', github.repository_owner)) || needs.build.outputs.api_image_repository }}
          FUGUE_API_IMAGE_TAG: ${{ inputs.existing_image_tag || needs.build.outputs.image_tag }}
          FUGUE_CONTROLLER_IMAGE_REPOSITORY: ${{ (github.event_name == 'workflow_dispatch' && inputs.existing_image_tag != '' && format('ghcr.io/{0}/fugue-controller', github.repository_owner)) || needs.build.outputs.controller_image_repository }}
          FUGUE_CONTROLLER_IMAGE_TAG: ${{ inputs.existing_image_tag || needs.build.outputs.image_tag }}
          FUGUE_DRAIN_AGENT_IMAGE_REPOSITORY: ${{ (github.event_name == 'workflow_dispatch' && inputs.existing_image_tag != '' && format('ghcr.io/{0}/fugue-drain-agent', github.repository_owner)) || needs.build.outputs.drain_agent_image_repository }}
          FUGUE_DRAIN_AGENT_IMAGE_TAG: ${{ inputs.existing_image_tag || needs.build.outputs.image_tag }}
          FUGUE_TELEMETRY_AGENT_IMAGE_REPOSITORY: ${{ (github.event_name == 'workflow_dispatch' && inputs.existing_image_tag != '' && format('ghcr.io/{0}/fugue-telemetry-agent', github.repository_owner)) || needs.build.outputs.telemetry_agent_image_repository }}
          FUGUE_TELEMETRY_AGENT_IMAGE_TAG: ${{ inputs.existing_image_tag || needs.build.outputs.image_tag }}
          FUGUE_OBSERVABILITY_ENABLED: ${{ vars.FUGUE_OBSERVABILITY_ENABLED || 'true' }}
          FUGUE_OBSERVABILITY_RETENTION: ${{ vars.FUGUE_OBSERVABILITY_RETENTION || '24h' }}
          FUGUE_OBSERVABILITY_EXPORTER_SECRET_NAME: ${{ vars.FUGUE_OBSERVABILITY_EXPORTER_SECRET_NAME || '' }}
          FUGUE_OBSERVABILITY_RUNTIME_LOG_PATHS: ${{ vars.FUGUE_OBSERVABILITY_RUNTIME_LOG_PATHS || '' }}
          FUGUE_OBSERVABILITY_PROMETHEUS_SCRAPE_URLS: ${{ vars.FUGUE_OBSERVABILITY_PROMETHEUS_SCRAPE_URLS || '' }}
          FUGUE_OBSERVABILITY_SCRAPE_INTERVAL: ${{ vars.FUGUE_OBSERVABILITY_SCRAPE_INTERVAL || '30s' }}
          FUGUE_OBSERVABILITY_KUBERNETES_LOGS_ENABLED: ${{ vars.FUGUE_OBSERVABILITY_KUBERNETES_LOGS_ENABLED || 'true' }}
          FUGUE_OBSERVABILITY_KUBERNETES_LOG_NAMESPACES: ${{ vars.FUGUE_OBSERVABILITY_KUBERNETES_LOG_NAMESPACES || '' }}
          FUGUE_OBSERVABILITY_KUBERNETES_LOG_NAMESPACE_PREFIXES: ${{ vars.FUGUE_OBSERVABILITY_KUBERNETES_LOG_NAMESPACE_PREFIXES || 'fg-' }}
          FUGUE_OBSERVABILITY_KUBERNETES_LOG_LABEL_SELECTOR: ${{ vars.FUGUE_OBSERVABILITY_KUBERNETES_LOG_LABEL_SELECTOR || '' }}
          FUGUE_OBSERVABILITY_KUBERNETES_LOG_POLL_INTERVAL: ${{ vars.FUGUE_OBSERVABILITY_KUBERNETES_LOG_POLL_INTERVAL || '15s' }}
          FUGUE_OBSERVABILITY_KUBERNETES_LOG_TAIL_LINES: ${{ vars.FUGUE_OBSERVABILITY_KUBERNETES_LOG_TAIL_LINES || '2000' }}
          FUGUE_OBSERVABILITY_KUBERNETES_LOG_MAX_PODS: ${{ vars.FUGUE_OBSERVABILITY_KUBERNETES_LOG_MAX_PODS || '500' }}
          FUGUE_OBSERVABILITY_KUBERNETES_LOG_MAX_LINES_PER_CYCLE: ${{ vars.FUGUE_OBSERVABILITY_KUBERNETES_LOG_MAX_LINES_PER_CYCLE || '20000' }}
          FUGUE_OBSERVABILITY_QUEUE_SIZE: ${{ vars.FUGUE_OBSERVABILITY_QUEUE_SIZE || '32768' }}
          FUGUE_OBSERVABILITY_BATCH_SIZE: ${{ vars.FUGUE_OBSERVABILITY_BATCH_SIZE || '512' }}
          FUGUE_OBSERVABILITY_MAX_PAYLOAD_BYTES: ${{ vars.FUGUE_OBSERVABILITY_MAX_PAYLOAD_BYTES || '1048576' }}
          FUGUE_OBSERVABILITY_MEMORY_LIMIT_BYTES: ${{ vars.FUGUE_OBSERVABILITY_MEMORY_LIMIT_BYTES || '134217728' }}
          FUGUE_OBSERVABILITY_RETRY_MAX_ATTEMPTS: ${{ vars.FUGUE_OBSERVABILITY_RETRY_MAX_ATTEMPTS || '3' }}
          FUGUE_OBSERVABILITY_TENANT_ID: ${{ vars.FUGUE_OBSERVABILITY_TENANT_ID || '' }}
          FUGUE_OBSERVABILITY_PROJECT_ID: ${{ vars.FUGUE_OBSERVABILITY_PROJECT_ID || '' }}
          FUGUE_OBSERVABILITY_APP_ID: ${{ vars.FUGUE_OBSERVABILITY_APP_ID || '' }}
          FUGUE_OBSERVABILITY_RUNTIME_ID: ${{ vars.FUGUE_OBSERVABILITY_RUNTIME_ID || '' }}
          FUGUE_OBSERVABILITY_COMPONENT: ${{ vars.FUGUE_OBSERVABILITY_COMPONENT || 'telemetry-agent' }}
          FUGUE_OBSERVABILITY_METRICS_ENABLED: ${{ vars.FUGUE_OBSERVABILITY_METRICS_ENABLED || 'true' }}
          FUGUE_OBSERVABILITY_METRICS_IMAGE_REPOSITORY: ${{ vars.FUGUE_OBSERVABILITY_METRICS_IMAGE_REPOSITORY || 'prom/prometheus' }}
          FUGUE_OBSERVABILITY_METRICS_IMAGE_TAG: ${{ vars.FUGUE_OBSERVABILITY_METRICS_IMAGE_TAG || 'latest' }}
          FUGUE_OBSERVABILITY_METRICS_RETENTION: ${{ vars.FUGUE_OBSERVABILITY_METRICS_RETENTION || '24h' }}
          FUGUE_OBSERVABILITY_METRICS_SCRAPE_INTERVAL: ${{ vars.FUGUE_OBSERVABILITY_METRICS_SCRAPE_INTERVAL || '30s' }}
          FUGUE_OBSERVABILITY_METRICS_EVALUATION_INTERVAL: ${{ vars.FUGUE_OBSERVABILITY_METRICS_EVALUATION_INTERVAL || '30s' }}
          FUGUE_OBSERVABILITY_ALERTS_ENABLED: ${{ vars.FUGUE_OBSERVABILITY_ALERTS_ENABLED || 'false' }}
          FUGUE_OBSERVABILITY_ALERTS_IMAGE_REPOSITORY: ${{ vars.FUGUE_OBSERVABILITY_ALERTS_IMAGE_REPOSITORY || 'prom/alertmanager' }}
          FUGUE_OBSERVABILITY_ALERTS_IMAGE_TAG: ${{ vars.FUGUE_OBSERVABILITY_ALERTS_IMAGE_TAG || 'latest' }}
          FUGUE_OBSERVABILITY_ALERTS_WEBHOOK_URL: ${{ secrets.FUGUE_OBSERVABILITY_ALERTS_WEBHOOK_URL || vars.FUGUE_OBSERVABILITY_ALERTS_WEBHOOK_URL || '' }}
