name: deploy-control-plane

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-control-plane.yml'
      - 'assets/**'
      - 'cmd/fugue-api/**'
      - 'cmd/fugue-controller/**'
      - 'cmd/fugue-drain-agent/**'
      - 'cmd/fugue-registry-maintenance/**'
      - 'cmd/fugue-telemetry-agent/**'
      - 'cmd/fugue-image-cache/**'
      - 'cmd/fugue-edge/**'
      - 'cmd/fugue-edge-front/**'
      - 'cmd/fugue-ssh-front/**'
      - 'cmd/fugue-dns/**'
      - 'cmd/fugue-mesh-agent/**'
      - 'cmd/fugue-mesh-recovery/**'
      - 'images/app-ssh/**'
      - 'internal/**'
      - 'deploy/helm/fugue/charts/**'
      - 'deploy/helm/fugue/crds/**'
      - 'deploy/helm/fugue/Chart.yaml'
      - 'deploy/helm/fugue/values-production-ha.yaml'
      - 'deploy/helm/fugue/values.yaml'
      - 'deploy/helm/fugue/templates/**'
      - 'Dockerfile.api'
      - 'Dockerfile.controller'
      - 'Dockerfile.drain-agent'
      - 'Dockerfile.telemetry-agent'
      - 'Dockerfile.image-cache'
      - 'Dockerfile.edge'
      - 'Dockerfile.app-ssh'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'
      - 'scripts/bootstrap_control_plane_automation.sh'
      - 'scripts/build_control_plane_images.sh'
      - 'scripts/compute_control_plane_image_build_plan.sh'
      - 'scripts/compute_release_changed_files_from_live.sh'
      - 'scripts/export_cloudflare_zone_static_records.sh'
      - 'scripts/install_fugue_ha.sh'
      - 'scripts/issue_fugue_app_wildcard_tls.sh'
      - 'scripts/prepare_authoritative_dns_dig.sh'
      - 'scripts/render_fugue_edge_systemd_unit.sh'
      - 'scripts/render_fugue_dns_systemd_unit.sh'
      - 'scripts/render_fugue_mesh_agent_systemd_unit.sh'
      - 'scripts/render_fugue_mesh_recovery_systemd_unit.sh'
      - 'scripts/resolve_control_plane_live_images.sh'
      - 'scripts/release_fugue_public_data_plane.sh'
      - 'scripts/sync_fugue_edge_proxy.sh'
      - 'scripts/test_release_domain_safety.sh'
      - 'scripts/test_node_local_dns_release.sh'
      - 'scripts/test_prepare_authoritative_dns_dig.sh'
      - 'scripts/test_verify_registry_image.py'
      - 'scripts/test_verify_stale_release_recovery.py'
      - 'scripts/upgrade_fugue_control_plane.sh'
      - 'scripts/verify_stale_release_recovery.py'
      - 'scripts/verify_registry_image.py'
  workflow_dispatch: {}

permissions:
  actions: read
  contents: read
  packages: write

concurrency:
  group: fugue-production-cluster-mutation-v1
  cancel-in-progress: false

jobs:
  release-baseline:
    runs-on:
      - self-hosted
      - linux
      - x64
      - fugue
      - control-plane
    outputs:
      changed_files: ${{ steps.release_changes.outputs.changed_files }}
      baseline_refs: ${{ steps.release_changes.outputs.baseline_refs }}
      source: ${{ steps.release_changes.outputs.source }}
      target_ref: ${{ steps.release_changes.outputs.target_ref }}
      api_image_baseline_ref: ${{ steps.live_images.outputs.api_image_baseline_ref }}
      controller_image_baseline_ref: ${{ steps.live_images.outputs.controller_image_baseline_ref }}
      drain_agent_image_baseline_ref: ${{ steps.live_images.outputs.drain_agent_image_baseline_ref }}
      telemetry_agent_image_baseline_ref: ${{ steps.live_images.outputs.telemetry_agent_image_baseline_ref }}
      image_cache_image_baseline_ref: ${{ steps.live_images.outputs.image_cache_image_baseline_ref }}
      edge_image_baseline_ref: ${{ steps.live_images.outputs.edge_image_baseline_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Resolve live image metadata
        id: live_images
        env:
          FUGUE_RELEASE_NAME: ${{ vars.FUGUE_RELEASE_NAME || 'fugue' }}
          FUGUE_NAMESPACE: ${{ vars.FUGUE_NAMESPACE || 'fugue-system' }}
          FUGUE_RELEASE_FULLNAME: ${{ vars.FUGUE_RELEASE_FULLNAME || 'fugue-fugue' }}
          FUGUE_IMAGE_TAG: ${{ github.sha }}
        run: ./scripts/resolve_control_plane_live_images.sh

      - name: Compute live-to-target release changed files
        id: release_changes
        env:
          FUGUE_RELEASE_TARGET_REF: ${{ github.sha }}
          FUGUE_RELEASE_BASE_REFS: ${{ steps.live_images.outputs.release_baseline_tags }}
          FUGUE_RELEASE_REQUIRE_BASELINE: "true"
        run: ./scripts/compute_release_changed_files_from_live.sh

  release-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Verify generated OpenAPI artifacts
        run: make generate-openapi-check

      - name: Verify release-domain safety contracts
        run: |
          bash scripts/test_prepare_authoritative_dns_dig.sh
          bash scripts/test_release_domain_safety.sh
          bash scripts/test_node_local_dns_release.sh
          python3 scripts/test_verify_stale_release_recovery.py

      - name: Run Go tests
        run: go test ./...

  build:
    needs:
      - release-baseline
      - release-gate
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      api_image_repository: ${{ steps.meta.outputs.api_image_repository }}
      controller_image_repository: ${{ steps.meta.outputs.controller_image_repository }}
      drain_agent_image_repository: ${{ steps.meta.outputs.drain_agent_image_repository }}
      telemetry_agent_image_repository: ${{ steps.meta.outputs.telemetry_agent_image_repository }}
      image_cache_image_repository: ${{ steps.meta.outputs.image_cache_image_repository }}
      edge_image_repository: ${{ steps.meta.outputs.edge_image_repository }}
      app_ssh_image_repository: ${{ steps.meta.outputs.app_ssh_image_repository }}
      api_image_digest: ${{ steps.build_images.outputs.api_image_digest }}
      controller_image_digest: ${{ steps.build_images.outputs.controller_image_digest }}
      drain_agent_image_digest: ${{ steps.build_images.outputs.drain_agent_image_digest }}
      telemetry_agent_image_digest: ${{ steps.build_images.outputs.telemetry_agent_image_digest }}
      image_cache_image_digest: ${{ steps.build_images.outputs.image_cache_image_digest }}
      edge_image_digest: ${{ steps.build_images.outputs.edge_image_digest }}
      app_ssh_image_digest: ${{ steps.build_images.outputs.app_ssh_image_digest }}
      build_api: ${{ steps.plan.outputs.build_api }}
      build_controller: ${{ steps.plan.outputs.build_controller }}
      build_drain_agent: ${{ steps.plan.outputs.build_drain_agent }}
      build_telemetry_agent: ${{ steps.plan.outputs.build_telemetry_agent }}
      build_image_cache: ${{ steps.plan.outputs.build_image_cache }}
      build_edge: ${{ steps.plan.outputs.build_edge }}
      build_app_ssh: ${{ steps.plan.outputs.build_app_ssh }}
      image_targets: ${{ steps.plan.outputs.targets }}
      image_target_count: ${{ steps.plan.outputs.target_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Compute image metadata
        id: meta
        run: |
          owner_lc="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "image_tag=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "api_image_repository=ghcr.io/${owner_lc}/fugue-api" >> "${GITHUB_OUTPUT}"
          echo "controller_image_repository=ghcr.io/${owner_lc}/fugue-controller" >> "${GITHUB_OUTPUT}"
          echo "drain_agent_image_repository=ghcr.io/${owner_lc}/fugue-drain-agent" >> "${GITHUB_OUTPUT}"
          echo "telemetry_agent_image_repository=ghcr.io/${owner_lc}/fugue-telemetry-agent" >> "${GITHUB_OUTPUT}"
          echo "image_cache_image_repository=ghcr.io/${owner_lc}/fugue-image-cache" >> "${GITHUB_OUTPUT}"
          echo "edge_image_repository=ghcr.io/${owner_lc}/fugue-edge" >> "${GITHUB_OUTPUT}"
          echo "app_ssh_image_repository=ghcr.io/${owner_lc}/fugue-app-ssh" >> "${GITHUB_OUTPUT}"

      - name: Compute image build plan
        id: plan
        env:
          FUGUE_RELEASE_CHANGED_FILES: ${{ needs.release-baseline.outputs.changed_files }}
          FUGUE_RELEASE_CHANGED_FILES_SET: "true"
          FUGUE_RELEASE_TARGET_REF: ${{ needs.release-baseline.outputs.target_ref }}
          FUGUE_API_IMAGE_BASE_REF: ${{ needs.release-baseline.outputs.api_image_baseline_ref }}
          FUGUE_CONTROLLER_IMAGE_BASE_REF: ${{ needs.release-baseline.outputs.controller_image_baseline_ref }}
          FUGUE_DRAIN_AGENT_IMAGE_BASE_REF: ${{ needs.release-baseline.outputs.drain_agent_image_baseline_ref }}
          FUGUE_TELEMETRY_AGENT_IMAGE_BASE_REF: ${{ needs.release-baseline.outputs.telemetry_agent_image_baseline_ref }}
          FUGUE_IMAGE_CACHE_IMAGE_BASE_REF: ${{ needs.release-baseline.outputs.image_cache_image_baseline_ref }}
          FUGUE_EDGE_IMAGE_BASE_REF: ${{ needs.release-baseline.outputs.edge_image_baseline_ref }}
        run: ./scripts/compute_control_plane_image_build_plan.sh

      - name: Setup Docker Buildx
        if: steps.plan.outputs.target_count != '0'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        if: steps.plan.outputs.target_count != '0'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push selected control-plane images
        id: build_images
        if: steps.plan.outputs.target_count != '0'
        env:
          FUGUE_CONTROL_PLANE_IMAGE_TARGETS: ${{ steps.plan.outputs.targets }}
          FUGUE_IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          FUGUE_API_IMAGE_REPOSITORY: ${{ steps.meta.outputs.api_image_repository }}
          FUGUE_CONTROLLER_IMAGE_REPOSITORY: ${{ steps.meta.outputs.controller_image_repository }}
          FUGUE_DRAIN_AGENT_IMAGE_REPOSITORY: ${{ steps.meta.outputs.drain_agent_image_repository }}
          FUGUE_TELEMETRY_AGENT_IMAGE_REPOSITORY: ${{ steps.meta.outputs.telemetry_agent_image_repository }}
          FUGUE_IMAGE_CACHE_IMAGE_REPOSITORY: ${{ steps.meta.outputs.image_cache_image_repository }}
          FUGUE_EDGE_IMAGE_REPOSITORY: ${{ steps.meta.outputs.edge_image_repository }}
          FUGUE_APP_SSH_IMAGE_REPOSITORY: ${{ steps.meta.outputs.app_ssh_image_repository }}
        run: ./scripts/build_control_plane_images.sh

  deploy:
    needs:
      - release-baseline
      - release-gate
      - build
    if: ${{ always() && needs.release-baseline.result == 'success' && needs.release-gate.result == 'success' && needs.build.result == 'success' }}
    # The staged rollout needs room for backup/release coordination, bounded
    # rollback, and attribution upload. New budget env values are intentionally
    # harmless to the previous release script during the bootstrap deployment.
    timeout-minutes: 360
    runs-on:
      - self-hosted
      - linux
      - x64
      - fugue
      - control-plane
    environment: production
    steps:
      - name: Record deploy job budget origin
        run: echo "FUGUE_DEPLOY_JOB_STARTED_AT_EPOCH=$(date +%s)" >> "${GITHUB_ENV}"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Guard stateful component files
        env:
          FUGUE_RELEASE_CHANGED_FILES: ${{ needs.release-baseline.outputs.changed_files }}
        run: |
          forbidden_pattern='^deploy/helm/fugue/templates/(postgres-(deployment|service)|registry-(configmap|deployment|pvc|service)|headscale-.*|control-plane-postgres-.*|shared-workspace-.*|snapshot-controller)\.yaml$'
          if printf '%s\n' "${FUGUE_RELEASE_CHANGED_FILES}" | grep -E "${forbidden_pattern}" >/dev/null; then
            echo "stateful component manifests changed since the live release:"
            printf '%s\n' "${FUGUE_RELEASE_CHANGED_FILES}" | grep -E "${forbidden_pattern}" || true
            echo "control-plane auto deploy refuses postgres/registry/headscale changes; use an independent controlled release window"
            exit 1
          fi

      - name: Prepare authoritative DNS DiG runtime
        run: ./scripts/prepare_authoritative_dns_dig.sh

      - name: Verify local deploy prerequisites
        run: |
          command -v helm
          command -v curl
          command -v dig
          [[ "$(command -v dig)" == "${FUGUE_AUTHORITATIVE_DNS_DIG_PREPARED_BIN}" ]]
          dig -v
          if command -v kubectl >/dev/null 2>&1; then
            kubectl version --client
          else
            k3s kubectl version --client
          fi

      - name: Explain runner and fail closed target
        env:
          FUGUE_RELEASE_NAME: ${{ vars.FUGUE_RELEASE_NAME || 'fugue' }}
          FUGUE_NAMESPACE: ${{ vars.FUGUE_NAMESPACE || 'fugue-system' }}
          FUGUE_IMAGE_TAG: ${{ needs.build.outputs.image_tag || github.sha }}
          FUGUE_IMAGE_TARGETS: ${{ needs.build.outputs.image_targets || '' }}
          FUGUE_RELEASE_CHANGED_FILES: ${{ needs.release-baseline.outputs.changed_files }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/fugue-release"
          if command -v kubectl >/dev/null 2>&1; then
            KUBECTL=kubectl
          else
            KUBECTL="k3s kubectl"
          fi
          {
            echo "workflow=deploy-control-plane.yml"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "runner_name=${RUNNER_NAME}"
            echo "runner_os=${RUNNER_OS}"
            echo "runner_arch=${RUNNER_ARCH}"
            echo "repository=${GITHUB_REPOSITORY}"
            echo "commit=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF}"
            echo "release_name=${FUGUE_RELEASE_NAME}"
            echo "namespace=${FUGUE_NAMESPACE}"
            echo "image_tag=${FUGUE_IMAGE_TAG}"
            echo "image_targets=${FUGUE_IMAGE_TARGETS}"
            echo "kubectl=$(${KUBECTL} version --client 2>&1 | tr '\n' ';')"
            echo "helm=$(helm version --short 2>&1)"
          } > "${RUNNER_TEMP}/fugue-release/attribution.env"
          if ! ${KUBECTL} config current-context >> "${RUNNER_TEMP}/fugue-release/target-cluster.txt" 2>&1; then
            echo "Kubernetes context unavailable; fail closed before control-plane deploy" >&2
            exit 1
          fi
          if ! ${KUBECTL} get --raw=/readyz?verbose > "${RUNNER_TEMP}/fugue-release/kubernetes-readyz.txt" 2>&1; then
            echo "Kubernetes API /readyz failed; fail closed before control-plane deploy" >&2
            cat "${RUNNER_TEMP}/fugue-release/kubernetes-readyz.txt" >&2 || true
            exit 1
          fi
          if helm plugin list 2>/dev/null | grep -q '^diff[[:space:]]'; then
            echo "helm_diff=available" >> "${RUNNER_TEMP}/fugue-release/attribution.env"
          else
            echo "helm_diff=not_installed; upgrade script records kubectl/resource diffs where supported" >> "${RUNNER_TEMP}/fugue-release/attribution.env"
          fi
          printf '%s\n' "${FUGUE_RELEASE_CHANGED_FILES}" > "${RUNNER_TEMP}/fugue-release/changed-files.txt"

      - name: Resolve live image metadata
        id: live_images
        env:
          FUGUE_RELEASE_NAME: ${{ vars.FUGUE_RELEASE_NAME || 'fugue' }}
          FUGUE_NAMESPACE: ${{ vars.FUGUE_NAMESPACE || 'fugue-system' }}
          FUGUE_RELEASE_FULLNAME: ${{ vars.FUGUE_RELEASE_FULLNAME || 'fugue-fugue' }}
          FUGUE_IMAGE_TAG: ${{ needs.build.outputs.image_tag || github.sha }}
          FUGUE_API_IMAGE_REPOSITORY: ${{ needs.build.outputs.api_image_repository || format('ghcr.io/{0}/fugue-api', github.repository_owner) }}
          FUGUE_CONTROLLER_IMAGE_REPOSITORY: ${{ needs.build.outputs.controller_image_repository || format('ghcr.io/{0}/fugue-controller', github.repository_owner) }}
          FUGUE_DRAIN_AGENT_IMAGE_REPOSITORY: ${{ needs.build.outputs.drain_agent_image_repository || format('ghcr.io/{0}/fugue-drain-agent', github.repository_owner) }}
          FUGUE_TELEMETRY_AGENT_IMAGE_REPOSITORY: ${{ needs.build.outputs.telemetry_agent_image_repository || format('ghcr.io/{0}/fugue-telemetry-agent', github.repository_owner) }}
          FUGUE_IMAGE_CACHE_IMAGE_REPOSITORY: ${{ needs.build.outputs.image_cache_image_repository || format('ghcr.io/{0}/fugue-image-cache', github.repository_owner) }}
          FUGUE_EDGE_IMAGE_REPOSITORY: ${{ needs.build.outputs.edge_image_repository || format('ghcr.io/{0}/fugue-edge', github.repository_owner) }}
        run: ./scripts/resolve_control_plane_live_images.sh

      - name: Prove explicitly authorized stale pre-Helm release recovery
        if: ${{ vars.FUGUE_CONTROL_PLANE_STALE_RELEASE_RECOVERY_MODE != '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RECOVERY_MODE: ${{ vars.FUGUE_CONTROL_PLANE_STALE_RELEASE_RECOVERY_MODE }}
          RECOVERY_EXPECTED_HOLDER: ${{ vars.FUGUE_CONTROL_PLANE_STALE_RELEASE_RECOVERY_EXPECTED_HOLDER }}
          RECOVERY_EXPECTED_HEAD_SHA: ${{ vars.FUGUE_CONTROL_PLANE_STALE_RELEASE_RECOVERY_EXPECTED_HEAD_SHA }}
          RECOVERY_EXPECTED_SCRIPT_BLOB: ${{ vars.FUGUE_CONTROL_PLANE_STALE_RELEASE_RECOVERY_EXPECTED_SCRIPT_BLOB }}
          RECOVERY_EXPECTED_HELM_REVISION: ${{ vars.FUGUE_CONTROL_PLANE_STALE_RELEASE_RECOVERY_EXPECTED_HELM_REVISION }}
          RECOVERY_EXPECTED_FAILURE: ${{ vars.FUGUE_CONTROL_PLANE_STALE_RELEASE_RECOVERY_EXPECTED_FAILURE }}
          FUGUE_RELEASE_NAME: ${{ vars.FUGUE_RELEASE_NAME || 'fugue' }}
          FUGUE_NAMESPACE: ${{ vars.FUGUE_NAMESPACE || 'fugue-system' }}
        run: |
          set -euo pipefail
          python3 ./scripts/verify_stale_release_recovery.py \
            --mode "${RECOVERY_MODE}" \
            --repository "${GITHUB_REPOSITORY}" \
            --api-url "${GITHUB_API_URL}" \
            --workflow-path ".github/workflows/deploy-control-plane.yml" \
            --runner-name "${RUNNER_NAME}" \
            --current-run-id "${GITHUB_RUN_ID}" \
            --current-run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --current-head-sha "${GITHUB_SHA}" \
            --expected-holder "${RECOVERY_EXPECTED_HOLDER}" \
            --expected-head-sha "${RECOVERY_EXPECTED_HEAD_SHA}" \
            --expected-script-blob "${RECOVERY_EXPECTED_SCRIPT_BLOB}" \
            --expected-helm-revision "${RECOVERY_EXPECTED_HELM_REVISION}" \
            --expected-failure "${RECOVERY_EXPECTED_FAILURE}" \
            --release-name "${FUGUE_RELEASE_NAME}" \
            --namespace "${FUGUE_NAMESPACE}" \
            --output "${RUNNER_TEMP}/fugue-stale-release-recovery-proof.json"

      - name: Upgrade Fugue control plane
        # Edge fan-out now happens inside the upgrade script using the
        # control-plane automation secret, so the workflow only needs one
        # deploy entrypoint.
        env:
          FUGUE_RELEASE_NAME: ${{ vars.FUGUE_RELEASE_NAME || 'fugue' }}
          FUGUE_NAMESPACE: ${{ vars.FUGUE_NAMESPACE || 'fugue-system' }}
          FUGUE_RELEASE_FULLNAME: ${{ vars.FUGUE_RELEASE_FULLNAME || 'fugue-fugue' }}
          FUGUE_API_KEY: ${{ secrets.FUGUE_API_KEY || '' }}
          FUGUE_API_PUBLIC_DOMAIN: ${{ vars.FUGUE_API_PUBLIC_DOMAIN || '' }}
          FUGUE_APP_BASE_DOMAIN: ${{ vars.FUGUE_APP_BASE_DOMAIN || '' }}
          FUGUE_API_DATABASE_URL: ${{ secrets.FUGUE_API_DATABASE_URL || '' }}
          FUGUE_POSTGRES_ENABLED: ${{ vars.FUGUE_POSTGRES_ENABLED || (vars.FUGUE_CONTROL_PLANE_POSTGRES_USE_FOR_API == 'true' && 'false' || 'true') }}
          FUGUE_CONTROL_PLANE_POSTGRES_ENABLED: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_ENABLED || 'false' }}
          FUGUE_CONTROL_PLANE_POSTGRES_USE_FOR_API: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_USE_FOR_API || 'false' }}
          FUGUE_CONTROL_PLANE_POSTGRES_NAME: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_NAME || '' }}
          FUGUE_CONTROL_PLANE_POSTGRES_IMAGE_NAME: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_IMAGE_NAME || '' }}
          FUGUE_CONTROL_PLANE_POSTGRES_INSTANCES: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_INSTANCES || '3' }}
          FUGUE_CONTROL_PLANE_POSTGRES_STORAGE_SIZE: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_STORAGE_SIZE || '10Gi' }}
          FUGUE_CONTROL_PLANE_POSTGRES_STORAGE_CLASS: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_STORAGE_CLASS || '' }}
          FUGUE_CONTROL_PLANE_POSTGRES_EXISTING_SECRET_NAME: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_EXISTING_SECRET_NAME || '' }}
          FUGUE_CONTROL_PLANE_POSTGRES_BOOTSTRAP_SOURCE_URL: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_BOOTSTRAP_SOURCE_URL || '' }}
          FUGUE_CONTROL_PLANE_SINGLETONS_ENABLED: ${{ vars.FUGUE_CONTROL_PLANE_SINGLETONS_ENABLED || 'false' }}
          FUGUE_CONTROL_PLANE_SINGLETON_NODE_SELECTOR: ${{ vars.FUGUE_CONTROL_PLANE_SINGLETON_NODE_SELECTOR || '' }}
          FUGUE_SHARED_WORKSPACE_STORAGE_ENABLED: ${{ vars.FUGUE_SHARED_WORKSPACE_STORAGE_ENABLED || 'false' }}
          FUGUE_SHARED_WORKSPACE_STORAGE_CLASS: ${{ vars.FUGUE_SHARED_WORKSPACE_STORAGE_CLASS || 'fugue-rwx' }}
          FUGUE_SHARED_WORKSPACE_NFS_CLUSTER_IP: ${{ vars.FUGUE_SHARED_WORKSPACE_NFS_CLUSTER_IP || '' }}
          FUGUE_CONTROL_PLANE_KUBE_API_FALLBACK_SERVERS: ${{ vars.FUGUE_CONTROL_PLANE_KUBE_API_FALLBACK_SERVERS || '' }}
          FUGUE_CLUSTER_JOIN_SERVER_FALLBACKS: ${{ vars.FUGUE_CLUSTER_JOIN_SERVER_FALLBACKS || '' }}
          FUGUE_CLUSTER_JOIN_K3S_VERSION: ${{ vars.FUGUE_CLUSTER_JOIN_K3S_VERSION || '' }}
          FUGUE_CLUSTER_JOIN_MESH_PROVIDER: ${{ vars.FUGUE_CLUSTER_JOIN_MESH_PROVIDER || '' }}
          FUGUE_CLUSTER_JOIN_MESH_LOGIN_SERVER: ${{ vars.FUGUE_CLUSTER_JOIN_MESH_LOGIN_SERVER || '' }}
          FUGUE_CLUSTER_JOIN_MESH_AUTH_KEY: ${{ secrets.FUGUE_CLUSTER_JOIN_MESH_AUTH_KEY || '' }}
          FUGUE_IMAGE_STORE_MODE: ${{ vars.FUGUE_IMAGE_STORE_MODE || 'distributed' }}
          FUGUE_IMAGE_STORE_MIN_REPLICAS: ${{ vars.FUGUE_IMAGE_STORE_MIN_REPLICAS || '1' }}
          FUGUE_IMAGE_STORE_TARGET_REPLICAS: ${{ vars.FUGUE_IMAGE_STORE_TARGET_REPLICAS || '1' }}
