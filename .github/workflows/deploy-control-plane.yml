name: deploy-control-plane

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-control-plane.yml'
      - 'assets/**'
      - 'cmd/fugue-api/**'
      - 'cmd/fugue-controller/**'
      - 'cmd/fugue-edge/**'
      - 'cmd/fugue-dns/**'
      - 'internal/**'
      - 'deploy/helm/fugue/charts/**'
      - 'deploy/helm/fugue/crds/**'
      - 'deploy/helm/fugue/Chart.yaml'
      - 'deploy/helm/fugue/values-production-ha.yaml'
      - 'deploy/helm/fugue/values.yaml'
      - 'deploy/helm/fugue/templates/**'
      - 'Dockerfile.api'
      - 'Dockerfile.controller'
      - 'Dockerfile.edge'
      - 'go.mod'
      - 'go.sum'
      - 'scripts/export_cloudflare_zone_static_records.sh'
      - 'scripts/install_fugue_ha.sh'
      - 'scripts/issue_fugue_app_wildcard_tls.sh'
      - 'scripts/render_fugue_edge_systemd_unit.sh'
      - 'scripts/sync_fugue_edge_proxy.sh'
      - 'scripts/upgrade_fugue_control_plane.sh'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: fugue-control-plane-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      api_image_repository: ${{ steps.meta.outputs.api_image_repository }}
      controller_image_repository: ${{ steps.meta.outputs.controller_image_repository }}
      edge_image_repository: ${{ steps.meta.outputs.edge_image_repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Compute image metadata
        id: meta
        run: |
          owner_lc="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "image_tag=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "api_image_repository=ghcr.io/${owner_lc}/fugue-api" >> "${GITHUB_OUTPUT}"
          echo "controller_image_repository=ghcr.io/${owner_lc}/fugue-controller" >> "${GITHUB_OUTPUT}"
          echo "edge_image_repository=ghcr.io/${owner_lc}/fugue-edge" >> "${GITHUB_OUTPUT}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push fugue-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: |
            ${{ steps.meta.outputs.api_image_repository }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push fugue-controller
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.controller
          push: true
          tags: |
            ${{ steps.meta.outputs.controller_image_repository }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push fugue-edge
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.edge
          push: true
          tags: |
            ${{ steps.meta.outputs.edge_image_repository }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on:
      - self-hosted
      - linux
      - x64
      - fugue
      - control-plane
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard stateful component files
        if: github.event_name == 'push'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          if [[ -z "${BEFORE_SHA}" || "${BEFORE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
            echo "skip stateful-file guard on initial push"
            exit 0
          fi
          changed_files="$(git diff --name-only "${BEFORE_SHA}" "${AFTER_SHA}")"
          forbidden_pattern='^deploy/helm/fugue/templates/(postgres-(deployment|service)|registry-(deployment|service)|headscale-(deployment|service)|headscale-config)\.yaml$'
          if printf '%s\n' "${changed_files}" | grep -E "${forbidden_pattern}" >/dev/null; then
            echo "stateful component manifests changed in this push:"
            printf '%s\n' "${changed_files}" | grep -E "${forbidden_pattern}" || true
            echo "control-plane auto deploy refuses postgres/registry/headscale changes; ship those with a manual release"
            exit 1
          fi

      - name: Verify local deploy prerequisites
        run: |
          command -v helm
          command -v curl
          if command -v kubectl >/dev/null 2>&1; then
            kubectl version --client
          else
            k3s kubectl version --client
          fi

      - name: Upgrade Fugue control plane
        # Edge fan-out now happens inside the upgrade script using the
        # control-plane automation secret, so the workflow only needs one
        # deploy entrypoint.
        env:
          FUGUE_RELEASE_NAME: ${{ vars.FUGUE_RELEASE_NAME || 'fugue' }}
          FUGUE_NAMESPACE: ${{ vars.FUGUE_NAMESPACE || 'fugue-system' }}
          FUGUE_RELEASE_FULLNAME: ${{ vars.FUGUE_RELEASE_FULLNAME || 'fugue-fugue' }}
          FUGUE_API_PUBLIC_DOMAIN: ${{ vars.FUGUE_API_PUBLIC_DOMAIN || 'api.fugue.pro' }}
          FUGUE_APP_BASE_DOMAIN: ${{ vars.FUGUE_APP_BASE_DOMAIN || 'fugue.pro' }}
          FUGUE_API_DATABASE_URL: ${{ secrets.FUGUE_API_DATABASE_URL || '' }}
          FUGUE_POSTGRES_ENABLED: ${{ vars.FUGUE_POSTGRES_ENABLED || (vars.FUGUE_CONTROL_PLANE_POSTGRES_USE_FOR_API == 'true' && 'false' || 'true') }}
          FUGUE_CONTROL_PLANE_POSTGRES_ENABLED: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_ENABLED || 'false' }}
          FUGUE_CONTROL_PLANE_POSTGRES_USE_FOR_API: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_USE_FOR_API || 'false' }}
          FUGUE_CONTROL_PLANE_POSTGRES_NAME: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_NAME || '' }}
          FUGUE_CONTROL_PLANE_POSTGRES_IMAGE_NAME: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_IMAGE_NAME || '' }}
          FUGUE_CONTROL_PLANE_POSTGRES_INSTANCES: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_INSTANCES || '3' }}
          FUGUE_CONTROL_PLANE_POSTGRES_STORAGE_SIZE: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_STORAGE_SIZE || '10Gi' }}
          FUGUE_CONTROL_PLANE_POSTGRES_STORAGE_CLASS: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_STORAGE_CLASS || '' }}
          FUGUE_CONTROL_PLANE_POSTGRES_EXISTING_SECRET_NAME: ${{ vars.FUGUE_CONTROL_PLANE_POSTGRES_EXISTING_SECRET_NAME || '' }}
          FUGUE_CONTROL_PLANE_SINGLETONS_ENABLED: ${{ vars.FUGUE_CONTROL_PLANE_SINGLETONS_ENABLED || 'false' }}
          FUGUE_CONTROL_PLANE_SINGLETON_NODE_SELECTOR: ${{ vars.FUGUE_CONTROL_PLANE_SINGLETON_NODE_SELECTOR || '' }}
          FUGUE_CONTROL_PLANE_KUBE_API_FALLBACK_SERVERS: ${{ vars.FUGUE_CONTROL_PLANE_KUBE_API_FALLBACK_SERVERS || 'https://100.64.0.2:6443,https://100.64.0.3:6443' }}
          FUGUE_CONTROL_PLANE_AUTOMATION_SECRET_NAME: ${{ vars.FUGUE_CONTROL_PLANE_AUTOMATION_SECRET_NAME || '' }}
          FUGUE_SYNC_EDGE_PROXY: ${{ vars.FUGUE_SYNC_EDGE_PROXY || 'false' }}
          FUGUE_SMOKE_URL: ${{ vars.FUGUE_SMOKE_URL || '' }}
          FUGUE_API_IMAGE_REPOSITORY: ${{ needs.build.outputs.api_image_repository }}
          FUGUE_API_IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          FUGUE_CONTROLLER_IMAGE_REPOSITORY: ${{ needs.build.outputs.controller_image_repository }}
          FUGUE_CONTROLLER_IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          FUGUE_EDGE_IMAGE_REPOSITORY: ${{ needs.build.outputs.edge_image_repository }}
          FUGUE_EDGE_IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          FUGUE_EDGE_GROUP_ID: ${{ vars.FUGUE_EDGE_GROUP_ID || 'edge-group-country-us' }}
          FUGUE_EDGE_REGION: ${{ vars.FUGUE_EDGE_REGION || '' }}
          FUGUE_EDGE_COUNTRY: ${{ vars.FUGUE_EDGE_COUNTRY || '' }}
          FUGUE_EDGE_PUBLIC_HOSTNAME: ${{ vars.FUGUE_EDGE_PUBLIC_HOSTNAME || '' }}
          FUGUE_EDGE_PUBLIC_IPV4: ${{ vars.FUGUE_EDGE_PUBLIC_IPV4 || '' }}
          FUGUE_EDGE_PUBLIC_IPV6: ${{ vars.FUGUE_EDGE_PUBLIC_IPV6 || '' }}
          FUGUE_EDGE_MESH_IP: ${{ vars.FUGUE_EDGE_MESH_IP || '' }}
          FUGUE_EDGE_CADDY_ENABLED: ${{ vars.FUGUE_EDGE_CADDY_ENABLED || 'true' }}
          FUGUE_EDGE_CADDY_LISTEN_ADDR: ${{ vars.FUGUE_EDGE_CADDY_LISTEN_ADDR || ':18443' }}
          FUGUE_EDGE_CADDY_TLS_MODE: ${{ vars.FUGUE_EDGE_CADDY_TLS_MODE || 'internal' }}
          FUGUE_EDGE_CADDY_PUBLIC_HOSTPORTS_ENABLED: ${{ vars.FUGUE_EDGE_CADDY_PUBLIC_HOSTPORTS_ENABLED || 'false' }}
          FUGUE_EDGE_CADDY_PUBLIC_HOSTPORT_HTTP: ${{ vars.FUGUE_EDGE_CADDY_PUBLIC_HOSTPORT_HTTP || '80' }}
          FUGUE_EDGE_CADDY_PUBLIC_HOSTPORT_HTTPS: ${{ vars.FUGUE_EDGE_CADDY_PUBLIC_HOSTPORT_HTTPS || '443' }}
          FUGUE_EDGE_CADDY_STATIC_TLS_ENABLED: ${{ vars.FUGUE_EDGE_CADDY_STATIC_TLS_ENABLED || 'false' }}
          FUGUE_EDGE_CADDY_STATIC_TLS_SECRET_NAME: ${{ vars.FUGUE_EDGE_CADDY_STATIC_TLS_SECRET_NAME || '' }}
          FUGUE_EDGE_CADDY_STATIC_TLS_MOUNT_PATH: ${{ vars.FUGUE_EDGE_CADDY_STATIC_TLS_MOUNT_PATH || '/etc/caddy/static-tls' }}
          FUGUE_EDGE_CADDY_STATIC_TLS_CERTIFICATE_KEY: ${{ vars.FUGUE_EDGE_CADDY_STATIC_TLS_CERTIFICATE_KEY || 'tls.crt' }}
          FUGUE_EDGE_CADDY_STATIC_TLS_PRIVATE_KEY_KEY: ${{ vars.FUGUE_EDGE_CADDY_STATIC_TLS_PRIVATE_KEY_KEY || 'tls.key' }}
          FUGUE_EDGE_NODE_SELECTOR_COUNTRY_CODE: ${{ vars.FUGUE_EDGE_NODE_SELECTOR_COUNTRY_CODE || '' }}
          FUGUE_EDGE_EXTRA_GROUPS: ${{ vars.FUGUE_EDGE_EXTRA_GROUPS || '' }}
          FUGUE_DNS_ENABLED: ${{ vars.FUGUE_DNS_ENABLED || 'false' }}
          FUGUE_DNS_ANSWER_IPS: ${{ vars.FUGUE_DNS_ANSWER_IPS || '' }}
          FUGUE_DNS_ROUTE_A_ANSWER_IPS: ${{ vars.FUGUE_DNS_ROUTE_A_ANSWER_IPS || '' }}
          FUGUE_DNS_STATIC_RECORDS_JSON: ${{ vars.FUGUE_DNS_STATIC_RECORDS_JSON || '' }}
          FUGUE_PLATFORM_ROUTES_JSON: ${{ vars.FUGUE_PLATFORM_ROUTES_JSON || '' }}
          FUGUE_DNS_NODE_SELECTOR_COUNTRY_CODE: ${{ vars.FUGUE_DNS_NODE_SELECTOR_COUNTRY_CODE || '' }}
          FUGUE_DNS_EXTRA_GROUPS: ${{ vars.FUGUE_DNS_EXTRA_GROUPS || '' }}
          FUGUE_DNS_NAMESERVERS: ${{ vars.FUGUE_DNS_NAMESERVERS || '' }}
          FUGUE_DNS_PUBLIC_HOSTPORTS_ENABLED: ${{ vars.FUGUE_DNS_PUBLIC_HOSTPORTS_ENABLED || 'false' }}
          FUGUE_DNS_UDP_ADDR: ${{ vars.FUGUE_DNS_UDP_ADDR || '' }}
          FUGUE_DNS_TCP_ADDR: ${{ vars.FUGUE_DNS_TCP_ADDR || '' }}
          FUGUE_DNS_ZONE: ${{ vars.FUGUE_DNS_ZONE || '' }}
          FUGUE_DNS_TTL: ${{ vars.FUGUE_DNS_TTL || '' }}
        run: ./scripts/upgrade_fugue_control_plane.sh
