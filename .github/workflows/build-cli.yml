name: build-cli

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-cli.yml'
      - 'cmd/fugue/**'
      - 'internal/cli/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'scripts/package_fugue_cli.sh'
      - 'scripts/install_fugue_cli.sh'
      - 'scripts/install_fugue_cli.ps1'
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Package fugue CLI archives
        run: ./scripts/package_fugue_cli.sh "${RUNNER_TEMP}/fugue-cli"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fugue-cli-dist
          path: ${{ runner.temp }}/fugue-cli/*
          if-no-files-found: error
