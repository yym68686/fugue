name: build-cli

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-cli.yml'
      - 'cmd/fugue/**'
      - 'internal/cli/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'scripts/package_fugue_cli.sh'
      - 'scripts/install_fugue_cli.sh'
      - 'scripts/install_fugue_cli.ps1'
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Setup Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v4.2.0

      - name: Run tests
        run: go test ./...

      - name: Package fugue CLI archives
        run: ./scripts/package_fugue_cli.sh "${RUNNER_TEMP}/fugue-cli"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fugue-cli-dist
          path: ${{ runner.temp }}/fugue-cli/*
          if-no-files-found: error
