name: recover-control-plane-release-policy

on:
  workflow_dispatch:
    inputs:
      expected_sha:
        description: Exact main commit authorized for release-policy recovery
        required: true
        type: string

permissions: {}

concurrency:
  group: fugue-production-cluster-mutation-v1
  cancel-in-progress: false

jobs:
  recovery-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      actions: read
      contents: read
    outputs:
      authorized_base_sha: ${{ steps.guard.outputs.authorized_base_sha }}
      authorized_target_sha: ${{ steps.guard.outputs.authorized_target_sha }}
      patch_digest: ${{ steps.guard.outputs.patch_digest }}
    steps:
      - name: Checkout exact recovery target without persisted credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Guard external authorization and exact recovery diff
        id: guard
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          AUTHORIZED_SHA: ${{ vars.FUGUE_CONTROL_PLANE_RELEASE_POLICY_RECOVERY_SHA }}
          AUTHORIZED_BASE_SHA: ${{ vars.FUGUE_CONTROL_PLANE_RELEASE_POLICY_RECOVERY_BASE_SHA }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          readonly baseline_ref='refs/tags/fugue-control-plane-release-baseline'
          readonly deploy_workflow='deploy-control-plane.yml'
          [[ "${GITHUB_REF}" == 'refs/heads/main' ]]
          [[ "${EXPECTED_SHA}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${AUTHORIZED_SHA}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${AUTHORIZED_BASE_SHA}" =~ ^[0-9a-f]{40}$ ]]
          target_sha="$(git rev-parse --verify 'HEAD^{commit}')"
          [[ "${target_sha}" == "${GITHUB_SHA}" ]]
          [[ "${target_sha}" == "${EXPECTED_SHA}" ]]
          [[ "${target_sha}" == "${AUTHORIZED_SHA}" ]]

          read -r target_commit target_parent extra <<<"$(git rev-list --parents -n 1 "${target_sha}")"
          [[ "${target_commit}" == "${target_sha}" ]]
          [[ -z "${extra:-}" ]]
          [[ "${target_parent}" == "${AUTHORIZED_BASE_SHA}" ]]

          remote_main="$(timeout --kill-after=2s 10s git ls-remote --refs --exit-code origin refs/heads/main)"
          read -r remote_main_object remote_main_ref extra <<<"${remote_main}"
          [[ -z "${extra:-}" ]]
          [[ "${remote_main_object}" == "${target_sha}" ]]
          [[ "${remote_main_ref}" == 'refs/heads/main' ]]

          remote_tag="$(timeout --kill-after=2s 10s git ls-remote --refs --exit-code origin "${baseline_ref}")"
          read -r baseline_ref_object baseline_remote_ref extra <<<"${remote_tag}"
          [[ -z "${extra:-}" ]]
          [[ "${baseline_ref_object}" == "${AUTHORIZED_BASE_SHA}" ]]
          [[ "${baseline_remote_ref}" == "${baseline_ref}" ]]

          mapfile -t actual_changes < <(git diff --no-renames --name-only "${AUTHORIZED_BASE_SHA}" "${target_sha}")
          expected_changes=(
            '.github/workflows/deploy-control-plane.yml'
            '.github/workflows/recover-control-plane-release-policy.yml'
            '.github/workflows/watch-control-plane-release-policy-recovery.yml'
            'docs/runbooks/release-policy-recovery.md'
            'scripts/recover_control_plane_release_baseline.py'
            'scripts/test_node_local_dns_release.sh'
            'scripts/test_release_domain_safety.sh'
            'scripts/test_release_policy_recovery_workflow.sh'
            'scripts/upgrade_fugue_control_plane.sh'
          )
          [[ "${#actual_changes[@]}" == "${#expected_changes[@]}" ]]
          for index in "${!expected_changes[@]}"; do
            [[ "${actual_changes[index]}" == "${expected_changes[index]}" ]]
          done
          git diff --check "${AUTHORIZED_BASE_SHA}" "${target_sha}"

          deploy_state="$(timeout --kill-after=2s 10s gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/${deploy_workflow}" --jq '.state')"
          [[ "${deploy_state}" == 'disabled_manually' ]]
          active_runs_file="$(mktemp)"
          trap 'rm -f "${active_runs_file}"' EXIT
          for status in queued in_progress requested waiting pending; do
            timeout --kill-after=2s 10s gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/${deploy_workflow}/runs?status=${status}&per_page=100" \
              --jq '.workflow_runs[].id' >>"${active_runs_file}"
          done
          sort -u "${active_runs_file}" -o "${active_runs_file}"
          [[ ! -s "${active_runs_file}" ]]

          patch_digest="sha256:$(git diff --binary "${AUTHORIZED_BASE_SHA}" "${target_sha}" | sha256sum | awk '{print $1}')"
          printf 'authorized_base_sha=%s\n' "${AUTHORIZED_BASE_SHA}" >>"${GITHUB_OUTPUT}"
          printf 'authorized_target_sha=%s\n' "${target_sha}" >>"${GITHUB_OUTPUT}"
          printf 'patch_digest=%s\n' "${patch_digest}" >>"${GITHUB_OUTPUT}"

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Setup Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v4.2.0

      - name: Verify recovery workflow and release safety contracts
        run: |
          make generate-openapi-check
          bash scripts/test_prepare_authoritative_dns_dig.sh
          bash scripts/test_release_domain_workflow.sh
          bash scripts/test_release_policy_recovery_workflow.sh
          bash scripts/test_release_domain_safety.sh
          FUGUE_REQUIRE_NODE_LOCAL_DNS_TEST_DOCKER=true bash scripts/test_node_local_dns_release.sh
          python3 scripts/test_verify_stale_release_recovery.py
          go test ./...

  advance-baseline:
    needs:
      - recovery-gate
    if: ${{ always() && needs.recovery-gate.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    permissions:
      actions: write
      contents: write
    steps:
      - name: Record writer deadline with compensation reserve
        if: ${{ !cancelled() && success() }}
        run: |
          set -euo pipefail
          started_at="$(date +%s)"
          [[ "${started_at}" =~ ^[1-9][0-9]*$ ]]
          printf 'RECOVERY_WRITER_DEADLINE_EPOCH=%s\n' "$((started_at + 2400))" >>"${GITHUB_ENV}"

      - name: Checkout exact recovery target with tag-write credentials
        if: ${{ !cancelled() && success() }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Revalidate authorization and quiesce duplicate recovery runs
        id: prewrite
        if: ${{ !cancelled() && success() }}
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          AUTHORIZED_SHA: ${{ vars.FUGUE_CONTROL_PLANE_RELEASE_POLICY_RECOVERY_SHA }}
          AUTHORIZED_BASE_SHA: ${{ vars.FUGUE_CONTROL_PLANE_RELEASE_POLICY_RECOVERY_BASE_SHA }}
          GATED_TARGET_SHA: ${{ needs.recovery-gate.outputs.authorized_target_sha }}
          GATED_BASE_SHA: ${{ needs.recovery-gate.outputs.authorized_base_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          readonly deploy_workflow='deploy-control-plane.yml'
          readonly recovery_workflow='recover-control-plane-release-policy.yml'
          [[ "${GITHUB_REF}" == 'refs/heads/main' ]]
          [[ "${EXPECTED_SHA}" == "${GITHUB_SHA}" ]]
          [[ "${AUTHORIZED_SHA}" == "${GITHUB_SHA}" ]]
          [[ "${GATED_TARGET_SHA}" == "${GITHUB_SHA}" ]]
          [[ "${AUTHORIZED_BASE_SHA}" == "${GATED_BASE_SHA}" ]]
          [[ "$(git rev-parse --verify 'HEAD^{commit}')" == "${GITHUB_SHA}" ]]

          deploy_state="$(timeout --kill-after=2s 10s gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/${deploy_workflow}" --jq '.state')"
          [[ "${deploy_state}" == 'disabled_manually' ]]

          recovery_state=''
          for attempt in 1 2 3 4 5; do
            timeout --kill-after=2s 10s gh api --method PUT \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/${recovery_workflow}/disable" >/dev/null 2>&1 || true
            recovery_state="$(timeout --kill-after=2s 10s gh api \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/${recovery_workflow}" --jq '.state' 2>/dev/null || true)"
            [[ "${recovery_state}" == 'disabled_manually' ]] && break
            sleep 2
          done
          [[ "${recovery_state}" == 'disabled_manually' ]]

          pending_runs() {
            local workflow="$1"
            local status=""
            local inventory=""
            inventory="$(mktemp)"
            for status in queued in_progress requested waiting pending; do
              if ! timeout --kill-after=2s 10s gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/runs?status=${status}&per_page=100" \
                --jq '.workflow_runs[].id' >>"${inventory}"; then
                rm -f "${inventory}"
                return 1
              fi
            done
            awk -v current="${GITHUB_RUN_ID}" '$0 != current' "${inventory}" | sort -u
            rm -f "${inventory}"
          }
          cancel_recovery_runs() {
            local run_id=""
            while IFS= read -r run_id; do
              [[ -n "${run_id}" ]] || continue
              timeout --kill-after=2s 10s gh api --method POST \
                "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/cancel" >/dev/null 2>&1 || true
            done < <(pending_runs "${recovery_workflow}")
          }

          deploy_runs="$(pending_runs "${deploy_workflow}")"
          [[ -z "${deploy_runs}" ]]
          remaining="$(pending_runs "${recovery_workflow}")"
          for attempt in 1 2 3 4 5; do
            [[ -z "${remaining}" ]] && break
            cancel_recovery_runs
            sleep 2
            remaining="$(pending_runs "${recovery_workflow}")"
          done
          [[ -z "${remaining}" ]]

          # A workflow_run watchdog is asynchronous. Before the first tag write,
          # independently latch every earlier attempt for this exact authorized
          # SHA: only completed/success attempts are admissible. A rerun keeps
          # its run_id/run_number, so its lower run_attempt values are queried
          # explicitly instead of trusting only the latest list result.
          [[ "${GITHUB_RUN_ID}" =~ ^[1-9][0-9]*$ ]]
          [[ "${GITHUB_RUN_NUMBER}" =~ ^[1-9][0-9]*$ ]]
          [[ "${GITHUB_RUN_ATTEMPT}" =~ ^[1-9][0-9]*$ ]]
          history_evidence_dir="${RUNNER_TEMP}/fugue-release-policy-recovery"
          install -d -m 0700 "${history_evidence_dir}"
          prior_attempt_rows="${history_evidence_dir}/prior-recovery-attempts.tsv"
          : >"${prior_attempt_rows}"
          history_url="repos/${GITHUB_REPOSITORY}/actions/workflows/${recovery_workflow}/runs?branch=main&event=workflow_dispatch&head_sha=${GITHUB_SHA}&per_page=100"
          history_total_count="$(timeout --kill-after=2s 10s gh api "${history_url}" --jq '.total_count')"
          [[ "${history_total_count}" =~ ^[1-9][0-9]*$ ]]
          if (( history_total_count > 20 )); then
            echo "too many exact-SHA recovery runs to prove the historical failure latch: total=${history_total_count}" >&2
            exit 1
          fi
          prior_runs_file="$(mktemp)"
          if ! timeout --kill-after=2s 10s gh api --paginate \
            "${history_url}" \
            --jq '.workflow_runs[] | [.id, .run_number, .run_attempt, .head_sha, .status, (.conclusion // "none")] | map(tostring) | join("|")' \
            >"${prior_runs_file}"; then
            rm -f "${prior_runs_file}"
            echo "could not enumerate recovery history before the tag write" >&2
            exit 1
          fi
          observed_run_count="$(awk 'NF { count++ } END { print count + 0 }' "${prior_runs_file}")"
          observed_unique_run_count="$(awk -F'|' 'NF { seen[$1] = 1 } END { print length(seen) + 0 }' "${prior_runs_file}")"
          [[ "${observed_run_count}" == "${history_total_count}" ]]
          [[ "${observed_unique_run_count}" == "${history_total_count}" ]]
          current_run_observed=0
          exact_run_count=0
          verified_prior_attempts=0
          while IFS='|' read -r run_id run_number run_attempt head_sha run_status run_conclusion extra; do
            [[ -n "${run_id}" ]] || continue
            [[ -z "${extra:-}" ]]
            [[ "${run_id}" =~ ^[1-9][0-9]*$ ]]
            [[ "${run_number}" =~ ^[1-9][0-9]*$ ]]
            [[ "${run_attempt}" =~ ^[1-9][0-9]*$ ]]
            [[ "${head_sha}" =~ ^[0-9a-f]{40}$ ]]
            [[ -n "${run_status}" && -n "${run_conclusion}" ]]
            [[ "${head_sha}" == "${GITHUB_SHA}" ]]
            exact_run_count=$((exact_run_count + 1))
            if [[ "${run_id}" == "${GITHUB_RUN_ID}" ]]; then
              [[ "${run_number}" == "${GITHUB_RUN_NUMBER}" ]]
              [[ "${run_attempt}" == "${GITHUB_RUN_ATTEMPT}" ]]
              current_run_observed=$((current_run_observed + 1))
              prior_attempt_limit=$((GITHUB_RUN_ATTEMPT - 1))
            else
              [[ "${run_number}" != "${GITHUB_RUN_NUMBER}" ]]
              prior_attempt_limit="${run_attempt}"
            fi
            for ((attempt_number = 1; attempt_number <= prior_attempt_limit; attempt_number++)); do
              verified_prior_attempts=$((verified_prior_attempts + 1))
              if (( verified_prior_attempts > 20 )); then
                rm -f "${prior_runs_file}"
                echo "too many prior recovery attempts to prove the historical failure latch" >&2
                exit 1
              fi
              attempt_row="$(timeout --kill-after=2s 10s gh api \
                "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/attempts/${attempt_number}" \
                --jq '[.id, .run_number, .run_attempt, .head_sha, .status, (.conclusion // "none")] | map(tostring) | join("|")')"
              IFS='|' read -r observed_id observed_number observed_attempt observed_sha observed_status observed_conclusion observed_extra <<<"${attempt_row}"
              [[ -z "${observed_extra:-}" ]]
              [[ "${observed_id}" == "${run_id}" ]]
              [[ "${observed_number}" == "${run_number}" ]]
              [[ "${observed_attempt}" == "${attempt_number}" ]]
              [[ "${observed_sha}" == "${GITHUB_SHA}" ]]
              printf '%s|%s|%s|%s|%s|%s\n' \
                "${observed_id}" "${observed_number}" "${observed_attempt}" \
                "${observed_sha}" "${observed_status}" "${observed_conclusion}" \
                >>"${prior_attempt_rows}"
              if [[ "${observed_status}" != 'completed' || "${observed_conclusion}" != 'success' ]]; then
                rm -f "${prior_runs_file}"
                echo "historical recovery failure latch is set: run=${run_id} attempt=${attempt_number} status=${observed_status} conclusion=${observed_conclusion}" >&2
                exit 1
              fi
            done
          done <"${prior_runs_file}"
          rm -f "${prior_runs_file}"
          [[ "${exact_run_count}" == "${history_total_count}" ]]
          [[ "${current_run_observed}" == '1' ]]
          LC_ALL=C sort -t '|' -k2,2n -k3,3n -o "${prior_attempt_rows}" "${prior_attempt_rows}"
          prior_attempt_digest="sha256:$(sha256sum "${prior_attempt_rows}" | awk '{print $1}')"
          printf 'RECOVERY_PRIOR_ATTEMPTS_VERIFIED=%s\n' "${verified_prior_attempts}" >>"${GITHUB_ENV}"
          printf 'RECOVERY_PRIOR_ATTEMPTS_DIGEST=%s\n' "${prior_attempt_digest}" >>"${GITHUB_ENV}"

          remote_main="$(timeout --kill-after=2s 10s git ls-remote --refs --exit-code origin refs/heads/main)"
          [[ "${remote_main}" == "${GITHUB_SHA}"$'\t''refs/heads/main' ]]
          now="$(date +%s)"
          if (( RECOVERY_WRITER_DEADLINE_EPOCH - now < 1500 )); then
            echo "insufficient writer budget for exact tag transaction, quiescence, evidence, and compensation" >&2
            exit 1
          fi

      - name: Advance, rollback, and re-advance dedicated release baseline
        id: transaction
        if: ${{ !cancelled() && success() }}
        env:
          BASE_SHA: ${{ needs.recovery-gate.outputs.authorized_base_sha }}
          TARGET_SHA: ${{ needs.recovery-gate.outputs.authorized_target_sha }}
        run: |
          set -euo pipefail
          evidence_dir="${RUNNER_TEMP}/fugue-release-policy-recovery"
          install -d -m 0700 "${evidence_dir}"
          python3 scripts/recover_control_plane_release_baseline.py transact \
            --base-sha "${BASE_SHA}" \
            --target-sha "${TARGET_SHA}" \
            --evidence "${evidence_dir}/baseline-transaction.json" \
            --timeout-seconds 20

      - name: Upload baseline transaction evidence
        id: transaction_evidence_upload
        if: ${{ always() && !cancelled() }}
        timeout-minutes: 5
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fugue-control-plane-release-policy-transaction-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/fugue-release-policy-recovery/baseline-transaction.json
          if-no-files-found: error
          retention-days: 90

      - name: Require successful transaction evidence
        id: transaction_evidence_required
        if: ${{ !cancelled() && steps.transaction.outcome == 'success' && steps.transaction_evidence_upload.outcome != 'success' }}
        run: |
          echo "the successful baseline transaction was not durably uploaded" >&2
          exit 1

      - name: Disable recovery lane and prove final quiescence
        id: quiesce
        if: ${{ !cancelled() && success() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          readonly deploy_workflow='deploy-control-plane.yml'
          readonly recovery_workflow='recover-control-plane-release-policy.yml'
          now="$(date +%s)"
          if (( RECOVERY_WRITER_DEADLINE_EPOCH - now < 1100 )); then
            echo "insufficient writer budget for post-transaction quiescence and compensation" >&2
            exit 1
          fi

          state=""
          for attempt in 1 2 3 4 5; do
            timeout --kill-after=2s 10s gh api --method PUT \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/${recovery_workflow}/disable" >/dev/null 2>&1 || true
            state="$(timeout --kill-after=2s 10s gh api \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/${recovery_workflow}" --jq '.state' 2>/dev/null || true)"
            [[ "${state}" == 'disabled_manually' ]] && break
            sleep 2
          done
          [[ "${state}" == 'disabled_manually' ]]

          pending_runs() {
            local workflow="$1"
            local status=""
            local inventory=""
            inventory="$(mktemp)"
            for status in queued in_progress requested waiting pending; do
              if ! timeout --kill-after=2s 10s gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/runs?status=${status}&per_page=100" \
                --jq '.workflow_runs[].id' >>"${inventory}"; then
                rm -f "${inventory}"
                return 1
              fi
            done
            awk -v current="${GITHUB_RUN_ID}" '$0 != current' "${inventory}" | sort -u
            rm -f "${inventory}"
          }
          cancel_recovery_runs() {
            local run_id=""
            while IFS= read -r run_id; do
              [[ -n "${run_id}" ]] || continue
              timeout --kill-after=2s 10s gh api --method POST \
                "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/cancel" >/dev/null 2>&1 || true
            done < <(pending_runs "${recovery_workflow}")
          }
          remaining="$(pending_runs "${recovery_workflow}")"
          for attempt in 1 2 3 4 5; do
            [[ -z "${remaining}" ]] && break
            cancel_recovery_runs
            sleep 2
            remaining="$(pending_runs "${recovery_workflow}")"
          done
          [[ -z "${remaining}" ]]
          deploy_remaining="$(pending_runs "${deploy_workflow}")"
          [[ -z "${deploy_remaining}" ]]
          [[ "$(timeout --kill-after=2s 10s gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/${deploy_workflow}" --jq '.state')" == 'disabled_manually' ]]
          [[ "$(timeout --kill-after=2s 10s git ls-remote --refs --exit-code origin refs/heads/main)" == "${GITHUB_SHA}"$'\t''refs/heads/main' ]]
          [[ "$(timeout --kill-after=2s 10s git ls-remote --refs --exit-code origin refs/tags/fugue-control-plane-release-baseline)" == "${GITHUB_SHA}"$'\t''refs/tags/fugue-control-plane-release-baseline' ]]

      - name: Write recovery context evidence
        id: context
        if: ${{ !cancelled() && success() }}
        env:
          BASE_SHA: ${{ needs.recovery-gate.outputs.authorized_base_sha }}
          TARGET_SHA: ${{ needs.recovery-gate.outputs.authorized_target_sha }}
          PATCH_DIGEST: ${{ needs.recovery-gate.outputs.patch_digest }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          evidence_dir="${RUNNER_TEMP}/fugue-release-policy-recovery"
          umask 077
          now="$(date +%s)"
          if (( RECOVERY_WRITER_DEADLINE_EPOCH - now < 400 )); then
            echo "insufficient writer budget for final evidence and compensation" >&2
            exit 1
          fi
          pending_runs() {
            local workflow="$1"
            local status=""
            local inventory=""
            inventory="$(mktemp)"
            for status in queued in_progress requested waiting pending; do
              if ! timeout --kill-after=2s 10s gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/runs?status=${status}&per_page=100" \
                --jq '.workflow_runs[].id' >>"${inventory}"; then
                rm -f "${inventory}"
                return 1
              fi
            done
            awk -v current="${GITHUB_RUN_ID}" '$0 != current' "${inventory}" | sort -u
            rm -f "${inventory}"
          }
          deploy_state="$(timeout --kill-after=2s 10s gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-control-plane.yml" --jq '.state')"
          recovery_state="$(timeout --kill-after=2s 10s gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/recover-control-plane-release-policy.yml" --jq '.state')"
          deploy_runs="$(pending_runs deploy-control-plane.yml)"
          recovery_runs="$(pending_runs recover-control-plane-release-policy.yml)"
          remaining_runs="$(printf '%s\n%s\n' "${deploy_runs}" "${recovery_runs}" | sed '/^$/d' | sort -u)"
          remote_main="$(timeout --kill-after=2s 10s git ls-remote --refs --exit-code origin refs/heads/main)"
          remote_tag="$(timeout --kill-after=2s 10s git ls-remote --refs --exit-code origin refs/tags/fugue-control-plane-release-baseline)"
          [[ "${deploy_state}" == 'disabled_manually' ]]
          [[ "${recovery_state}" == 'disabled_manually' ]]
          [[ -z "${remaining_runs}" ]]
          [[ "${remote_main}" == "${TARGET_SHA}"$'\t''refs/heads/main' ]]
          [[ "${remote_tag}" == "${TARGET_SHA}"$'\t''refs/tags/fugue-control-plane-release-baseline' ]]
          export DEPLOY_STATE="${deploy_state}"
          export RECOVERY_STATE="${recovery_state}"
          export OBSERVED_MAIN_OID="${remote_main%%$'\t'*}"
          export OBSERVED_BASELINE_OID="${remote_tag%%$'\t'*}"
          [[ "${RECOVERY_PRIOR_ATTEMPTS_VERIFIED:-}" =~ ^[0-9]+$ ]]
          [[ "${RECOVERY_PRIOR_ATTEMPTS_DIGEST:-}" =~ ^sha256:[0-9a-f]{64}$ ]]
          python3 - "${evidence_dir}/context.json" "${evidence_dir}/prior-recovery-attempts.tsv" <<'PY'
          import json
          import os
          import sys
          from datetime import datetime, timezone

          prior_attempts = []
          with open(sys.argv[2], encoding="utf-8") as handle:
              for raw_line in handle:
                  fields = raw_line.rstrip("\n").split("|")
                  if len(fields) != 6:
                      raise SystemExit("invalid prior recovery attempt evidence row")
                  run_id, run_number, run_attempt, head_sha, status, conclusion = fields
                  prior_attempts.append({
                      "run_id": int(run_id),
                      "run_number": int(run_number),
                      "run_attempt": int(run_attempt),
                      "head_sha": head_sha,
                      "status": status,
                      "conclusion": conclusion,
                  })
          if len(prior_attempts) != int(os.environ["RECOVERY_PRIOR_ATTEMPTS_VERIFIED"]):
              raise SystemExit("prior recovery attempt evidence count mismatch")

          document = {
              "schema_version": 1,
              "workflow": "recover-control-plane-release-policy",
              "repository": os.environ["GITHUB_REPOSITORY"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "base_sha": os.environ["BASE_SHA"],
              "target_sha": os.environ["TARGET_SHA"],
              "patch_digest": os.environ["PATCH_DIGEST"],
              "cluster_mutation_attempted": False,
              "deploy_workflow_state": os.environ["DEPLOY_STATE"],
              "recovery_workflow_state": os.environ["RECOVERY_STATE"],
              "observed_main_oid": os.environ["OBSERVED_MAIN_OID"],
              "observed_baseline_oid": os.environ["OBSERVED_BASELINE_OID"],
              "verified_prior_recovery_attempts": int(os.environ["RECOVERY_PRIOR_ATTEMPTS_VERIFIED"]),
              "prior_recovery_attempt_digest": os.environ["RECOVERY_PRIOR_ATTEMPTS_DIGEST"],
              "prior_recovery_attempts": prior_attempts,
              "remaining_other_runs": [],
              "recorded_at": datetime.now(timezone.utc).isoformat(),
          }
          temporary = sys.argv[1] + ".tmp"
          with open(temporary, "x", encoding="utf-8") as handle:
              json.dump(document, handle, indent=2, sort_keys=True)
              handle.write("\n")
              handle.flush()
              os.fsync(handle.fileno())
          os.chmod(temporary, 0o600)
          os.replace(temporary, sys.argv[1])
          PY

      - name: Upload release-policy recovery evidence
        id: success_evidence_upload
        if: ${{ !cancelled() && success() }}
        timeout-minutes: 5
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fugue-control-plane-release-policy-recovery-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/fugue-release-policy-recovery
          if-no-files-found: error
          retention-days: 90
          include-hidden-files: false
          overwrite: false

      - name: Final remote and lane proof
        id: final_proof
        if: ${{ !cancelled() && success() }}
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ needs.recovery-gate.outputs.authorized_target_sha }}
        run: |
          set -euo pipefail
          now="$(date +%s)"
          if (( RECOVERY_WRITER_DEADLINE_EPOCH - now < 240 )); then
            echo "insufficient writer budget for the final remote proof" >&2
            exit 1
          fi
          pending_runs() {
            local workflow="$1"
            local status=""
            local inventory=""
            inventory="$(mktemp)"
            for status in queued in_progress requested waiting pending; do
              if ! timeout --kill-after=2s 10s gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/runs?status=${status}&per_page=100" \
                --jq '.workflow_runs[].id' >>"${inventory}"; then
                rm -f "${inventory}"
                return 1
              fi
            done
            awk -v current="${GITHUB_RUN_ID}" '$0 != current' "${inventory}" | sort -u
            rm -f "${inventory}"
          }
          [[ "$(timeout --kill-after=2s 10s gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-control-plane.yml" --jq '.state')" == 'disabled_manually' ]]
          [[ "$(timeout --kill-after=2s 10s gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/recover-control-plane-release-policy.yml" --jq '.state')" == 'disabled_manually' ]]
          deploy_remaining="$(pending_runs deploy-control-plane.yml)"
          recovery_remaining="$(pending_runs recover-control-plane-release-policy.yml)"
          [[ -z "${deploy_remaining}" ]]
          [[ -z "${recovery_remaining}" ]]
          [[ "$(timeout --kill-after=2s 10s git ls-remote --refs --exit-code origin refs/heads/main)" == "${TARGET_SHA}"$'\t''refs/heads/main' ]]
          [[ "$(timeout --kill-after=2s 10s git ls-remote --refs --exit-code origin refs/tags/fugue-control-plane-release-baseline)" == "${TARGET_SHA}"$'\t''refs/tags/fugue-control-plane-release-baseline' ]]

      - name: Same-runner compensation after an incomplete writer
        id: same_runner_compensate
        if: ${{ always() && (cancelled() || steps.prewrite.outcome != 'success' || steps.transaction.outcome != 'success' || steps.transaction_evidence_upload.outcome != 'success' || steps.quiesce.outcome != 'success' || steps.context.outcome != 'success' || steps.success_evidence_upload.outcome != 'success' || steps.final_proof.outcome != 'success') }}
        continue-on-error: true
        env:
          BASE_SHA: ${{ needs.recovery-gate.outputs.authorized_base_sha }}
          TARGET_SHA: ${{ needs.recovery-gate.outputs.authorized_target_sha }}
        run: |
          set -euo pipefail
          evidence_dir="${RUNNER_TEMP}/fugue-release-policy-recovery-same-runner-compensation"
          install -d -m 0700 "${evidence_dir}"
          python3 scripts/recover_control_plane_release_baseline.py compensate \
            --base-sha "${BASE_SHA}" \
            --target-sha "${TARGET_SHA}" \
            --evidence "${evidence_dir}/compensation.json" \
            --timeout-seconds 10

      - name: Same-runner freeze after an incomplete writer
        id: same_runner_freeze
        if: ${{ always() && steps.same_runner_compensate.outcome != 'skipped' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          evidence_dir="${RUNNER_TEMP}/fugue-release-policy-recovery-same-runner-compensation"
          install -d -m 0700 "${evidence_dir}"
          pending_evidence_file="${evidence_dir}/pending-runs.txt"
          : >"${pending_evidence_file}"
          workflows=(deploy-control-plane.yml recover-control-plane-release-policy.yml)
          pending_runs() {
            local workflow="$1"
            local status=""
            local inventory=""
            inventory="$(mktemp)"
            for status in queued in_progress requested waiting pending; do
              if ! timeout --kill-after=2s 5s gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/runs?status=${status}&per_page=100" \
                --jq '.workflow_runs[].id' >>"${inventory}"; then
                rm -f "${inventory}"
                return 1
              fi
            done
            awk -v current="${GITHUB_RUN_ID}" '$0 != current' "${inventory}" | sort -u
            rm -f "${inventory}"
          }
          freeze_failed=0
          for workflow in "${workflows[@]}"; do
            state=''
            for attempt in 1 2; do
              timeout --kill-after=2s 5s gh api --method PUT \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/disable" >/dev/null 2>&1 || true
              state="$(timeout --kill-after=2s 5s gh api \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}" --jq '.state' 2>/dev/null || true)"
              [[ "${state}" == 'disabled_manually' ]] && break
              sleep 1
            done
            [[ "${state}" == 'disabled_manually' ]] || freeze_failed=1
            if ! remaining="$(pending_runs "${workflow}")"; then
              freeze_failed=1
              printf 'enumeration-unavailable:%s\n' "${workflow}" >>"${pending_evidence_file}"
              continue
            fi
            for attempt in 1 2; do
              [[ -z "${remaining}" ]] && break
              while IFS= read -r run_id; do
                [[ -n "${run_id}" ]] || continue
                timeout --kill-after=2s 5s gh api --method POST \
                  "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/cancel" >/dev/null 2>&1 || true
              done <<<"${remaining}"
              sleep 1
              if ! remaining="$(pending_runs "${workflow}")"; then
                remaining='enumeration-failed'
                freeze_failed=1
                break
              fi
            done
            if [[ -n "${remaining}" ]]; then
              printf '%s\n' "${remaining}" >>"${pending_evidence_file}"
              freeze_failed=1
            fi
          done
          if ! deploy_state="$(timeout --kill-after=2s 5s gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-control-plane.yml" --jq '.state')"; then
            deploy_state='unavailable'
            freeze_failed=1
          fi
          if ! recovery_state="$(timeout --kill-after=2s 5s gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/recover-control-plane-release-policy.yml" --jq '.state')"; then
            recovery_state='unavailable'
            freeze_failed=1
          fi
          if ! baseline_oid="$(timeout --kill-after=2s 5s gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/fugue-control-plane-release-baseline" --jq '.object.sha')"; then
            baseline_oid='unavailable'
            freeze_failed=1
          fi
          [[ "${deploy_state}" == 'disabled_manually' ]] || freeze_failed=1
          [[ "${recovery_state}" == 'disabled_manually' ]] || freeze_failed=1
          export DEPLOY_STATE="${deploy_state}"
          export RECOVERY_STATE="${recovery_state}"
          export BASELINE_OID="${baseline_oid}"
          export PENDING_RUNS="$(sort -u "${pending_evidence_file}" | paste -sd,)"
          python3 - "${evidence_dir}/lane-freeze.json" <<'PY'
          import json
          import os
          import sys
          from datetime import datetime, timezone

          pending = [value for value in os.environ["PENDING_RUNS"].split(",") if value]
          document = {
              "schema_version": 1,
              "workflow": "recover-control-plane-release-policy",
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "deploy_workflow_state": os.environ["DEPLOY_STATE"],
              "recovery_workflow_state": os.environ["RECOVERY_STATE"],
              "final_observed_baseline_oid": os.environ["BASELINE_OID"],
              "remaining_other_run_ids": pending,
              "cluster_mutation_attempted": False,
              "recorded_at": datetime.now(timezone.utc).isoformat(),
          }
          with open(sys.argv[1], "x", encoding="utf-8") as handle:
              json.dump(document, handle, indent=2, sort_keys=True)
              handle.write("\n")
          os.chmod(sys.argv[1], 0o600)
          PY
          [[ "${freeze_failed}" == '0' ]]

      - name: Upload same-runner compensation evidence
        id: same_runner_compensation_upload
        if: ${{ always() && steps.same_runner_compensate.outcome != 'skipped' }}
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fugue-control-plane-release-policy-same-runner-compensation-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/fugue-release-policy-recovery
            ${{ runner.temp }}/fugue-release-policy-recovery-same-runner-compensation
          if-no-files-found: error
          retention-days: 90

      - name: Require same-runner compensation evidence
        if: ${{ always() && steps.same_runner_compensate.outcome != 'skipped' && (steps.same_runner_compensate.outcome != 'success' || steps.same_runner_freeze.outcome != 'success' || steps.same_runner_compensation_upload.outcome != 'success') }}
        run: |
          echo "same-runner recovery compensation or its evidence failed" >&2
          exit 1

  compensate-baseline-on-failure:
    needs:
      - recovery-gate
      - advance-baseline
    if: ${{ always() && needs.recovery-gate.result == 'success' && needs.advance-baseline.result != 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout exact recovery target for compensation
        if: always()
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.recovery-gate.outputs.authorized_target_sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Observe and compensate exact intermediate tag state
        id: compensate
        if: always()
        continue-on-error: true
        env:
          BASE_SHA: ${{ needs.recovery-gate.outputs.authorized_base_sha }}
          TARGET_SHA: ${{ needs.recovery-gate.outputs.authorized_target_sha }}
        run: |
          set -euo pipefail
          evidence_dir="${RUNNER_TEMP}/fugue-release-policy-recovery-compensation"
          install -d -m 0700 "${evidence_dir}"
          python3 scripts/recover_control_plane_release_baseline.py compensate \
            --base-sha "${BASE_SHA}" \
            --target-sha "${TARGET_SHA}" \
            --evidence "${evidence_dir}/compensation.json" \
            --timeout-seconds 20

      - name: Upload compensation evidence
        id: compensation_evidence_upload
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fugue-control-plane-release-policy-compensation-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/fugue-release-policy-recovery-compensation/compensation.json
          if-no-files-found: error
          retention-days: 90

      - name: Require successful compensation and evidence
        if: ${{ always() && (steps.compensate.outcome != 'success' || steps.compensation_evidence_upload.outcome != 'success') }}
        run: |
          echo "release-policy recovery compensation or its evidence failed" >&2
          exit 1

  freeze-release-lanes-on-failure:
    needs:
      - recovery-gate
      - advance-baseline
      - compensate-baseline-on-failure
    if: ${{ always() && (needs.recovery-gate.result != 'success' || needs.advance-baseline.result != 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: write
      contents: read
    steps:
      - name: Record freeze deadline with evidence reserve
        if: always()
        run: |
          set -euo pipefail
          started_at="$(date +%s)"
          [[ "${started_at}" =~ ^[1-9][0-9]*$ ]]
          printf 'RECOVERY_FREEZE_DEADLINE_EPOCH=%s\n' "$((started_at + 2100))" >>"${GITHUB_ENV}"

      - name: Disable both lanes and cancel every other non-terminal run
        id: freeze_lane
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          workflows=(deploy-control-plane.yml recover-control-plane-release-policy.yml)

          disable_workflow() {
            local workflow="$1"
            local state=""
            for attempt in 1 2 3 4 5; do
              timeout --kill-after=2s 10s gh api --method PUT \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/disable" >/dev/null 2>&1 || true
              state="$(timeout --kill-after=2s 10s gh api \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}" --jq '.state' 2>/dev/null || true)"
              [[ "${state}" == 'disabled_manually' ]] && return 0
              sleep 2
            done
            echo "workflow disable was not confirmed: ${workflow} state=${state}" >&2
            return 1
          }
          pending_runs() {
            local workflow="$1"
            local status=""
            local inventory=""
            inventory="$(mktemp)"
            for status in queued in_progress requested waiting pending; do
              if ! timeout --kill-after=2s 10s gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/runs?status=${status}&per_page=100" \
                --jq '.workflow_runs[].id' >>"${inventory}"; then
                rm -f "${inventory}"
                return 1
              fi
            done
            awk -v current="${GITHUB_RUN_ID}" '$0 != current' "${inventory}" | sort -u
            rm -f "${inventory}"
          }
          cancel_pending_runs() {
            local workflow="$1"
            local run_id=""
            while IFS= read -r run_id; do
              [[ -n "${run_id}" ]] || continue
              timeout --kill-after=2s 10s gh api --method POST \
                "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/cancel" >/dev/null 2>&1 || true
            done < <(pending_runs "${workflow}")
          }

          freeze_failed=0
          for workflow in "${workflows[@]}"; do
            if ! disable_workflow "${workflow}"; then
              freeze_failed=1
            fi
          done
          for workflow in "${workflows[@]}"; do
            if ! remaining="$(pending_runs "${workflow}")"; then
              echo "could not enumerate non-terminal runs for ${workflow}" >&2
              freeze_failed=1
              continue
            fi
            for attempt in 1 2 3 4 5; do
              [[ -z "${remaining}" ]] && break
              cancel_pending_runs "${workflow}"
              sleep 2
              if ! remaining="$(pending_runs "${workflow}")"; then
                echo "could not re-enumerate non-terminal runs for ${workflow}" >&2
                freeze_failed=1
                remaining='enumeration-failed'
                break
              fi
            done
            if [[ -n "${remaining}" ]]; then
              echo "non-terminal runs remain for ${workflow}:" >&2
              printf '%s\n' "${remaining}" >&2
              freeze_failed=1
            fi
          done
          now="$(date +%s)"
          if (( RECOVERY_FREEZE_DEADLINE_EPOCH - now < 360 )); then
            echo "freeze action did not retain its post-action evidence reserve" >&2
            freeze_failed=1
          fi
          [[ "${freeze_failed}" == '0' ]]

      - name: Record post-freeze evidence
        id: post_freeze_evidence
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GATE_RESULT: ${{ needs.recovery-gate.result }}
          ADVANCE_RESULT: ${{ needs.advance-baseline.result }}
          COMPENSATE_RESULT: ${{ needs.compensate-baseline-on-failure.result }}
          FREEZE_OUTCOME: ${{ steps.freeze_lane.outcome }}
        run: |
          set -euo pipefail
          evidence_dir="${RUNNER_TEMP}/fugue-release-policy-recovery-freeze"
          install -d -m 0700 "${evidence_dir}"
          umask 077
          observation_failed=0
          pending_runs() {
            local workflow="$1"
            local status=""
            local inventory=""
            inventory="$(mktemp)"
            for status in queued in_progress requested waiting pending; do
              if ! timeout --kill-after=2s 10s gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/runs?status=${status}&per_page=100" \
                --jq '.workflow_runs[].id' >>"${inventory}"; then
                rm -f "${inventory}"
                return 1
              fi
            done
            awk -v current="${GITHUB_RUN_ID}" '$0 != current' "${inventory}" | sort -u
            rm -f "${inventory}"
          }
          if ! deploy_state="$(timeout --kill-after=2s 10s gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-control-plane.yml" --jq '.state')"; then
            deploy_state='unavailable'
            observation_failed=1
          fi
          if ! recovery_state="$(timeout --kill-after=2s 10s gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/recover-control-plane-release-policy.yml" --jq '.state')"; then
            recovery_state='unavailable'
            observation_failed=1
          fi
          if ! baseline_oid="$(timeout --kill-after=2s 10s gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/fugue-control-plane-release-baseline" --jq '.object.sha')"; then
            baseline_oid='unavailable'
            observation_failed=1
          fi
          if ! deploy_runs="$(pending_runs deploy-control-plane.yml)"; then
            deploy_runs='enumeration-unavailable:deploy-control-plane.yml'
            observation_failed=1
          fi
          if ! recovery_runs="$(pending_runs recover-control-plane-release-policy.yml)"; then
            recovery_runs='enumeration-unavailable:recover-control-plane-release-policy.yml'
            observation_failed=1
          fi
          pending_file="${evidence_dir}/pending-runs.txt"
          printf '%s\n%s\n' "${deploy_runs}" "${recovery_runs}" | sed '/^$/d' | sort -u >"${pending_file}"
          [[ "${deploy_state}" == 'disabled_manually' ]] || observation_failed=1
          [[ "${recovery_state}" == 'disabled_manually' ]] || observation_failed=1
          [[ ! -s "${pending_file}" ]] || observation_failed=1
          now="$(date +%s)"
          if ! [[ "${RECOVERY_FREEZE_DEADLINE_EPOCH:-0}" =~ ^[1-9][0-9]*$ ]] ||
            (( now > RECOVERY_FREEZE_DEADLINE_EPOCH )); then
            observation_failed=1
          fi
          export DEPLOY_STATE="${deploy_state}"
          export RECOVERY_STATE="${recovery_state}"
          export BASELINE_OID="${baseline_oid}"
          export PENDING_RUNS="$(paste -sd, "${pending_file}")"
          python3 - "${evidence_dir}/lane-freeze.json" <<'PY'
          import json
          import os
          import sys
          from datetime import datetime, timezone

          pending = [value for value in os.environ["PENDING_RUNS"].split(",") if value]
          document = {
              "schema_version": 1,
              "workflow": "recover-control-plane-release-policy",
              "repository": os.environ["GITHUB_REPOSITORY"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "head_sha": os.environ["GITHUB_SHA"],
              "job_results": {
                  "recovery_gate": os.environ["GATE_RESULT"],
                  "advance_baseline": os.environ["ADVANCE_RESULT"],
                  "compensate_baseline": os.environ["COMPENSATE_RESULT"],
              },
              "freeze_step_outcome": os.environ["FREEZE_OUTCOME"],
              "deploy_workflow_state": os.environ["DEPLOY_STATE"],
              "recovery_workflow_state": os.environ["RECOVERY_STATE"],
              "final_observed_baseline_oid": os.environ["BASELINE_OID"],
              "remaining_other_run_ids": pending,
              "cluster_mutation_attempted": False,
              "recorded_at": datetime.now(timezone.utc).isoformat(),
          }
          with open(sys.argv[1], "x", encoding="utf-8") as handle:
              json.dump(document, handle, indent=2, sort_keys=True)
              handle.write("\n")
          os.chmod(sys.argv[1], 0o600)
          PY
          [[ "${observation_failed}" == '0' ]]

      - name: Upload recovery lane freeze evidence
        id: freeze_evidence_upload
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fugue-control-plane-release-policy-recovery-freeze-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/fugue-release-policy-recovery-freeze
          if-no-files-found: error
          retention-days: 90

      - name: Require verified lane freeze and evidence
        if: ${{ always() && (steps.freeze_lane.outcome != 'success' || steps.post_freeze_evidence.outcome != 'success' || steps.freeze_evidence_upload.outcome != 'success') }}
        run: |
          echo "release lanes were not verifiably frozen or freeze evidence was not uploaded" >&2
          exit 1
