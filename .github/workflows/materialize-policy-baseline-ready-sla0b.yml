name: materialize-policy-baseline-ready-sla0b

on:
  repository_dispatch:
    types: [fugue_policy_checkpoint_complete]

permissions: {}

concurrency:
  group: fugue-policy-baseline-ready-sla0b-${{ github.event.client_payload.expected_sha }}
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    permissions:
      actions: read
      contents: read
    outputs:
      artifact_name: ${{ steps.materialize.outputs.artifact_name }}
      artifact_digest: ${{ steps.normalize.outputs.artifact_digest }}
      baseline_sha256: ${{ steps.materialize.outputs.baseline_sha256 }}
      expected_sha: ${{ steps.materialize.outputs.expected_sha }}
      expected_tree: ${{ steps.materialize.outputs.expected_tree }}
    steps:
      - name: Checkout exact policy checkpoint SHA
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.client_payload.expected_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Verify exact automatic activation and decode attested inputs
        id: authorize
        env:
          CHECKPOINT_B64: ${{ github.event.client_payload.checkpoint_b64 }}
          CHECKPOINT_DIGEST: ${{ github.event.client_payload.checkpoint_digest }}
          ENVIRONMENT_B64: ${{ github.event.client_payload.environment_b64 }}
          ENVIRONMENT_DIGEST: ${{ github.event.client_payload.environment_digest }}
          EVENT_ACTION: ${{ github.event.action }}
          EXPECTED_SHA: ${{ github.event.client_payload.expected_sha }}
          EXPECTED_TREE: ${{ github.event.client_payload.expected_tree }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          TIMING_B64: ${{ github.event.client_payload.timing_b64 }}
          TIMING_DIGEST: ${{ github.event.client_payload.timing_digest }}
        run: |
          set -euo pipefail
          [[ "${GITHUB_EVENT_NAME}" == 'repository_dispatch' ]] || exit 1
          [[ "${EVENT_ACTION}" == 'fugue_policy_checkpoint_complete' ]] || exit 1
          [[ "${GITHUB_ACTOR}" == "${REPOSITORY_OWNER}" ]] || exit 1
          [[ "${GITHUB_REF}" == 'refs/heads/main' ]] || exit 1
          [[ "${GITHUB_RUN_ATTEMPT}" == '1' ]] || exit 1
          [[ "${EXPECTED_SHA}" =~ ^[0-9a-f]{40}$ && "${EXPECTED_SHA}" == "${GITHUB_SHA}" ]] || exit 1
          [[ "${EXPECTED_TREE}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          [[ "$(git rev-parse HEAD)" == "${EXPECTED_SHA}" ]] || exit 1
          [[ "$(git rev-parse HEAD^{tree})" == "${EXPECTED_TREE}" ]] || exit 1

          readonly workflow_path='.github/workflows/materialize-policy-baseline-ready-sla0b.yml'
          readonly test_path='internal/platformsafety/policy_baseline_ready_workflow_test.go'
          readonly materializer_path='cmd/fugue-policy-baseline-ready-materialize/main.go'
          readonly materializer_test_path='cmd/fugue-policy-baseline-ready-materialize/main_test.go'
          activation_commit="$(git log --format='%H' -n 1 -- "${workflow_path}" "${test_path}")" || exit 1
          materializer_commit="$(git log --format='%H' -n 1 -- "${materializer_path}" "${materializer_test_path}")" || exit 1
          [[ "${activation_commit}" =~ ^[0-9a-f]{40}$ && "${materializer_commit}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          git merge-base --is-ancestor "${activation_commit}" "${EXPECTED_SHA}" || exit 1
          git merge-base --is-ancestor "${materializer_commit}" "${EXPECTED_SHA}" || exit 1
          for policy_path in "${workflow_path}" "${test_path}"; do
            [[ "$(git log --format='%H' -n 1 -- "${policy_path}")" == "${activation_commit}" ]] || exit 1
          done
          for policy_path in "${materializer_path}" "${materializer_test_path}"; do
            [[ "$(git log --format='%H' -n 1 -- "${policy_path}")" == "${materializer_commit}" ]] || exit 1
          done
          python3 - "${activation_commit}" "${workflow_path}" "${test_path}" \
            "${materializer_commit}" "${materializer_path}" "${materializer_test_path}" <<'PY'
          import subprocess
          import sys

          values = sys.argv[1:]
          for commit, paths in ((values[0], values[1:3]), (values[3], values[4:6])):
              output = subprocess.check_output(
                  ["git", "diff", "--no-renames", "--name-status", commit + "^", commit],
                  text=True,
              )
              rows = [line.split("\t", 1) for line in output.splitlines()]
              if len(rows) != 2 or [row[1] for row in rows] != list(paths):
                  raise SystemExit("policy changed-file inventory drifted")
              if any(len(row) != 2 or row[0] not in {"A", "M"} for row in rows):
                  raise SystemExit("policy changed-file status drifted")
          PY
          git diff --check "${activation_commit}^" "${activation_commit}" || exit 1
          git diff --check "${materializer_commit}^" "${materializer_commit}" || exit 1
          git diff --exit-code --ignore-submodules "${EXPECTED_SHA}" -- || exit 1
          [[ -z "$(git status --porcelain=v1 --untracked-files=all)" ]] || exit 1

          main_head="$(timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')" || exit 1
          [[ "${main_head}" == "${EXPECTED_SHA}" ]] || exit 1

          readonly evidence_dir="${RUNNER_TEMP}/fugue-policy-baseline-ready-sla0b-input"
          install -d -m 0700 "${evidence_dir}"
          umask 077
          python3 - "${evidence_dir}" <<'PY'
          import base64
          import json
          import os
          import pathlib
          import re
          import sys

          root = pathlib.Path(sys.argv[1])
          inputs = (
              ("checkpoint", "CHECKPOINT_B64", "CHECKPOINT_DIGEST"),
              ("environment", "ENVIRONMENT_B64", "ENVIRONMENT_DIGEST"),
              ("timing", "TIMING_B64", "TIMING_DIGEST"),
          )
          for name, payload_name, digest_name in inputs:
              payload = os.environ.get(payload_name, "")
              digest = os.environ.get(digest_name, "")
              if re.fullmatch(r"[A-Za-z0-9+/]+={0,2}", payload) is None:
                  raise SystemExit(f"{name} base64 is invalid")
              if re.fullmatch(r"sha256:[0-9a-f]{64}", digest) is None:
                  raise SystemExit(f"{name} digest is invalid")
              try:
                  data = base64.b64decode(payload, validate=True)
              except Exception as exc:
                  raise SystemExit(f"{name} base64 decoding failed") from exc
              if not 1 <= len(data) <= 32768:
                  raise SystemExit(f"{name} evidence size is invalid")
              json.loads(data)
              path = root / f"{name}.json"
              descriptor = os.open(path, os.O_WRONLY | os.O_CREAT | os.O_EXCL, 0o600)
              with os.fdopen(descriptor, "wb") as handle:
                  handle.write(data)
          identities = [(root / f"{name}.json").stat() for name, _, _ in inputs]
          if len({(item.st_dev, item.st_ino) for item in identities}) != len(identities):
              raise SystemExit("attested input files must be distinct")
          PY
          printf 'evidence_dir=%s\n' "${evidence_dir}" >>"${GITHUB_OUTPUT}"

      - name: Materialize canonical exact-main baseline readiness
        id: materialize
        env:
          CHECKPOINT_DIGEST: ${{ github.event.client_payload.checkpoint_digest }}
          ENVIRONMENT_DIGEST: ${{ github.event.client_payload.environment_digest }}
          EVIDENCE_DIR: ${{ steps.authorize.outputs.evidence_dir }}
          EXPECTED_SHA: ${{ github.event.client_payload.expected_sha }}
          EXPECTED_TREE: ${{ github.event.client_payload.expected_tree }}
          TIMING_DIGEST: ${{ github.event.client_payload.timing_digest }}
        run: |
          set -euo pipefail
          readonly artifact_dir="${RUNNER_TEMP}/fugue-policy-baseline-ready-sla0b-artifact"
          install -d -m 0700 "${artifact_dir}"
          umask 077
          go run ./cmd/fugue-policy-baseline-ready-materialize \
            --checkpoint "${EVIDENCE_DIR}/checkpoint.json" \
            --checkpoint-digest "${CHECKPOINT_DIGEST}" \
            --environment "${EVIDENCE_DIR}/environment.json" \
            --environment-digest "${ENVIRONMENT_DIGEST}" \
            --timing "${EVIDENCE_DIR}/timing.json" \
            --timing-digest "${TIMING_DIGEST}" \
            --expected-sha "${EXPECTED_SHA}" \
            --expected-tree "${EXPECTED_TREE}" >"${artifact_dir}/BASELINE_READY.json"
          python3 - "${artifact_dir}/BASELINE_READY.json" "${EXPECTED_SHA}" "${EXPECTED_TREE}" <<'PY'
          import json
          import pathlib
          import sys

          path, expected_sha, expected_tree = pathlib.Path(sys.argv[1]), sys.argv[2], sys.argv[3]
          raw = path.read_bytes()
          if not raw.endswith(b"\n") or raw.endswith(b"\n\n"):
              raise SystemExit("BASELINE_READY output is not canonical one-LF JSON")
          value = json.loads(raw)
          if value.get("status") != "BASELINE_READY" or value.get("base_sha") != expected_sha or value.get("base_tree") != expected_tree:
              raise SystemExit("BASELINE_READY identity drifted")
          if value.get("source", {}).get("safety_status") != "PASS" or value.get("source", {}).get("timing_status") not in {"PASS", "TIMING_NONCOMPLIANT"}:
              raise SystemExit("BASELINE_READY gate status drifted")
          PY
          baseline_sha256="$(shasum -a 256 "${artifact_dir}/BASELINE_READY.json" | awk '{print $1}')"
          python3 - "${artifact_dir}/activation.json" "${EXPECTED_SHA}" "${EXPECTED_TREE}" \
            "${baseline_sha256}" "${CHECKPOINT_DIGEST}" "${ENVIRONMENT_DIGEST}" "${TIMING_DIGEST}" <<'PY'
          import datetime
          import json
          import os
          import sys

          output, sha, tree, baseline_digest, checkpoint_digest, environment_digest, timing_digest = sys.argv[1:]
          value = {
              "schema_version": 1,
              "status": "ACTIVATED",
              "workflow": "materialize-policy-baseline-ready-sla0b",
              "repository": os.environ["GITHUB_REPOSITORY"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": int(os.environ["GITHUB_RUN_ATTEMPT"]),
              "sha": sha,
              "tree": tree,
              "baseline_ready_sha256": "sha256:" + baseline_digest,
              "checkpoint_digest": checkpoint_digest,
              "environment_digest": environment_digest,
              "timing_digest": timing_digest,
              "production_write": False,
              "ref_mutation_attempted": False,
              "object_mutation_attempted": False,
              "cluster_mutation_attempted": False,
              "recorded_at": datetime.datetime.now(datetime.timezone.utc).isoformat(),
          }
          with open(output, "w", encoding="utf-8") as handle:
              json.dump(value, handle, sort_keys=True, separators=(",", ":"))
              handle.write("\n")
          PY
          artifact_name="fugue-policy-baseline-ready-${EXPECTED_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          printf 'artifact_dir=%s\n' "${artifact_dir}" >>"${GITHUB_OUTPUT}"
          printf 'artifact_name=%s\n' "${artifact_name}" >>"${GITHUB_OUTPUT}"
          printf 'baseline_sha256=sha256:%s\n' "${baseline_sha256}" >>"${GITHUB_OUTPUT}"
          printf 'expected_sha=%s\n' "${EXPECTED_SHA}" >>"${GITHUB_OUTPUT}"
          printf 'expected_tree=%s\n' "${EXPECTED_TREE}" >>"${GITHUB_OUTPUT}"

      - name: Upload exact-main baseline readiness artifact
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.materialize.outputs.artifact_name }}
          path: ${{ steps.materialize.outputs.artifact_dir }}
          if-no-files-found: error
          retention-days: 90

      - name: Normalize uploaded artifact digest
        id: normalize
        env:
          RAW_ARTIFACT_DIGEST: ${{ steps.upload.outputs.artifact-digest }}
        run: |
          set -euo pipefail
          [[ "${RAW_ARTIFACT_DIGEST}" =~ ^[0-9a-f]{64}$ ]] || exit 1
          printf 'artifact_digest=sha256:%s\n' "${RAW_ARTIFACT_DIGEST}" >>"${GITHUB_OUTPUT}"

  consume:
    needs: materialize
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    permissions:
      actions: read
      contents: read
    steps:
      - name: Download exact-main baseline readiness artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.materialize.outputs.artifact_name }}
          path: ${{ runner.temp }}/fugue-policy-baseline-ready-sla0b-consume

      - name: Consume and verify exact-main baseline readiness artifact
        env:
          ARTIFACT_DIGEST: ${{ needs.materialize.outputs.artifact_digest }}
          BASELINE_SHA256: ${{ needs.materialize.outputs.baseline_sha256 }}
          EXPECTED_SHA: ${{ needs.materialize.outputs.expected_sha }}
          EXPECTED_TREE: ${{ needs.materialize.outputs.expected_tree }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          readonly artifact_dir="${RUNNER_TEMP}/fugue-policy-baseline-ready-sla0b-consume"
          [[ "${EXPECTED_SHA}" =~ ^[0-9a-f]{40}$ && "${EXPECTED_TREE}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          [[ "${BASELINE_SHA256}" =~ ^sha256:[0-9a-f]{64}$ ]] || exit 1
          [[ "${ARTIFACT_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]] || exit 1
          python3 - "${artifact_dir}" <<'PY'
          import pathlib
          import sys

          root = pathlib.Path(sys.argv[1])
          files = sorted(path.name for path in root.iterdir() if path.is_file())
          if files != ["BASELINE_READY.json", "activation.json"]:
              raise SystemExit("baseline artifact inventory drifted")
          PY
          [[ "sha256:$(shasum -a 256 "${artifact_dir}/BASELINE_READY.json" | awk '{print $1}')" == "${BASELINE_SHA256}" ]] || exit 1
          main_head="$(timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')" || exit 1
          [[ "${main_head}" == "${EXPECTED_SHA}" ]] || exit 1
          python3 - "${artifact_dir}/BASELINE_READY.json" "${artifact_dir}/activation.json" \
            "${EXPECTED_SHA}" "${EXPECTED_TREE}" "${BASELINE_SHA256}" <<'PY'
          import json
          import pathlib
          import sys

          baseline_path, activation_path = map(pathlib.Path, sys.argv[1:3])
          expected_sha, expected_tree, baseline_digest = sys.argv[3:]
          for path in (baseline_path, activation_path):
              raw = path.read_bytes()
              if not raw.endswith(b"\n") or raw.endswith(b"\n\n"):
                  raise SystemExit(f"{path.name} is not canonical one-LF JSON")
          baseline = json.loads(baseline_path.read_bytes())
          activation = json.loads(activation_path.read_bytes())
          if baseline.get("status") != "BASELINE_READY" or baseline.get("base_sha") != expected_sha or baseline.get("base_tree") != expected_tree:
              raise SystemExit("consumed BASELINE_READY identity drifted")
          if baseline.get("source", {}).get("safety_status") != "PASS" or baseline.get("source", {}).get("timing_status") not in {"PASS", "TIMING_NONCOMPLIANT"}:
              raise SystemExit("consumed BASELINE_READY gate status drifted")
          if activation.get("status") != "ACTIVATED" or activation.get("sha") != expected_sha or activation.get("tree") != expected_tree:
              raise SystemExit("activation identity drifted")
          if activation.get("baseline_ready_sha256") != baseline_digest:
              raise SystemExit("activation baseline digest drifted")
          for field in ("production_write", "ref_mutation_attempted", "object_mutation_attempted", "cluster_mutation_attempted"):
              if activation.get(field) is not False:
                  raise SystemExit(f"activation mutation field {field} drifted")
          PY
          printf 'BASELINE_READY consumed: sha=%s tree=%s payload=%s artifact=%s\n' \
            "${EXPECTED_SHA}" "${EXPECTED_TREE}" "${BASELINE_SHA256}" "${ARTIFACT_DIGEST}" >>"${GITHUB_STEP_SUMMARY}"
