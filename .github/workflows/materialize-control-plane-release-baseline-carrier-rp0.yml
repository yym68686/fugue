name: materialize-control-plane-release-baseline-carrier-rp0

on:
  workflow_dispatch:
    inputs:
      expected_sha:
        description: Exact lowercase main SHA containing the carrier writer
        required: true
        type: string
      expected_previous_object_sha:
        description: Exact current forward baseline ref object
        required: true
        type: string
      runtime_sha:
        description: Exact runtime SHA already represented by the current baseline
        required: true
        type: string

permissions: {}

concurrency:
  group: fugue-release-policy-rp0-carrier-materialization-v1
  cancel-in-progress: false

jobs:
  materialize-forward-carrier:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      contents: write
    steps:
      - name: Checkout exact carrier-writer policy SHA
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact carrier materialization authorization
        id: verify
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          EXPECTED_PREVIOUS_OBJECT_SHA: ${{ inputs.expected_previous_object_sha }}
          RUNTIME_SHA: ${{ inputs.runtime_sha }}
          HEALTH_URL: ${{ vars.FUGUE_CONTROL_PLANE_RP0_HEALTH_URL || 'https://api.fugue.pro/healthz' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          readonly baseline_ref='refs/heads/fugue-control-plane-release-baseline'
          [[ "${GITHUB_EVENT_NAME}" == 'workflow_dispatch' ]] || exit 1
          [[ "${GITHUB_REF}" == 'refs/heads/main' ]] || exit 1
          [[ "${GITHUB_RUN_ATTEMPT}" == '1' ]] || exit 1
          [[ "${EXPECTED_SHA}" =~ ^[0-9a-f]{40}$ && "${EXPECTED_SHA}" == "${GITHUB_SHA}" ]] || exit 1
          [[ "${EXPECTED_PREVIOUS_OBJECT_SHA}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          [[ "${RUNTIME_SHA}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          [[ "$(git rev-parse --verify 'HEAD^{commit}')" == "${GITHUB_SHA}" ]] || exit 1
          policy_identity="$(git rev-list --parents -n 1 "${GITHUB_SHA}")" || exit 1
          read -r policy_commit policy_parent extra <<<"${policy_identity}" || exit 1
          [[ "${policy_commit}" == "${GITHUB_SHA}" && -n "${policy_parent:-}" && -z "${extra:-}" ]] || exit 1
          expected_changes=(
            $'M\t.github/workflows/materialize-control-plane-release-baseline-carrier-rp0.yml'
            $'M\tinternal/platformsafety/release_workflow_test.go'
          )
          actual_changes_text="$(git diff --no-renames --name-status "${policy_parent}" "${GITHUB_SHA}")" || exit 1
          mapfile -t actual_changes <<<"${actual_changes_text}"
          [[ "${#actual_changes[@]}" == "${#expected_changes[@]}" ]] || exit 1
          for index in "${!expected_changes[@]}"; do
            [[ "${actual_changes[index]}" == "${expected_changes[index]}" ]] || exit 1
          done
          git diff --check "${policy_parent}" "${GITHUB_SHA}"

          main_status=0
          main_head="$(timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')" || main_status=$?
          [[ "${main_status}" == '0' && "${main_head}" == "${GITHUB_SHA}" ]] || exit 1
          baseline_status=0
          baseline_fields="$(timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/matching-refs/heads/fugue-control-plane-release-baseline" \
            --jq 'if length == 1 and .[0].ref == "refs/heads/fugue-control-plane-release-baseline" then [.[0].object.sha,.[0].ref,.[0].object.type] | @tsv else error("missing or ambiguous baseline ref") end')" || baseline_status=$?
          [[ "${baseline_status}" == '0' ]] || exit 1
          IFS=$'\t' read -r baseline_object observed_ref object_type extra <<<"${baseline_fields}" || exit 1
          [[ -z "${extra:-}" && "${baseline_object}" == "${EXPECTED_PREVIOUS_OBJECT_SHA}" ]] || exit 1
          [[ "${observed_ref}" == "${baseline_ref}" && "${object_type}" == 'commit' ]] || exit 1

          timeout --kill-after=5s 60s git fetch --no-tags origin "${baseline_ref}" || exit 1
          [[ "$(git rev-parse --verify 'FETCH_HEAD^{commit}')" == "${EXPECTED_PREVIOUS_OBJECT_SHA}" ]] || exit 1
          previous_identity="$(git rev-list --parents -n 1 FETCH_HEAD)" || exit 1
          read -r previous_commit previous_parents <<<"${previous_identity}" || exit 1
          [[ "${previous_commit}" == "${EXPECTED_PREVIOUS_OBJECT_SHA}" ]] || exit 1
          previous_tree="$(git ls-tree --full-tree FETCH_HEAD)" || exit 1
          [[ "$(printf '%s\n' "${previous_tree}" | sed '/^$/d' | wc -l | tr -d ' ')" == '1' ]] || exit 1
          read -r metadata_mode metadata_type metadata_blob metadata_path extra <<<"${previous_tree}" || exit 1
          [[ -z "${extra:-}" && "${metadata_mode}" == '100644' && "${metadata_type}" == 'blob' ]] || exit 1
          [[ "${metadata_blob}" =~ ^[0-9a-f]{40}$ && "${metadata_path}" == 'fugue-runtime-baseline.json' ]] || exit 1
          previous_payload_fields="$(
            git cat-file blob "${metadata_blob}" |
              python3 -c '
          import json, re, sys
          payload = sys.stdin.buffer.read()
          try:
              value = json.loads(payload)
          except (UnicodeDecodeError, json.JSONDecodeError):
              raise SystemExit("previous baseline metadata is not exact JSON")
          runtime_sha = value.get("runtime_sha") if type(value) is dict else None
          previous_sha = value.get("previous_baseline_object_sha") if type(value) is dict else None
          if type(runtime_sha) is not str or re.fullmatch(r"[0-9a-f]{40}", runtime_sha) is None:
              raise SystemExit("previous baseline runtime SHA is invalid")
          if previous_sha is not None and (
              type(previous_sha) is not str or re.fullmatch(r"[0-9a-f]{40}", previous_sha) is None
          ):
              raise SystemExit("previous baseline parent SHA is invalid")
          expected = json.dumps(
              {"previous_baseline_object_sha": previous_sha, "runtime_sha": runtime_sha, "schema_version": 1},
              sort_keys=True,
              separators=(",", ":"),
          ).encode("utf-8") + b"\n"
          if payload != expected:
              raise SystemExit("previous baseline metadata bytes are not canonical")
          sys.stdout.write(runtime_sha + "\t" + ("null" if previous_sha is None else previous_sha))
          '
          )" || exit 1
          IFS=$'\t' read -r represented_runtime represented_previous extra <<<"${previous_payload_fields}" || exit 1
          [[ -z "${extra:-}" && "${represented_runtime}" == "${RUNTIME_SHA}" ]] || exit 1
          if [[ "${represented_previous}" == 'null' ]]; then
            [[ -z "${previous_parents:-}" ]] || exit 1
          else
            read -r represented_parent extra_parent <<<"${previous_parents:-}" || exit 1
            [[ "${represented_parent}" == "${represented_previous}" && -z "${extra_parent:-}" ]] || exit 1
          fi
          git cat-file -e "${RUNTIME_SHA}^{commit}" || exit 1
          git merge-base --is-ancestor "${RUNTIME_SHA}" "${GITHUB_SHA}" || exit 1

          carrier_date="$(git show -s --format=%cI "${GITHUB_SHA}" | python3 -c '
          import datetime, sys
          value = datetime.datetime.fromisoformat(sys.stdin.read().strip())
          sys.stdout.write(value.astimezone(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"))
          ')" || exit 1
          [[ "${carrier_date}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$ ]] || exit 1
          {
            printf 'previous_object_sha=%s\n' "${EXPECTED_PREVIOUS_OBJECT_SHA}"
            printf 'runtime_sha=%s\n' "${RUNTIME_SHA}"
            printf 'carrier_date=%s\n' "${carrier_date}"
            printf 'health_url=%s\n' "${HEALTH_URL}"
          } >>"${GITHUB_OUTPUT}" || exit 1

      - name: Write carrier materialization intent evidence
        env:
          PREVIOUS_OBJECT_SHA: ${{ steps.verify.outputs.previous_object_sha }}
          RUNTIME_SHA: ${{ steps.verify.outputs.runtime_sha }}
        run: |
          set -euo pipefail
          evidence_dir="${RUNNER_TEMP}/fugue-rp0-carrier-materialization"
          install -d -m 0700 "${evidence_dir}"
          umask 077
          python3 - "${evidence_dir}/intent.json" <<'PY'
          import json, os, sys
          from datetime import datetime, timezone
          payload = {
              "schema_version": 1,
              "workflow": "materialize-control-plane-release-baseline-carrier-rp0",
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "policy_sha": os.environ["GITHUB_SHA"],
              "previous_baseline_object_sha": os.environ["PREVIOUS_OBJECT_SHA"],
              "runtime_sha": os.environ["RUNTIME_SHA"],
              "transition": "carrier-object-pending-ref-unchanged",
              "ref_mutation_attempted": False,
              "cluster_mutation_attempted": False,
              "recorded_at": datetime.now(timezone.utc).isoformat(),
          }
          with open(sys.argv[1], "w", encoding="utf-8") as handle:
              json.dump(payload, handle, indent=2, sort_keys=True)
              handle.write("\n")
          PY

      - name: Upload carrier materialization intent evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fugue-control-plane-rp0-carrier-intent-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/fugue-rp0-carrier-materialization/intent.json
          if-no-files-found: error
          retention-days: 90

      - name: Observe unchanged production health before carrier object write
        env:
          HEALTH_URL: ${{ steps.verify.outputs.health_url }}
        run: |
          set -euo pipefail
          for sample in 1 2 3 4 5; do
            response="$(curl --fail --silent --show-error \
              --connect-timeout 5 --max-time 10 "${HEALTH_URL}")"
            python3 - "${response}" <<'PY'
          import json, sys
          if json.loads(sys.argv[1]) != {"status": "ok"}:
              raise SystemExit("production health payload drifted")
          PY
            [[ "${sample}" == '5' ]] || sleep 15
          done

      - name: Materialize canonical forward carrier objects without moving a ref
        id: materialize
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          PREVIOUS_OBJECT_SHA: ${{ steps.verify.outputs.previous_object_sha }}
          RUNTIME_SHA: ${{ steps.verify.outputs.runtime_sha }}
          CARRIER_DATE: ${{ steps.verify.outputs.carrier_date }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          readonly baseline_ref='refs/heads/fugue-control-plane-release-baseline'
          readonly metadata_path='fugue-runtime-baseline.json'
          [[ "${GITHUB_RUN_ATTEMPT}" == '1' && "${GITHUB_SHA}" == "${EXPECTED_SHA}" ]] || exit 1
          [[ "${PREVIOUS_OBJECT_SHA}" =~ ^[0-9a-f]{40}$ && "${RUNTIME_SHA}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          [[ "${CARRIER_DATE}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$ ]] || exit 1
          object_tmp="$(mktemp -d)" || exit 1
          trap 'rm -rf "${object_tmp}"' EXIT

          python3 - "${PREVIOUS_OBJECT_SHA}" "${RUNTIME_SHA}" \
            "${object_tmp}/metadata.json" "${object_tmp}/blob-request.json" <<'PY'
          import json, pathlib, sys
          metadata = {
              "previous_baseline_object_sha": sys.argv[1],
              "runtime_sha": sys.argv[2],
              "schema_version": 1,
          }
          content = json.dumps(metadata, sort_keys=True, separators=(",", ":")) + "\n"
          pathlib.Path(sys.argv[3]).write_text(content, encoding="utf-8")
          pathlib.Path(sys.argv[4]).write_text(
              json.dumps({"content": content, "encoding": "utf-8"}, separators=(",", ":")),
              encoding="utf-8",
          )
          PY
          blob_sha="$(git hash-object -w --stdin <"${object_tmp}/metadata.json")" || exit 1
          [[ "${blob_sha}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          blob_status=0
          timeout --kill-after=2s 10s gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/git/blobs" \
            --input "${object_tmp}/blob-request.json" >"${object_tmp}/blob-response.json" || blob_status=$?
          timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/blobs/${blob_sha}" \
            >"${object_tmp}/blob-readback.json" || exit 1
          python3 - "${object_tmp}/metadata.json" "${object_tmp}/blob-readback.json" "${blob_sha}" <<'PY'
          import base64, pathlib, json, sys
          expected = pathlib.Path(sys.argv[1]).read_bytes()
          response = json.load(open(sys.argv[2], encoding="utf-8"))
          encoded = response.get("content")
          if response.get("sha") != sys.argv[3] or response.get("encoding") != "base64" or not isinstance(encoded, str):
              raise SystemExit("carrier blob readback identity drifted")
          if base64.b64decode("".join(encoded.split()), validate=True) != expected:
              raise SystemExit("carrier blob readback bytes drifted")
          PY

          printf '100644 blob %s\t%s\n' "${blob_sha}" "${metadata_path}" >"${object_tmp}/tree-input"
          tree_sha="$(git mktree <"${object_tmp}/tree-input")" || exit 1
          [[ "${tree_sha}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          python3 - "${metadata_path}" "${blob_sha}" >"${object_tmp}/tree-request.json" <<'PY'
          import json, sys
          json.dump({"tree": [{"path": sys.argv[1], "mode": "100644", "type": "blob", "sha": sys.argv[2]}]}, sys.stdout, separators=(",", ":"))
          PY
          tree_status=0
          timeout --kill-after=2s 10s gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/git/trees" \
            --input "${object_tmp}/tree-request.json" >"${object_tmp}/tree-response.json" || tree_status=$?
          timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/trees/${tree_sha}" \
            >"${object_tmp}/tree-readback.json" || exit 1
          python3 - "${object_tmp}/tree-readback.json" "${tree_sha}" "${metadata_path}" "${blob_sha}" <<'PY'
          import json, sys
          response = json.load(open(sys.argv[1], encoding="utf-8"))
          expected = [{"path": sys.argv[3], "mode": "100644", "type": "blob", "sha": sys.argv[4]}]
          actual = [{key: entry.get(key) for key in ("path", "mode", "type", "sha")} for entry in response.get("tree", [])]
          if response.get("sha") != sys.argv[2] or response.get("truncated") is not False or actual != expected:
              raise SystemExit("carrier tree readback drifted")
          PY

          carrier_message="fugue runtime baseline carrier ${RUNTIME_SHA}"
          python3 - "${tree_sha}" "${PREVIOUS_OBJECT_SHA}" "${CARRIER_DATE}" \
            "${carrier_message}" "${object_tmp}/commit-object" <<'PY'
          import datetime, pathlib, sys
          tree_sha, parent_sha, date, message, output_path = sys.argv[1:]
          instant = datetime.datetime.fromisoformat(date.replace("Z", "+00:00"))
          if instant.tzinfo != datetime.timezone.utc:
              raise SystemExit("carrier commit date is not UTC")
          timestamp = int(instant.timestamp())
          identity = f"Fugue Release Baseline <release-baseline@fugue.invalid> {timestamp} +0000"
          content = (
              f"tree {tree_sha}\n"
              f"parent {parent_sha}\n"
              f"author {identity}\n"
              f"committer {identity}\n"
              "\n"
          ).encode("utf-8") + message.encode("utf-8")
          pathlib.Path(output_path).write_bytes(content)
          PY
          carrier_sha="$(git hash-object -t commit --stdin <"${object_tmp}/commit-object")" || exit 1
          [[ "${carrier_sha}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          python3 - "${carrier_message}" "${tree_sha}" "${PREVIOUS_OBJECT_SHA}" "${CARRIER_DATE}" \
            >"${object_tmp}/commit-request.json" <<'PY'
          import json, sys
          identity = {"name": "Fugue Release Baseline", "email": "release-baseline@fugue.invalid", "date": sys.argv[4]}
          payload = {"message": sys.argv[1], "tree": sys.argv[2], "parents": [sys.argv[3]], "author": identity, "committer": identity}
          json.dump(payload, sys.stdout, separators=(",", ":"))
          PY
          commit_status=0
          timeout --kill-after=2s 10s gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/git/commits" \
            --input "${object_tmp}/commit-request.json" >"${object_tmp}/commit-response.json" || commit_status=$?
          timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/commits/${carrier_sha}" \
            >"${object_tmp}/commit-readback.json" || exit 1
          python3 - "${object_tmp}/commit-request.json" "${object_tmp}/commit-readback.json" \
            "${carrier_sha}" "${tree_sha}" "${PREVIOUS_OBJECT_SHA}" <<'PY'
          import json, sys
          request = json.load(open(sys.argv[1], encoding="utf-8"))
          response = json.load(open(sys.argv[2], encoding="utf-8"))
          if response.get("sha") != sys.argv[3] or response.get("message") != request["message"]:
              raise SystemExit("carrier commit readback identity drifted")
          if response.get("tree", {}).get("sha") != sys.argv[4]:
              raise SystemExit("carrier commit tree drifted")
          parents = response.get("parents")
          if not isinstance(parents, list) or len(parents) != 1 or parents[0].get("sha") != sys.argv[5]:
              raise SystemExit("carrier commit parent drifted")
          for field in ("author", "committer"):
              actual = {key: response.get(field, {}).get(key) for key in ("name", "email", "date")}
              if actual != request[field]:
                  raise SystemExit(f"carrier commit {field} drifted")
          PY

          after_status=0
          after_object="$(timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/matching-refs/heads/fugue-control-plane-release-baseline" \
            --jq 'if length == 1 and .[0].ref == "refs/heads/fugue-control-plane-release-baseline" then .[0].object.sha else error("missing or ambiguous baseline ref") end')" || after_status=$?
          [[ "${after_status}" == '0' && "${after_object}" == "${PREVIOUS_OBJECT_SHA}" ]] || exit 1
          {
            printf 'metadata_blob_sha=%s\n' "${blob_sha}"
            printf 'metadata_tree_sha=%s\n' "${tree_sha}"
            printf 'carrier_commit_sha=%s\n' "${carrier_sha}"
            printf 'blob_transport_status=%s\n' "${blob_status}"
            printf 'tree_transport_status=%s\n' "${tree_status}"
            printf 'commit_transport_status=%s\n' "${commit_status}"
          } >>"${GITHUB_OUTPUT}" || exit 1

      - name: Write carrier materialization result evidence
        env:
          METADATA_BLOB_SHA: ${{ steps.materialize.outputs.metadata_blob_sha }}
          METADATA_TREE_SHA: ${{ steps.materialize.outputs.metadata_tree_sha }}
          CARRIER_COMMIT_SHA: ${{ steps.materialize.outputs.carrier_commit_sha }}
          BLOB_TRANSPORT_STATUS: ${{ steps.materialize.outputs.blob_transport_status }}
          TREE_TRANSPORT_STATUS: ${{ steps.materialize.outputs.tree_transport_status }}
          COMMIT_TRANSPORT_STATUS: ${{ steps.materialize.outputs.commit_transport_status }}
        run: |
          set -euo pipefail
          evidence_file="${RUNNER_TEMP}/fugue-rp0-carrier-materialization/intent.json"
          python3 - "${evidence_file}" <<'PY'
          import json, os, pathlib, re, sys
          path = pathlib.Path(sys.argv[1])
          payload = json.loads(path.read_text(encoding="utf-8"))
          if payload.get("transition") != "carrier-object-pending-ref-unchanged":
              raise SystemExit("carrier intent transition drifted")
          for key, env_name in (
              ("metadata_blob_sha", "METADATA_BLOB_SHA"),
              ("metadata_tree_sha", "METADATA_TREE_SHA"),
              ("carrier_commit_sha", "CARRIER_COMMIT_SHA"),
          ):
              value = os.environ[env_name]
              if re.fullmatch(r"[0-9a-f]{40}", value) is None:
                  raise SystemExit(f"{key} is malformed")
              payload[key] = value
          payload["transport_status"] = {
              "blob": int(os.environ["BLOB_TRANSPORT_STATUS"]),
              "tree": int(os.environ["TREE_TRANSPORT_STATUS"]),
              "commit": int(os.environ["COMMIT_TRANSPORT_STATUS"]),
          }
          payload["transition"] = "carrier-object-materialized-ref-unchanged"
          temporary = path.with_suffix(".tmp")
          temporary.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          temporary.replace(path)
          PY

      - name: Upload carrier materialization result evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fugue-control-plane-rp0-carrier-result-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/fugue-rp0-carrier-materialization/intent.json
          if-no-files-found: error
          retention-days: 90
