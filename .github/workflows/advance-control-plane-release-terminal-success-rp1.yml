name: advance-control-plane-release-terminal-success-rp1

on:
  workflow_dispatch:
    inputs:
      expected_sha:
        description: Exact main policy SHA authorized to advance the terminal ref
        required: true
        type: string
      expected_previous_terminal_oid:
        description: Exact current reservation commit before the CAS
        required: true
        type: string
      success_terminal_oid:
        description: Exact already-materialized success child commit
        required: true
        type: string
      materializer_run_id:
        description: Exact successful success-object materializer run ID
        required: true
        type: string
      materializer_intent_artifact_id:
        description: Exact immutable success-object intent artifact ID
        required: true
        type: string
      materializer_intent_artifact_digest:
        description: Exact sha256 digest of the success-object intent artifact ZIP
        required: true
        type: string

permissions: {}

concurrency:
  group: fugue-release-terminal-success-ref-cas-rp1
  cancel-in-progress: false

jobs:
  advance-terminal-success:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout exact terminal success CAS policy SHA
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact terminal success CAS authorization
        id: verify
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          EXPECTED_PREVIOUS_TERMINAL_OID: ${{ inputs.expected_previous_terminal_oid }}
          SUCCESS_TERMINAL_OID: ${{ inputs.success_terminal_oid }}
          MATERIALIZER_RUN_ID: ${{ inputs.materializer_run_id }}
          MATERIALIZER_INTENT_ARTIFACT_ID: ${{ inputs.materializer_intent_artifact_id }}
          MATERIALIZER_INTENT_ARTIFACT_DIGEST: ${{ inputs.materializer_intent_artifact_digest }}
          HEALTH_URL: ${{ vars.FUGUE_CONTROL_PLANE_RP1_HEALTH_URL || 'https://api.fugue.pro/healthz' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          readonly terminal_ref='refs/heads/fugue-control-plane-release-terminal-state'
          readonly materializer_path='.github/workflows/materialize-control-plane-release-terminal-success-rp1.yml'
          [[ "${GITHUB_EVENT_NAME}" == 'workflow_dispatch' ]] || exit 1
          [[ "${GITHUB_REF}" == 'refs/heads/main' ]] || exit 1
          [[ "${GITHUB_RUN_ATTEMPT}" == '1' ]] || exit 1
          [[ "${EXPECTED_SHA}" =~ ^[0-9a-f]{40}$ && "${EXPECTED_SHA}" == "${GITHUB_SHA}" ]] || exit 1
          [[ "${EXPECTED_PREVIOUS_TERMINAL_OID}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          [[ "${SUCCESS_TERMINAL_OID}" =~ ^[0-9a-f]{40}$ && "${SUCCESS_TERMINAL_OID}" != "${EXPECTED_PREVIOUS_TERMINAL_OID}" ]] || exit 1
          [[ "${MATERIALIZER_RUN_ID}" =~ ^[1-9][0-9]*$ ]] || exit 1
          [[ "${MATERIALIZER_INTENT_ARTIFACT_ID}" =~ ^[1-9][0-9]*$ ]] || exit 1
          [[ "${MATERIALIZER_INTENT_ARTIFACT_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]] || exit 1

          policy_identity="$(git rev-list --parents -n 1 "${GITHUB_SHA}")" || exit 1
          read -r policy_commit policy_parent extra <<<"${policy_identity}" || exit 1
          [[ -z "${extra:-}" && "${policy_commit}" == "${GITHUB_SHA}" && "${policy_parent}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          actual_changes_text="$(git diff --no-renames --name-status "${policy_parent}" "${GITHUB_SHA}")" || exit 1
          mapfile -t actual_changes <<<"${actual_changes_text}"
          expected_changes=(
            $'A\t.github/workflows/advance-control-plane-release-terminal-success-rp1.yml'
            $'A\tinternal/platformsafety/release_terminal_success_ref_cas_workflow_test.go'
          )
          [[ "${#actual_changes[@]}" == "${#expected_changes[@]}" ]] || exit 1
          for index in "${!expected_changes[@]}"; do
            [[ "${actual_changes[${index}]}" == "${expected_changes[${index}]}" ]] || exit 1
          done
          git diff --check "${policy_parent}" "${GITHUB_SHA}" || exit 1
          git diff --exit-code --ignore-submodules "${GITHUB_SHA}" -- || exit 1
          [[ -z "$(git status --porcelain=v1 --untracked-files=all)" ]] || exit 1

          main_head="$(timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')" || exit 1
          [[ "${main_head}" == "${GITHUB_SHA}" ]] || exit 1
          terminal_oid="$(timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/matching-refs/heads/fugue-control-plane-release-terminal-state" \
            --jq 'if length == 1 and .[0].ref == "refs/heads/fugue-control-plane-release-terminal-state" and .[0].object.type == "commit" then .[0].object.sha else error("missing or ambiguous terminal reservation") end')" || exit 1
          [[ "${terminal_oid}" == "${EXPECTED_PREVIOUS_TERMINAL_OID}" ]] || exit 1

          run_fields="$(timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${MATERIALIZER_RUN_ID}" \
            --jq '[.head_sha,.status,.conclusion,.run_attempt,.event,.path] | @tsv')" || exit 1
          IFS=$'\t' read -r run_head run_status run_conclusion run_attempt run_event run_path extra \
            <<<"${run_fields}" || exit 1
          [[ -z "${extra:-}" && "${run_head}" == "${policy_parent}" ]] || exit 1
          [[ "${run_status}" == 'completed' && "${run_conclusion}" == 'success' ]] || exit 1
          [[ "${run_attempt}" == '1' && "${run_event}" == 'workflow_dispatch' && "${run_path}" == "${materializer_path}" ]] || exit 1

          artifact_fields="$(timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/actions/artifacts/${MATERIALIZER_INTENT_ARTIFACT_ID}" \
            --jq '[.id,.name,.expired,.digest,.workflow_run.id,.workflow_run.head_sha] | @tsv')" || exit 1
          IFS=$'\t' read -r artifact_id artifact_name artifact_expired artifact_digest artifact_run_id artifact_head extra \
            <<<"${artifact_fields}" || exit 1
          [[ -z "${extra:-}" && "${artifact_id}" == "${MATERIALIZER_INTENT_ARTIFACT_ID}" ]] || exit 1
          [[ "${artifact_name}" == "fugue-rp1-terminal-success-intent-${MATERIALIZER_RUN_ID}-1" ]] || exit 1
          [[ "${artifact_expired}" == 'false' && "${artifact_digest}" == "${MATERIALIZER_INTENT_ARTIFACT_DIGEST}" ]] || exit 1
          [[ "${artifact_run_id}" == "${MATERIALIZER_RUN_ID}" && "${artifact_head}" == "${run_head}" ]] || exit 1

          evidence_tmp="$(mktemp -d)" || exit 1
          trap 'rm -rf "${evidence_tmp}"' EXIT
          timeout --kill-after=5s 30s gh api \
            "repos/${GITHUB_REPOSITORY}/actions/artifacts/${MATERIALIZER_INTENT_ARTIFACT_ID}/zip" \
            >"${evidence_tmp}/intent.zip" || exit 1
          [[ "sha256:$(sha256sum "${evidence_tmp}/intent.zip" | awk '{print $1}')" == \
             "${MATERIALIZER_INTENT_ARTIFACT_DIGEST}" ]] || exit 1
          intent_fields="$(python3 - "${evidence_tmp}/intent.zip" "${MATERIALIZER_RUN_ID}" \
            "${run_head}" "${EXPECTED_PREVIOUS_TERMINAL_OID}" "${SUCCESS_TERMINAL_OID}" \
            "${GITHUB_REPOSITORY}" "${evidence_tmp}/intent.json" <<'PY'
          import datetime, json, pathlib, re, stat, sys, zipfile
          archive, run_id, run_head, previous_oid, success_oid, repository, output = sys.argv[1:]
          with zipfile.ZipFile(archive) as handle:
              infos = handle.infolist()
              if [item.filename for item in infos] != ["intent.json"]:
                  raise SystemExit("success intent artifact inventory drifted")
              info = infos[0]
              if stat.S_ISLNK(info.external_attr >> 16) or info.file_size <= 0 or info.file_size > 16384:
                  raise SystemExit("success intent artifact entry is unsafe")
              raw = handle.read(info)
          value = json.loads(raw)
          expected_keys = {
              "cluster_mutation_attempted", "git_history_rewritten", "head_sha", "ref_mutation_attempted",
              "repository", "reservation_oid", "run_attempt", "run_id", "schema_version", "source_head_sha",
              "source_run_id", "success_blob_oid", "success_commit_oid", "success_tree_oid", "terminal_date",
              "transition", "workflow",
          }
          if type(value) is not dict or set(value) != expected_keys:
              raise SystemExit("success intent artifact schema drifted")
          if value["schema_version"] != 1 or type(value["schema_version"]) is not int:
              raise SystemExit("success intent schema version drifted")
          if value["workflow"] != "materialize-control-plane-release-terminal-success-rp1":
              raise SystemExit("success intent workflow drifted")
          if value["repository"] != repository or value["run_id"] != run_id or value["run_attempt"] != 1:
              raise SystemExit("success intent run attribution drifted")
          if value["head_sha"] != run_head or value["reservation_oid"] != previous_oid:
              raise SystemExit("success intent policy/reservation binding drifted")
          if value["success_commit_oid"] != success_oid:
              raise SystemExit("success intent commit target drifted")
          if value["transition"] != "reservation-to-success-object-pending-ref-unchanged":
              raise SystemExit("success intent transition drifted")
          if value["cluster_mutation_attempted"] is not False or value["ref_mutation_attempted"] is not False or value["git_history_rewritten"] is not False:
              raise SystemExit("success intent reports an out-of-scope mutation")
          oid = re.compile(r"^[0-9a-f]{40}$")
          for key in ("head_sha", "source_head_sha", "reservation_oid", "success_blob_oid", "success_tree_oid", "success_commit_oid"):
              if type(value[key]) is not str or oid.fullmatch(value[key]) is None:
                  raise SystemExit(f"success intent {key} is malformed")
          if type(value["source_run_id"]) is not str or re.fullmatch(r"[1-9][0-9]*", value["source_run_id"]) is None:
              raise SystemExit("success intent source run is malformed")
          terminal_date = value["terminal_date"]
          if type(terminal_date) is not str or re.fullmatch(r"[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z", terminal_date) is None:
              raise SystemExit("success intent terminal date is malformed")
          if datetime.datetime.fromisoformat(terminal_date.replace("Z", "+00:00")).utcoffset() != datetime.timedelta(0):
              raise SystemExit("success intent terminal date is not UTC")
          pathlib.Path(output).write_bytes(raw)
          print("\t".join((value["source_run_id"], value["source_head_sha"], terminal_date, value["success_blob_oid"], value["success_tree_oid"])))
          PY
          )" || exit 1
          IFS=$'\t' read -r source_run_id source_head terminal_date success_blob success_tree extra \
            <<<"${intent_fields}" || exit 1
          [[ -z "${extra:-}" ]] || exit 1
          [[ "${success_blob}" == '6f02bd3684b1cbee348db49a140938b9cfcc7998' ]] || exit 1
          [[ "${success_tree}" == '321f2bf24ff5a33681baa30600531313af5e3616' ]] || exit 1

          timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/blobs/${success_blob}" >"${evidence_tmp}/blob.json" || exit 1
          timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/trees/${success_tree}" >"${evidence_tmp}/tree.json" || exit 1
          timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/commits/${SUCCESS_TERMINAL_OID}" >"${evidence_tmp}/commit.json" || exit 1
          python3 - "${evidence_tmp}" "${success_blob}" "${success_tree}" "${SUCCESS_TERMINAL_OID}" \
            "${EXPECTED_PREVIOUS_TERMINAL_OID}" "${source_run_id}" "${source_head}" "${terminal_date}" <<'PY' || exit 1
          import base64, datetime, hashlib, json, pathlib, sys
          root = pathlib.Path(sys.argv[1])
          blob_oid, tree_oid, commit_oid, previous_oid, source_run_id, source_head, terminal_date = sys.argv[2:]
          blob = json.loads((root / "blob.json").read_text(encoding="utf-8"))
          tree = json.loads((root / "tree.json").read_text(encoding="utf-8"))
          commit = json.loads((root / "commit.json").read_text(encoding="utf-8"))
          document = {
              "schema_version": 1,
              "certificate_kind": "fugue-control-plane-release-policy-terminal-finalization",
              "terminal_mode": "success",
              "source_run_id": source_run_id,
              "source_run_attempt": 1,
              "source_head_sha": source_head,
              "source_workflow": ".github/workflows/write-control-plane-release-terminal-rp1.yml",
              "source_conclusion": "success",
              "previous_terminal_state_oid": previous_oid,
              "reservation_oid": previous_oid,
          }
          canonical = (json.dumps(document, separators=(",", ":")) + "\n").encode("utf-8")
          encoded = blob.get("content")
          if blob.get("sha") != blob_oid or blob.get("encoding") != "base64" or type(encoded) is not str:
              raise SystemExit("success blob identity drifted")
          actual = base64.b64decode("".join(encoded.split()), validate=True)
          if actual != canonical or hashlib.sha1(b"blob " + str(len(actual)).encode() + b"\0" + actual).hexdigest() != blob_oid:
              raise SystemExit("success blob bytes or OID drifted")
          expected_tree = [{"path": ".fugue-release-terminal-state.json", "mode": "100644", "type": "blob", "sha": blob_oid}]
          actual_tree = [{key: item.get(key) for key in ("path", "mode", "type", "sha")} for item in tree.get("tree", [])]
          raw_tree = b"100644 .fugue-release-terminal-state.json\0" + bytes.fromhex(blob_oid)
          if tree.get("sha") != tree_oid or tree.get("truncated") is not False or actual_tree != expected_tree:
              raise SystemExit("success tree drifted")
          if hashlib.sha1(b"tree " + str(len(raw_tree)).encode() + b"\0" + raw_tree).hexdigest() != tree_oid:
              raise SystemExit("success tree OID drifted")
          identity = {"name": "Fugue Release Terminal", "email": "release-terminal@fugue.invalid", "date": terminal_date}
          if commit.get("sha") != commit_oid or commit.get("message") != f"fugue release terminal success {source_run_id}":
              raise SystemExit("success commit identity drifted")
          parents = commit.get("parents")
          if commit.get("tree", {}).get("sha") != tree_oid or type(parents) is not list or len(parents) != 1 or parents[0].get("sha") != previous_oid:
              raise SystemExit("success commit ancestry drifted")
          for field in ("author", "committer"):
              if {key: commit.get(field, {}).get(key) for key in identity} != identity:
                  raise SystemExit(f"success commit {field} drifted")
          instant = datetime.datetime.fromisoformat(terminal_date.replace("Z", "+00:00"))
          timestamp = int(instant.timestamp())
          line = f"Fugue Release Terminal <release-terminal@fugue.invalid> {timestamp} +0000"
          raw_commit = f"tree {tree_oid}\nparent {previous_oid}\nauthor {line}\ncommitter {line}\n\nfugue release terminal success {source_run_id}".encode("utf-8")
          if hashlib.sha1(b"commit " + str(len(raw_commit)).encode() + b"\0" + raw_commit).hexdigest() != commit_oid:
              raise SystemExit("success commit OID drifted")
          PY
          python3 - "${HEALTH_URL}" <<'PY' || exit 1
          import sys, urllib.parse
          parsed = urllib.parse.urlsplit(sys.argv[1])
          if parsed.scheme != "https" or not parsed.hostname or parsed.username or parsed.password or parsed.fragment:
              raise SystemExit("health URL must be credential-free HTTPS")
          PY
          {
            printf 'previous_terminal_oid=%s\n' "${EXPECTED_PREVIOUS_TERMINAL_OID}"
            printf 'success_terminal_oid=%s\n' "${SUCCESS_TERMINAL_OID}"
            printf 'materializer_run_id=%s\n' "${MATERIALIZER_RUN_ID}"
            printf 'materializer_intent_artifact_id=%s\n' "${MATERIALIZER_INTENT_ARTIFACT_ID}"
            printf 'materializer_intent_artifact_digest=%s\n' "${MATERIALIZER_INTENT_ARTIFACT_DIGEST}"
            printf 'health_url=%s\n' "${HEALTH_URL}"
          } >>"${GITHUB_OUTPUT}" || exit 1

      - name: Write terminal success ref CAS intent evidence
        env:
          PREVIOUS_TERMINAL_OID: ${{ steps.verify.outputs.previous_terminal_oid }}
          SUCCESS_TERMINAL_OID: ${{ steps.verify.outputs.success_terminal_oid }}
          MATERIALIZER_RUN_ID: ${{ steps.verify.outputs.materializer_run_id }}
          MATERIALIZER_INTENT_ARTIFACT_ID: ${{ steps.verify.outputs.materializer_intent_artifact_id }}
          MATERIALIZER_INTENT_ARTIFACT_DIGEST: ${{ steps.verify.outputs.materializer_intent_artifact_digest }}
        run: |
          set -euo pipefail
          readonly evidence_dir="${RUNNER_TEMP}/fugue-rp1-terminal-success-ref-cas"
          install -d -m 0700 "${evidence_dir}"
          umask 077
          python3 - "${evidence_dir}/intent.json" <<'PY'
          import json, os, sys
          from datetime import datetime, timezone
          payload = {
              "schema_version": 1,
              "workflow": "advance-control-plane-release-terminal-success-rp1",
              "repository": os.environ["GITHUB_REPOSITORY"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": int(os.environ["GITHUB_RUN_ATTEMPT"]),
              "policy_sha": os.environ["GITHUB_SHA"],
              "previous_terminal_oid": os.environ["PREVIOUS_TERMINAL_OID"],
              "success_terminal_oid": os.environ["SUCCESS_TERMINAL_OID"],
              "materializer_run_id": os.environ["MATERIALIZER_RUN_ID"],
              "materializer_intent_artifact_id": os.environ["MATERIALIZER_INTENT_ARTIFACT_ID"],
              "materializer_intent_artifact_digest": os.environ["MATERIALIZER_INTENT_ARTIFACT_DIGEST"],
              "transition": "reservation-to-success-ref-cas-pending",
              "ref_mutation_attempted": False,
              "cluster_mutation_attempted": False,
              "git_history_rewritten": False,
              "recorded_at": datetime.now(timezone.utc).isoformat(),
          }
          with open(sys.argv[1], "w", encoding="utf-8") as handle:
              json.dump(payload, handle, indent=2, sort_keys=True)
              handle.write("\n")
          PY

      - name: Upload terminal success ref CAS intent evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fugue-rp1-terminal-success-ref-cas-intent-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/fugue-rp1-terminal-success-ref-cas/intent.json
          if-no-files-found: error
          retention-days: 90

      - name: Observe unchanged health before terminal success ref CAS
        env:
          PREVIOUS_TERMINAL_OID: ${{ steps.verify.outputs.previous_terminal_oid }}
          SUCCESS_TERMINAL_OID: ${{ steps.verify.outputs.success_terminal_oid }}
          HEALTH_URL: ${{ steps.verify.outputs.health_url }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for sample in 1 2 3 4 5; do
            response="$(curl --fail --silent --show-error \
              --connect-timeout 5 --max-time 10 "${HEALTH_URL}")" || exit 1
            python3 - "${response}" <<'PY' || exit 1
          import json, sys
          if json.loads(sys.argv[1]) != {"status": "ok"}:
              raise SystemExit("production health payload drifted")
          PY
            terminal_oid="$(timeout --kill-after=2s 10s gh api \
              "repos/${GITHUB_REPOSITORY}/git/ref/heads/fugue-control-plane-release-terminal-state" \
              --jq '.object.sha')" || exit 1
            [[ "${terminal_oid}" == "${PREVIOUS_TERMINAL_OID}" ]] || exit 1
            success_oid="$(timeout --kill-after=2s 10s gh api \
              "repos/${GITHUB_REPOSITORY}/git/commits/${SUCCESS_TERMINAL_OID}" --jq '.sha')" || exit 1
            [[ "${success_oid}" == "${SUCCESS_TERMINAL_OID}" ]] || exit 1
            [[ "${sample}" == '5' ]] || sleep 15
          done

      - name: Advance terminal ref by one exact success CAS
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          PREVIOUS_TERMINAL_OID: ${{ steps.verify.outputs.previous_terminal_oid }}
          SUCCESS_TERMINAL_OID: ${{ steps.verify.outputs.success_terminal_oid }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          readonly terminal_ref='refs/heads/fugue-control-plane-release-terminal-state'
          [[ "${GITHUB_EVENT_NAME}" == 'workflow_dispatch' ]] || exit 1
          [[ "${GITHUB_RUN_ATTEMPT}" == '1' && "${GITHUB_SHA}" == "${EXPECTED_SHA}" ]] || exit 1
          [[ "${PREVIOUS_TERMINAL_OID}" =~ ^[0-9a-f]{40}$ && "${SUCCESS_TERMINAL_OID}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          [[ "${PREVIOUS_TERMINAL_OID}" != "${SUCCESS_TERMINAL_OID}" ]] || exit 1

          main_head="$(timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')" || exit 1
          [[ "${main_head}" == "${GITHUB_SHA}" ]] || exit 1
          before_oid="$(timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/matching-refs/heads/fugue-control-plane-release-terminal-state" \
            --jq 'if length == 1 and .[0].ref == "refs/heads/fugue-control-plane-release-terminal-state" and .[0].object.type == "commit" then .[0].object.sha else error("terminal ref drifted") end')" || exit 1
          [[ "${before_oid}" == "${PREVIOUS_TERMINAL_OID}" ]] || exit 1
          success_fields="$(timeout --kill-after=2s 10s gh api \
            "repos/${GITHUB_REPOSITORY}/git/commits/${SUCCESS_TERMINAL_OID}" \
            --jq 'if .sha and (.parents | length) == 1 then [.sha,.parents[0].sha] | @tsv else error("success commit drifted") end')" || exit 1
          IFS=$'\t' read -r success_oid success_parent extra <<<"${success_fields}" || exit 1
          [[ -z "${extra:-}" && "${success_oid}" == "${SUCCESS_TERMINAL_OID}" && "${success_parent}" == "${PREVIOUS_TERMINAL_OID}" ]] || exit 1

          repository_id="$(timeout --kill-after=2s 10s gh api graphql \
            -f 'query=query($owner:String!,$name:String!){repository(owner:$owner,name:$name){id}}' \
            -f "owner=${GITHUB_REPOSITORY_OWNER}" -f "name=${GITHUB_REPOSITORY#*/}" \
            --jq '.data.repository.id')" || exit 1
          [[ "${repository_id}" =~ ^[A-Za-z0-9_=-]+$ ]] || exit 1
          readonly mutation='mutation($repositoryId:ID!,$name:GitRefname!,$beforeOid:GitObjectID!,$afterOid:GitObjectID!,$force:Boolean!,$clientMutationId:String!){updateRefs(input:{repositoryId:$repositoryId,refUpdates:[{name:$name,beforeOid:$beforeOid,afterOid:$afterOid,force:$force}],clientMutationId:$clientMutationId}){clientMutationId}}'
          mutation_id="fugue-rp1-terminal-success-${PREVIOUS_TERMINAL_OID:0:12}-${SUCCESS_TERMINAL_OID:0:12}"
          mutation_status=0
          echoed="$(timeout --kill-after=2s 10s gh api graphql \
            -f "query=${mutation}" -f "repositoryId=${repository_id}" -f "name=${terminal_ref}" \
            -f "beforeOid=${PREVIOUS_TERMINAL_OID}" -f "afterOid=${SUCCESS_TERMINAL_OID}" -F 'force=false' \
            -f "clientMutationId=${mutation_id}" --jq '.data.updateRefs.clientMutationId')" || mutation_status=$?

          for attempt in 1 2 3 4 5; do
            observe_status=0
            observed="$(timeout --kill-after=2s 10s gh api \
              "repos/${GITHUB_REPOSITORY}/git/matching-refs/heads/fugue-control-plane-release-terminal-state" \
              --jq 'if length == 1 and .[0].ref == "refs/heads/fugue-control-plane-release-terminal-state" and .[0].object.type == "commit" then .[0].object.sha else "unknown" end')" || observe_status=$?
            if [[ "${observe_status}" == '0' && "${observed}" == "${SUCCESS_TERMINAL_OID}" ]]; then
              printf 'terminal success ref settled at exact commit %s\n' "${SUCCESS_TERMINAL_OID}" || true
              exit 0
            fi
            [[ "${attempt}" == '5' ]] || sleep 2
          done
          printf 'terminal success ref CAS did not settle: mutation_status=%s echoed=%s\n' "${mutation_status}" "${echoed:-missing}" >&2
          exit 1
