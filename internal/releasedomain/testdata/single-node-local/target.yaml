apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fugue-node-local-dns
  namespace: kube-system
  labels:
    app.kubernetes.io/component: node-local-dns
    fugue.io/rollout-subsystem: cluster-dns
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: node-local-dns
  template:
    metadata:
      labels:
        app.kubernetes.io/component: node-local-dns
    spec:
      containers:
        - name: node-cache
          image: registry.k8s.io/dns/k8s-dns-node-cache:1.26.8
